<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Summary — Will probably / Might | A1 | JUCUM</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fredoka:wght@400;500;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{
--bg:#FAFAF6;--card:#fff;--text:#2A2A2A;--text-soft:#777;--border:#E8E5DC;
--shadow:0 3px 16px rgba(0,0,0,.06);--radius:14px;
--lp:#2196F3;--ld:#0D47A1;--ll:#E3F2FD;--lm:#BBDEFB;
--lg:linear-gradient(135deg,#1565C0,#2196F3);--lglow:rgba(33,150,243,.15);
--badge-text:#0A2A5E;
--subj:#1565C0;--subj-bg:#E3F2FD;
--verb:#E53935;--verb-bg:#FFEBEE;
--comp:#00897B;--comp-bg:#E0F2F1;
--neg:#AD1457;--neg-bg:#FCE4EC;
--quest:#7B1FA2;--quest-bg:#F3E5F5;
--ok:#2E7D32;--ok-bg:#E8F5E9;
--err:#C62828;--err-bg:#FFEBEE;
--note-bg:#E3F2FD;--note-border:#2196F3;
--will:#1B5E20;--will-bg:#E8F5E9;--will-border:#81C784;
--prob:#F57F17;--prob-bg:#FFF9C4;--prob-border:#FFD54F;
--might:#5E35B1;--might-bg:#EDE7F6;--might-border:#B39DDB;
--wont:#B71C1C;--wont-bg:#FFEBEE;--wont-border:#EF9A9A;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;padding:1.5rem 1rem;-webkit-font-smoothing:antialiased}
.container{max-width:780px;margin:0 auto}

.level-badge{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:var(--ll);color:var(--badge-text);padding:4px 12px;border-radius:20px;border:1.5px solid var(--lm);margin-bottom:.8rem}
.level-header{text-align:center;padding:2rem;border-radius:20px;color:#fff;position:relative;overflow:hidden;margin-bottom:1.2rem;background:var(--lg)}
.level-header::before{content:'';position:absolute;top:-40%;right:-15%;width:250px;height:250px;background:rgba(255,255,255,.1);border-radius:50%}
.level-header h1{font-family:'Fredoka',sans-serif;font-size:1.8rem;font-weight:600;position:relative;z-index:1}
.level-header .module-name{font-family:'Fredoka',sans-serif;font-size:1.1rem;font-weight:500;opacity:.95;position:relative;z-index:1;margin-top:.2rem}
.level-header .subtitle{opacity:.8;font-size:.85rem;position:relative;z-index:1;margin-top:.15rem}

.step-tabs{display:flex;gap:.35rem;margin-bottom:1rem;flex-wrap:wrap}
.step-tab{padding:.45rem .85rem;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card);transition:.2s;font-family:'Nunito',sans-serif}
.step-tab:hover{background:var(--ll)}
.step-tab.active{background:var(--ll);border-color:var(--lp);color:var(--ld)}
.step-tab.done{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-bottom:1.2rem;box-shadow:var(--shadow);border-top:3.5px solid var(--lp);display:none}
.card.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.section-label{display:flex;align-items:center;gap:.5rem;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--ld);margin-bottom:.3rem}
.section-label::before{content:'';width:20px;height:3px;background:var(--lp);border-radius:2px}
.section-title{font-family:'Fredoka',sans-serif;font-size:1.25rem;font-weight:600;margin-bottom:.1rem}
.section-desc{font-size:.85rem;color:var(--text-soft);margin-bottom:1rem}

.g-subj{background:var(--subj-bg);color:var(--subj);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--subj)}
.g-verb{background:var(--verb-bg);color:var(--verb);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--verb)}
.g-comp{background:var(--comp-bg);color:var(--comp);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--comp)}
.g-neg{background:var(--neg-bg);color:var(--neg);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--neg)}
.g-quest{background:var(--quest-bg);color:var(--quest);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--quest)}
.g-will{background:var(--will-bg);color:var(--will);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--will-border)}
.g-prob{background:var(--prob-bg);color:var(--prob);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--prob-border)}
.g-might{background:var(--might-bg);color:var(--might);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--might-border)}
.g-wont{background:var(--wont-bg);color:var(--wont);padding:1px 6px;border-radius:4px;font-weight:700;border-bottom:2.5px solid var(--wont-border)}

.g-table{width:100%;border-collapse:separate;border-spacing:0;margin:.8rem 0;border-radius:10px;overflow:hidden;font-size:.83rem;border:1px solid var(--border)}
.g-table th{background:var(--lg);color:#fff;padding:.65rem .6rem;font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.g-table td{padding:.6rem;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.g-table tr:nth-child(even) td{background:var(--ll)}
.g-table tr:last-child td{border-bottom:none}

.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.8rem 0}
.compare-card{padding:1rem;border-radius:12px}
.compare-card.esp{background:var(--ll);border:2px solid var(--lm)}
.compare-card.eng{background:var(--will-bg);border:2px solid var(--will-border)}
.compare-card h4{font-family:'Fredoka',sans-serif;font-size:.9rem;margin-bottom:.5rem}
.compare-card.esp h4{color:var(--ld)}
.compare-card.eng h4{color:var(--will)}
.compare-card ul{list-style:none;font-size:.82rem;color:var(--text-soft)}
.compare-card li{padding:3px 0;border-bottom:1px dashed rgba(0,0,0,.07)}
.compare-card li:last-child{border-bottom:none}

.cert-scale{background:#F8F9FA;border:1.5px solid var(--border);border-radius:14px;padding:1.1rem 1.2rem;margin:.8rem 0}
.cert-title{font-size:.72rem;font-weight:800;color:var(--ld);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.7rem}
.cert-bar{display:flex;gap:0;border-radius:8px;overflow:hidden;height:36px;margin-bottom:.5rem}
.cert-seg{display:flex;align-items:center;justify-content:center;font-family:'Fredoka',sans-serif;font-size:.8rem;font-weight:600;color:#fff;text-align:center;padding:0 4px}
.cert-seg.will{background:var(--will);flex:2}
.cert-seg.will-prob{background:var(--prob);flex:2;color:#5F4000}
.cert-seg.might{background:var(--might);flex:2}
.cert-seg.wont{background:var(--wont);flex:2}
.cert-labels{display:flex;justify-content:space-between;font-size:.65rem;color:var(--text-soft);padding:0 2px}

.future-grid{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin:.8rem 0}
.future-card{padding:.9rem;border-radius:12px;border:2px solid}
.future-card.will{background:var(--will-bg);border-color:var(--will-border)}
.future-card.will-prob{background:var(--prob-bg);border-color:var(--prob-border)}
.future-card.might{background:var(--might-bg);border-color:var(--might-border)}
.future-card.wont{background:var(--wont-bg);border-color:var(--wont-border)}
.future-card .fc-word{font-family:'Fredoka',sans-serif;font-size:1rem;font-weight:600;margin-bottom:.15rem}
.future-card.will .fc-word{color:var(--will)}
.future-card.will-prob .fc-word{color:var(--prob)}
.future-card.might .fc-word{color:var(--might)}
.future-card.wont .fc-word{color:var(--wont)}
.future-card .fc-pct{font-size:.72rem;color:var(--text-soft);margin-bottom:.25rem}
.future-card .fc-esp{font-size:.76rem;font-style:italic;color:var(--text-soft);margin-bottom:.25rem}
.future-card .fc-ex{font-size:.77rem;color:var(--text);font-weight:600}

.adverb-box{background:#FFFDE7;border:2px solid #FFD54F;border-radius:12px;padding:.9rem 1.1rem;margin:.8rem 0}
.adverb-box .ab-title{font-family:'Fredoka',sans-serif;font-size:.82rem;color:#F57F17;margin-bottom:.5rem}
.adverb-row{display:flex;align-items:center;gap:.7rem;margin:.3rem 0;font-size:.83rem}
.adverb-word{font-family:'Fredoka',sans-serif;font-size:.88rem;font-weight:600;color:var(--prob);min-width:80px}
.adverb-pos{font-size:.75rem;color:var(--text-soft);flex:1}

.formula-strip{display:flex;gap:.3rem;flex-wrap:wrap;align-items:center;background:var(--note-bg);border:2px solid var(--note-border);border-radius:12px;padding:.8rem 1rem;margin:.8rem 0}
.fs-block{padding:4px 10px;border-radius:6px;font-family:'Fredoka',sans-serif;font-size:.88rem;font-weight:600;white-space:nowrap}
.fs-block.subj{background:var(--subj-bg);color:var(--subj);border:1.5px solid #90CAF9}
.fs-block.will{background:var(--will-bg);color:var(--will);border:1.5px solid var(--will-border)}
.fs-block.prob{background:var(--prob-bg);color:var(--prob);border:1.5px solid var(--prob-border)}
.fs-block.might{background:var(--might-bg);color:var(--might);border:1.5px solid var(--might-border)}
.fs-block.verb{background:var(--verb-bg);color:var(--verb);border:1.5px solid #EF9A9A}
.fs-sep{color:var(--text-soft);font-size:1.1rem;font-weight:700}
.fs-opt{font-size:.72rem;color:var(--text-soft);font-style:italic;align-self:center}

.formula-box{background:var(--note-bg);border:2px solid var(--note-border);border-radius:12px;padding:1rem;margin:.8rem 0;text-align:center;font-family:'Fredoka',sans-serif;font-size:.92rem;color:var(--ld);line-height:2}
.tip-card{background:var(--ll);border-radius:10px;padding:.8rem 1rem;margin:.5rem 0;font-size:.83rem;border-left:3px solid var(--lp)}
.tip-card strong{color:var(--ld)}
.alert-card{background:var(--err-bg);border:2px solid #EF5350;border-radius:10px;padding:.8rem 1rem;margin:.8rem 0}
.alert-card .atitle{font-family:'Fredoka',sans-serif;color:var(--err);font-size:.82rem;margin-bottom:.3rem}
.alert-card p{font-size:.82rem;color:var(--text-soft);line-height:1.6}

.ex-row{display:flex;align-items:center;gap:.6rem;padding:.6rem .8rem;border-radius:10px;margin:.4rem 0;font-size:.88rem}
.ex-row .icon{font-size:1.2rem;flex-shrink:0}
.ex-row .en{font-weight:700;color:var(--text)}
.ex-row .es{font-family:'Lora',serif;font-style:italic;font-size:.82rem;color:var(--text-soft);margin-top:1px}
.ex-right{border-left:3px solid var(--ok);background:var(--ok-bg)}
.ex-wrong{border-left:3px solid var(--err);background:var(--err-bg)}

.ex-section{margin-top:1.2rem;padding-top:1rem;border-top:2px dashed var(--lm)}
.ex-section h3{font-family:'Fredoka',sans-serif;color:var(--ld);font-size:.9rem;margin-bottom:.8rem}
.exercise{background:#fafafa;border-radius:12px;padding:1rem;margin-bottom:.7rem;border:2px solid #eee;transition:.2s}
.exercise.correct{border-color:var(--ok);background:var(--ok-bg)}
.exercise.incorrect{border-color:var(--err);background:var(--err-bg)}
.exercise-q{font-size:.88rem;margin-bottom:.7rem;line-height:1.5}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.opt-btn{padding:.65rem .5rem;border:2px solid #e0e0e0;border-radius:10px;background:var(--card);color:var(--text-soft);font-size:.83rem;font-weight:600;cursor:pointer;transition:.15s;font-family:'Nunito',sans-serif;text-align:left;line-height:1.4}
.opt-btn:hover:not(:disabled){border-color:var(--lp);background:var(--ll)}
.opt-btn:disabled{cursor:not-allowed;opacity:.7}
.opt-btn.sel-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt-btn.sel-bad{background:var(--err);color:#fff;border-color:var(--err)}
.opt-btn.show-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.fb{margin-top:.7rem;padding:0;border-radius:12px;font-size:.82rem;display:none;line-height:1.6;overflow:hidden}
.fb.show{display:block;animation:fbSlide .35s ease}
@keyframes fbSlide{from{opacity:0;max-height:0;transform:translateY(-8px)}to{opacity:1;max-height:600px;transform:translateY(0)}}
.fb-header{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;font-family:'Fredoka',sans-serif;font-size:.85rem;font-weight:600}
.fb.fb-ok .fb-header{background:#C8E6C9;color:var(--ok)}
.fb.fb-bad .fb-header{background:#FFCDD2;color:var(--err)}
.fb-header .fb-icon{font-size:1.2rem}
.fb-body{padding:.8rem 1rem}
.fb.fb-ok .fb-body{background:var(--ok-bg)}
.fb.fb-bad .fb-body{background:var(--err-bg)}
.fb-row{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.4rem}
.fb-row:last-child{margin-bottom:0}
.fb-row .fb-dot{font-size:.9rem;flex-shrink:0;margin-top:1px}
.fb-row .fb-text{flex:1}
.fb-correct-answer{color:var(--ok);font-weight:700}
.fb-wrong-reason{color:var(--err);font-weight:600}
.fb-example{display:inline-flex;align-items:center;gap:.3rem;margin-top:.3rem;padding:3px 10px;border-radius:6px;font-size:.78rem;font-weight:700}
.fb.fb-ok .fb-example{background:#A5D6A7;color:#1B5E20}
.fb.fb-bad .fb-example{background:#EF9A9A;color:#B71C1C}
.fb-tip{margin-top:.5rem;padding:.5rem .7rem;border-radius:8px;background:var(--note-bg);border:1px solid var(--note-border);font-size:.76rem;color:#0a2a5e}
.fb-tip strong{color:var(--ld)}
.score-bar{text-align:center;padding:.8rem;background:var(--ll);border-radius:10px;margin-top:.8rem;border:1px solid var(--lm)}
.score-bar .num{font-family:'Fredoka',sans-serif;font-size:1.4rem;color:var(--ld)}
.score-bar .lbl{font-size:.7rem;color:var(--lp);font-weight:700;text-transform:uppercase;letter-spacing:1px}

.summary-final{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-top:1rem;box-shadow:var(--shadow);border-top:3.5px solid var(--ok);display:none}
.summary-final.show{display:block}
.summary-final h3{font-family:'Fredoka',sans-serif;color:var(--ok);margin-bottom:.6rem}
.summary-final ul{list-style:none}
.summary-final li{padding:4px 0 4px 20px;position:relative;font-size:.83rem;color:var(--text-soft)}
.summary-final li:before{content:"✔";position:absolute;left:0;color:var(--lp);font-weight:700}

@media(max-width:600px){
  .level-header h1{font-size:1.4rem}
  .card{padding:1.2rem}
  .compare-grid,.future-grid{grid-template-columns:1fr}
  .cert-seg{font-size:.65rem}
  .formula-strip{gap:.2rem}
}
</style>
</head>
<body>
<div class="container">

<div class="level-badge">💙 A1 · Daily Life &amp; Personal Routines</div>
<div class="level-header">
  <h1>📝 Grammar Summary</h1>
  <div class="module-name">🏠 Daily Life — Will probably / Might</div>
  <p class="subtitle">Grados de certeza sobre el futuro · will · probably · might · won't · 5 pasos × 5 ejercicios</p>
</div>

<div class="step-tabs" id="stepTabs"></div>
<div id="cardArea"></div>

<div class="summary-final" id="summaryFinal">
  <h3>🎓 Resumen: Will probably / Might</h3>
  <ul id="summaryList"></ul>
</div>

</div>
<script>
var TOPIC = {
  summary: [
    "<b>will</b> = seguro/decisión sobre el futuro → <i>I will cook dinner.</i> (~90%)",
    "<b>will probably</b> = bastante probable → <i>She will probably arrive late.</i> (~75%)",
    "<b>might</b> = posible, no seguro → <i>He might come.</i> (~50%)",
    "<b>won't</b> = casi seguro que NO pasará → <i>I won't be late.</i> (~10%)",
    "<b>Posición de probably:</b> después de will, antes del verbo → <i>I will <u>probably</u> go.</i>",
    "<b>Forma:</b> will/might/won't + base verb (sin to, sin -s)"
  ],
  steps: [
    /* ── PASO 1 ── */
    {
      icon: "🇪🇸", title: "Repaso en Español",
      html: '<div class="section-label">Paso 1</div><div class="section-title">Paso 1: 🇪🇸 Repaso en Español</div>' +
        '<div class="section-desc">En español usamos expresiones como "seguramente", "probablemente", "quizás" o "no creo que" para indicar cuánta certeza tenemos sobre algo en el futuro. En inglés hay palabras específicas para cada nivel de certeza.</div>' +
        '<div class="compare-grid">' +
          '<div class="compare-card esp"><h4>🇪🇸 Certeza en Español</h4><ul>' +
            '<li><b>Voy a</b> cocinar hoy. (seguro)</li>' +
            '<li><b>Seguramente</b> llegue tarde. (probable)</li>' +
            '<li><b>Probablemente</b> venga. (probable)</li>' +
            '<li><b>Quizás</b> vaya. (posible)</li>' +
            '<li><b>No creo que</b> llueva. (improbable)</li>' +
          '</ul></div>' +
          '<div class="compare-card eng"><h4>🇬🇧 Degrees of Certainty</h4><ul>' +
            '<li>I <b>will</b> cook today. (certain)</li>' +
            '<li>She <b>will probably</b> be late. (likely)</li>' +
            '<li>He <b>might</b> come. (possible)</li>' +
            '<li>It <b>might not</b> rain. (unlikely)</li>' +
            '<li>I <b>won\'t</b> be late. (almost certain NOT)</li>' +
          '</ul></div>' +
        '</div>' +
        '<div class="cert-scale">' +
          '<div class="cert-title">📊 Escala de certeza — Futuro</div>' +
          '<div class="cert-bar">' +
            '<div class="cert-seg will">will ✅</div>' +
            '<div class="cert-seg will-prob">will probably</div>' +
            '<div class="cert-seg might">might</div>' +
            '<div class="cert-seg wont">won\'t ❌</div>' +
          '</div>' +
          '<div class="cert-labels"><span>← seguro que SÍ (~90%)</span><span>probable (~75%)</span><span>posible (~50%)</span><span>seguro que NO (~10%) →</span></div>' +
        '</div>' +
        '<div class="tip-card"><strong>💡 Clave:</strong> A diferencia de los modales de deducción (pasado/presente), estos expresan certeza sobre el <em>futuro</em>. ¿Qué tan seguro estás de que algo va a pasar?</div>',
      exercises: [
        {q: '"Seguramente llegue tarde." (probable, ~75%) en inglés:', a: 'b', o: ['She will arrive late.', 'She will probably arrive late.'], fc: '"Will probably" = bastante probable pero no 100% seguro. ~75% de certeza.', fi: '"Will arrive" sería certeza total (~90%). "Probably" baja la certeza a probable.', ex: 'She will probably arrive late. → Seguramente llegue tarde.', tip: 'will probably = bastante probable (~75%)'},
        {q: '"Quizás vaya." (posible, ~50%) en inglés:', a: 'a', o: ['I might go.', 'I will go.'], fc: '"Might" = posibilidad, ~50%. Quizás sí, quizás no.', fi: '"Will go" = certeza (~90%). "Might" expresa la duda de "quizás".', ex: 'I might go. → Quizás vaya.', tip: 'might = posible (~50%)'},
        {q: '"No voy a llegar tarde." (casi seguro que NO) en inglés:', a: 'b', o: ["I might not be late.", "I won't be late."], fc: '"Won\'t" = contracción de "will not". Casi seguro que NO va a pasar.', fi: '"Might not" = posiblemente no, pero con duda. "Won\'t" es más fuerte: casi seguro que no.', ex: "I won't be late. → No voy a llegar tarde.", tip: "won't = casi seguro que NO (~10%)"},
        {q: '"Voy a cocinar hoy." (certeza, decisión) en inglés:', a: 'a', o: ['I will cook today.', 'I might cook today.'], fc: '"Will" = certeza o decisión sobre el futuro. Sin duda.', fi: '"Might" introduce duda. "Will" es la decisión/certeza directa.', ex: 'I will cook today. → Voy a cocinar hoy.', tip: 'will = certeza/decisión (~90%)'},
        {q: 'El orden correcto con "probably" es:', a: 'b', o: ['I probably will go.', 'I will probably go.'], fc: '"Probably" va DESPUÉS de "will": I will probably go.', fi: '"Probably will" invierte el orden. En inglés "probably" va entre "will" y el verbo base.', ex: 'I will probably go. → Probablemente vaya.', tip: 'will + probably + base verb'}
      ]
    },

    /* ── PASO 2 ── */
    {
      icon: "🤝", title: "Similitudes",
      html: '<div class="section-label">Paso 2</div><div class="section-title">Paso 2: 🤝 Similitudes ESP ↔ ENG</div>' +
        '<div class="section-desc">Los grados de certeza sobre el futuro funcionan de forma similar en ambos idiomas: añadimos modificadores para indicar cuánta seguridad tenemos.</div>' +
        '<table class="g-table"><tr><th>Similitud</th><th>🇪🇸 Español</th><th>🇬🇧 English</th></tr>' +
          '<tr><td>Certeza alta</td><td>Voy a / Seguro que</td><td><span class="g-will">will</span> + base verb</td></tr>' +
          '<tr><td>Probabilidad alta</td><td>Probablemente / Seguramente</td><td><span class="g-will">will</span> <span class="g-prob">probably</span> + base verb</td></tr>' +

          '<tr><td>Improbable</td><td>Probablemente no</td><td><span class="g-might">might not</span> + base verb</td></tr>' +
          '<tr><td>Certeza negativa</td><td>No va a / No creo que</td><td><span class="g-wont">won\'t</span> + base verb</td></tr>' +

        '<div class="future-grid">' +

          '<div class="future-card will-prob"><div class="fc-word">will probably</div><div class="fc-pct">~75% probable</div><div class="fc-esp">probablemente / seguramente</div><div class="fc-ex">She will probably come. → Seguramente vendrá.</div></div>' +
          '<div class="future-card might"><div class="fc-word">might</div><div class="fc-pct">~50% posible</div><div class="fc-esp">quizás / tal vez</div><div class="fc-ex">He might go. → Quizás vaya.</div></div>' +
          '<div class="future-card wont"><div class="fc-word">won\'t</div><div class="fc-pct">~10% casi NO ❌</div><div class="fc-esp">no va a / no creo que</div><div class="fc-ex">I won\'t be late. → No llegaré tarde.</div></div>' +
        '</div>' +
        '<div class="tip-card"><strong>💡 Diferencia clave:</strong> El tema anterior (must/might/can\'t) hablaba de <em>deducción sobre el presente</em>. Este tema habla de <em>certeza sobre el futuro</em>. "Might" aparece en ambos, pero el contexto es diferente.</div>',
      exercises: [
        {q: '"Will" expresa:', a: 'a', o: ['Certeza o decisión sobre el futuro', 'Posibilidad sobre el futuro'], fc: '"Will" = certeza o decisión firme sobre el futuro. ~90%.', fi: '"Might" expresa posibilidad (~50%). "Will" es mucho más seguro.', ex: 'I will cook dinner. → Voy a cocinar la cena. (decisión)', tip: 'will = certeza/decisión futura'},
        {q: '"She will probably come." equivale a:', a: 'b', o: ['Seguro que viene. (100%)', 'Seguramente vendrá. (~75%)'], fc: '"Will probably" = probable pero no 100% seguro. ~75%.', fi: '"Seguro que viene" sería solo "will come" sin "probably".', ex: 'She will probably come. → Seguramente vendrá.', tip: 'will probably ≈ probablemente'},
        {q: '"Won\'t" es la contracción de:', a: 'a', o: ['will not', 'would not'], fc: '"Won\'t" = will not. Certeza negativa sobre el futuro.', fi: '"Would not" = wouldn\'t. Es un modal diferente, para condicional.', ex: "I won't be late. = I will not be late. → No llegaré tarde.", tip: "won't = will not"},
        {q: '"Might" para futuro expresa:', a: 'b', o: ['Certeza total', 'Posibilidad (~50%)'], fc: '"Might" = posibilidad. Quizás ocurra, quizás no. ~50%.', fi: 'Certeza total sería "will". "Might" siempre introduce duda.', ex: 'He might come. → Quizás venga. (no es seguro)', tip: 'might = quizás (~50%)'},
        {q: 'Para decir "Probablemente no venga." usas:', a: 'b', o: ["She won't probably come.", 'She probably won\'t come.'], fc: '"Probably" va antes de "won\'t" en negativo: She probably won\'t come.', fi: '"Won\'t probably" invierte el orden. "Probably" va antes del auxiliar en negativo.', ex: "She probably won't come. → Probablemente no venga.", tip: "En negativo: probably + won't"}
      ]
    },

    /* ── PASO 3 ── */
    {
      icon: "⚡", title: "Diferencias",
      html: '<div class="section-label">Paso 3</div><div class="section-title">Paso 3: ⚡ Diferencias Importantes</div>' +
        '<table class="g-table"><tr><th>🇪🇸 Español</th><th>🇬🇧 Inglés</th><th>💡 Explicación</th></tr>' +
          '<tr><td>Probablemente + verbo</td><td><span class="g-will">will</span> <span class="g-prob">probably</span> + base verb</td><td>"Probably" va DESPUÉS de will</td></tr>' +
          '<tr><td>Quizás + subjuntivo</td><td><span class="g-might">might</span> + base verb (sin cambio)</td><td>Inglés: no hay subjuntivo</td></tr>' +
          '<tr><td>Él probablemente viene</td><td>He <span class="g-will">will</span> <span class="g-prob">probably</span> <span class="g-verb">come</span></td><td>Modal nunca lleva -s</td></tr>' +
          '<tr><td>No creo que llueva</td><td>It <span class="g-wont">won\'t</span> <span class="g-verb">rain</span> / It <span class="g-might">might not</span> <span class="g-verb">rain</span></td><td>Won\'t = casi seguro NO</td></tr>' +
          '<tr><td>"Probably" al inicio</td><td>"Probably" <b>después</b> de will</td><td>Posición fija en inglés</td></tr>' +
        '</table>' +
        '<div class="section-label">Posición de "probably" — regla visual</div>' +
        '<div class="formula-strip">' +
          '<div class="fs-block subj">Subject</div><div class="fs-sep">+</div>' +
          '<div class="fs-block will">will</div><div class="fs-sep">+</div>' +
          '<div class="fs-block prob">probably</div><div class="fs-sep">+</div>' +
          '<div class="fs-block verb">base verb</div>' +
        '</div>' +
        '<div class="formula-strip">' +
          '<div class="fs-block subj">Subject</div><div class="fs-sep">+</div>' +
          '<div class="fs-block prob">probably</div><div class="fs-sep">+</div>' +
          '<div class="fs-block will" style="background:var(--wont-bg);color:var(--wont);border-color:var(--wont-border)">won\'t</div><div class="fs-sep">+</div>' +
          '<div class="fs-block verb">base verb</div>' +
          '<div class="fs-opt">(negativo: probably ANTES de won\'t)</div>' +
        '</div>' +
        '<div class="alert-card"><div class="atitle">⚠️ "Probably" tiene posición diferente en afirmativo y negativo</div>' +
          '<p>✅ Afirmativo: I <b>will probably</b> go. → probably después de will<br>' +
          '✅ Negativo: I <b>probably won\'t</b> go. → probably ANTES de won\'t<br>' +
          '❌ I probably will go. → incorrecto en afirmativo<br>' +
          '❌ I won\'t probably go. → incorrecto en negativo</p></div>' +
        '<div class="ex-row ex-right"><div class="icon">🍳</div><div><div class="en"><span class="g-subj">She</span> <span class="g-will">will</span> <span class="g-prob">probably</span> <span class="g-verb">cook</span> <span class="g-comp">dinner</span>.</div><div class="es">Seguramente ella cocine la cena.</div></div></div>' +
        '<div class="ex-row ex-wrong"><div class="icon">❌</div><div><div class="en">She probably will cook dinner.</div><div class="es">"Probably" no va entre sujeto y "will" en afirmativo.</div></div></div>',
      exercises: [
        {q: '"Probablemente vaya." — orden correcto:', a: 'b', o: ['I probably will go.', 'I will probably go.'], fc: '"Will probably go" — "probably" va DESPUÉS de will en afirmativo.', fi: '"Probably will" invierte el orden. En afirmativo siempre: will + probably + verb.', ex: 'I will probably go. → Probablemente vaya.', tip: 'Afirmativo: will + probably + base verb'},
        {q: '"Probablemente no vaya." — orden correcto:', a: 'a', o: ["I probably won't go.", "I won't probably go."], fc: '"Probably won\'t" — en negativo "probably" va ANTES de won\'t.', fi: '"Won\'t probably" invierte el orden para negativo. La regla cambia: probably antes de won\'t.', ex: "I probably won't go. → Probablemente no vaya.", tip: "Negativo: probably + won't + base verb"},
        {q: '"He ___ probably be at work." (certeza alta positiva)', a: 'a', o: ['will', 'might'], fc: '"Will probably" = bastante probable. ~75% de certeza.', fi: '"Might probably" es redundante e incorrecto. "Might" ya expresa posibilidad sin "probably".', ex: 'He will probably be at work. → Seguramente esté en el trabajo.', tip: 'will probably ≈ bastante probable (~75%)'},
        {q: '"It ___ rain tomorrow." (solo posible, ~50%)', a: 'b', o: ['will', 'might'], fc: '"Might" = posibilidad ~50%. No estás seguro de si va a llover.', fi: '"Will" implica certeza (~90%). Si solo es posible, "might" es más preciso.', ex: 'It might rain tomorrow. → Quizás llueva mañana.', tip: 'might = quizás (~50%)'},
        {q: '"She probably ___ come. She\'s very busy."', a: 'b', o: ['will', "won't"], fc: '"She probably won\'t come" — negativo con evidencia (está muy ocupada).', fi: '"She probably will come" es la conclusión positiva, pero la evidencia sugiere lo contrario.', ex: "She probably won't come. She's busy. → Probablemente no venga. Está ocupada.", tip: "probably + won't = probablemente no"}
      ]
    },

    /* ── PASO 4 ── */
    {
      icon: "💡", title: "Consejos",
      html: '<div class="section-label">Paso 4</div><div class="section-title">Paso 4: 💡 Consejos Prácticos</div>' +
        '<div class="tip-card"><strong>Tip 1 — El termómetro:</strong> Imagina un termómetro de certeza. <b>will</b> = muy caliente (~90%). <b>will probably</b> = caliente (~75%). <b>might</b> = tibio (~50%). <b>won\'t</b> = frío (~10%).</div>' +
        '<div class="tip-card"><strong>Tip 2 — Posición de "probably":</strong> Afirmativo → <b>will probably</b> cook. Negativo → <b>probably won\'t</b> cook. La regla cambia con la negación.</div>' +
        '<div class="tip-card"><strong>Tip 3 — Might para futuro:</strong> "Might" del futuro = quizás algo pase. Diferente de "might" de deducción (quizás sea así ahora). Mismo modal, contexto distinto.</div>' +
        '<div class="tip-card"><strong>Tip 4 — Forma siempre igual:</strong> will/might/won\'t + <b>base verb</b>. Sin -s, sin to, sin -ed. She <b>will cook</b> ✅ · She <b>wills cook</b> ❌ · She <b>will to cook</b> ❌</div>' +
        '<div class="adverb-box">' +
          '<div class="ab-title">📍 Adverbios de certeza — posición</div>' +
          '<div class="adverb-row"><span class="adverb-word">probably</span><span class="adverb-pos">después de will · antes de won\'t → I will <b>probably</b> go / I <b>probably</b> won\'t go</span></div>' +
          '<div class="adverb-row"><span class="adverb-word">definitely</span><span class="adverb-pos">igual posición → I will <b>definitely</b> go. (con seguridad)</span></div>' +
          '<div class="adverb-row"><span class="adverb-word">maybe</span><span class="adverb-pos">al inicio de la oración → <b>Maybe</b> I will go. (quizás)</span></div>' +
        '</div>',
      exercises: [
        {q: '"I ___ probably cook dinner." (certeza alta)', a: 'a', o: ['will', 'might'], fc: '"Will probably" = bastante probable. "Will" es el auxiliar que acompaña a "probably".', fi: '"Might probably" es incorrecto. "Might" ya expresa posibilidad; no necesita "probably".', ex: 'I will probably cook dinner. → Probablemente cocine la cena.', tip: 'will + probably + base verb'},
        {q: '"___ I won\'t be at school tomorrow." (probablemente no)', a: 'b', o: ['Will', 'Probably'], fc: '"Probably" en negativo va antes de won\'t: "Probably I won\'t" o "I probably won\'t".', fi: '"Will I won\'t" combina dos auxiliares incorrectamente.', ex: "Probably I won't be at school. = I probably won't be at school.", tip: "Negativo: probably + won't"},
        {q: '"It ___ snow tomorrow." (quizás, no seguro)', a: 'b', o: ['will', 'might'], fc: '"Might" = posibilidad sin certeza. No sabes con seguridad si nevará.', fi: '"Will" implica que casi seguro va a nevar. Si hay duda, "might" es más preciso.', ex: 'It might snow tomorrow. → Quizás nieve mañana.', tip: 'duda/posibilidad → might'},
        {q: '"She will definitely ___." (forma correcta)', a: 'a', o: ['come', 'comes'], fc: 'Modal + base verb: "She will definitely come." Sin -s.', fi: '"Comes" añade -s innecesariamente. Después de un modal siempre va la base verb sin cambios.', ex: 'She will definitely come. → Definitivamente vendrá.', tip: 'modal + base verb (sin -s)'},
        {q: '"___ maybe I will go." es incorrecto. La forma correcta es:', a: 'b', o: ['Maybe will I go?', 'Maybe I will go.'], fc: '"Maybe" al inicio + orden normal: Maybe I will go.', fi: '"Maybe will I go" invierte el orden como pregunta, pero no es pregunta.', ex: 'Maybe I will go. → Quizás vaya.', tip: 'maybe + subject + will + verb'}
      ]
    },

    /* ── PASO 5 ── */
    {
      icon: "✨", title: "Práctica Final",
      html: '<div class="section-label">Paso 5</div><div class="section-title">Paso 5: ✨ Práctica Final</div>' +
        '<div class="formula-box">' +
          '<span class="g-will">will</span> (~90%) · <span class="g-will">will</span> <span class="g-prob">probably</span> (~75%) · <span class="g-might">might</span> (~50%) · <span class="g-wont">won\'t</span> (~10%)<br>' +
          '✅ Afirmativo: <span class="g-will">will</span> + <span class="g-prob">probably</span> + base verb<br>' +
          '❌ Negativo: <span class="g-prob">probably</span> + <span class="g-wont">won\'t</span> + base verb' +
        '</div>' +
        '<div class="ex-row ex-right"><div class="icon">🍽️</div><div><div class="en"><span class="g-subj">I</span> <span class="g-will">will</span> <span class="g-prob">probably</span> <span class="g-verb">cook</span> <span class="g-comp">pasta tonight</span>.</div><div class="es">Probablemente cocine pasta esta noche.</div></div></div>' +
        '<div class="ex-row ex-right"><div class="icon">🤷</div><div><div class="en"><span class="g-subj">He</span> <span class="g-might">might</span> <span class="g-verb">come</span> <span class="g-comp">to the party</span>.</div><div class="es">Quizás venga a la fiesta.</div></div></div>' +
        '<div class="ex-row ex-right"><div class="icon">🚫</div><div><div class="en"><span class="g-subj">She</span> <span class="g-prob">probably</span> <span class="g-wont">won\'t</span> <span class="g-verb">arrive</span> <span class="g-comp">on time</span>.</div><div class="es">Probablemente no llegue a tiempo.</div></div></div>' +
        '<div class="alert-card"><div class="atitle">⚠️ Errores Comunes</div><p>' +
          '❌ "I probably will go." → ✅ "I <b>will probably</b> go." (probably después de will)<br>' +
          '❌ "She mights come." → ✅ "She <b>might</b> come." (modal sin -s)<br>' +
          '❌ "He won\'t probably call." → ✅ "He <b>probably won\'t</b> call." (probably antes de won\'t)' +
        '</p></div>',
      exercises: [
        {q: '"I ___ probably stay home tonight."', a: 'a', o: ['will', 'might'], fc: '"Will probably" = bastante probable. "Will" acompaña a "probably" en afirmativo.', fi: '"Might probably" es incorrecto. Si usas "might", no añadas "probably".', ex: 'I will probably stay home tonight. → Probablemente me quede en casa esta noche.', tip: 'will + probably (no might + probably)'},
        {q: '"She ___ come. I\'m not sure." (~50%)', a: 'b', o: ['will', 'might'], fc: '"Might" = posibilidad ~50%. "I\'m not sure" indica que no hay certeza → might.', fi: '"Will" implica certeza. Si no estás seguro, "might" es el modal correcto.', ex: "She might come. I'm not sure. → Quizás venga. No estoy seguro."},
        {q: '"They ___ probably be late." (negativo: probablemente no lleguen a tiempo)', a: 'b', o: ["They will probably be late.", "They probably won't be on time."], fc: '"Probably won\'t" = probablemente no. En negativo, "probably" va antes de won\'t.', fi: '"Will probably be late" es afirmativo: probablemente SÍ lleguen tarde. El contexto pide negativo.', ex: "They probably won't be on time. → Probablemente no lleguen a tiempo.", tip: "probably + won't = probablemente no"},
        {q: '"It ___ rain tomorrow, but I\'m not sure."', a: 'b', o: ['will', 'might'], fc: '"Might" = posibilidad sin certeza. "I\'m not sure" confirma que hay duda → might.', fi: '"Will" sería certeza (~90%). La frase indica duda, así que "might" es más preciso.', ex: 'It might rain tomorrow. → Quizás llueva mañana.'},
        {q: '"I will ___ cook dinner tonight." (con certeza)', a: 'a', o: ['definitely', 'probably'], fc: '"Will definitely" = con toda certeza. Más fuerte que "probably".', fi: '"Probably" baja la certeza a ~75%. "Definitely" es ~99% seguro.', ex: 'I will definitely cook dinner tonight. → Definitivamente cocinaré la cena esta noche.', tip: 'definitely > probably en nivel de certeza'}
      ]
    }
  ]
};

var curStep = 0;
var scores = {};
var answered = {};

function renderStepTabs() {
  var c = document.getElementById('stepTabs');
  c.innerHTML = '';
  TOPIC.steps.forEach(function(s, i) {
    var b = document.createElement('button');
    var k = 's' + i;
    b.className = 'step-tab' + (i === curStep ? ' active' : '');
    if (scores[k] !== undefined && i < curStep) b.classList.add('done');
    b.textContent = (i + 1) + '. ' + s.icon + ' ' + s.title;
    b.onclick = (function(idx) {
      return function() {
        curStep = idx;
        renderStepTabs();
        renderCard();
        document.getElementById('summaryFinal').classList.remove('show');
      };
    })(i);
    c.appendChild(b);
  });
}

function renderCard() {
  var s = TOPIC.steps[curStep];
  var k = 's' + curStep;
  if (scores[k] === undefined) scores[k] = 0;
  var h = '<div class="card active">' + s.html + '<div class="ex-section"><h3>✏️ Ejercicios — ' + s.title + '</h3>';
  s.exercises.forEach(function(e, i) {
    var eid = k + 'e' + i;
    var correct_label = e.o[e.a === 'a' ? 0 : 1];
    var fbOk = '<div class="fb fb-ok" id="fbok-' + eid + '">' +
      '<div class="fb-header"><span class="fb-icon">🎉</span> ¡Correcto!</div>' +
      '<div class="fb-body">' +
        '<div class="fb-row"><span class="fb-dot">✅</span><div class="fb-text"><span class="fb-correct-answer">' + correct_label + '</span> — ' + e.fc + '</div></div>' +
        '<div class="fb-row"><span class="fb-dot">💡</span><div class="fb-text">La otra opción: ' + e.fi + '</div></div>' +
        (e.ex ? '<div class="fb-example">📝 ' + e.ex + '</div>' : '') +
        (e.tip ? '<div class="fb-tip"><strong>💡 Recuerda:</strong> ' + e.tip + '</div>' : '') +
      '</div></div>';
    var fbBad = '<div class="fb fb-bad" id="fbbad-' + eid + '">' +
      '<div class="fb-header"><span class="fb-icon">😕</span> No es correcto</div>' +
      '<div class="fb-body">' +
        '<div class="fb-row"><span class="fb-dot">❌</span><div class="fb-text"><span class="fb-wrong-reason">' + e.fi + '</span></div></div>' +
        '<div class="fb-row"><span class="fb-dot">✅</span><div class="fb-text">La respuesta correcta es <span class="fb-correct-answer">' + correct_label + '</span> — ' + e.fc + '</div></div>' +
        (e.ex ? '<div class="fb-example">📝 ' + e.ex + '</div>' : '') +
        (e.tip ? '<div class="fb-tip"><strong>💡 Recuerda:</strong> ' + e.tip + '</div>' : '') +
      '</div></div>';
    h += '<div class="exercise" id="' + eid + '">' +
      '<div class="exercise-q">' + (i + 1) + '. ' + e.q + '</div>' +
      '<div class="opts">' +
        '<button class="opt-btn" onclick="chk(\'' + eid + '\',\'a\',\'' + e.a + '\')">a) ' + e.o[0] + '</button>' +
        '<button class="opt-btn" onclick="chk(\'' + eid + '\',\'b\',\'' + e.a + '\')">b) ' + e.o[1] + '</button>' +
      '</div>' + fbOk + fbBad + '</div>';
  });
  h += '<div class="score-bar"><div class="num" id="sc-' + k + '">0/5</div><div class="lbl">Puntuación</div></div></div></div>';
  document.getElementById('cardArea').innerHTML = h;
}

function chk(eid, sel, correct) {
  if (answered[eid]) return;
  answered[eid] = true;
  var ex = document.getElementById(eid);
  var btns = ex.querySelectorAll('.opt-btn');
  btns.forEach(function(b) { b.disabled = true; });
  var k = eid.match(/s\d+/)[0];
  if (sel === correct) {
    ex.classList.add('correct');
    btns.forEach(function(b) { if (b.textContent.charAt(0) === sel) b.classList.add('sel-ok'); });
    document.getElementById('fbok-' + eid).classList.add('show');
    scores[k]++;
  } else {
    ex.classList.add('incorrect');
    btns.forEach(function(b) {
      if (b.textContent.charAt(0) === sel) b.classList.add('sel-bad');
      if (b.textContent.charAt(0) === correct) b.classList.add('show-ok');
    });
    document.getElementById('fbbad-' + eid).classList.add('show');
  }
  document.getElementById('sc-' + k).textContent = scores[k] + '/5';
  var allDone = [0,1,2,3,4].every(function(i) { return answered[k + 'e' + i]; });
  if (allDone && curStep === 4) {
    setTimeout(function() {
      var sf = document.getElementById('summaryFinal');
      var sl = document.getElementById('summaryList');
      sl.innerHTML = TOPIC.summary.map(function(s) { return '<li>' + s + '</li>'; }).join('');
      sf.classList.add('show');
      sf.scrollIntoView({behavior: 'smooth'});
    }, 600);
  }
}

renderStepTabs();
renderCard();
</script>
</body>
</html>
