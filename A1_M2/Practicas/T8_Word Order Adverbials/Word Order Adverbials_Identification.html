        .compare-row:last-child { border-bottom:none; }

        .compare-label.wrong { background:var(--error-light); color:var(--error-dark); }
        .compare-label.right { background:var(--success-light); color:var(--success-dark); }

        .fb-error { background:var(--error-light); border:1px solid #FECACA; }

        .word-swap { display:flex; align-items:center; justify-content:center; gap:0.75rem; margin:0.6rem 0; flex-wrap:wrap; }
        .ws-box { padding:0.4rem 1rem; border-radius:8px; font-weight:700; font-size:1rem; }

        .ws-arrow { font-size:1.3rem; color:#94A3B8; }
        .ws-right { background:var(--success); color:white; }
        .error-text { font-size:0.9rem; color:var(--text-dark); line-height:1.55; }
        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.95rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }
        .rule-examples { display:flex; flex-wrap:wrap; gap:0.4rem; }
        .rule-ex { font-size:0.82rem; background:white; border:1px solid #BFDBFE; border-radius:6px; padding:0.25rem 0.55rem; color:var(--info-dark); font-weight:600; }
        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-why .fb-block-title { color:var(--success-dark); }

        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }

        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }

        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }

                <div class="instructions-title">Choose the correct sentence</div>
                <div class="instructions-text">Read the three sentences and pick the one with the correct word order. Tap <strong>"Ver en español"</strong> if you need a translation.</div>

    <script>
    const quizData = [
        // Q1 — pos B
        {
            id: 1, topic: "time expr. position",
            translation: "Lucía estudia inglés todos los días.",
            options: [
                { text: "Lucia studies every day English.", correct: false,
                  errorWord: "studies every day English", correctWord: "studies English every day",
                  errorType: "Wrong position",
                  explanation: "The time expression 'every day' cuts between the verb and the object. Time expressions must go at the end." },
                { text: "Lucia studies English every day.", correct: true },
                { text: "Lucia every day studies English.", correct: false,
                  errorWord: "Lucia every day studies", correctWord: "Lucia studies English every day",
                  errorType: "Wrong position",
                  explanation: "The time expression is between the subject and the verb. Time expressions belong at the end of the sentence (or at the start with a comma)." }
            ],
            clue: "every day (time)",
            clueExplain: "is a time expression that goes at the END of the sentence — after the verb and object.",
            rule: "Subject + verb + object + time expression",
            examples: ["I work every day", "We meet every Monday", "They run every morning"],
            correctReason: "Time expressions like 'every day' go at the end of the sentence — they never cut between the verb and its object."
        },
        // Q2 — pos A
        {
            id: 2, topic: "frequency adv. position",
            translation: "Carlos siempre llega temprano al trabajo.",
            options: [
                { text: "Carlos always arrives early at work.", correct: true },
                { text: "Carlos arrives always early at work.", correct: false,
                  errorWord: "arrives always", correctWord: "always arrives",
                  errorType: "Wrong position",
                  explanation: "The frequency adverb is after the verb. With main verbs, it must come before the verb." },
                { text: "Always Carlos arrives early at work.", correct: false,
                  errorWord: "Always Carlos", correctWord: "Carlos always",
                  errorType: "Wrong position",
                  explanation: "Frequency adverbs don't start the sentence in standard English. They go inside the clause, near the verb." }
            ],
            clue: "always (frequency) + arrives (main verb)",
            clueExplain: "is a frequency adverb that goes BEFORE the main verb.",
            rule: "Subject + adverb + main verb + ...",
            examples: ["I always work", "She often visits", "They never argue"],
            correctReason: "Frequency adverbs (always, never, often) go before the main verb in Present Simple."
        },
        // Q3 — pos C
        {
            id: 3, topic: "frequency adv. with 'be'",
            translation: "El restaurante normalmente está lleno los viernes.",
            options: [
                { text: "The restaurant usually is full on Fridays.", correct: false,
                  errorWord: "usually is", correctWord: "is usually",
                  errorType: "Wrong position",
                  explanation: "With the verb 'be', the frequency adverb goes AFTER the verb, not before." },
                { text: "The restaurant is full usually on Fridays.", correct: false,
                  errorWord: "full usually", correctWord: "usually full",
                  errorType: "Wrong position",
                  explanation: "The frequency adverb is mixed in with the time expression. It belongs between 'be' and the adjective." },
                { text: "The restaurant is usually full on Fridays.", correct: true }
            ],
            clue: "is (verb 'be') + usually + on Fridays",
            clueExplain: "shows: with 'be', frequency goes AFTER the verb. Time expression goes at the end.",
            rule: "Subject + be + adverb + adjective + time expression",
            examples: ["I am always tired at night", "She is usually busy on Mondays", "They are often here in summer"],
            correctReason: "With 'be', frequency adverbs go after the verb. Time expressions stay at the end of the sentence."
        },
        // Q4 — pos B
        {
            id: 4, topic: "time expr. at start",
            translation: "Por la mañana, mi madre prepara café.",
            options: [
                { text: "My mother in the morning prepares coffee.", correct: false,
                  errorWord: "mother in the morning prepares", correctWord: "morning, my mother prepares",
                  errorType: "Wrong position",
                  explanation: "The time expression cuts between the subject and the verb. It must go at the start (with comma) or at the end." },
                { text: "In the morning, my mother prepares coffee.", correct: true },
                { text: "My mother prepares in the morning coffee.", correct: false,
                  errorWord: "prepares in the morning coffee", correctWord: "prepares coffee in the morning",
                  errorType: "Wrong position",
                  explanation: "The time expression cuts between the verb and the object. It must go at the end (after the object) or at the start." }
            ],
            clue: "in the morning at start",
            clueExplain: "is moved to the START of the sentence for emphasis. A comma usually follows.",
            rule: "Time expr. + comma + subject + verb + object",
            examples: ["In the morning, I run", "On Sundays, we relax", "At night, they read"],
            correctReason: "Time expressions can move to the START of a sentence (often followed by a comma). They never cut between the subject and the verb, or between the verb and its object."
        },
        // Q5 — pos A
        {
            id: 5, topic: "frequency + time together",
            translation: "James generalmente desayuna a las 7 AM.",
            options: [
                { text: "James usually has breakfast at 7 AM.", correct: true },
                { text: "James has breakfast usually at 7 AM.", correct: false,
                  errorWord: "breakfast usually at 7", correctWord: "usually has breakfast at 7",
                  errorType: "Wrong position (frequency)",
                  explanation: "The frequency adverb is mixed with the time expression. Frequency adverbs go in the middle, not at the end." },
                { text: "James usually at 7 AM has breakfast.", correct: false,
                  errorWord: "at 7 AM has breakfast", correctWord: "has breakfast at 7 AM",
                  errorType: "Wrong position (time)",
                  explanation: "The time expression is between the frequency adverb and the verb. Time expressions belong at the end." }
            ],
            clue: "usually (middle) + at 7 AM (end)",
            clueExplain: "shows the two-position rule: frequency in the middle, time at the end.",
            rule: "Subject + frequency + verb + object + time expression",
            examples: ["I always work in the morning", "She usually eats at 7 AM", "We often meet on Sundays"],
            correctReason: "Frequency adverbs go in the middle (before the verb). Time expressions go at the end. Each has its own position."
        },
        // Q6 — pos C
        {
            id: 6, topic: "fixed expression 'at night'",
            translation: "Mi padre lee las noticias por la noche.",
            options: [
                { text: "My father reads the news on the night.", correct: false,
                  errorWord: "on the night", correctWord: "at night",
                  errorType: "Wrong preposition",
                  explanation: "We don't say 'on the night'. The fixed expression for the night-time period is 'at night' (no article)." },
                { text: "My father reads the news in night.", correct: false,
                  errorWord: "in night", correctWord: "at night",
                  errorType: "Wrong preposition",
                  explanation: "We don't say 'in night'. The fixed expression is 'at night' — this is a fixed phrase you must memorize." },
                { text: "My father reads the news at night.", correct: true }
            ],
            clue: "at night (fixed expression)",
            clueExplain: "is a fixed time expression that always uses 'at' and no article.",
            rule: "at night / in the morning / on Mondays",
            examples: ["I work at night", "She studies in the morning", "We meet on Mondays"],
            correctReason: "'At night' is a fixed expression — no article, always 'at'. Compare with 'in the morning' (with 'the')."
        },
        // Q7 — pos B
        {
            id: 7, topic: "negative + frequency",
            translation: "Diego no siempre cena con su familia.",
            options: [
                { text: "Diego always doesn't have dinner with his family.", correct: false,
                  errorWord: "always doesn't", correctWord: "doesn't always",
                  errorType: "Wrong position",
                  explanation: "The frequency adverb is before the auxiliary. In negatives, it must go between 'doesn't' and the main verb." },
                { text: "Diego doesn't always have dinner with his family.", correct: true },
                { text: "Diego doesn't have always dinner with his family.", correct: false,
                  errorWord: "have always dinner", correctWord: "always have dinner",
                  errorType: "Wrong position",
                  explanation: "The frequency adverb is between the verb and the object. In negatives, it must sit between the auxiliary 'doesn't' and the base verb." }
            ],
            clue: "negative + always",
            clueExplain: "is a frequency adverb in a negative sentence — it goes between the auxiliary and the main verb.",
            rule: "Subject + don't/doesn't + adverb + verb + ...",
            examples: ["I don't always agree", "She doesn't always cook", "They don't always come"],
            correctReason: "In negatives, the frequency adverb sits between the auxiliary 'doesn't/don't' and the base verb."
        },
        // Q8 — pos A
        {
            id: 8, topic: "multi-word frequency",
            translation: "Sara va al cine dos veces al mes.",
            options: [
                { text: "Sara goes to the cinema twice a month.", correct: true },
                { text: "Sara twice a month goes to the cinema.", correct: false,
                  errorWord: "twice a month goes", correctWord: "goes to the cinema twice a month",
                  errorType: "Wrong position",
                  explanation: "Multi-word frequency phrases like 'twice a month' don't go in the middle. They go at the end of the sentence." },
                { text: "Sara goes twice a month to the cinema.", correct: false,
                  errorWord: "goes twice a month to", correctWord: "goes to the cinema twice a month",
                  errorType: "Wrong position",
                  explanation: "The frequency phrase cuts between the verb and the place. It must go at the end of the sentence." }
            ],
            clue: "twice a month (multi-word frequency)",
            clueExplain: "is a multi-word frequency phrase that goes at the END, not in the middle like single-word adverbs.",
            rule: "Subject + verb + object/place + frequency phrase",
            examples: ["I work three days a week", "We meet twice a month", "She runs five times a week"],
            correctReason: "Multi-word frequency phrases (twice a week, three times a year) go at the end of the sentence — NOT in the middle like single-word adverbs (always, often)."
        },
        // Q9 — pos C
        {
            id: 9, topic: "frequency + time + place",
            translation: "Mis padres frecuentemente cenan en restaurantes los sábados.",
            options: [
                { text: "My parents have dinner often at restaurants on Saturdays.", correct: false,
                  errorWord: "have dinner often", correctWord: "often have dinner",
                  errorType: "Wrong position (frequency)",
                  explanation: "The frequency adverb is after the verb. With main verbs, it must come before the verb." },
                { text: "My parents often on Saturdays have dinner at restaurants.", correct: false,
                  errorWord: "often on Saturdays have", correctWord: "often have dinner",
                  errorType: "Wrong position (time)",
                  explanation: "The time expression is between the frequency adverb and the verb. Time expressions belong at the end." },
                { text: "My parents often have dinner at restaurants on Saturdays.", correct: true }
            ],
            clue: "often (middle) + at restaurants + on Saturdays (end)",
            clueExplain: "shows three elements: frequency in the middle, place and time at the end.",
            rule: "Subject + frequency + verb + place + time",
            examples: ["I often eat at home in the evening", "She rarely shops at the mall on weekends"],
            correctReason: "Frequency adverbs go in the middle (before the verb). Place and time expressions go at the end, with place often before time."
        },
        // Q10 — pos B
        {
            id: 10, topic: "frequency with 3rd person",
            translation: "Mi hermana raramente come pizza.",
            options: [
                { text: "My sister eats rarely pizza.", correct: false,
                  errorWord: "eats rarely pizza", correctWord: "rarely eats pizza",
                  errorType: "Wrong position",
                  explanation: "The frequency adverb is between the verb and the object. With main verbs, it must come before the verb." },
                { text: "My sister rarely eats pizza.", correct: true },
                { text: "Rarely my sister eats pizza.", correct: false,
                  errorWord: "Rarely my sister", correctWord: "My sister rarely",
                  errorType: "Wrong position",
                  explanation: "Starting with 'rarely' is unusual in everyday English. The adverb belongs after the subject." }
            ],
            clue: "rarely + main verb",
            clueExplain: "is a frequency adverb that goes before the main verb, even with third-person singular.",
            rule: "Subject + adverb + verb-s + object",
            examples: ["He rarely smokes", "She rarely calls", "It rarely rains"],
            correctReason: "Frequency adverbs go before the main verb. With third-person singular, the verb still takes '-s'."
        },
        // Q11 — pos A
        {
            id: 11, topic: "time expr. with 'in'",
            translation: "Hace mucho calor en verano.",
            options: [
                { text: "It is very hot in summer.", correct: true },
                { text: "It is very hot at summer.", correct: false,
                  errorWord: "at summer", correctWord: "in summer",
                  errorType: "Wrong preposition",
                  explanation: "We don't say 'at summer'. With seasons, months and years, we use 'in' (in summer, in July, in 2025)." },
                { text: "It is very hot on summer.", correct: false,
                  errorWord: "on summer", correctWord: "in summer",
                  errorType: "Wrong preposition",
                  explanation: "We don't say 'on summer'. 'On' is for days and dates (on Monday, on July 5th), not for seasons." }
            ],
            clue: "in summer (season)",
            clueExplain: "is a time expression with a season — uses the preposition 'in'.",
            rule: "in + season / month / year — on + day / date — at + time / night",
            examples: ["in summer", "in July", "in 2025", "on Monday", "at 7 PM"],
            correctReason: "Seasons take the preposition 'in': in summer, in winter, in spring, in fall. The same applies to months and years."
        },
        // Q12 — pos C
        {
            id: 12, topic: "frequency in question",
            translation: "¿Con qué frecuencia visitas a tus abuelos?",
            options: [
                { text: "How often you visit your grandparents?", correct: false,
                  errorWord: "How often you visit", correctWord: "How often do you visit",
                  errorType: "Missing auxiliary",
                  explanation: "Wh- questions need 'do/does' between the question phrase and the subject." },
                { text: "How visit you your grandparents often?", correct: false,
                  errorWord: "How visit you", correctWord: "How often do you visit",
                  errorType: "Wrong word order",
                  explanation: "The order is broken. 'How often' must stay together at the start, then 'do/does' + subject + base verb." },
                { text: "How often do you visit your grandparents?", correct: true }
            ],
            clue: "How often + question",
            clueExplain: "is a frequency question — uses the standard Wh- question structure.",
            rule: "How often + do/does + subject + base verb?",
            examples: ["How often do you study?", "How often does she run?", "How often do they meet?"],
            correctReason: "Frequency questions follow the standard Wh- pattern: 'How often' + auxiliary + subject + base verb."
        },
        // Q13 — pos B
        {
            id: 13, topic: "two adverbials with 'be'",
            translation: "Ella siempre está cansada por la noche.",
            options: [
                { text: "She always is tired at night.", correct: false,
                  errorWord: "always is", correctWord: "is always",
                  errorType: "Wrong position",
                  explanation: "With 'be', the frequency adverb goes AFTER the verb, not before." },
                { text: "She is always tired at night.", correct: true },
                { text: "She is tired always at night.", correct: false,
                  errorWord: "tired always", correctWord: "always tired",
                  errorType: "Wrong position",
                  explanation: "The frequency adverb is after the adjective. With 'be', it must sit between the verb and the adjective." }
            ],
            clue: "is + always + at night",
            clueExplain: "shows: with 'be', frequency goes between the verb and the adjective. Time expression goes at the end.",
            rule: "Subject + be + adverb + adjective + time expression",
            examples: ["I am always tired at night", "He is never busy on weekends", "They are usually here in summer"],
            correctReason: "With 'be', frequency adverbs go after the verb and before the adjective. Time expressions go at the end."
        },
        // Q14 — pos A
        {
            id: 14, topic: "fixed expression 'on Mondays'",
            translation: "Vamos a la iglesia los domingos.",
            options: [
                { text: "We go to church on Sundays.", correct: true },
                { text: "We go to church in Sundays.", correct: false,
                  errorWord: "in Sundays", correctWord: "on Sundays",
                  errorType: "Wrong preposition",
                  explanation: "We don't say 'in Sundays'. With days of the week, we use 'on' (on Monday, on Sundays)." },
                { text: "We go to church at Sundays.", correct: false,
                  errorWord: "at Sundays", correctWord: "on Sundays",
                  errorType: "Wrong preposition",
                  explanation: "We don't say 'at Sundays'. 'At' is for clock times and 'night', not for days of the week." }
            ],
            clue: "on Sundays (day of the week)",
            clueExplain: "uses 'on' for days of the week. The plural form means 'every Sunday'.",
            rule: "on + day → on Monday / on Sundays / on Saturday morning",
            examples: ["on Monday", "on Sundays", "on Friday night"],
            correctReason: "Days of the week take the preposition 'on'. The plural form ('on Sundays') means 'every Sunday'."
        },
        // Q15 — pos C
        {
            id: 15, topic: "complete sentence with all elements",
            translation: "Mi padre nunca trabaja en la oficina los fines de semana.",
            options: [
                { text: "My father works never at the office on weekends.", correct: false,
                  errorWord: "works never", correctWord: "never works",
                  errorType: "Wrong position (frequency)",
                  explanation: "The frequency adverb is after the verb. With main verbs, it must come before the verb." },
                { text: "My father never at the office works on weekends.", correct: false,
                  errorWord: "at the office works", correctWord: "works at the office",
                  errorType: "Wrong word order",
                  explanation: "The place expression is between the frequency adverb and the verb. The verb must come right after the adverb." },
                { text: "My father never works at the office on weekends.", correct: true }
            ],
            clue: "never (middle) + at the office (place) + on weekends (time)",
            clueExplain: "shows the full structure: frequency before the verb, place after the verb, time at the end.",
            rule: "Subject + frequency + verb + place + time",
            examples: ["I always study at home in the evening", "She rarely eats at restaurants on weekdays"],
            correctReason: "The order is: subject + frequency adverb + main verb + place + time. Each adverbial has its position and they don't mix."
        }
    ];

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, i) => {
            q.shuffled = shuffle(q.options);
            container.appendChild(createCard(q, i));
        });
        showQuestion(0);
        updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = `question-card ${index !== 0 ? 'hidden' : ''}`;
        card.id = `question-${index}`;
        const letters = ['A','B','C'];

        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span class="q-label">Choose the correct sentence:</span>
                <span class="topic-badge">${q.topic}</span>
            </div>
            <div class="translate-bar">
                <button class="translate-btn" id="trBtn-${index}" onclick="toggleTranslation(${index})">🇪🇸 Ver en español</button>
            </div>
            <div class="translation-box" id="trBox-${index}">
                <span class="tr-label">ES:</span>${q.translation}
            </div>
            <div class="sentence-options" id="options-${index}">
                ${q.shuffled.map((opt, i) => `
                    <button class="sent-option" onclick="selectOption(${index}, ${i})">
                        <div class="option-letter">${letters[i]}</div>
                        <div class="option-text">${opt.text}</div>
                        <div class="option-status"></div>
                    </button>
                `).join('')}
            </div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Previous</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'See Results 🎉' : 'Next →'}
                </button>
            </div>
        `;
        return card;
    }

    function toggleTranslation(qi) {
        const box = document.getElementById(`trBox-${qi}`);
        const btn = document.getElementById(`trBtn-${qi}`);
        const open = box.classList.toggle('show');
        btn.classList.toggle('active', open);
        btn.innerHTML = open ? '🇬🇧 Hide translation' : '🇪🇸 Ver en español';
    }

    function selectOption(qi, optIdx) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = q.shuffled[optIdx];
        const isCorrect = selected.correct;
        const correctOpt = q.shuffled.find(o => o.correct);
        if (isCorrect) score++;

        document.querySelectorAll(`#options-${qi} .sent-option`).forEach((btn, i) => {
            btn.classList.add('disabled');
            const opt = q.shuffled[i];
            const status = btn.querySelector('.option-status');
            if (opt.correct) { btn.classList.add('correct'); status.textContent = '✅'; }
            else if (i === optIdx) { btn.classList.add('incorrect'); status.textContent = '❌'; }
        });

        buildFeedback(qi, selected, isCorrect, correctOpt, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, correctOpt, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;

        function markError(text, word) {
            if (!word) return text;
            const esc = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return text.replace(new RegExp(esc), `<span class="error-highlight">${word}</span>`);
        }
        const ruleExamples = q.examples.map(e => `<span class="rule-ex">${e}</span>`).join('');

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">✅</span>
                    <div>
                        <div class="fb-title">Correct! Great identification</div>
                        <div class="fb-subtitle">Let's see why the others were wrong</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-signal">
                        <div class="fb-block-title">🔍 Key signal in the sentence</div>
                        <div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">
                            The element <span class="signal-tag">${q.clue}</span> ${q.clueExplain}
                        </div>
                    </div>
                    ${q.shuffled.filter(o => !o.correct).map(err => `
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ Error in one option: <span class="error-badge">${err.errorType}</span></div>
                        <div class="error-text">${err.explanation}</div>
                    </div>`).join('')}
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 The rule</div>
                        <div class="rule-formula">${q.rule}</div>
                        <div class="rule-examples">${ruleExamples}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 Why is the correct sentence correct?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        } else {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">❌</span>
                    <div>
                        <div class="fb-title">Incorrect — let's review</div>
                        <div class="fb-subtitle">Spot the difference between the sentences</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-signal wrong">
                        <div class="fb-block-title">🔍 Key signal you needed to spot</div>
                        <div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">
                            The element <span class="signal-tag red">${q.clue}</span> ${q.clueExplain}
                        </div>
                    </div>
                    <div class="fb-block fb-compare">
                        <div class="fb-block-title">🔄 Your choice vs. the correct one</div>
                        <div class="compare-row">
                            <span class="compare-label wrong">You chose</span>
                            <span class="compare-text">${markError(selected.text, selected.errorWord)}</span>
                        </div>
                        <div class="compare-row">
                            <span class="compare-label right">Correct</span>
                            <span class="compare-text">${correctOpt.text}</span>
                        </div>
                    </div>
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ The error: <span class="error-badge">${selected.errorType}</span></div>
                        <div class="error-text">${selected.explanation}</div>
                    </div>
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 The correct rule</div>
                        <div class="rule-formula">${q.rule}</div>
                        <div class="rule-examples">${ruleExamples}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 Why is the correct sentence correct?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c, idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function nextQuestion(i) { i < quizData.length - 1 ? showQuestion(i + 1) : showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
    function updateProgress() {
        const done = answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width = (done / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        window.dispatchEvent(new CustomEvent('jucum:done', { detail: { score: Math.round(pct) } })); // JUCUM seguimiento
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        let stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? 'Excellent! You master word order. 🏆'
            : pct >= 70 ? 'Well done! Keep practicing. 💪'
            : 'Good effort. Review the rules and try again. 📚';
        document.querySelectorAll('.star').forEach((s, i) => {
            if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300);
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
