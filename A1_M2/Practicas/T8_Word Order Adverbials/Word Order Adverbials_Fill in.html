<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fill in the Blanks - A1 M2 · Word Order with Adverbials | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #29B6F6; --primary-light: #B3E5FC; --primary-dark: #0277BD; --primary-darker: #01579B;
            --accent: #4FC3F7; --bg-gradient-start: #F0F9FF; --bg-gradient-end: #E1F5FE;
            --text-dark: #01579B; --text-medium: #0277BD; --text-light: #0288D1;
            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444; --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6; --info-light: #DBEAFE; --info-dark: #1D4ED8;
            --purple: #8B5CF6; --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --white: #FFFFFF;
            --shadow-soft: 0 4px 20px rgba(41,182,246,0.18);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start),var(--bg-gradient-end)); min-height:100vh; color:var(--text-dark); }
        .header { background:linear-gradient(135deg,#0288D1,#29B6F6,#4FC3F7); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.4rem; text-decoration:none; color:white; transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); transform:scale(1.1); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.9); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; white-space:nowrap; }
        .progress-container { padding:0; height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; border-radius:0 3px 3px 0; transition:width .5s ease; width:0%; }
        main { padding:1.5rem; max-width:680px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }

        /* Reference panel — adverbial types */
        
        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:0.85rem; flex-wrap:wrap; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .topic-badge { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.7rem; border-radius:20px; font-size:0.72rem; font-weight:700; background:var(--primary-light); color:var(--primary-darker); margin-left:auto; }
        .question-text { font-size:1.1rem; line-height:1.7; margin-bottom:0.4rem; font-weight:600; color:var(--text-dark); }
        .blank { display:inline-block; min-width:120px; padding:0.2rem 0.6rem; background:var(--primary-light); border:2px dashed var(--primary-dark); border-radius:8px; text-align:center; font-weight:700; color:var(--primary-darker); transition:all .3s; }
        .blank.correct { background:var(--success-light); border:2px solid var(--success); color:var(--success-dark); }
        .blank.incorrect { background:var(--error-light); border:2px solid var(--error); color:var(--error-dark); }
        .translate-bar { display:flex; justify-content:flex-end; margin-bottom:0.5rem; }
        .translate-btn { background:white; border:1.5px dashed var(--primary); color:var(--primary-dark); padding:0.35rem 0.8rem; border-radius:20px; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:0.35rem; transition:all .2s; }
        .translate-btn:hover { background:var(--bg-gradient-start); }
        .translate-btn.active { background:var(--primary); color:white; border-style:solid; }
        .translation-box { background:#FFF8E1; border:1px solid #FFE082; border-radius:10px; padding:0.6rem 0.85rem; margin-bottom:0.85rem; font-size:0.88rem; color:#5D4037; font-style:italic; display:none; line-height:1.5; }
        .translation-box.show { display:block; animation:fadeUp .3s ease; }
        .translation-box .tr-label { font-weight:800; font-style:normal; color:#E65100; margin-right:0.3rem; font-size:0.75rem; text-transform:uppercase; letter-spacing:.4px; }
        .options-grid { display:grid; grid-template-columns:1fr; gap:0.7rem; margin-top:0.5rem; }
        .option-btn { padding:0.85rem 1rem; border:2.5px solid #E5E7EB; border-radius:12px; background:white; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; color:var(--text-dark); text-align:left; }
        .option-btn:hover:not(:disabled) { border-color:var(--primary); background:var(--bg-gradient-start); transform:translateX(4px); }
        .option-btn:disabled { cursor:default; }
        .option-btn.correct { border-color:var(--success); background:var(--success-light); color:var(--success-dark); }
        .option-btn.incorrect { border-color:var(--error); background:var(--error-light); color:var(--error-dark); }
        .feedback { margin-top:1.25rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon { font-size:1.6rem; }
        .fb-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }
        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; }
        .fb-compare { background:#F8FAFC; border:1px solid #E2E8F0; border-radius:12px; padding:0.9rem 1rem; }
        .fb-compare-row { display:flex; align-items:baseline; gap:0.6rem; padding:0.35rem 0; border-bottom:1px dashed #E2E8F0; }
        .fb-compare-row:last-child { border-bottom:none; }
        .compare-label { font-size:0.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; padding:0.15rem 0.5rem; border-radius:6px; flex-shrink:0; }
        .compare-label.wrong { background:var(--error-light); color:var(--error-dark); }
        .compare-label.right { background:var(--success-light); color:var(--success-dark); }
        .compare-text { font-size:0.95rem; color:var(--text-dark); line-height:1.5; }
        .word-wrong { color:var(--error); font-weight:700; text-decoration:line-through; }
        .word-right { color:var(--success-dark); font-weight:700; }
        .fb-error { background:var(--error-light); border-radius:12px; padding:0.9rem 1rem; border:1px solid #FECACA; }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.2rem 0.6rem; border-radius:6px; font-size:0.72rem; font-weight:700; margin-left:4px; }
        .fb-error .fb-block-title { color:var(--error-dark); }
        .error-rule { font-size:0.88rem; color:var(--text-dark); line-height:1.55; }
        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; border-radius:12px; padding:0.9rem 1rem; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.95rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }
        .rule-examples { display:flex; flex-wrap:wrap; gap:0.4rem; }
        .rule-ex { font-size:0.82rem; background:white; border:1px solid #BFDBFE; border-radius:6px; padding:0.25rem 0.55rem; color:var(--info-dark); font-weight:600; }
        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; border-radius:12px; padding:0.9rem 1rem; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }
        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji { font-size:4rem; margin-bottom:1rem; }
        .results-title { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; color:var(--text-dark); }
        .results-score { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>
    <header class="header">
        <a href="https://jucumenglishcenter.github.io/A1/panel-a1.html" class="back-btn">←</a>
        <div class="header-info">
            <div class="header-title">✏️ Fill in the Blanks</div>
            <div class="header-subtitle">🩵 A1 · Module 2 · Word Order with Adverbials</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/15</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">✏️</div>
            <div>
                <div class="instructions-title">Choose the correct word order</div>
                <div class="instructions-text">Select the option that builds the sentence with the correct word order. Tap <strong>"Ver en español"</strong> if you need a translation.</div>
            </div>
        </div>
        <div id="questionsContainer"></div>

        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">Quiz Complete!</div>
            <div class="results-score" id="finalScore">0/15</div>
            <div class="stars-container">
                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Try Again</button>
                <a href="https://jucumenglishcenter.github.io/A1/panel-a1.html" class="result-btn secondary">← Back to Panel</a>
            </div>
        </div>
    </main>

    <script>
    const quizData = [
        // Q1 — pos 0
        {
            id: 1, topic: "time expr. at end",
            sentence: "Carlos _____.",
            translation: "Carlos juega fútbol los sábados.",
            options: [
                "plays football on Saturdays",
                "on Saturdays plays football",
                "plays on Saturdays football"
            ],
            correctIdx: 0,
            feedback: {
                "on Saturdays plays football": { errorType: "Wrong position", explanation: "The time expression starts the sentence without a comma after the subject. The natural position for time expressions is at the end of the clause." },
                "plays on Saturdays football": { errorType: "Wrong position", explanation: "The time expression cuts between the verb and the object. Time expressions don't go in the middle of the clause." }
            },
            clue: "on Saturdays (time expression)",
            clueExplain: "is a time expression that goes at the END of the sentence, after the verb and object.",
            rule: "Subject + verb + object + time expression",
            examples: ["I work every day", "She studies in the morning", "We meet on Mondays"],
            correctReason: "Time expressions like 'on Saturdays' go at the end of the sentence — after the verb and object. They never cut between them."
        },
        // Q2 — pos 1
        {
            id: 2, topic: "frequency adv. with main verb",
            sentence: "Lucia _____.",
            translation: "Lucía siempre llega temprano.",
            options: [
                "arrives always early",
                "always arrives early",
                "early always arrives"
            ],
            correctIdx: 1,
            feedback: {
                "arrives always early": { errorType: "Wrong position", explanation: "The frequency adverb is placed after the verb. With main verbs, it must come before the verb." },
                "early always arrives": { errorType: "Wrong word order", explanation: "The order is broken. 'Early' is part of the meaning of 'arrives' and should follow it." }
            },
            clue: "always (frequency) + arrives (main verb)",
            clueExplain: "is a frequency adverb that goes BEFORE the main verb.",
            rule: "Subject + adverb + main verb + complement",
            examples: ["I always work", "She never lies", "They often visit us"],
            correctReason: "Frequency adverbs (always, never, often...) go before the main verb in Present Simple."
        },
        // Q3 — pos 2
        {
            id: 3, topic: "frequency + time together",
            sentence: "James _____.",
            translation: "James generalmente desayuna a las 7 AM.",
            options: [
                "has breakfast usually at 7 AM",
                "usually at 7 AM has breakfast",
                "usually has breakfast at 7 AM"
            ],
            correctIdx: 2,
            feedback: {
                "has breakfast usually at 7 AM": { errorType: "Wrong position (frequency)", explanation: "The frequency adverb is placed after the verb. With main verbs, it must come before the verb. The time expression position is OK." },
                "usually at 7 AM has breakfast": { errorType: "Wrong position (time)", explanation: "The time expression cuts between the frequency adverb and the verb. Time expressions belong at the end, not in the middle." }
            },
            clue: "usually (middle) + at 7 AM (end)",
            clueExplain: "shows the two-position rule: frequency adverbs in the middle, time expressions at the end.",
            rule: "Subject + frequency adverb + verb + object + time expression",
            examples: ["I always work in the morning", "She usually eats at 7 AM", "We often meet on Sundays"],
            correctReason: "When you have both a frequency adverb and a time expression, they go in different positions: frequency in the middle (before the verb), time at the end."
        },
        // Q4 — pos 0
        {
            id: 4, topic: "frequency adv. with 'be'",
            sentence: "The library _____.",
            translation: "La biblioteca está siempre llena los lunes.",
            options: [
                "is always full on Mondays",
                "always is full on Mondays",
                "is full always on Mondays"
            ],
            correctIdx: 0,
            feedback: {
                "always is full on Mondays": { errorType: "Wrong position", explanation: "With the verb 'be', the frequency adverb goes AFTER the verb, not before." },
                "is full always on Mondays": { errorType: "Wrong position", explanation: "The frequency adverb is after the adjective. With 'be', it must sit between the verb and the adjective." }
            },
            clue: "is (verb 'be') + always",
            clueExplain: "uses 'be' as the verb, so the frequency adverb goes after it. The time expression goes at the end.",
            rule: "Subject + be + adverb + adjective + time expression",
            examples: ["I am always tired at night", "She is never late on Mondays", "It is usually warm in summer"],
            correctReason: "With 'be', frequency adverbs go after the verb. Time expressions still go at the end."
        },
        // Q5 — pos 1
        {
            id: 5, topic: "time expr. at start",
            sentence: "_____ I go to the gym.",
            translation: "Todas las mañanas voy al gimnasio.",
            options: [
                "I every morning",
                "Every morning",
                "Morning every"
            ],
            correctIdx: 1,
            feedback: {
                "I every morning": { errorType: "Wrong word order", explanation: "The subject 'I' is repeated. Starting with the time expression alone — without a subject — is the natural order." },
                "Morning every": { errorType: "Wrong order", explanation: "The words 'every' and 'morning' are reversed. The correct order is 'every + time' (every morning, every day, every week)." }
            },
            clue: "time expression at start",
            clueExplain: "can begin a sentence to emphasize when something happens.",
            rule: "Time expression + subject + verb + ...",
            examples: ["Every morning I run", "On Sundays we relax", "At night they read"],
            correctReason: "Time expressions can move to the START of a sentence for emphasis. The subject and verb follow normally — no extra subject is added."
        },
        // Q6 — pos 2
        {
            id: 6, topic: "frequency adv. negative",
            sentence: "Diego _____.",
            translation: "Diego no siempre cena en casa.",
            options: [
                "always doesn't have dinner at home",
                "doesn't have always dinner at home",
                "doesn't always have dinner at home"
            ],
            correctIdx: 2,
            feedback: {
                "always doesn't have dinner at home": { errorType: "Wrong position", explanation: "The frequency adverb is before the auxiliary. In negatives, it must go between the auxiliary and the main verb." },
                "doesn't have always dinner at home": { errorType: "Wrong position", explanation: "The frequency adverb is after the verb. It must sit between the auxiliary 'doesn't' and the main verb." }
            },
            clue: "negative + always",
            clueExplain: "is a frequency adverb in a negative sentence — it goes between the auxiliary and the main verb.",
            rule: "Subject + don't/doesn't + adverb + verb + ...",
            examples: ["I don't always agree", "She doesn't always cook", "They don't always come"],
            correctReason: "In negatives, frequency adverbs sit between the auxiliary 'doesn't/don't' and the base verb."
        },
        // Q7 — pos 0
        {
            id: 7, topic: "two time expressions",
            sentence: "Ana _____.",
            translation: "Ana estudia inglés dos veces por semana en la academia.",
            options: [
                "studies English twice a week at the academy",
                "studies twice a week English at the academy",
                "twice a week studies English at the academy"
            ],
            correctIdx: 0,
            feedback: {
                "studies twice a week English at the academy": { errorType: "Wrong position", explanation: "The frequency expression cuts between the verb and the object. It must go after the object." },
                "twice a week studies English at the academy": { errorType: "Wrong position", explanation: "Starting with the frequency expression sounds unnatural here. It belongs at the end of the sentence with the place expression." }
            },
            clue: "twice a week + at the academy",
            clueExplain: "are two phrases that go at the END of the sentence, after the object.",
            rule: "Subject + verb + object + frequency expr. + place expr.",
            examples: ["I work three days a week at the office", "We meet twice a month at the café"],
            correctReason: "Multi-word frequency expressions (twice a week, three times a year) go at the end of the sentence, never between the verb and object."
        },
        // Q8 — pos 1
        {
            id: 8, topic: "frequency adv. simple",
            sentence: "Sara _____.",
            translation: "Sara nunca olvida un cumpleaños.",
            options: [
                "forgets never a birthday",
                "never forgets a birthday",
                "a birthday never forgets"
            ],
            correctIdx: 1,
            feedback: {
                "forgets never a birthday": { errorType: "Wrong position", explanation: "The frequency adverb is between the verb and the object. With main verbs, it must come before the verb." },
                "a birthday never forgets": { errorType: "Wrong word order", explanation: "The object is at the start without context. The natural order is subject + adverb + verb + object." }
            },
            clue: "never + main verb",
            clueExplain: "is a frequency adverb that goes before the main verb.",
            rule: "Subject + adverb + main verb + object",
            examples: ["I never lie", "He never smokes", "We never argue"],
            correctReason: "Frequency adverbs go before the main verb — never between the verb and its object."
        },
        // Q9 — pos 2
        {
            id: 9, topic: "time expr. middle vs end",
            sentence: "We _____.",
            translation: "Cenamos en la noche.",
            options: [
                "in the evening have dinner",
                "have in the evening dinner",
                "have dinner in the evening"
            ],
            correctIdx: 2,
            feedback: {
                "in the evening have dinner": { errorType: "Wrong word order", explanation: "Starting with the time expression is possible, but the subject 'we' is missing. The most natural order has the time expression at the end." },
                "have in the evening dinner": { errorType: "Wrong position", explanation: "The time expression cuts between the verb and the object. Time expressions go at the end, after the object." }
            },
            clue: "in the evening (time)",
            clueExplain: "is a time expression that goes at the END of the sentence, after the object.",
            rule: "Subject + verb + object + time expression",
            examples: ["I work in the morning", "She reads at night", "We eat at 8 PM"],
            correctReason: "Time expressions with prepositions (in/on/at + time) go at the end of the sentence — after the verb and object."
        },
        // Q10 — pos 0
        {
            id: 10, topic: "frequency + time mixed",
            sentence: "My parents _____.",
            translation: "Mis padres a veces ven películas los viernes.",
            options: [
                "sometimes watch movies on Fridays",
                "watch sometimes movies on Fridays",
                "watch movies sometimes on Fridays"
            ],
            correctIdx: 0,
            feedback: {
                "watch sometimes movies on Fridays": { errorType: "Wrong position (frequency)", explanation: "The frequency adverb cuts between the verb and the object. It must come before the verb." },
                "watch movies sometimes on Fridays": { errorType: "Wrong position (frequency)", explanation: "The frequency adverb is mixed with the time expression. Frequency adverbs belong in the middle, before the main verb." }
            },
            clue: "sometimes (middle) + on Fridays (end)",
            clueExplain: "shows two adverbials: frequency goes before the verb, time goes at the end.",
            rule: "Subject + frequency + verb + object + time expression",
            examples: ["I sometimes work on weekends", "She often visits us on Sundays", "We rarely meet at night"],
            correctReason: "Frequency adverbs go in the middle (before the main verb), and time expressions go at the end. Each has its own position."
        },
        // Q11 — pos 1
        {
            id: 11, topic: "time at start with comma",
            sentence: "_____, my brother helps me with my homework.",
            translation: "Por la noche, mi hermano me ayuda con la tarea.",
            options: [
                "On the night",
                "At night",
                "In night"
            ],
            correctIdx: 1,
            feedback: {
                "On the night": { errorType: "Wrong preposition", explanation: "We don't say 'on the night'. The fixed expression for the night-time period is 'at night' (no article)." },
                "In night": { errorType: "Wrong preposition", explanation: "We don't say 'in night'. The fixed expression is 'at night' — this is a fixed phrase you must memorize." }
            },
            clue: "at night (fixed expression)",
            clueExplain: "is a fixed time expression that always uses 'at' and no article.",
            rule: "Time expr. at start + comma + subject + verb...",
            examples: ["At night, I read", "In the morning, she studies", "On Sundays, we relax"],
            correctReason: "Some time expressions are fixed phrases. 'At night' (no article) is one of them. When moved to the start of a sentence, a comma typically follows."
        },
        // Q12 — pos 2
        {
            id: 12, topic: "frequency in question",
            sentence: "_____?",
            translation: "¿Con qué frecuencia visitas a tus abuelos?",
            options: [
                "How often you visit your grandparents",
                "How often does you visit your grandparents",
                "How often do you visit your grandparents"
            ],
            correctIdx: 2,
            feedback: {
                "How often you visit your grandparents": { errorType: "Missing auxiliary", explanation: "Wh- questions need 'do/does' between the question phrase and the subject." },
                "How often does you visit your grandparents": { errorType: "Wrong auxiliary", explanation: "'Does' is for he/she/it. The subject 'you' uses 'do' as the auxiliary." }
            },
            clue: "How often + you (2nd person)",
            clueExplain: "starts a frequency question with the subject 'you' — uses 'do' as the auxiliary.",
            rule: "How often + do/does + subject + base verb?",
            examples: ["How often do you study?", "How often does she run?", "How often do they meet?"],
            correctReason: "Frequency questions follow the standard Present Simple question structure: 'how often' + auxiliary + subject + base verb."
        },
        // Q13 — pos 0
        {
            id: 13, topic: "frequency adv. with 3rd person",
            sentence: "Nadia _____.",
            translation: "Nadia rara vez bebe café.",
            options: [
                "rarely drinks coffee",
                "drinks rarely coffee",
                "rarely drink coffee"
            ],
            correctIdx: 0,
            feedback: {
                "drinks rarely coffee": { errorType: "Wrong position", explanation: "The frequency adverb is between the verb and the object. It must come before the verb." },
                "rarely drink coffee": { errorType: "Missing -s", explanation: "The subject is third person singular, so the verb takes '-s'. The adverb position is fine, but the verb form is wrong." }
            },
            clue: "Nadia (3rd person) + rarely",
            clueExplain: "needs the frequency adverb before the verb AND the verb with '-s' for third person.",
            rule: "He/She/It + adverb + verb-s",
            examples: ["He rarely smokes", "She rarely calls", "It rarely rains"],
            correctReason: "Frequency adverbs go before the main verb. With third-person singular, the verb still takes '-s'."
        },
        // Q14 — pos 1
        {
            id: 14, topic: "time expr. with verb 'be'",
            sentence: "The classroom _____.",
            translation: "El aula está vacía los fines de semana.",
            options: [
                "on weekends is empty",
                "is empty on weekends",
                "is on weekends empty"
            ],
            correctIdx: 1,
            feedback: {
                "on weekends is empty": { errorType: "Wrong position", explanation: "Starting with the time expression is possible but the subject is missing here. The natural order has the time expression at the end." },
                "is on weekends empty": { errorType: "Wrong position", explanation: "The time expression cuts between the verb and the adjective. Time expressions go at the end, not in the middle." }
            },
            clue: "is + on weekends",
            clueExplain: "uses the verb 'be' with a time expression. The time expression goes at the end, after the adjective.",
            rule: "Subject + be + adjective + time expression",
            examples: ["I am tired at night", "She is busy on Mondays", "It is open every day"],
            correctReason: "Time expressions go at the end of the sentence, after the verb 'be' and the adjective."
        },
        // Q15 — pos 2
        {
            id: 15, topic: "frequency adv. + multi-word time",
            sentence: "I _____.",
            translation: "Siempre voy al supermercado los sábados por la mañana.",
            options: [
                "go always to the supermarket on Saturday mornings",
                "always to the supermarket go on Saturday mornings",
                "always go to the supermarket on Saturday mornings"
            ],
            correctIdx: 2,
            feedback: {
                "go always to the supermarket on Saturday mornings": { errorType: "Wrong position (frequency)", explanation: "The frequency adverb is after the verb. With main verbs, it must come before the verb." },
                "always to the supermarket go on Saturday mornings": { errorType: "Broken word order", explanation: "The verb is moved out of position. The order should be: frequency adverb + verb + object/place + time expression." }
            },
            clue: "always (middle) + on Saturday mornings (end)",
            clueExplain: "shows the two-position rule: frequency before the verb, time at the end.",
            rule: "Subject + frequency + verb + object + time expression",
            examples: ["I always work on Mondays", "She often shops on weekends", "We never travel in summer"],
            correctReason: "Frequency adverbs go before the main verb. Time expressions go at the end of the sentence. Each has its fixed position."

    ];

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, i) => {
            const indexed = q.options.map((text, idx) => ({ text, isCorrect: idx === q.correctIdx }));
            q.shuffled = shuffle(indexed);
            container.appendChild(createCard(q, i));
        });
        showQuestion(0);
        updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = `question-card ${index !== 0 ? 'hidden' : ''}`;
        card.id = `question-${index}`;

        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span class="topic-badge">${q.topic}</span>
            </div>
            <p class="question-text">${q.sentence.replace('_____', `<span class="blank" id="blank-${index}">?</span>`)}</p>
            <div class="translate-bar">
                <button class="translate-btn" id="trBtn-${index}" onclick="toggleTranslation(${index})">🇪🇸 Ver en español</button>
            </div>
            <div class="translation-box" id="trBox-${index}">
                <span class="tr-label">ES:</span>${q.translation}
            </div>
            <div class="options-grid" id="options-${index}">
                ${q.shuffled.map((opt, i) => `
                    <button class="option-btn" data-idx="${i}" onclick="selectAnswer(${index}, ${i})">${opt.text}</button>
                `).join('')}
            </div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Previous</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'See Results 🎉' : 'Next →'}
                </button>
            </div>
        `;
        return card;
    }

    function toggleTranslation(qi) {
        const box = document.getElementById(`trBox-${qi}`);
        const btn = document.getElementById(`trBtn-${qi}`);
        const open = box.classList.toggle('show');
        btn.classList.toggle('active', open);
        btn.innerHTML = open ? '🇬🇧 Hide translation' : '🇪🇸 Ver en español';
    }

    function selectAnswer(qi, optIdx) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = q.shuffled[optIdx];
        const isCorrect = selected.isCorrect;
        const correctOpt = q.shuffled.find(o => o.isCorrect);
        if (isCorrect) score++;

        const blank = document.getElementById(`blank-${qi}`);
        blank.textContent = selected.text;
        blank.className = `blank ${isCorrect ? 'correct' : 'incorrect'}`;

        document.querySelectorAll(`#options-${qi} .option-btn`).forEach((b, i) => {
            b.disabled = true;
            const opt = q.shuffled[i];
            if (opt.isCorrect) b.classList.add('correct');
            else if (i === optIdx) b.classList.add('incorrect');
        });

        buildFeedback(qi, selected, isCorrect, correctOpt, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, correctOpt, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
        const ruleExamples = q.examples.map(e => `<span class="rule-ex">${e}</span>`).join('');

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">✅</span>
                    <div>
                        <div class="fb-title">Correct!</div>
                        <div class="fb-subtitle">You picked the right word order</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-rule">
                        <div class="fb-block-title">📐 The rule</div>
                        <div class="rule-formula">${q.rule}</div>
                        <div class="rule-examples">${ruleExamples}</div>
                    </div>
                    <div class="fb-why">
                        <div class="fb-block-title">💡 Why is it correct?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        } else {
            const err = q.feedback[selected.text] || { errorType: "Error", explanation: "Wrong answer." };
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">❌</span>
                    <div>
                        <div class="fb-title">Incorrect</div>
                        <div class="fb-subtitle">Let's review the word order</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-compare">
                        <div class="fb-block-title" style="color:#64748B;">🔄 Your answer vs. the correct one</div>
                        <div class="fb-compare-row">
                            <span class="compare-label wrong">You wrote</span>
                            <span class="compare-text"><span class="word-wrong">${selected.text}</span></span>
                        </div>
                        <div class="fb-compare-row">
                            <span class="compare-label right">Correct</span>
                            <span class="compare-text"><span class="word-right">${correctOpt.text}</span></span>
                        </div>
                    </div>
                    <div class="fb-error">
                        <div class="fb-block-title">⚠️ Error type: <span class="error-badge">${err.errorType}</span></div>
                        <div class="error-rule">${err.explanation}</div>
                    </div>
                    <div class="fb-rule">
                        <div class="fb-block-title">📐 The correct rule</div>
                        <div class="rule-formula">${q.rule}</div>
                        <div class="rule-examples">${ruleExamples}</div>
                    </div>
                    <div class="fb-why">
                        <div class="fb-block-title">💡 Why is the correct answer correct?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c, idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function nextQuestion(i) { i < quizData.length - 1 ? showQuestion(i + 1) : showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
    function updateProgress() {
        const done = answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width = (done / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        window.dispatchEvent(new CustomEvent('jucum:done', { detail: { score: Math.round(pct) } })); // JUCUM seguimiento
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        let stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? 'Excellent! You master word order. 🏆'
            : pct >= 70 ? 'Well done! Keep practicing. 💪'
            : 'Good effort. Review the rules and try again. 📚';
        document.querySelectorAll('.star').forEach((s, i) => {
            if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300);
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
