<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Identification - A1 M2 · Adverbs of Frequency | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* ===== A1 PALETTE (BLUE) ===== */
            --primary: #29B6F6;
            --primary-light: #B3E5FC;
            --primary-dark: #0277BD;
            --primary-darker: #01579B;
            --accent: #4FC3F7;
            --bg-gradient-start: #F0F9FF;
            --bg-gradient-end: #E1F5FE;
            --text-dark: #01579B;
            --text-medium: #0277BD;
            --text-light: #0288D1;
            --lvl-glow: rgba(41,182,246,0.12);

            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444; --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6; --info-light: #DBEAFE; --info-dark: #1D4ED8;
            --purple: #8B5CF6; --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --white: #FFFFFF;
            --shadow-soft: 0 4px 20px rgba(41,182,246,0.18);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start),var(--bg-gradient-end)); min-height:100vh; color:var(--text-dark); }

        .header { background:linear-gradient(135deg,#0288D1,#29B6F6,#4FC3F7); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.4rem; text-decoration:none; color:white; transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); transform:scale(1.1); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.9); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; }
        .progress-container { height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; transition:width .5s ease; width:0%; }

        main { padding:1.5rem; max-width:680px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }

        /* ── QUESTION CARD ── */
        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:0.85rem; flex-wrap:wrap; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .q-label { font-size:0.88rem; color:var(--text-medium); font-weight:600; }
        .topic-badge { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.7rem; border-radius:20px; font-size:0.72rem; font-weight:700; margin-left:auto; background:var(--primary-light); color:var(--primary-darker); }

        /* ── TRANSLATION TOGGLE ── */
        .translate-bar { display:flex; justify-content:flex-end; margin-bottom:0.6rem; }
        .translate-btn { background:white; border:1.5px dashed var(--primary); color:var(--primary-dark); padding:0.35rem 0.8rem; border-radius:20px; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:0.35rem; transition:all .2s; }
        .translate-btn:hover { background:var(--bg-gradient-start); }
        .translate-btn.active { background:var(--primary); color:white; border-style:solid; }
        .translation-box { background:#FFF8E1; border:1px solid #FFE082; border-radius:10px; padding:0.6rem 0.85rem; margin-bottom:0.85rem; font-size:0.88rem; color:#5D4037; font-style:italic; display:none; line-height:1.5; }
        .translation-box.show { display:block; animation:fadeUp .3s ease; }
        .translation-box .tr-label { font-weight:800; font-style:normal; color:#E65100; margin-right:0.3rem; font-size:0.75rem; text-transform:uppercase; letter-spacing:.4px; }

        /* ── SENTENCE OPTIONS ── */
        .sentence-options { display:flex; flex-direction:column; gap:0.7rem; margin-bottom:0.5rem; }
        .sent-option { border:2.5px solid #E5E7EB; border-radius:14px; padding:1rem 1.1rem; cursor:pointer; transition:all .2s; background:white; text-align:left; font-family:'Nunito',sans-serif; display:flex; gap:0.75rem; align-items:flex-start; }
        .sent-option:hover:not(.disabled) { border-color:var(--primary); background:var(--bg-gradient-start); transform:translateX(4px); }
        .sent-option.disabled { cursor:default; }
        .sent-option.correct { border-color:var(--success); background:var(--success-light); }
        .sent-option.incorrect { border-color:var(--error); background:var(--error-light); }
        .option-letter { width:26px; height:26px; border-radius:50%; background:var(--primary-light); color:var(--primary-darker); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.8rem; flex-shrink:0; margin-top:1px; font-family:'Fredoka',sans-serif; }
        .sent-option.correct .option-letter { background:var(--success); color:white; }
        .sent-option.incorrect .option-letter { background:var(--error); color:white; }
        .option-text { font-size:0.98rem; color:var(--text-dark); line-height:1.55; font-weight:600; flex:1; }
        .sent-option.correct .option-text { color:var(--success-dark); }
        .sent-option.incorrect .option-text { color:var(--error-dark); }
        .option-status { font-size:1.1rem; margin-left:auto; flex-shrink:0; opacity:0; transition:opacity .2s; }
        .sent-option.correct .option-status, .sent-option.incorrect .option-status { opacity:1; }

        .error-highlight { color:var(--error); font-weight:800; text-decoration:underline wavy var(--error); }
        .correct-highlight { color:var(--success-dark); font-weight:800; }

        /* ── FEEDBACK ── */
        .feedback { margin-top:1.25rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon { font-size:1.6rem; }
        .fb-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }

        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }

        .fb-block { border-radius:12px; padding:0.9rem 1rem; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.15rem 0.55rem; border-radius:6px; font-size:0.72rem; font-weight:700; margin-left:4px; }
        .success-badge { display:inline-block; background:var(--success); color:white; padding:0.15rem 0.55rem; border-radius:6px; font-size:0.72rem; font-weight:700; }

        /* signal */
        .fb-signal { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-signal.wrong { background:#FFF1F2; border-color:#FECDD3; }
        .fb-signal .fb-block-title { color:var(--success-dark); }
        .fb-signal.wrong .fb-block-title { color:var(--error-dark); }
        .signal-tag { display:inline-block; background:var(--success); color:white; border-radius:6px; padding:0.1rem 0.5rem; font-size:0.82rem; font-weight:700; margin:0 2px; }
        .signal-tag.red { background:var(--error); }

        /* compare */
        .fb-compare { background:#F8FAFC; border:1px solid #E2E8F0; }
        .fb-compare .fb-block-title { color:#475569; }
        .compare-row { display:flex; align-items:flex-start; gap:0.6rem; padding:0.4rem 0; border-bottom:1px dashed #E2E8F0; }
        .compare-row:last-child { border-bottom:none; }
        .compare-label { font-size:0.72rem; font-weight:800; text-transform:uppercase; white-space:nowrap; padding:0.15rem 0.5rem; border-radius:6px; flex-shrink:0; margin-top:2px; }
        .compare-label.wrong { background:var(--error-light); color:var(--error-dark); }
        .compare-label.right { background:var(--success-light); color:var(--success-dark); }
        .compare-text { font-size:0.95rem; color:var(--text-dark); line-height:1.55; }

        /* error */
        .fb-error { background:var(--error-light); border:1px solid #FECACA; }
        .fb-error .fb-block-title { color:var(--error-dark); }
        .word-swap { display:flex; align-items:center; justify-content:center; gap:0.75rem; margin:0.6rem 0; flex-wrap:wrap; }
        .ws-box { padding:0.4rem 1rem; border-radius:8px; font-weight:700; font-size:1rem; }
        .ws-wrong { background:white; color:var(--error); border:2px solid var(--error); text-decoration:line-through; }
        .ws-arrow { font-size:1.3rem; color:#94A3B8; }
        .ws-right { background:var(--success); color:white; }
        .error-text { font-size:0.9rem; color:var(--text-dark); line-height:1.55; }

        /* rule */
        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.95rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }
        .rule-examples { display:flex; flex-wrap:wrap; gap:0.4rem; }
        .rule-ex { font-size:0.82rem; background:white; border:1px solid #BFDBFE; border-radius:6px; padding:0.25rem 0.55rem; color:var(--info-dark); font-weight:600; }

        /* why */
        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }

        /* ── NAV ── */
        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }

        /* ── RESULTS ── */
        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji { font-size:4rem; margin-bottom:1rem; }
        .results-title { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; color:var(--text-dark); }
        .results-score { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>
    <header class="header">
        <a href="https://jucumenglishcenter.github.io/A1/panel-a1.html" class="back-btn">←</a>
        <div class="header-info">
            <div class="header-title">🔍 Identification</div>
            <div class="header-subtitle">🩵 A1 · Module 2 · Adverbs of Frequency</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/15</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">🔍</div>
            <div>
                <div class="instructions-title">Choose the correct sentence</div>
                <div class="instructions-text">Read the three sentences and pick the one that uses the adverb of frequency correctly. Tap <strong>"Ver en español"</strong> if you need a translation.</div>
            </div>
        </div>

        <div id="questionsContainer"></div>

        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">Quiz Complete!</div>
            <div class="results-score" id="finalScore">0/15</div>
            <div class="stars-container">
                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Try Again</button>
                <a href="https://jucumenglishcenter.github.io/A1/panel-a1.html" class="result-btn secondary">← Back to Panel</a>
            </div>
        </div>
    </main>

    <script>
    // ============================================================
    // IDENTIFY — A1 M2 · ADVERBS OF FREQUENCY
    //
    // options[]:
    //   correct:true  → grammatically correct sentence
    //   correct:false → contains an error in adverb usage
    //     ├─ errorWord   : the wrong segment
    //     ├─ correctWord : how it should be
    //     ├─ errorType   : short label of the error
    //     └─ explanation : why it's wrong
    //
    // translation : Spanish translation of the sentence-question
    // clue        : the time/frequency signal
    // clueExplain : what the signal tells the learner (no answer reveal)
    // correctReason : why the correct sentence is correct
    // ============================================================
    const quizData = [
        // Q1 — correct in position B
        {
            id: 1, topic: "always · be-verb",
            translation: "Anna siempre llega temprano al trabajo.",
            options: [
                { text: "Anna always is early for work.", correct: false,
                  errorWord: "always is", correctWord: "is always",
                  errorType: "Wrong position",
                  explanation: "With the verb 'be' (am/is/are), the adverb of frequency goes AFTER the verb, not before it." },
                { text: "Anna is always early for work.", correct: true },
                { text: "Always Anna is early for work.", correct: false,
                  errorWord: "Always Anna", correctWord: "Anna is always",
                  errorType: "Wrong position",
                  explanation: "Adverbs of frequency don't start the sentence in standard English. They go inside the clause, near the verb." }
            ],
            clue: "is (verb 'be')",
            clueExplain: "tells you the adverb position depends on the verb 'be', not on a regular verb.",
            rule: "Subject + be + adverb + complement",
            examples: ["I am always happy", "She is never late", "They are usually busy"],
            correctReason: "With 'be' verbs, the adverb of frequency goes immediately after the verb — that's the fixed pattern."
        },
        // Q2 — correct in position A
        {
            id: 2, topic: "never · main verb",
            translation: "Mi hermano nunca bebe café.",
            options: [
                { text: "My brother never drinks coffee.", correct: true },
                { text: "My brother drinks never coffee.", correct: false,
                  errorWord: "drinks never", correctWord: "never drinks",
                  errorType: "Wrong position",
                  explanation: "With main verbs (not 'be'), the adverb goes BEFORE the verb, not after it." },
                { text: "Never my brother drinks coffee.", correct: false,
                  errorWord: "Never my brother", correctWord: "My brother never",
                  errorType: "Wrong position",
                  explanation: "The adverb 'never' doesn't start the sentence here. It belongs between the subject and the main verb." }
            ],
            clue: "drinks (main verb)",
            clueExplain: "shows the adverb position rule for main verbs in Present Simple.",
            rule: "Subject + adverb + main verb + object",
            examples: ["I never smoke", "He always works", "We sometimes travel"],
            correctReason: "With main verbs, the adverb of frequency comes right before the verb — this is the standard pattern."
        },
        // Q3 — correct in position C
        {
            id: 3, topic: "usually · main verb",
            translation: "Carlos generalmente camina al parque los domingos.",
            options: [
                { text: "Carlos walks usually to the park on Sundays.", correct: false,
                  errorWord: "walks usually", correctWord: "usually walks",
                  errorType: "Wrong position",
                  explanation: "The adverb is placed after the main verb, but it should go before it." },
                { text: "Carlos is usually walks to the park on Sundays.", correct: false,
                  errorWord: "is usually walks", correctWord: "usually walks",
                  errorType: "Extra verb 'is'",
                  explanation: "There are two verbs here ('is' and 'walks'). With a main verb in Present Simple, you don't add 'be'." },
                { text: "Carlos usually walks to the park on Sundays.", correct: true }
            ],
            clue: "walks (main verb)",
            clueExplain: "tells you to follow the rule for main verbs, not for 'be'.",
            rule: "Subject + adverb + main verb",
            examples: ["She usually cooks", "I often read", "They rarely watch TV"],
            correctReason: "The adverb 'usually' goes between the subject and the main verb — no extra auxiliary needed in Present Simple."
        },
        // Q4 — correct in B
        {
            id: 4, topic: "often · question",
            translation: "¿Con qué frecuencia visitas a tus abuelos?",
            options: [
                { text: "How you often visit your grandparents?", correct: false,
                  errorWord: "How you often visit", correctWord: "How often do you visit",
                  errorType: "Missing auxiliary",
                  explanation: "The question is missing the auxiliary 'do'. In Present Simple questions you need 'do/does'." },
                { text: "How often do you visit your grandparents?", correct: true },
                { text: "How often you visit your grandparents?", correct: false,
                  errorWord: "How often you visit", correctWord: "How often do you visit",
                  errorType: "Missing auxiliary",
                  explanation: "Present Simple questions need 'do' before the subject. Without it, the question is incomplete." }
            ],
            clue: "How often (question word)",
            clueExplain: "introduces a question about frequency and requires a specific question structure.",
            rule: "How often + do/does + subject + verb?",
            examples: ["How often do you study?", "How often does he run?", "How often do they call?"],
            correctReason: "Frequency questions start with 'How often' followed by the auxiliary 'do/does' and the base verb."
        },
        // Q5 — correct in A
        {
            id: 5, topic: "sometimes · main verb",
            translation: "A veces compramos pan en la panadería.",
            options: [
                { text: "We sometimes buy bread at the bakery.", correct: true },
                { text: "We buy sometimes bread at the bakery.", correct: false,
                  errorWord: "buy sometimes", correctWord: "sometimes buy",
                  errorType: "Wrong position",
                  explanation: "The adverb cuts between the verb and the object. It should be before the main verb instead." },
                { text: "We are sometimes buy bread at the bakery.", correct: false,
                  errorWord: "are sometimes buy", correctWord: "sometimes buy",
                  errorType: "Extra verb 'are'",
                  explanation: "Present Simple with a main verb doesn't take 'be'. Adding 'are' creates two verbs in the same clause." }
            ],
            clue: "buy (main verb)",
            clueExplain: "tells you to apply the rule for main verbs in Present Simple.",
            rule: "Subject + adverb + main verb + object",
            examples: ["I sometimes cook", "She sometimes drives", "They sometimes help"],
            correctReason: "'Sometimes' goes before the main verb 'buy' — never between the verb and its object."
        },
        // Q6 — correct in C
        {
            id: 6, topic: "always · be-verb",
            translation: "Los niños siempre están felices en la fiesta.",
            options: [
                { text: "The children always are happy at the party.", correct: false,
                  errorWord: "always are", correctWord: "are always",
                  errorType: "Wrong position",
                  explanation: "With 'be' (are), the adverb goes after the verb, not before it." },
                { text: "The children are happy always at the party.", correct: false,
                  errorWord: "happy always", correctWord: "always happy",
                  errorType: "Wrong position",
                  explanation: "The adverb is placed after the adjective. With 'be', it must go between the verb and the adjective." },
                { text: "The children are always happy at the party.", correct: true }
            ],
            clue: "are (verb 'be')",
            clueExplain: "shows you to apply the rule for the verb 'be'.",
            rule: "Subject + be + adverb + adjective",
            examples: ["I am always tired", "He is always kind", "We are always ready"],
            correctReason: "With 'be', the adverb of frequency comes immediately after the verb and before the adjective — that's the fixed order."
        },
        // Q7 — correct in B
        {
            id: 7, topic: "rarely · main verb",
            translation: "María raramente come carne.",
            options: [
                { text: "Maria eats rarely meat.", correct: false,
                  errorWord: "eats rarely", correctWord: "rarely eats",
                  errorType: "Wrong position",
                  explanation: "The adverb is placed between the verb and the object. With main verbs it goes before the verb." },
                { text: "Maria rarely eats meat.", correct: true },
                { text: "Rarely Maria eats meat.", correct: false,
                  errorWord: "Rarely Maria", correctWord: "Maria rarely",
                  errorType: "Wrong position",
                  explanation: "Starting the sentence with 'rarely' is not standard in everyday English. The adverb belongs after the subject." }
            ],
            clue: "eats (main verb)",
            clueExplain: "indicates the adverb-position rule for main verbs.",
            rule: "Subject + adverb + main verb + object",
            examples: ["I rarely drink soda", "He rarely calls", "They rarely complain"],
            correctReason: "'Rarely' goes between the subject and the main verb — that's the standard placement for adverbs of low frequency."
        },
        // Q8 — correct in A
        {
            id: 8, topic: "never · be-verb",
            translation: "Nunca llego tarde a clase.",
            options: [
                { text: "I am never late for class.", correct: true },
                { text: "I never am late for class.", correct: false,
                  errorWord: "never am", correctWord: "am never",
                  errorType: "Wrong position",
                  explanation: "With 'be' (am), the adverb goes after the verb, not before it." },
                { text: "I am late never for class.", correct: false,
                  errorWord: "late never", correctWord: "never late",
                  errorType: "Wrong position",
                  explanation: "The adverb sits after the adjective. With 'be', it should go between the verb and the adjective." }
            ],
            clue: "am (verb 'be')",
            clueExplain: "tells you the adverb position depends on the verb 'be'.",
            rule: "Subject + be + adverb + adjective",
            examples: ["I am never bored", "She is never tired", "We are never late"],
            correctReason: "With 'be', the adverb of frequency goes right after the verb — and before the adjective that describes the subject."
        },
        // Q9 — correct in C
        {
            id: 9, topic: "always · question",
            translation: "¿Siempre desayunas en casa?",
            options: [
                { text: "You always have breakfast at home?", correct: false,
                  errorWord: "You always have", correctWord: "Do you always have",
                  errorType: "Missing auxiliary",
                  explanation: "Yes/no questions in Present Simple need the auxiliary 'do' at the start, not just intonation." },
                { text: "Do always you have breakfast at home?", correct: false,
                  errorWord: "Do always you", correctWord: "Do you always",
                  errorType: "Wrong adverb position",
                  explanation: "In questions, the adverb goes between the subject and the main verb — not between 'do' and the subject." },
                { text: "Do you always have breakfast at home?", correct: true }
            ],
            clue: "yes/no question",
            clueExplain: "tells you the question follows the Present Simple question pattern.",
            rule: "Do/Does + subject + adverb + verb?",
            examples: ["Do you always work?", "Does he often visit?", "Do they usually arrive on time?"],
            correctReason: "In yes/no questions with frequency adverbs, the order is: Do + subject + adverb + base verb."
        },
        // Q10 — correct in A
        {
            id: 10, topic: "often · main verb",
            translation: "Mis padres a menudo viajan en verano.",
            options: [
                { text: "My parents often travel in summer.", correct: true },
                { text: "My parents are often travel in summer.", correct: false,
                  errorWord: "are often travel", correctWord: "often travel",
                  errorType: "Extra verb 'are'",
                  explanation: "Two verbs appear ('are' and 'travel'). With a main verb in Present Simple, you don't add 'be'." },
                { text: "Often my parents travel in summer.", correct: false,
                  errorWord: "Often my parents", correctWord: "My parents often",
                  errorType: "Wrong position",
                  explanation: "Beginning the sentence with 'often' is not standard. The adverb goes between the subject and the main verb." }
            ],
            clue: "travel (main verb)",
            clueExplain: "tells you which adverb-position rule applies.",
            rule: "Subject + adverb + main verb",
            examples: ["I often walk", "She often reads", "They often visit us"],
            correctReason: "'Often' goes between the subject and the main verb — no extra auxiliary needed in Present Simple."
        },
        // Q11 — correct in B
        {
            id: 11, topic: "usually · be-verb",
            translation: "El restaurante normalmente está lleno los viernes.",
            options: [
                { text: "The restaurant usually is full on Fridays.", correct: false,
                  errorWord: "usually is", correctWord: "is usually",
                  errorType: "Wrong position",
                  explanation: "With 'is' (verb 'be'), the adverb goes after the verb, not before." },
                { text: "The restaurant is usually full on Fridays.", correct: true },
                { text: "The restaurant is full usually on Fridays.", correct: false,
                  errorWord: "full usually", correctWord: "usually full",
                  errorType: "Wrong position",
                  explanation: "The adverb is placed after the adjective. With 'be', it must come between the verb and the adjective." }
            ],
            clue: "is (verb 'be')",
            clueExplain: "tells you the adverb position depends on the verb 'be'.",
            rule: "Subject + be + adverb + adjective",
            examples: ["It is usually warm", "She is usually busy", "They are usually here"],
            correctReason: "With 'be', the adverb 'usually' sits right after the verb and before the adjective — the fixed pattern."
        },
        // Q12 — correct in C
        {
            id: 12, topic: "sometimes · main verb",
            translation: "Mi mejor amiga a veces me llama por la noche.",
            options: [
                { text: "My best friend calls me sometimes at night.", correct: false,
                  errorWord: "calls me sometimes", correctWord: "sometimes calls me",
                  errorType: "Wrong position",
                  explanation: "The adverb appears late in the sentence. With main verbs it goes before the verb." },
                { text: "My best friend is sometimes call me at night.", correct: false,
                  errorWord: "is sometimes call", correctWord: "sometimes calls",
                  errorType: "Extra verb + base form",
                  explanation: "Two problems: 'is' shouldn't be there, and the verb is in base form. Use the conjugated main verb only." },
                { text: "My best friend sometimes calls me at night.", correct: true }
            ],
            clue: "calls (main verb)",
            clueExplain: "indicates the rule for main verbs in Present Simple.",
            rule: "Subject + adverb + main verb + object",
            examples: ["I sometimes write", "He sometimes laughs", "We sometimes meet"],
            correctReason: "'Sometimes' goes between the subject and the main verb 'calls' — that's the standard order."
        },
        // Q13 — correct in A
        {
            id: 13, topic: "always · negative",
            translation: "Mi padre no siempre ve las noticias.",
            options: [
                { text: "My father doesn't always watch the news.", correct: true },
                { text: "My father always doesn't watch the news.", correct: false,
                  errorWord: "always doesn't", correctWord: "doesn't always",
                  errorType: "Wrong position",
                  explanation: "In negatives, the adverb goes between the auxiliary and the main verb — after 'doesn't', not before." },
                { text: "My father not always watches the news.", correct: false,
                  errorWord: "not always watches", correctWord: "doesn't always watch",
                  errorType: "Missing auxiliary",
                  explanation: "Negatives in Present Simple need 'do/does + not'. You can't use 'not' alone with a conjugated verb." }
            ],
            clue: "negative sentence",
            clueExplain: "tells you the adverb has a special position relative to the auxiliary in negatives.",
            rule: "Subject + don't/doesn't + adverb + verb",
            examples: ["I don't always agree", "She doesn't always cook", "They don't always come"],
            correctReason: "In Present Simple negatives, the adverb sits between the auxiliary 'doesn't' and the base verb."
        },
        // Q14 — correct in B
        {
            id: 14, topic: "never · main verb",
            translation: "Lucía nunca olvida un cumpleaños.",
            options: [
                { text: "Lucia forgets never a birthday.", correct: false,
                  errorWord: "forgets never", correctWord: "never forgets",
                  errorType: "Wrong position",
                  explanation: "The adverb is between the verb and the object. With main verbs it must come before the verb." },
                { text: "Lucia never forgets a birthday.", correct: true },
                { text: "Lucia doesn't never forget a birthday.", correct: false,
                  errorWord: "doesn't never", correctWord: "never",
                  errorType: "Double negative",
                  explanation: "'Never' is already negative. Combining it with 'doesn't' creates a double negative, which is incorrect in standard English." }
            ],
            clue: "never (negative adverb)",
            clueExplain: "is itself negative, so no extra negation is needed.",
            rule: "Subject + never + main verb (no 'don't/doesn't')",
            examples: ["I never lie", "He never quits", "They never argue"],
            correctReason: "'Never' carries the negative meaning by itself — combining it with 'doesn't' is grammatically wrong."
        },
        // Q15 — correct in C
        {
            id: 15, topic: "often · question",
            translation: "¿Con qué frecuencia juega tu hermano fútbol?",
            options: [
                { text: "How often plays your brother football?", correct: false,
                  errorWord: "plays your brother", correctWord: "does your brother play",
                  errorType: "Missing auxiliary",
                  explanation: "Questions in Present Simple need 'does' before the subject — the main verb stays in base form." },
                { text: "How often your brother plays football?", correct: false,
                  errorWord: "your brother plays", correctWord: "does your brother play",
                  errorType: "Missing auxiliary",
                  explanation: "Without 'does', the structure is a statement, not a question. Frequency questions still need the auxiliary." },
                { text: "How often does your brother play football?", correct: true }
            ],
            clue: "How often (question word)",
            clueExplain: "starts a frequency question and requires the standard Present Simple question structure.",
            rule: "How often + does + subject + base verb?",
            examples: ["How often does she swim?", "How often does it rain?", "How often does he cook?"],
            correctReason: "Frequency questions follow the Present Simple pattern: 'How often' + 'does' + subject + base verb."
        }
    ];

    // ---- Fisher-Yates shuffle ----
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, i) => {
            q.shuffled = shuffle(q.options);
            container.appendChild(createCard(q, i));
        });
        showQuestion(0);
        updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = `question-card ${index !== 0 ? 'hidden' : ''}`;
        card.id = `question-${index}`;
        const letters = ['A','B','C'];

        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span class="q-label">Choose the grammatically correct sentence:</span>
                <span class="topic-badge">${q.topic}</span>
            </div>
            <div class="translate-bar">
                <button class="translate-btn" id="trBtn-${index}" onclick="toggleTranslation(${index})">
                    🇪🇸 Ver en español
                </button>
            </div>
            <div class="translation-box" id="trBox-${index}">
                <span class="tr-label">ES:</span>${q.translation}
            </div>
            <div class="sentence-options" id="options-${index}">
                ${q.shuffled.map((opt, i) => `
                    <button class="sent-option" onclick="selectOption(${index}, ${i})">
                        <div class="option-letter">${letters[i]}</div>
                        <div class="option-text">${opt.text}</div>
                        <div class="option-status">${opt.correct ? '✅' : '❌'}</div>
                    </button>
                `).join('')}
            </div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Previous</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'See Results 🎉' : 'Next →'}
                </button>
            </div>
        `;

        // Hide the empty option-status emojis until answered
        setTimeout(() => {
            card.querySelectorAll('.option-status').forEach(s => s.textContent = '');
        }, 0);

        return card;
    }

    function toggleTranslation(qi) {
        const box = document.getElementById(`trBox-${qi}`);
        const btn = document.getElementById(`trBtn-${qi}`);
        const open = box.classList.toggle('show');
        btn.classList.toggle('active', open);
        btn.innerHTML = open ? '🇬🇧 Hide translation' : '🇪🇸 Ver en español';
    }

    function selectOption(qi, optIdx) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = q.shuffled[optIdx];
        const isCorrect = selected.correct;
        const correctOpt = q.shuffled.find(o => o.correct);
        if (isCorrect) score++;

        document.querySelectorAll(`#options-${qi} .sent-option`).forEach((btn, i) => {
            btn.classList.add('disabled');
            const opt = q.shuffled[i];
            const status = btn.querySelector('.option-status');
            if (opt.correct) {
                btn.classList.add('correct');
                status.textContent = '✅';
            } else if (i === optIdx) {
                btn.classList.add('incorrect');
                status.textContent = '❌';
            }
        });

        buildFeedback(qi, selected, isCorrect, correctOpt, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, correctOpt, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;

        function markError(text, word) {
            return text.replace(word, `<span class="error-highlight">${word}</span>`);
        }

        const ruleExamples = q.examples.map(e =>
            `<span class="rule-ex">${e}</span>`
        ).join('');

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">✅</span>
                    <div>
                        <div class="fb-title">Correct! Great identification</div>
                        <div class="fb-subtitle">Let's see why the others were wrong</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-signal">
                        <div class="fb-block-title">🔍 Key signal in the sentence</div>
                        <div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">
                            The element <span class="signal-tag">${q.clue}</span> ${q.clueExplain}
                        </div>
                    </div>
                    ${q.shuffled.filter(o => !o.correct).map(err => `
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ Error in one option: <span class="error-badge">${err.errorType}</span></div>
                        <div class="error-text">${err.explanation}</div>
                    </div>`).join('')}
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 The rule</div>
                        <div class="rule-formula">${q.rule}</div>
                        <div class="rule-examples">${ruleExamples}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 Why the correct sentence IS correct</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        } else {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">❌</span>
                    <div>
                        <div class="fb-title">Incorrect — let's review</div>
                        <div class="fb-subtitle">Spot the difference between the sentences</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-signal wrong">
                        <div class="fb-block-title">🔍 Key signal you needed to spot</div>
                        <div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">
                            The element <span class="signal-tag red">${q.clue}</span> ${q.clueExplain}
                        </div>
                    </div>
                    <div class="fb-block fb-compare">
                        <div class="fb-block-title">🔄 Your choice vs. the correct one</div>
                        <div class="compare-row">
                            <span class="compare-label wrong">You chose</span>
                            <span class="compare-text">${markError(selected.text, selected.errorWord)}</span>
                        </div>
                        <div class="compare-row">
                            <span class="compare-label right">Correct</span>
                            <span class="compare-text">${correctOpt.text}</span>
                        </div>
                    </div>
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ The error: <span class="error-badge">${selected.errorType}</span></div>
                        <div class="word-swap">
                            <span class="ws-box ws-wrong">${selected.errorWord}</span>
                            <span class="ws-arrow">→</span>
                            <span class="ws-box ws-right">${selected.correctWord}</span>
                        </div>
                        <div class="error-text">${selected.explanation}</div>
                    </div>
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 The correct rule</div>
                        <div class="rule-formula">${q.rule}</div>
                        <div class="rule-examples">${ruleExamples}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 Why the correct sentence IS correct</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c, idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function nextQuestion(i) { i < quizData.length - 1 ? showQuestion(i + 1) : showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
    function updateProgress() {
        const done = answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width = (done / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        let stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? 'Excellent! You master adverb position. 🏆'
            : pct >= 70 ? 'Well done! Keep practicing. 💪'
            : 'Good effort. Review the rules and try again. 📚';
        document.querySelectorAll('.star').forEach((s, i) => {
            if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300);
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>
</html>
