<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Identification - A1 M2 · Present Simple Negative & 3rd Person | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #29B6F6; --primary-light: #B3E5FC; --primary-dark: #0277BD; --primary-darker: #01579B;
            --accent: #4FC3F7; --bg-gradient-start: #F0F9FF; --bg-gradient-end: #E1F5FE;
            --text-dark: #01579B; --text-medium: #0277BD; --text-light: #0288D1;
            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444; --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6; --info-light: #DBEAFE; --info-dark: #1D4ED8;
            --purple: #8B5CF6; --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --white: #FFFFFF;
            --shadow-soft: 0 4px 20px rgba(41,182,246,0.18);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start),var(--bg-gradient-end)); min-height:100vh; color:var(--text-dark); }
        .header { background:linear-gradient(135deg,#0288D1,#29B6F6,#4FC3F7); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.4rem; text-decoration:none; color:white; transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); transform:scale(1.1); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.9); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; }
        .progress-container { height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; transition:width .5s ease; width:0%; }
        main { padding:1.5rem; max-width:680px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }
        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:0.85rem; flex-wrap:wrap; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .q-label { font-size:0.88rem; color:var(--text-medium); font-weight:600; }
        .topic-badge { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.7rem; border-radius:20px; font-size:0.72rem; font-weight:700; margin-left:auto; background:var(--primary-light); color:var(--primary-darker); }
        .translate-bar { display:flex; justify-content:flex-end; margin-bottom:0.6rem; }
        .translate-btn { background:white; border:1.5px dashed var(--primary); color:var(--primary-dark); padding:0.35rem 0.8rem; border-radius:20px; font-family:'Nunito',sans-serif; font-size:0.78rem; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:0.35rem; transition:all .2s; }
        .translate-btn:hover { background:var(--bg-gradient-start); }
        .translate-btn.active { background:var(--primary); color:white; border-style:solid; }
        .translation-box { background:#FFF8E1; border:1px solid #FFE082; border-radius:10px; padding:0.6rem 0.85rem; margin-bottom:0.85rem; font-size:0.88rem; color:#5D4037; font-style:italic; display:none; line-height:1.5; }
        .translation-box.show { display:block; animation:fadeUp .3s ease; }
        .translation-box .tr-label { font-weight:800; font-style:normal; color:#E65100; margin-right:0.3rem; font-size:0.75rem; text-transform:uppercase; letter-spacing:.4px; }
        .sentence-options { display:flex; flex-direction:column; gap:0.7rem; margin-bottom:0.5rem; }

        .sent-option:hover:not(.disabled) { border-color:var(--primary); background:var(--bg-gradient-start); transform:translateX(4px); }
        .sent-option.disabled { cursor:default; }
        .sent-option.correct { border-color:var(--success); background:var(--success-light); }
        .sent-option.incorrect { border-color:var(--error); background:var(--error-light); }
        .option-letter { width:26px; height:26px; border-radius:50%; background:var(--primary-light); color:var(--primary-darker); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.8rem; flex-shrink:0; margin-top:1px; font-family:'Fredoka',sans-serif; }
        .sent-option.correct .option-letter { background:var(--success); color:white; }
        .sent-option.incorrect .option-letter { background:var(--error); color:white; }
        .option-text { font-size:0.98rem; color:var(--text-dark); line-height:1.55; font-weight:600; flex:1; }
        .sent-option.correct .option-text { color:var(--success-dark); }
        .sent-option.incorrect .option-text { color:var(--error-dark); }
        .option-status { font-size:1.1rem; margin-left:auto; flex-shrink:0; opacity:0; transition:opacity .2s; }
        .sent-option.correct .option-status, .sent-option.incorrect .option-status { opacity:1; }
        .error-highlight { color:var(--error); font-weight:800; text-decoration:underline wavy var(--error); }
        .feedback { margin-top:1.25rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon { font-size:1.6rem; }
        .fb-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }
        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }
        .fb-block { border-radius:12px; padding:0.9rem 1rem; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.15rem 0.55rem; border-radius:6px; font-size:0.72rem; font-weight:700; margin-left:4px; }
        .fb-signal { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-signal.wrong { background:#FFF1F2; border-color:#FECDD3; }
        .fb-signal .fb-block-title { color:var(--success-dark); }
        .fb-signal.wrong .fb-block-title { color:var(--error-dark); }
        .signal-tag { display:inline-block; background:var(--success); color:white; border-radius:6px; padding:0.1rem 0.5rem; font-size:0.82rem; font-weight:700; margin:0 2px; }
        .signal-tag.red { background:var(--error); }
        .fb-compare { background:#F8FAFC; border:1px solid #E2E8F0; }
        .fb-compare .fb-block-title { color:#475569; }
        .compare-row { display:flex; align-items:flex-start; gap:0.6rem; padding:0.4rem 0; border-bottom:1px dashed #E2E8F0; }
        .compare-row:last-child { border-bottom:none; }
        .compare-label { font-size:0.72rem; font-weight:800; text-transform:uppercase; white-space:nowrap; padding:0.15rem 0.5rem; border-radius:6px; flex-shrink:0; margin-top:2px; }
        .compare-label.wrong { background:var(--error-light); color:var(--error-dark); }
        .compare-label.right { background:var(--success-light); color:var(--success-dark); }
        .compare-text { font-size:0.95rem; color:var(--text-dark); line-height:1.55; }
        .fb-error { background:var(--error-light); border:1px solid #FECACA; }
        .fb-error .fb-block-title { color:var(--error-dark); }
        .word-swap { display:flex; align-items:center; justify-content:center; gap:0.75rem; margin:0.6rem 0; flex-wrap:wrap; }
        .ws-box { padding:0.4rem 1rem; border-radius:8px; font-weight:700; font-size:1rem; }
        .ws-wrong { background:white; color:var(--error); border:2px solid var(--error); text-decoration:line-through; }
        .ws-arrow { font-size:1.3rem; color:#94A3B8; }
        .ws-right { background:var(--success); color:white; }
        .error-text { font-size:0.9rem; color:var(--text-dark); line-height:1.55; }
        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.95rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }
        .rule-examples { display:flex; flex-wrap:wrap; gap:0.4rem; }
        .rule-ex { font-size:0.82rem; background:white; border:1px solid #BFDBFE; border-radius:6px; padding:0.25rem 0.55rem; color:var(--info-dark); font-weight:600; }
        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }
        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji { font-size:4rem; margin-bottom:1rem; }
        .results-title { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; color:var(--text-dark); }
        .results-score { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>

        <a href="https://jucumenglishcenter.github.io/A1/panel-a1.html" class="back-btn">←</a>

            <div class="header-subtitle">🩵 A1 · Module 2 · Present Simple — Negative & 3rd Person</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/15</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">🔍</div>
            <div>
                <div class="instructions-title">Choose the correct sentence</div>
                <div class="instructions-text">Read the three sentences and pick the one that uses Present Simple correctly. Tap <strong>"Ver en español"</strong> if you need a translation.</div>
            </div>
        </div>

        <div id="questionsContainer"></div>

        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>

                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>

                <button class="result-btn primary" onclick="location.reload()">🔄 Try Again</button>

            </div>
        </div>
    </main>

    <script>
    const quizData = [
        // Q1 — pos B
        {
            id: 1, topic: "3rd person · spelling -es",
            translation: "Mi padre observa las estrellas desde el balcón.",
            options: [
                { text: "My father watch the stars from the balcony.", correct: false,
                  errorWord: "watch", correctWord: "watches",
                  errorType: "Missing -es",
                  explanation: "The base form is used. With third person singular and verbs ending in -ch, the verb takes '-es'." },
                { text: "My father watches the stars from the balcony.", correct: true },
                { text: "My father watchs the stars from the balcony.", correct: false,
                  errorWord: "watchs", correctWord: "watches",
                  errorType: "Wrong spelling",
                  explanation: "Verbs ending in -ch don't add just '-s'. They follow a special spelling rule." }
            ],
            clue: "My father (he)",
            clueExplain: "is third person singular, and the verb 'watch' ends in -ch (special spelling rule).",
            rule: "Verbs in -ch / -sh / -s / -x → add -es",
            examples: ["watch → watches", "wash → washes", "fix → fixes"],
            correctReason: "Third person singular subjects take a verb with the correct ending. Verbs ending in -ch take '-es', not just '-s'."
        },
        // Q2 — pos A
        {
            id: 2, topic: "3rd person · negative",
            translation: "Mi hermana no toma café por la mañana.",
            options: [
                { text: "My sister doesn't drink coffee in the morning.", correct: true },
                { text: "My sister don't drink coffee in the morning.", correct: false,
                  errorWord: "don't", correctWord: "doesn't",
                  errorType: "Wrong auxiliary",
                  explanation: "'Don't' is for plural subjects and I/you. The subject 'my sister' is third person singular and needs a different auxiliary." },
                { text: "My sister doesn't drinks coffee in the morning.", correct: false,
                  errorWord: "doesn't drinks", correctWord: "doesn't drink",
                  errorType: "Double conjugation",
                  explanation: "The auxiliary 'doesn't' already carries the third-person mark. The main verb must stay in base form." }
            ],
            clue: "My sister (3rd person) + negative",
            clueExplain: "needs the correct auxiliary AND the base form of the main verb.",
            rule: "He/She/It + doesn't + base verb",
            examples: ["he doesn't drink", "she doesn't smoke", "it doesn't work"],
            correctReason: "With third person singular in negatives, the auxiliary is 'doesn't' and the main verb stays in base form (no -s)."
        },
        // Q3 — pos C
        {
            id: 3, topic: "3rd person · -ies",
            translation: "El bebé llora cuando tiene hambre.",
            options: [
                { text: "The baby crys when he is hungry.", correct: false,
                  errorWord: "crys", correctWord: "cries",
                  errorType: "Wrong spelling",
                  explanation: "When a verb ends in consonant + y, the 'y' changes before adding the ending. Just adding '-s' is incorrect." },
                { text: "The baby cry when he is hungry.", correct: false,
                  errorWord: "cry", correctWord: "cries",
                  errorType: "Missing ending",
                  explanation: "The base form is used, but the subject is third person singular and the verb needs a special ending." },
                { text: "The baby cries when he is hungry.", correct: true }
            ],
            clue: "The baby (it/he) + cry",
            clueExplain: "is third person singular AND the verb ends in consonant + y (special spelling rule).",
            rule: "Consonant + y → -ies",
            examples: ["cry → cries", "study → studies", "try → tries"],
            correctReason: "Verbs ending in consonant + y change the 'y' to 'i' and add '-es' for third person singular."
        },
        // Q4 — pos B
        {
            id: 4, topic: "negative · plural",
            translation: "Mis padres no ven mucha televisión.",
            options: [
                { text: "My parents doesn't watch much television.", correct: false,
                  errorWord: "doesn't", correctWord: "don't",
                  errorType: "Wrong auxiliary",
                  explanation: "'Doesn't' is for he/she/it. The subject 'my parents' is plural and uses a different auxiliary." },
                { text: "My parents don't watch much television.", correct: true },
                { text: "My parents not watch much television.", correct: false,
                  errorWord: "not watch", correctWord: "don't watch",
                  errorType: "Missing auxiliary",
                  explanation: "'Not' alone cannot make a Present Simple negative. The auxiliary 'do' must come with 'not'." }
            ],
            clue: "My parents (plural)",
            clueExplain: "is a plural subject, which changes the negative auxiliary.",
            rule: "I/You/We/They + don't + base verb",
            examples: ["I don't smoke", "we don't agree", "they don't drive"],
            correctReason: "With plural subjects (and I/you), the Present Simple negative uses 'don't' followed by the base verb."
        },
        // Q5 — pos A
        {
            id: 5, topic: "3rd person · 'has'",
            translation: "Ana tiene dos hermanos y una hermana.",
            options: [
                { text: "Ana has two brothers and one sister.", correct: true },
                { text: "Ana have two brothers and one sister.", correct: false,
                  errorWord: "have", correctWord: "has",
                  errorType: "Missing change",
                  explanation: "The base form is used, but 'have' is irregular and changes for third person singular." },
                { text: "Ana haves two brothers and one sister.", correct: false,
                  errorWord: "haves", correctWord: "has",
                  errorType: "Wrong form",
                  explanation: "'Haves' doesn't exist in standard English. 'Have' is irregular and changes completely in third person." }
            ],
            clue: "Ana (she) + have",
            clueExplain: "is third person singular AND 'have' is irregular in this form.",
            rule: "have → has (irregular, 3rd person singular)",
            examples: ["he has", "she has", "it has"],
            correctReason: "'Have' is irregular: in third person singular affirmative, it changes to 'has' (not 'haves')."
        },
        // Q6 — pos C
        {
            id: 6, topic: "3rd person · negative · 'have'",
            translation: "Mi vecino no tiene mascotas.",
            options: [
                { text: "My neighbor doesn't has any pets.", correct: false,
                  errorWord: "doesn't has", correctWord: "doesn't have",
                  errorType: "Double conjugation",
                  explanation: "After 'doesn't', the verb stays in base form. 'Have' doesn't change to 'has' here because the auxiliary already marks the person." },
                { text: "My neighbor don't have any pets.", correct: false,
                  errorWord: "don't", correctWord: "doesn't",
                  errorType: "Wrong auxiliary",
                  explanation: "'Don't' is for plural subjects. 'My neighbor' is third person singular and needs a different auxiliary." },
                { text: "My neighbor doesn't have any pets.", correct: true }
            ],
            clue: "My neighbor (he/she) + negative + have",
            clueExplain: "needs the right auxiliary AND the base form of 'have' after 'doesn't'.",
            rule: "He/She/It + doesn't + have (base form)",
            examples: ["he doesn't have", "she doesn't have", "it doesn't have"],
            correctReason: "In negatives, 'have' stays in base form after 'doesn't'. The change to 'has' only happens in affirmative third person."
        },
        // Q7 — pos B
        {
            id: 7, topic: "3rd person · regular -s",
            translation: "Diego trabaja en un restaurante grande.",
            options: [
                { text: "Diego work in a big restaurant.", correct: false,
                  errorWord: "work", correctWord: "works",
                  errorType: "Missing -s",
                  explanation: "The base form is used, but the subject is third person singular and the verb needs '-s'." },
                { text: "Diego works in a big restaurant.", correct: true },
                { text: "Diego is work in a big restaurant.", correct: false,
                  errorWord: "is work", correctWord: "works",
                  errorType: "Two verbs",
                  explanation: "There are two verbs together ('is' and 'work'). Present Simple affirmative uses one main verb." }
            ],
            clue: "Diego (he)",
            clueExplain: "is third person singular and the verb follows the basic spelling rule.",
            rule: "Most verbs → he/she/it + verb-s",
            examples: ["work → works", "live → lives", "play → plays"],
            correctReason: "Most verbs add just '-s' for third person singular. No auxiliary 'is' needed in Present Simple affirmative."
        },
        // Q8 — pos A
        {
            id: 8, topic: "negative · 1st person",
            translation: "No hablo japonés.",
            options: [
                { text: "I don't speak Japanese.", correct: true },
                { text: "I doesn't speak Japanese.", correct: false,
                  errorWord: "doesn't", correctWord: "don't",
                  errorType: "Wrong auxiliary",
                  explanation: "'Doesn't' is for he/she/it. The subject 'I' uses a different auxiliary in Present Simple negatives." },
                { text: "I am not speak Japanese.", correct: false,
                  errorWord: "am not speak", correctWord: "don't speak",
                  errorType: "Wrong tense",
                  explanation: "'Am not' is the negative of the verb 'be', not for main verbs. The verb 'speak' needs a different negative form." }
            ],
            clue: "I (1st person) + main verb",
            clueExplain: "uses a specific negative auxiliary in Present Simple.",
            rule: "I + don't + base verb",
            examples: ["I don't know", "I don't smoke", "I don't agree"],
            correctReason: "With 'I' (and you/we/they), the Present Simple negative uses 'don't' + base verb."
        },
        // Q9 — pos C
        {
            id: 9, topic: "3rd person · 'goes'",
            translation: "Mi tío va al gimnasio tres veces por semana.",
            options: [
                { text: "My uncle go to the gym three times a week.", correct: false,
                  errorWord: "go", correctWord: "goes",
                  errorType: "Missing ending",
                  explanation: "The base form is used, but the subject is third person singular and the verb 'go' needs a special ending." },
                { text: "My uncle gos to the gym three times a week.", correct: false,
                  errorWord: "gos", correctWord: "goes",
                  errorType: "Wrong spelling",
                  explanation: "Verbs ending in -o don't add just '-s'. They follow a special spelling rule." },
                { text: "My uncle goes to the gym three times a week.", correct: true }
            ],
            clue: "My uncle (he) + go",
            clueExplain: "is third person singular AND 'go' ends in -o (special spelling rule).",
            rule: "Verbs ending in -o → -es",
            examples: ["go → goes", "do → does", "watch → watches"],
            correctReason: "Verbs ending in -o add '-es' (not just '-s') for third person singular. This is a fixed spelling rule."
        },
        // Q10 — pos B
        {
            id: 10, topic: "3rd person · negative · 'live'",
            translation: "Mi prima no vive cerca de aquí.",
            options: [
                { text: "My cousin don't lives near here.", correct: false,
                  errorWord: "don't lives", correctWord: "doesn't live",
                  errorType: "Wrong auxiliary + double mark",
                  explanation: "Two errors: 'don't' is for plural subjects, and the main verb is conjugated when it should stay in base form." },
                { text: "My cousin doesn't live near here.", correct: true },
                { text: "My cousin doesn't lives near here.", correct: false,
                  errorWord: "doesn't lives", correctWord: "doesn't live",
                  errorType: "Double conjugation",
                  explanation: "After 'doesn't', the verb stays in base form. The auxiliary already carries the third-person mark." }
            ],
            clue: "My cousin (3rd person) + negative",
            clueExplain: "needs 'doesn't' + the base form of the main verb (no -s).",
            rule: "He/She/It + doesn't + base verb",
            examples: ["he doesn't live", "she doesn't work", "it doesn't fit"],
            correctReason: "With third person singular in negatives, use 'doesn't' + base form. The auxiliary marks the person; the main verb does not."
        },
        // Q11 — pos A
        {
            id: 11, topic: "3rd person · 'does'",
            translation: "Mi madre hace el desayuno cada mañana.",
            options: [
                { text: "My mother does breakfast every morning.", correct: true },
                { text: "My mother do breakfast every morning.", correct: false,
                  errorWord: "do", correctWord: "does",
                  errorType: "Missing change",
                  explanation: "The base form is used, but the subject is third person singular and 'do' has a special form." },
                { text: "My mother dos breakfast every morning.", correct: false,
                  errorWord: "dos", correctWord: "does",
                  errorType: "Wrong spelling",
                  explanation: "Adding just '-s' to 'do' is incorrect. 'Do' takes '-es' for third person singular." }
            ],
            clue: "My mother (she) + do",
            clueExplain: "is third person singular AND 'do' has a special spelling rule.",
            rule: "do → does (-es ending)",
            examples: ["he does", "she does", "it does"],
            correctReason: "'Do' takes '-es' (not just '-s') for third person singular: 'does'. Same rule as 'go' → 'goes'."
        },
        // Q12 — pos C
        {
            id: 12, topic: "negative · 'we'",
            translation: "No comemos carne los viernes.",
            options: [
                { text: "We doesn't eat meat on Fridays.", correct: false,
                  errorWord: "doesn't", correctWord: "don't",
                  errorType: "Wrong auxiliary",
                  explanation: "'Doesn't' is for he/she/it. The subject 'we' is plural and uses a different auxiliary." },
                { text: "We don't eats meat on Fridays.", correct: false,
                  errorWord: "don't eats", correctWord: "don't eat",
                  errorType: "Double conjugation",
                  explanation: "The main verb stays in base form after 'don't'. Adding '-s' is incorrect because 'we' is not third person." },
                { text: "We don't eat meat on Fridays.", correct: true }
            ],
            clue: "We (plural)",
            clueExplain: "is a plural subject, which uses 'don't' + base verb.",
            rule: "I/You/We/They + don't + base verb",
            examples: ["I don't eat", "we don't drink", "they don't smoke"],
            correctReason: "With plural subjects, the Present Simple negative uses 'don't' + base verb. The verb stays unchanged."
        },
        // Q13 — pos B
        {
            id: 13, topic: "3rd person · -ses ending",
            translation: "El profesor pasa la lista al inicio de la clase.",
            options: [
                { text: "The teacher pas the list at the start of class.", correct: false,
                  errorWord: "pas", correctWord: "passes",
                  errorType: "Wrong spelling",
                  explanation: "Verbs ending in -s don't drop letters. They add '-es' for third person singular." },
                { text: "The teacher passes the list at the start of class.", correct: true },
                { text: "The teacher passs the list at the start of class.", correct: false,
                  errorWord: "passs", correctWord: "passes",
                  errorType: "Wrong spelling",
                  explanation: "Three s's in a row is never correct in English. Verbs ending in -s add '-es' for third person singular." }
            ],
            clue: "The teacher (he/she) + -s ending",
            clueExplain: "is third person singular AND the verb 'pass' ends in -s (special spelling rule).",
            rule: "Verbs in -s / -ss / -sh / -ch / -x → -es",
            examples: ["pass → passes", "kiss → kisses", "miss → misses"],
            correctReason: "Verbs ending in -s or -ss take '-es' for third person singular (not just '-s')."
        },
        // Q14 — pos A
        {
            id: 14, topic: "3rd person · negative · 'study'",
            translation: "Lucía no estudia en la biblioteca los sábados.",
            options: [
                { text: "Lucia doesn't study at the library on Saturdays.", correct: true },
                { text: "Lucia doesn't studies at the library on Saturdays.", correct: false,
                  errorWord: "doesn't studies", correctWord: "doesn't study",
                  errorType: "Double conjugation",
                  explanation: "After 'doesn't', the verb stays in base form. The third-person spelling rule (-ies) doesn't apply when the verb follows 'doesn't'." },
                { text: "Lucia don't study at the library on Saturdays.", correct: false,
                  errorWord: "don't", correctWord: "doesn't",
                  errorType: "Wrong auxiliary",
                  explanation: "'Don't' is for plural subjects. 'Lucia' is third person singular and needs 'doesn't'." }
            ],
            clue: "Lucia (3rd person) + negative + study",
            clueExplain: "needs the right auxiliary AND the base form of 'study' (no -ies after doesn't).",
            rule: "He/She/It + doesn't + base verb",
            examples: ["she doesn't study", "he doesn't try", "it doesn't fly"],
            correctReason: "After 'doesn't', the main verb always stays in base form, even when normally it would change spelling for third person."
        },
        // Q15 — pos C
        {
            id: 15, topic: "negative · 'they'",
            translation: "No me gustan las películas de terror.",
            options: [
                { text: "Horror movies doesn't like to me.", correct: false,
                  errorWord: "doesn't like to me", correctWord: "I don't like horror movies",
                  errorType: "Wrong structure",
                  explanation: "The structure is broken — the subject and object are swapped, and the verb 'like' isn't used like 'gustar' in Spanish. English uses a direct subject-verb-object pattern." },
                { text: "I doesn't like horror movies.", correct: false,
                  errorWord: "doesn't", correctWord: "don't",
                  errorType: "Wrong auxiliary",
                  explanation: "'Doesn't' is for he/she/it. The subject 'I' uses 'don't' in Present Simple negatives." },
                { text: "I don't like horror movies.", correct: true }
            ],
            clue: "I (1st person) + main verb",
            clueExplain: "uses 'don't' + base verb in Present Simple negatives. English uses a direct SVO order.",
            rule: "I + don't + base verb + object",
            examples: ["I don't like fish", "I don't watch TV", "I don't drink coffee"],
            correctReason: "With 'I', the negative is 'don't' + base verb. Unlike Spanish 'gustar', English uses 'I + verb + object' directly."
        }
    ];

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, i) => {
            q.shuffled = shuffle(q.options);
            container.appendChild(createCard(q, i));
        });
        showQuestion(0);
        updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = `question-card ${index !== 0 ? 'hidden' : ''}`;
        card.id = `question-${index}`;
        const letters = ['A','B','C'];

        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span class="q-label">Choose the correct sentence:</span>
                <span class="topic-badge">${q.topic}</span>
            </div>
            <div class="translate-bar">
                <button class="translate-btn" id="trBtn-${index}" onclick="toggleTranslation(${index})">🇪🇸 Ver en español</button>
            </div>
            <div class="translation-box" id="trBox-${index}">
                <span class="tr-label">ES:</span>${q.translation}
            </div>
            <div class="sentence-options" id="options-${index}">
                ${q.shuffled.map((opt, i) => `
                    <button class="sent-option" onclick="selectOption(${index}, ${i})">
                        <div class="option-letter">${letters[i]}</div>
                        <div class="option-text">${opt.text}</div>
                        <div class="option-status"></div>
                    </button>
                `).join('')}
            </div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Previous</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'See Results 🎉' : 'Next →'}
                </button>
            </div>
        `;
        return card;
    }

    function toggleTranslation(qi) {
        const box = document.getElementById(`trBox-${qi}`);
        const btn = document.getElementById(`trBtn-${qi}`);
        const open = box.classList.toggle('show');
        btn.classList.toggle('active', open);
        btn.innerHTML = open ? '🇬🇧 Hide translation' : '🇪🇸 Ver en español';
    }

    function selectOption(qi, optIdx) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = q.shuffled[optIdx];
        const isCorrect = selected.correct;
        const correctOpt = q.shuffled.find(o => o.correct);
        if (isCorrect) score++;

        document.querySelectorAll(`#options-${qi} .sent-option`).forEach((btn, i) => {
            btn.classList.add('disabled');
            const opt = q.shuffled[i];
            const status = btn.querySelector('.option-status');
            if (opt.correct) {
                btn.classList.add('correct');
                status.textContent = '✅';
            } else if (i === optIdx) {
                btn.classList.add('incorrect');
                status.textContent = '❌';
            }
        });

        buildFeedback(qi, selected, isCorrect, correctOpt, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, correctOpt, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;

        function markError(text, word) {
            if (!word) return text;
            const esc = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return text.replace(new RegExp(esc), `<span class="error-highlight">${word}</span>`);
        }
        const ruleExamples = q.examples.map(e => `<span class="rule-ex">${e}</span>`).join('');

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">✅</span>
                    <div>
                        <div class="fb-title">Correct! Great identification</div>
                        <div class="fb-subtitle">Let's see why the others were wrong</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-signal">
                        <div class="fb-block-title">🔍 Key signal in the sentence</div>
                        <div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">
                            The element <span class="signal-tag">${q.clue}</span> ${q.clueExplain}
                        </div>
                    </div>
                    ${q.shuffled.filter(o => !o.correct).map(err => `
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ Error in one option: <span class="error-badge">${err.errorType}</span></div>
                        <div class="error-text">${err.explanation}</div>
                    </div>`).join('')}
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 The rule</div>
                        <div class="rule-formula">${q.rule}</div>
                        <div class="rule-examples">${ruleExamples}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 Why is the correct sentence correct?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        } else {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">❌</span>
                    <div>
                        <div class="fb-title">Incorrect — let's review</div>
                        <div class="fb-subtitle">Spot the difference between the sentences</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-signal wrong">
                        <div class="fb-block-title">🔍 Key signal you needed to spot</div>
                        <div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">
                            The element <span class="signal-tag red">${q.clue}</span> ${q.clueExplain}
                        </div>
                    </div>
                    <div class="fb-block fb-compare">
                        <div class="fb-block-title">🔄 Your choice vs. the correct one</div>
                        <div class="compare-row">
                            <span class="compare-label wrong">You chose</span>
                            <span class="compare-text">${markError(selected.text, selected.errorWord)}</span>
                        </div>
                        <div class="compare-row">
                            <span class="compare-label right">Correct</span>
                            <span class="compare-text">${correctOpt.text}</span>
                        </div>
                    </div>
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ The error: <span class="error-badge">${selected.errorType}</span></div>
                        <div class="word-swap">
                            <span class="ws-box ws-wrong">${selected.errorWord}</span>
                            <span class="ws-arrow">→</span>
                            <span class="ws-box ws-right">${selected.correctWord}</span>
                        </div>
                        <div class="error-text">${selected.explanation}</div>
                    </div>
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 The correct rule</div>
                        <div class="rule-formula">${q.rule}</div>
                        <div class="rule-examples">${ruleExamples}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 Why is the correct sentence correct?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c, idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function nextQuestion(i) { i < quizData.length - 1 ? showQuestion(i + 1) : showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
    function updateProgress() {
        const done = answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width = (done / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        let stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? 'Excellent! You master these forms. 🏆'
            : pct >= 70 ? 'Well done! Keep practicing. 💪'
            : 'Good effort. Review the rules and try again. 📚';
        document.querySelectorAll('.star').forEach((s, i) => {
            if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300);
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>
</html>
