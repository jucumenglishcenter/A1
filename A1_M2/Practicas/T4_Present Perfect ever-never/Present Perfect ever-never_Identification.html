    <title>Identification - A1 M2 · Present Perfect (ever/never) | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {

            --accent: #4FC3F7; --bg-gradient-start: #F0F9FF; --bg-gradient-end: #E1F5FE;

        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

        .back-btn { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.4rem; text-decoration:none; color:white; transition:all .2s; flex-shrink:0; }

        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }

        .instructions-icon { font-size:1.6rem; flex-shrink:0; }

        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }
        
        
        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:0.85rem; flex-wrap:wrap; }

        .sent-option:hover:not(.disabled) { border-color:var(--primary); background:var(--bg-gradient-start); transform:translateX(4px); }
        .sent-option.disabled { cursor:default; }
        .sent-option.correct { border-color:var(--success); background:var(--success-light); }
        .sent-option.incorrect { border-color:var(--error); background:var(--error-light); }
        .option-letter { width:26px; height:26px; border-radius:50%; background:var(--primary-light); color:var(--primary-darker); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.8rem; flex-shrink:0; margin-top:1px; font-family:'Fredoka',sans-serif; }
        .sent-option.correct .option-letter { background:var(--success); color:white; }
        .sent-option.incorrect .option-letter { background:var(--error); color:white; }
        .option-text { font-size:0.98rem; color:var(--text-dark); line-height:1.55; font-weight:600; flex:1; }
        .sent-option.correct .option-text { color:var(--success-dark); }
        .sent-option.incorrect .option-text { color:var(--error-dark); }
        .option-status { font-size:1.1rem; margin-left:auto; flex-shrink:0; opacity:0; transition:opacity .2s; }
        .sent-option.correct .option-status, .sent-option.incorrect .option-status { opacity:1; }
        .error-highlight { color:var(--error); font-weight:800; text-decoration:underline wavy var(--error); }
        .feedback { margin-top:1.25rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon { font-size:1.6rem; }
        .fb-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }
        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }
        .fb-block { border-radius:12px; padding:0.9rem 1rem; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.15rem 0.55rem; border-radius:6px; font-size:0.72rem; font-weight:700; margin-left:4px; }
        .fb-signal { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-signal.wrong { background:#FFF1F2; border-color:#FECDD3; }
        .fb-signal .fb-block-title { color:var(--success-dark); }
        .fb-signal.wrong .fb-block-title { color:var(--error-dark); }
        .signal-tag { display:inline-block; background:var(--success); color:white; border-radius:6px; padding:0.1rem 0.5rem; font-size:0.82rem; font-weight:700; margin:0 2px; }
        .signal-tag.red { background:var(--error); }
        .fb-compare { background:#F8FAFC; border:1px solid #E2E8F0; }
        .fb-compare .fb-block-title { color:#475569; }
        .compare-row { display:flex; align-items:flex-start; gap:0.6rem; padding:0.4rem 0; border-bottom:1px dashed #E2E8F0; }
        .compare-row:last-child { border-bottom:none; }
        .compare-label { font-size:0.72rem; font-weight:800; text-transform:uppercase; white-space:nowrap; padding:0.15rem 0.5rem; border-radius:6px; flex-shrink:0; margin-top:2px; }
        .compare-label.wrong { background:var(--error-light); color:var(--error-dark); }
        .compare-label.right { background:var(--success-light); color:var(--success-dark); }
        .compare-text { font-size:0.95rem; color:var(--text-dark); line-height:1.55; }
        .fb-error { background:var(--error-light); border:1px solid #FECACA; }
        .fb-error .fb-block-title { color:var(--error-dark); }
        .word-swap { display:flex; align-items:center; justify-content:center; gap:0.75rem; margin:0.6rem 0; flex-wrap:wrap; }
        .ws-box { padding:0.4rem 1rem; border-radius:8px; font-weight:700; font-size:1rem; }
        .ws-wrong { background:white; color:var(--error); border:2px solid var(--error); text-decoration:line-through; }
        .ws-arrow { font-size:1.3rem; color:#94A3B8; }
        .ws-right { background:var(--success); color:white; }
        .error-text { font-size:0.9rem; color:var(--text-dark); line-height:1.55; }
        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.95rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }
        .rule-examples { display:flex; flex-wrap:wrap; gap:0.4rem; }
        .rule-ex { font-size:0.82rem; background:white; border:1px solid #BFDBFE; border-radius:6px; padding:0.25rem 0.55rem; color:var(--info-dark); font-weight:600; }
        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }
        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
        .results-screen { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji { font-size:4rem; margin-bottom:1rem; }
        .results-title { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; color:var(--text-dark); }
        .results-score { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>

<body>
    <header class="header">
        <a href="https://jucumenglishcenter.github.io/A1/panel-a1.html" class="back-btn">←</a>
        <div class="header-info">
            <div class="header-title">🔍 Identification</div>
            <div class="header-subtitle">🩵 A1 · Module 2 · Present Perfect (ever/never)</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/15</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">🔍</div>
            <div>
                <div class="instructions-title">Choose the correct sentence</div>
                <div class="instructions-text">Read the three sentences and pick the one with the correct Present Perfect form. Tap <strong>"Ver en español"</strong> if you need a translation.</div>
            </div>
        </div>
        <div id="questionsContainer"></div>

        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>

                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>

            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Try Again</button>
                <a href="https://jucumenglishcenter.github.io/A1/panel-a1.html" class="result-btn secondary">← Back to Panel</a>
            </div>
        </div>
    </main>

    <script>
    const quizData = [
        // Q1 — pos B
        {
            id: 1, topic: "ever · question",
            translation: "¿Has estado alguna vez en Italia?",
            options: [
                { text: "Have you never been to Italy?", correct: false,
                  errorWord: "never", correctWord: "ever",
                  errorType: "Wrong word",
                  explanation: "'Never' is for negative statements. Questions about life experience use 'ever' (meaning 'at any time in your life')." },
                { text: "Have you ever been to Italy?", correct: true },
                { text: "Do you ever been to Italy?", correct: false,
                  errorWord: "Do you ever been", correctWord: "Have you ever been",
                  errorType: "Wrong auxiliary",
                  explanation: "'Do' is for Present Simple. Present Perfect questions use 'have' or 'has' as the auxiliary." }
            ],
            clue: "ever (in question)",
            clueExplain: "is the word for 'alguna vez' in Present Perfect questions.",
            rule: "Have/Has + subject + ever + past participle?",
            examples: ["Have you ever been...?", "Has she ever tried...?", "Have they ever seen...?"],
            correctReason: "Present Perfect questions about life experience use 'ever'. The structure is: Have/Has + subject + ever + past participle."
        },
        // Q2 — pos A
        {
            id: 2, topic: "never · negative statement",
            translation: "Lucía nunca ha probado comida tailandesa.",
            options: [
                { text: "Lucia has never tried Thai food.", correct: true },
                { text: "Lucia has not never tried Thai food.", correct: false,
                  errorWord: "has not never", correctWord: "has never",
                  errorType: "Double negative",
                  explanation: "'Never' already contains the negative meaning. Adding 'not' creates a double negative, which is not standard English." },
                { text: "Lucia hasn't ever tried Thai food.", correct: false,
                  errorWord: "hasn't ever tried", correctWord: "has never tried",
                  errorType: "Less natural form",
                  explanation: "'Hasn't ever' technically works but is less natural for stating 'nunca'. The standard form is 'has never tried'." }
            ],
            clue: "never (negative statement)",
            clueExplain: "is the word for 'nunca' — used WITHOUT 'not' in negative statements.",
            rule: "Subject + have/has + never + past participle (no 'not')",
            examples: ["I have never tried", "she has never been", "they have never seen"],
            correctReason: "'Never' is its own negative — it goes alone between have/has and the past participle. Adding 'not' would be a double negative."
        },
        // Q3 — pos C — irregular PP eat
        {
            id: 3, topic: "irregular PP · eat",
            translation: "Mis hijos nunca han comido sushi.",
            options: [
                { text: "My children have never ate sushi.", correct: false,
                  errorWord: "ate", correctWord: "eaten",
                  errorType: "Wrong form",
                  explanation: "'Ate' is the simple past form of 'eat'. Present Perfect needs the past participle, which is 'eaten'." },
                { text: "My children have never eated sushi.", correct: false,
                  errorWord: "eated", correctWord: "eaten",
                  errorType: "Wrong spelling",
                  explanation: "'Eat' is irregular — it doesn't add -ed. The past participle is 'eaten'." },
                { text: "My children have never eaten sushi.", correct: true }
            ],
            clue: "eat (irregular PP)",
            clueExplain: "is irregular: eat → ate → eaten.",
            rule: "eat → ate → eaten (past participle)",
            examples: ["I have eaten", "she has eaten", "they haven't eaten"],
            correctReason: "'Eat' is irregular. Its three forms are eat/ate/eaten. Present Perfect uses the past participle 'eaten'."
        },
        // Q4 — pos B — have/has
        {
            id: 4, topic: "have vs. has · 3rd person",
            translation: "James ha visitado muchos museos.",
            options: [
                { text: "James have visited many museums.", correct: false,
                  errorWord: "James have", correctWord: "James has",
                  errorType: "Wrong auxiliary",
                  explanation: "'Have' is for I/you/we/they. The subject 'James' is third-person singular and uses 'has'." },
                { text: "James has visited many museums.", correct: true },
                { text: "James is visited many museums.", correct: false,
                  errorWord: "is visited", correctWord: "has visited",
                  errorType: "Wrong tense",
                  explanation: "'Is visited' would be passive voice, not Present Perfect. The active Present Perfect uses 'have/has + past participle'." }
            ],
            clue: "James (he) + Present Perfect",
            clueExplain: "is third-person singular, which uses 'has' as the auxiliary.",
            rule: "He/She/It + has + past participle",
            examples: ["he has visited", "she has worked", "it has rained"],
            correctReason: "Third-person singular subjects (he/she/it) use 'has' in Present Perfect — never 'have'."
        },
        // Q5 — pos A — never word order
        {
            id: 5, topic: "never · word order",
            translation: "Nunca he visto esa película.",
            options: [
                { text: "I have never seen that movie.", correct: true },
                { text: "I never have seen that movie.", correct: false,
                  errorWord: "never have seen", correctWord: "have never seen",
                  errorType: "Wrong word order",
                  explanation: "'Never' goes BETWEEN the auxiliary and the past participle, not before the auxiliary." },
                { text: "I have seen never that movie.", correct: false,
                  errorWord: "seen never", correctWord: "never seen",
                  errorType: "Wrong word order",
                  explanation: "'Never' must go BEFORE the past participle, not after it. The order is: have/has + never + past participle." }
            ],
            clue: "never + past participle",
            clueExplain: "goes between have/has and the past participle.",
            rule: "Subject + have/has + never + past participle",
            examples: ["I have never seen", "she has never tried", "they have never been"],
            correctReason: "'Never' goes BETWEEN the auxiliary (have/has) and the past participle. The order is fixed."
        },
        // Q6 — pos C — irregular PP see
        {
            id: 6, topic: "irregular PP · see",
            translation: "¿Has visto alguna vez el mar?",
            options: [
                { text: "Have you ever saw the sea?", correct: false,
                  errorWord: "saw", correctWord: "seen",
                  errorType: "Wrong form",
                  explanation: "'Saw' is the simple past form. Present Perfect needs the past participle, which is 'seen'." },
                { text: "Have you ever see the sea?", correct: false,
                  errorWord: "see", correctWord: "seen",
                  errorType: "Wrong form",
                  explanation: "'See' is the base form. After 'have', you need the past participle 'seen'." },
                { text: "Have you ever seen the sea?", correct: true }
            ],
            clue: "see (irregular PP)",
            clueExplain: "is irregular: see → saw → seen.",
            rule: "see → saw → seen (past participle)",
            examples: ["I have seen", "she has seen", "have you seen?"],
            correctReason: "'See' is irregular. Its three forms are see/saw/seen. Present Perfect uses the past participle 'seen'."
        },
        // Q7 — pos B — irregular PP go (been to)
        {
            id: 7, topic: "irregular PP · go (been to)",
            translation: "He estado en Cusco dos veces.",
            options: [
                { text: "I have went to Cusco twice.", correct: false,
                  errorWord: "went", correctWord: "been",
                  errorType: "Wrong form",
                  explanation: "'Went' is the simple past of 'go'. For Present Perfect with experiences (visited and returned), use 'been to'." },
                { text: "I have been to Cusco twice.", correct: true },
                { text: "I have gone to Cusco twice.", correct: false,
                  errorWord: "gone to", correctWord: "been to",
                  errorType: "Wrong meaning",
                  explanation: "'Have gone to' means you LEFT and are still there. For an experience (visited and came back), use 'have been to'." }
            ],
            clue: "experience (visited and returned)",
            clueExplain: "uses 'have been to' — not 'have gone to'.",
            rule: "have/has + been to + place (experience)",
            examples: ["I have been to Cusco", "she has been to Japan", "they have been to a concert"],
            correctReason: "For life experiences (visited and came back), use 'been to'. 'Gone to' means the person left and is still there."
        },
        // Q8 — pos A — Present Simple vs Present Perfect
        {
            id: 8, topic: "tense · Present Simple vs. Present Perfect",
            translation: "¿Has trabajado alguna vez en un hospital?",
            options: [
                { text: "Have you ever worked in a hospital?", correct: true },
                { text: "Did you ever work in a hospital?", correct: false,
                  errorWord: "Did you", correctWord: "Have you",
                  errorType: "Wrong tense",
                  explanation: "'Did' is for Past Simple. For asking about life experience up to now, use Present Perfect with 'have/has'." },
                { text: "Do you ever work in a hospital?", correct: false,
                  errorWord: "Do you", correctWord: "Have you",
                  errorType: "Wrong tense",
                  explanation: "'Do you' is for Present Simple (habits). For life experiences, use Present Perfect: 'Have you ever...?'" }
            ],
            clue: "ever + life experience",
            clueExplain: "asks about a life experience — uses Present Perfect, not Past Simple or Present Simple.",
            rule: "Have/Has + subject + ever + past participle?",
            examples: ["Have you ever worked?", "Has she ever lived?", "Have they ever traveled?"],
            correctReason: "Questions about life experiences (with 'ever') always use Present Perfect, not Past Simple ('did') or Present Simple ('do')."
        },
        // Q9 — pos C — negative haven't
        {
            id: 9, topic: "negative · haven't",
            translation: "No hemos terminado el proyecto todavía.",
            options: [
                { text: "We don't have finished the project yet.", correct: false,
                  errorWord: "don't have", correctWord: "haven't",
                  errorType: "Wrong auxiliary",
                  explanation: "'Don't have' is Present Simple. Present Perfect negatives use 'haven't' (have not) or 'hasn't' (has not)." },
                { text: "We not have finished the project yet.", correct: false,
                  errorWord: "not have", correctWord: "haven't",
                  errorType: "Wrong word order",
                  explanation: "The order is 'haven't' (have + not), not 'not have'. The negative goes AFTER the auxiliary." },
                { text: "We haven't finished the project yet.", correct: true }
            ],
            clue: "we (plural) + negative",
            clueExplain: "is a plural subject in a negative — uses 'haven't' + past participle.",
            rule: "Subject + haven't / hasn't + past participle",
            examples: ["I haven't seen", "they haven't been", "she hasn't tried"],
            correctReason: "Present Perfect negatives combine the auxiliary with 'not': haven't (have + not) or hasn't (has + not)."
        },
        // Q10 — pos B — ever in question with 3rd
        {
            id: 10, topic: "ever · question · 3rd person",
            translation: "¿Sara ha probado alguna vez la comida coreana?",
            options: [
                { text: "Have Sara ever tried Korean food?", correct: false,
                  errorWord: "Have Sara", correctWord: "Has Sara",
                  errorType: "Wrong auxiliary",
                  explanation: "'Have' is for I/you/we/they. The subject 'Sara' is third-person singular and uses 'Has'." },
                { text: "Has Sara ever tried Korean food?", correct: true },
                { text: "Does Sara ever tried Korean food?", correct: false,
                  errorWord: "Does Sara ever tried", correctWord: "Has Sara ever tried",
                  errorType: "Wrong tense",
                  explanation: "'Does' is for Present Simple. Present Perfect questions use 'have' or 'has'." }
            ],
            clue: "Sara (she) + question",
            clueExplain: "is third-person singular in a Present Perfect question — uses 'Has' at the start.",
            rule: "Has + he/she/it + ever + past participle?",
            examples: ["Has he ever been?", "Has she ever tried?", "Has it ever rained?"],
            correctReason: "Present Perfect questions with third-person singular subjects (he/she/it) start with 'Has', not 'Have'."
        },
        // Q11 — pos A — irregular PP write
        {
            id: 11, topic: "irregular PP · write",
            translation: "Diego ha escrito varios libros.",
            options: [
                { text: "Diego has written several books.", correct: true },
                { text: "Diego has wrote several books.", correct: false,
                  errorWord: "wrote", correctWord: "written",
                  errorType: "Wrong form",
                  explanation: "'Wrote' is the simple past form. Present Perfect needs the past participle, which is 'written'." },
                { text: "Diego has writed several books.", correct: false,
                  errorWord: "writed", correctWord: "written",
                  errorType: "Wrong spelling",
                  explanation: "'Write' is irregular — it doesn't add -ed. The past participle is 'written'." }
            ],
            clue: "write (irregular PP)",
            clueExplain: "is irregular: write → wrote → written.",
            rule: "write → wrote → written (past participle)",
            examples: ["he has written", "I have written", "they have written"],
            correctReason: "'Write' is irregular. Its three forms are write/wrote/written. Present Perfect uses the past participle 'written'."
        },
        // Q12 — pos C — irregular PP do
        {
            id: 12, topic: "irregular PP · do",
            translation: "Nunca he hecho yoga.",
            options: [
                { text: "I have never did yoga.", correct: false,
                  errorWord: "did", correctWord: "done",
                  errorType: "Wrong form",
                  explanation: "'Did' is the simple past form of 'do'. Present Perfect needs the past participle, which is 'done'." },
                { text: "I have never doed yoga.", correct: false,
                  errorWord: "doed", correctWord: "done",
                  errorType: "Wrong spelling",
                  explanation: "'Do' is irregular — it doesn't add -ed. The past participle is 'done'." },
                { text: "I have never done yoga.", correct: true }
            ],
            clue: "do (irregular PP)",
            clueExplain: "is irregular: do → did → done.",
            rule: "do → did → done (past participle)",
            examples: ["I have done", "she has done", "they have done"],
            correctReason: "'Do' is irregular. Its three forms are do/did/done. Present Perfect uses the past participle 'done'."
        },
        // Q13 — pos B — never word order with 3rd
        {
            id: 13, topic: "never · 3rd person · word order",
            translation: "Mi hermano nunca ha visitado el extranjero.",
            options: [
                { text: "My brother never has visited abroad.", correct: false,
                  errorWord: "never has visited", correctWord: "has never visited",
                  errorType: "Wrong word order",
                  explanation: "'Never' goes AFTER the auxiliary 'has', not before. The order is: subject + has + never + past participle." },
                { text: "My brother has never visited abroad.", correct: true },
                { text: "My brother has visited never abroad.", correct: false,
                  errorWord: "visited never", correctWord: "never visited",
                  errorType: "Wrong word order",
                  explanation: "'Never' goes BEFORE the past participle, not after it." }
            ],
            clue: "my brother (he) + never",
            clueExplain: "needs 'has' (third person) + 'never' + past participle in this fixed order.",
            rule: "He/She/It + has + never + past participle",
            examples: ["he has never been", "she has never tried", "it has never happened"],
            correctReason: "The fixed order is: subject + has + never + past participle. 'Never' always goes between the auxiliary and the past participle."
        },
        // Q14 — pos A — ever in 1st person plural
        {
            id: 14, topic: "ever · question · 1st plural",
            translation: "¿Hemos viajado en avión alguna vez?",
            options: [
                { text: "Have we ever traveled by plane?", correct: true },
                { text: "Has we ever traveled by plane?", correct: false,
                  errorWord: "Has we", correctWord: "Have we",
                  errorType: "Wrong auxiliary",
                  explanation: "'Has' is for he/she/it. The subject 'we' is plural and uses 'Have'." },
                { text: "Did we ever traveled by plane?", correct: false,
                  errorWord: "Did we ever traveled", correctWord: "Have we ever traveled",
                  errorType: "Wrong tense",
                  explanation: "'Did' is Past Simple, and after 'did' the verb stays in base form. For life experience, use Present Perfect: 'have/has + past participle'." }
            ],
            clue: "we + question",
            clueExplain: "is a plural subject in a Present Perfect question — uses 'Have' at the start.",
            rule: "Have + we/you/they/I + ever + past participle?",
            examples: ["Have we ever traveled?", "Have you ever met?", "Have they ever tried?"],
            correctReason: "Present Perfect questions with I/you/we/they start with 'Have'. With third-person singular, use 'Has'."
        },
        // Q15 — pos C — irregular PP meet
        {
            id: 15, topic: "irregular PP · meet",
            translation: "¿Has conocido alguna vez a una persona famosa?",
            options: [
                { text: "Have you ever meeted a famous person?", correct: false,
                  errorWord: "meeted", correctWord: "met",
                  errorType: "Wrong spelling",
                  explanation: "'Meet' is irregular — it doesn't add -ed. The past participle is 'met' (same as the simple past)." },
                { text: "Did you ever meet a famous person?", correct: false,
                  errorWord: "Did you ever meet", correctWord: "Have you ever met",
                  errorType: "Wrong tense",
                  explanation: "'Did' is Past Simple. For life experiences with 'ever', use Present Perfect: 'have/has + past participle'." },
                { text: "Have you ever met a famous person?", correct: true }
            ],
            clue: "meet (irregular PP)",
            clueExplain: "is irregular: meet → met → met (same form for past and past participle).",
            rule: "meet → met → met (past participle)",
            examples: ["she has met", "I have met", "they have met"],
            correctReason: "'Meet' is irregular. Its past participle is 'met' (same as the simple past). It does NOT follow the -ed pattern."
        }
    ];

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, i) => {
            q.shuffled = shuffle(q.options);
            container.appendChild(createCard(q, i));
        });
        showQuestion(0);
        updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = `question-card ${index !== 0 ? 'hidden' : ''}`;
        card.id = `question-${index}`;
        const letters = ['A','B','C'];

        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span class="q-label">Choose the correct sentence:</span>
                <span class="topic-badge">${q.topic}</span>
            </div>
            <div class="translate-bar">
                <button class="translate-btn" id="trBtn-${index}" onclick="toggleTranslation(${index})">🇪🇸 Ver en español</button>
            </div>
            <div class="translation-box" id="trBox-${index}">
                <span class="tr-label">ES:</span>${q.translation}
            </div>
            <div class="sentence-options" id="options-${index}">
                ${q.shuffled.map((opt, i) => `
                    <button class="sent-option" onclick="selectOption(${index}, ${i})">
                        <div class="option-letter">${letters[i]}</div>
                        <div class="option-text">${opt.text}</div>
                        <div class="option-status"></div>
                    </button>
                `).join('')}
            </div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Previous</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'See Results 🎉' : 'Next →'}
                </button>
            </div>
        `;
        return card;
    }

    function toggleTranslation(qi) {
        const box = document.getElementById(`trBox-${qi}`);
        const btn = document.getElementById(`trBtn-${qi}`);
        const open = box.classList.toggle('show');
        btn.classList.toggle('active', open);
        btn.innerHTML = open ? '🇬🇧 Hide translation' : '🇪🇸 Ver en español';
    }

    function selectOption(qi, optIdx) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = q.shuffled[optIdx];
        const isCorrect = selected.correct;
        const correctOpt = q.shuffled.find(o => o.correct);
        if (isCorrect) score++;

        document.querySelectorAll(`#options-${qi} .sent-option`).forEach((btn, i) => {
            btn.classList.add('disabled');
            const opt = q.shuffled[i];
            const status = btn.querySelector('.option-status');
            if (opt.correct) { btn.classList.add('correct'); status.textContent = '✅'; }
            else if (i === optIdx) { btn.classList.add('incorrect'); status.textContent = '❌'; }
        });

        buildFeedback(qi, selected, isCorrect, correctOpt, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, correctOpt, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;

        function markError(text, word) {
            if (!word) return text;
            const esc = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            return text.replace(new RegExp(esc), `<span class="error-highlight">${word}</span>`);
        }
        const ruleExamples = q.examples.map(e => `<span class="rule-ex">${e}</span>`).join('');

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">✅</span>
                    <div>
                        <div class="fb-title">Correct! Great identification</div>
                        <div class="fb-subtitle">Let's see why the others were wrong</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-signal">
                        <div class="fb-block-title">🔍 Key signal in the sentence</div>
                        <div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">
                            The element <span class="signal-tag">${q.clue}</span> ${q.clueExplain}
                        </div>
                    </div>
                    ${q.shuffled.filter(o => !o.correct).map(err => `
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ Error in one option: <span class="error-badge">${err.errorType}</span></div>
                        <div class="error-text">${err.explanation}</div>
                    </div>`).join('')}
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 The rule</div>
                        <div class="rule-formula">${q.rule}</div>
                        <div class="rule-examples">${ruleExamples}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 Why is the correct sentence correct?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        } else {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">❌</span>
                    <div>
                        <div class="fb-title">Incorrect — let's review</div>
                        <div class="fb-subtitle">Spot the difference between the sentences</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-signal wrong">
                        <div class="fb-block-title">🔍 Key signal you needed to spot</div>
                        <div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">
                            The element <span class="signal-tag red">${q.clue}</span> ${q.clueExplain}
                        </div>
                    </div>
                    <div class="fb-block fb-compare">
                        <div class="fb-block-title">🔄 Your choice vs. the correct one</div>
                        <div class="compare-row">
                            <span class="compare-label wrong">You chose</span>
                            <span class="compare-text">${markError(selected.text, selected.errorWord)}</span>
                        </div>
                        <div class="compare-row">
                            <span class="compare-label right">Correct</span>
                            <span class="compare-text">${correctOpt.text}</span>
                        </div>
                    </div>
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ The error: <span class="error-badge">${selected.errorType}</span></div>
                        <div class="word-swap">
                            <span class="ws-box ws-wrong">${selected.errorWord}</span>
                            <span class="ws-arrow">→</span>
                            <span class="ws-box ws-right">${selected.correctWord}</span>
                        </div>
                        <div class="error-text">${selected.explanation}</div>
                    </div>
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 The correct rule</div>
                        <div class="rule-formula">${q.rule}</div>
                        <div class="rule-examples">${ruleExamples}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 Why is the correct sentence correct?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>
            `;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c, idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    function nextQuestion(i) { i < quizData.length - 1 ? showQuestion(i + 1) : showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
    function updateProgress() {
        const done = answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width = (done / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        let stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? 'Excellent! You master Present Perfect. 🏆'
            : pct >= 70 ? 'Well done! Keep practicing. 💪'
            : 'Good effort. Review the rules and try again. 📚';
        document.querySelectorAll('.star').forEach((s, i) => {
            if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300);
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>
</html>
