<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Summary — Word Order — Adverbials of Time & Frequency | A1 | JUCUM</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Fredoka:wght@400;500;600;700&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
<style>
:root{
--bg:#FAFAF6;--card:#fff;--text:#2A2A2A;--text-soft:#777;--border:#E8E5DC;
--shadow:0 3px 16px rgba(0,0,0,.06);--radius:14px;
--lp:#2196F3;--ld:#0D47A1;--ll:#E3F2FD;--lm:#BBDEFB;
--lg:linear-gradient(135deg,#1565C0,#2196F3);--lglow:rgba(33,150,243,.15);
--badge-text:#0A2A5E;
--subj:#1565C0;--subj-bg:#E3F2FD;
--verb:#E53935;--verb-bg:#FFEBEE;
--comp:#00897B;--comp-bg:#E0F2F1;
--neg:#AD1457;--neg-bg:#FCE4EC;
--quest:#7B1FA2;--quest-bg:#F3E5F5;
--ok:#2E7D32;--ok-bg:#E8F5E9;
--err:#C62828;--err-bg:#FFEBEE;
--note-bg:#FFFDE7;--note-border:#FBC02D;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);line-height:1.7;padding:1.5rem 1rem;-webkit-font-smoothing:antialiased}
.container{max-width:780px;margin:0 auto}

.level-header{text-align:center;padding:2rem;border-radius:20px;color:#fff;position:relative;overflow:hidden;margin-bottom:1.2rem;background:var(--lg)}
.level-header::before{content:'';position:absolute;top:-40%;right:-15%;width:250px;height:250px;background:rgba(255,255,255,.1);border-radius:50%}
.level-header h1{font-family:'Fredoka',sans-serif;font-size:1.8rem;font-weight:600;position:relative;z-index:1}
.level-header .module-name{font-family:'Fredoka',sans-serif;font-size:1.1rem;font-weight:500;opacity:.95;position:relative;z-index:1;margin-top:.2rem}
.level-header .subtitle{opacity:.8;font-size:.85rem;position:relative;z-index:1;margin-top:.15rem}
.level-badge{display:inline-flex;align-items:center;gap:6px;font-size:.7rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;background:var(--ll);color:var(--badge-text);padding:4px 12px;border-radius:20px;border:1.5px solid var(--lm);margin-bottom:.8rem;position:relative;z-index:1}

.step-tabs{display:flex;gap:.35rem;margin-bottom:1rem;flex-wrap:wrap}
.step-tab{padding:.45rem .85rem;border-radius:8px;font-size:.78rem;font-weight:700;cursor:pointer;border:2px solid var(--border);background:var(--card);transition:.2s;font-family:'Nunito',sans-serif}
.step-tab:hover{background:var(--ll)}
.step-tab.active{background:var(--ll);border-color:var(--lp);color:var(--ld)}
.step-tab.done{background:var(--ok-bg);border-color:var(--ok);color:var(--ok)}

.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-bottom:1.2rem;box-shadow:var(--shadow);border-top:3.5px solid var(--lp);display:none}
.card.active{display:block;animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.section-label{display:flex;align-items:center;gap:.5rem;font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--ld);margin-bottom:.3rem}
.section-label::before{content:"";width:20px;height:3px;background:var(--lp);border-radius:2px}
.section-title{font-family:'Fredoka',sans-serif;font-size:1.25rem;font-weight:600;margin-bottom:.1rem}
.section-desc{font-size:.85rem;color:var(--text-soft);margin-bottom:1rem;line-height:1.6}

/* GRAMMAR TAGS - inline-block prevents overlap */
.g-subj,.g-verb,.g-comp,.g-neg,.g-quest,.g-prep,.g-time,.g-art{display:inline-block;padding:1px 7px;border-radius:4px;font-weight:700;margin:0 1px;line-height:1.5}
.g-subj{background:var(--subj-bg);color:var(--subj);border-bottom:2.5px solid var(--subj)}
.g-verb{background:var(--verb-bg);color:var(--verb);border-bottom:2.5px solid var(--verb)}
.g-comp{background:var(--comp-bg);color:var(--comp);border-bottom:2.5px solid var(--comp)}
.g-neg{background:var(--neg-bg);color:var(--neg);border-bottom:2.5px solid var(--neg)}
.g-quest{background:var(--quest-bg);color:var(--quest);border-bottom:2.5px solid var(--quest)}
.g-prep{background:#FFE0B2;color:#E65100;border-bottom:2.5px solid #FB8C00}
.g-time{background:#F8BBD0;color:#AD1457;border-bottom:2.5px solid #C2185B}
.g-art{background:#FFF59D;color:#F57F17;border-bottom:2.5px solid #FBC02D}

.g-table{width:100%;border-collapse:separate;border-spacing:0;margin:.8rem 0;border-radius:10px;overflow:hidden;font-size:.83rem;border:1px solid var(--border)}
.g-table th{background:var(--lg);color:#fff;padding:.65rem .6rem;font-size:.7rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.g-table td{padding:.6rem;border-bottom:1px solid #f0f0f0;vertical-align:middle;line-height:1.65}
.g-table tr:nth-child(even) td{background:var(--ll)}
.g-table tr:last-child td{border-bottom:none}

.compare-grid{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin:.8rem 0}
.compare-card{padding:1rem;border-radius:12px;text-align:center}
.compare-card.esp{background:var(--ll);border:2px solid var(--lm)}
.compare-card.eng{background:var(--subj-bg);border:2px solid #90CAF9}
.compare-card h4{font-family:'Fredoka',sans-serif;font-size:.85rem;margin-bottom:.5rem}
.compare-card.esp h4{color:var(--ld)}
.compare-card.eng h4{color:var(--subj)}
.compare-card ul{list-style:none;font-size:.82rem;color:var(--text-soft)}
.compare-card li{padding:3px 0;line-height:1.5}

.formula-box{background:var(--note-bg);border:2px solid var(--note-border);border-radius:12px;padding:1rem;margin:.8rem 0;text-align:center;font-family:'Fredoka',sans-serif;font-size:.95rem;color:var(--ld);line-height:2.1}
.tip-card{background:var(--ll);border-radius:10px;padding:.8rem 1rem;margin:.5rem 0;font-size:.83rem;border-left:3px solid var(--lp);line-height:1.65}
.tip-card strong{color:var(--ld)}
.alert-card{background:var(--err-bg);border:2px solid #EF5350;border-radius:10px;padding:.8rem 1rem;margin:.8rem 0}
.alert-card .atitle{font-family:'Fredoka',sans-serif;color:var(--err);font-size:.82rem;margin-bottom:.3rem}
.alert-card p{font-size:.82rem;color:var(--text-soft);line-height:1.65}

.viz-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:.5rem;margin:.8rem 0}
.viz-item{padding:.7rem .5rem;border-radius:10px;text-align:center;background:var(--card);border:1.5px solid var(--lm);font-size:.82rem}
.viz-item .ico{font-size:1.6rem;display:block;margin-bottom:.3rem}
.viz-item .lbl{font-family:'Fredoka',sans-serif;color:var(--ld);font-size:.95rem;display:block}
.viz-item .es{font-style:italic;color:var(--text-soft);font-size:.74rem;display:block;margin-top:2px}

.rule-grid{display:grid;grid-template-columns:1fr;gap:.5rem;margin:.8rem 0}
.rule-item{padding:.7rem 1rem;border-radius:10px;background:var(--card);border:1.5px solid var(--lm);display:flex;align-items:flex-start;gap:.7rem}
.rule-item .num{font-family:'Fredoka',sans-serif;background:var(--lp);color:#fff;min-width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.9rem}
.rule-item .info{flex:1;font-size:.85rem;line-height:1.6}
.rule-item .info strong{color:var(--ld);display:block;margin-bottom:2px}

.timeline{display:flex;align-items:center;justify-content:space-between;margin:1rem 0;padding:.8rem;background:var(--ll);border-radius:12px;border:1.5px solid var(--lm);gap:.4rem;flex-wrap:wrap}
.tl-point{flex:1;min-width:75px;text-align:center;padding:.5rem .3rem;background:#fff;border-radius:8px;border:2px solid var(--lm)}
.tl-point .ico{font-size:1.3rem;display:block}
.tl-point .lbl{font-family:'Fredoka',sans-serif;font-size:.78rem;color:var(--ld);margin-top:2px;display:block}
.tl-arrow{color:var(--lp);font-size:1.2rem;font-weight:700}

.ex-row{display:flex;align-items:flex-start;gap:.6rem;padding:.6rem .8rem;border-radius:10px;margin:.4rem 0;font-size:.88rem;transition:background .2s}
.ex-row:hover{background:var(--lglow)}
.ex-row .icon{font-size:1.2rem;flex-shrink:0;margin-top:1px}
.ex-row .body{flex:1;min-width:0}
.ex-row .en{font-weight:700;color:var(--text);line-height:1.7;word-spacing:1px}
.ex-row .es{font-family:'Lora',serif;font-style:italic;font-size:.82rem;color:var(--text-soft);margin-top:3px;line-height:1.5}
.ex-right{border-left:3px solid var(--ok);background:var(--ok-bg)}
.ex-wrong{border-left:3px solid var(--err);background:var(--err-bg)}

.ex-section{margin-top:1.2rem;padding-top:1rem;border-top:2px dashed var(--lm)}
.ex-section h3{font-family:'Fredoka',sans-serif;color:var(--ld);font-size:.95rem;margin-bottom:.8rem}
.exercise{background:#fafafa;border-radius:12px;padding:1rem;margin-bottom:.7rem;border:2px solid #eee;transition:.2s}
.exercise.correct{border-color:var(--ok);background:var(--ok-bg)}
.exercise.incorrect{border-color:var(--err);background:var(--err-bg)}
.exercise-q{font-size:.9rem;margin-bottom:.7rem;line-height:1.55;font-weight:600}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:.4rem}
.opt-btn{padding:.7rem .55rem;border:2px solid #e0e0e0;border-radius:10px;background:var(--card);color:var(--text);font-size:.85rem;font-weight:600;cursor:pointer;transition:.15s;font-family:'Nunito',sans-serif;text-align:center;line-height:1.35}
.opt-btn:hover:not(:disabled){border-color:var(--lp);background:var(--ll)}
.opt-btn:disabled{cursor:not-allowed;opacity:.7}
.opt-btn.sel-ok{background:var(--ok);color:#fff;border-color:var(--ok)}
.opt-btn.sel-bad{background:var(--err);color:#fff;border-color:var(--err)}
.opt-btn.show-ok{background:var(--ok);color:#fff;border-color:var(--ok)}

.fb{margin-top:.7rem;padding:0;border-radius:12px;font-size:.82rem;display:none;line-height:1.6;overflow:hidden}
.fb.show{display:block;animation:fbSlide .35s ease}
@keyframes fbSlide{from{opacity:0;max-height:0;transform:translateY(-8px)}to{opacity:1;max-height:600px;transform:translateY(0)}}
.fb-header{display:flex;align-items:center;gap:.5rem;padding:.7rem 1rem;font-family:'Fredoka',sans-serif;font-size:.88rem;font-weight:600}
.fb.fb-ok .fb-header{background:#C8E6C9;color:var(--ok)}
.fb.fb-bad .fb-header{background:#FFCDD2;color:var(--err)}
.fb-header .fb-icon{font-size:1.2rem}
.fb-body{padding:.8rem 1rem}
.fb.fb-ok .fb-body{background:var(--ok-bg)}
.fb.fb-bad .fb-body{background:var(--err-bg)}
.fb-row{display:flex;align-items:flex-start;gap:.5rem;margin-bottom:.5rem}
.fb-row:last-child{margin-bottom:0}
.fb-row .fb-dot{font-size:.95rem;flex-shrink:0;margin-top:1px}
.fb-row .fb-text{flex:1;line-height:1.55}
.fb-row .fb-text strong{color:var(--text)}
.fb-correct-answer{color:var(--ok);font-weight:700}
.fb-wrong-reason{color:var(--err);font-weight:600}
.fb-example{display:inline-block;margin-top:.5rem;padding:5px 12px;border-radius:6px;font-size:.79rem;font-weight:700}
.fb.fb-ok .fb-example{background:#A5D6A7;color:#1B5E20}
.fb.fb-bad .fb-example{background:#EF9A9A;color:#B71C1C}
.fb-tip{margin-top:.5rem;padding:.5rem .75rem;border-radius:8px;background:var(--note-bg);border:1px solid var(--note-border);font-size:.78rem;color:#6D4C00;line-height:1.5}
.fb-tip strong{color:var(--ld)}

.score-bar{text-align:center;padding:.8rem;background:var(--ll);border-radius:10px;margin-top:.8rem;border:1px solid var(--lm)}
.score-bar .num{font-family:'Fredoka',sans-serif;font-size:1.4rem;color:var(--ld)}
.score-bar .lbl{font-size:.7rem;color:var(--lp);font-weight:700;text-transform:uppercase;letter-spacing:1px}

.summary-final{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.6rem;margin-top:1rem;box-shadow:var(--shadow);border-top:3.5px solid var(--ok);display:none}
.summary-final.show{display:block;animation:fadeIn .4s ease}
.summary-final h3{font-family:'Fredoka',sans-serif;color:var(--ok);margin-bottom:.6rem;font-size:1.15rem}
.summary-final ul{list-style:none}
.summary-final li{padding:5px 0 5px 22px;position:relative;font-size:.85rem;color:var(--text-soft);line-height:1.6}
.summary-final li:before{content:"\2713";position:absolute;left:0;color:var(--lp);font-weight:700;font-size:1rem}
.summary-final .total-score{margin-top:1rem;padding:.8rem;background:var(--ll);border-radius:10px;text-align:center;font-family:'Fredoka',sans-serif}
.summary-final .total-score .big{font-size:1.6rem;color:var(--ld)}
.summary-final .total-score .small{font-size:.8rem;color:var(--text-soft);font-weight:600}

@media(max-width:600px){
.level-header h1{font-size:1.4rem}
.card{padding:1.2rem}
.compare-grid,.viz-grid{grid-template-columns:1fr 1fr}
.timeline{flex-direction:column}
.tl-arrow{transform:rotate(90deg)}
.opts{grid-template-columns:1fr}
}

.why-box{background:#EDF7ED;border:1.5px solid #A5D6A7;border-left:4px solid var(--ok);border-radius:10px;padding:.7rem .9rem;margin:.7rem 0;font-size:.83rem;line-height:1.6}.why-box .wt{font-family:'Fredoka',sans-serif;color:var(--ok);font-size:.8rem;display:block;margin-bottom:.2rem}.note-box{background:var(--note-bg);border:1.5px solid var(--note-border);border-left:4px solid var(--lp);border-radius:10px;padding:.7rem .9rem;margin:.7rem 0;font-size:.83rem;line-height:1.6}.note-box .nt{font-family:'Fredoka',sans-serif;color:var(--ld);font-size:.8rem;display:block;margin-bottom:.2rem}.illus{display:flex;justify-content:center;align-items:center;gap:.5rem;margin:.4rem 0 1rem;background:linear-gradient(135deg,#E3F2FD,#BBDEFB);border:2px dashed var(--lm);border-radius:16px;padding:1rem}.illus .big{font-size:3.2rem;line-height:1}.illus .big.sm{font-size:2.4rem}.info-illus{display:flex;align-items:center;gap:.8rem;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:.8rem 1rem;margin:.6rem 0}.info-illus .emo{font-size:2.4rem;line-height:1;flex-shrink:0}.info-illus .txt{font-size:.85rem;line-height:1.55}.info-illus .txt b{color:var(--ld)}.eg-card{position:relative;display:flex;align-items:center;gap:.7rem;background:#E3F2FD;border:2px solid #64B5F6;border-radius:12px;padding:1rem .9rem .9rem;margin:.4rem 0 1.1rem}.eg-card .eg-emo{font-size:2.3rem;line-height:1;flex-shrink:0}.eg-card .eg-body .en{font-weight:800;color:#0D47A1;font-size:.95rem;line-height:1.4}.eg-card .eg-body .es{font-family:'Lora',serif;font-style:italic;color:#1565C0;font-size:.82rem;margin-top:3px}.eg-card::before{content:'\1F4DD EJEMPLO';position:absolute;top:-11px;left:14px;background:#1565C0;color:#fff;font-family:'Fredoka',sans-serif;font-size:.62rem;font-weight:600;letter-spacing:.06em;padding:2px 9px;border-radius:20px}.eg-card.ok{background:#E8F5E9;border-color:#81C784}.eg-card.ok .en{color:#1B5E20}.eg-card.ok .es{color:#2E7D32}.eg-card.ok::before{content:'\2705 BIEN';background:#2E7D32}.eg-card.bad{background:#FFEBEE;border-color:#EF9A9A}.eg-card.bad .en{color:#B71C1C}.eg-card.bad .es{color:#C62828}.eg-card.bad::before{content:'\274C MAL';background:#C62828}
.art-hero{display:grid;grid-template-columns:1fr 1fr;gap:.8rem;margin:.8rem 0}.art-hero.three{grid-template-columns:1fr 1fr 1fr}.art-box{background:#fff;border:2px solid var(--lm);border-radius:16px;padding:1rem .9rem;text-align:center;box-shadow:0 2px 10px rgba(33,150,243,.10)}.art-box .word{font-family:'Fredoka',sans-serif;font-size:2.6rem;font-weight:700;color:var(--ld);line-height:1;background:linear-gradient(135deg,#E3F2FD,#90CAF9);border-radius:12px;padding:.5rem 0;margin-bottom:.5rem}.art-box.eng .word{background:linear-gradient(135deg,#E3F2FD,#90CAF9);color:#0D47A1}.art-box .role{font-family:'Fredoka',sans-serif;font-size:.78rem;color:var(--lp);font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:.35rem}.art-box.eng .role{color:#1976D2}.art-box .desc{font-size:.8rem;color:var(--text-soft);line-height:1.5}.vs-grid{margin:.8rem 0}.vs-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:stretch;gap:.5rem;margin:.55rem 0}.vs-side{border-radius:12px;padding:.7rem .8rem;font-size:.84rem;line-height:1.45}.vs-side .flag{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;display:block;margin-bottom:.2rem;opacity:.85}.vs-side.es{background:var(--ll);border:1.5px solid var(--lm)}.vs-side.es .flag{color:var(--ld)}.vs-side.en{background:#E3F2FD;border:1.5px solid #90CAF9}.vs-side.en .flag{color:#1565C0}.vs-mid{display:flex;align-items:center;justify-content:center;font-size:1.3rem;color:var(--lp)}@media(max-width:600px){.art-hero,.art-hero.three{grid-template-columns:1fr}.vs-row{grid-template-columns:1fr;gap:.3rem}.vs-mid{transform:rotate(90deg);padding:.1rem 0}}.conj-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin:.8rem 0}.conj-item{padding:.6rem;border-radius:10px;text-align:center;background:var(--card);border:1.5px solid var(--border)}.conj-item .pron{font-size:.75rem;color:var(--subj);font-weight:800}.conj-item .vrb{font-family:'Fredoka',sans-serif;font-size:1.1rem;color:var(--verb)}.conj-item .meaning{font-size:.65rem;color:var(--text-soft)}@media(max-width:600px){.conj-grid{grid-template-columns:1fr}}</style>

<body>
<div class="container">
<div class="level-header">
<div class="level-badge">A1 · Shopping, Services & Money</div>
<h1>Grammar Summary</h1>
<div class="module-name">📏 Word Order — Adverbials of Time & Frequency</div>
<p class="subtitle">Orden de palabras con adverbios de tiempo y frecuencia · 5 pasos × 5 ejercicios</p>
</div>
<div class="step-tabs" id="stepTabs"></div>
<div id="cardArea"></div>
<div class="summary-final" id="summaryFinal">
<h3>🎓 Resumen del Tema</h3>
<ul id="summaryList"></ul>
<div class="total-score" id="totalScore"></div>
</div>
</div>
<script>
const ICON_PARTY="🎉";
const ICON_CHECK="✅";
const ICON_X="❌";
const ICON_BULB="💡";
const ICON_NOTE="📝";
const ICON_THINK="😕";
const DASH="—";
const TEXT_CORRECT="¡Correcto!";
const TEXT_INCORRECT="No es correcto";
const TEXT_OTHER_OPT="La otra opción";
const TEXT_CORRECT_IS="La respuesta correcta es";
const TEXT_REMEMBER="Recuerda";
const TEXT_SCORE="Puntuación";
const TEXT_TOTAL="Total del tema";
const EX_HEADER="✏️ Ejercicios —";

const DATA={"name": "Word Order — Adverbials of Time & Frequency", "summary": ["<b>Orden básico:</b> Subject + verb + object + <b>place</b> + <b>time</b>", "<b>Adverbios de frecuencia</b> van en el MEDIO (antes del verbo principal o después de \"be\")", "<b>Adverbios de tiempo</b> (yesterday, on Monday, every day) van al FINAL (o al inicio)", "Regla de oro: <b>LUGAR antes que TIEMPO</b>: \"I work <b>at the bank</b> <b>every day</b>\"", "NUNCA pongas adverbios de frecuencia al final: ❌ \"I go shopping always\" → ✅ \"I always go shopping\"", "Expresiones de tiempo flexibles: pueden ir al INICIO o al FINAL de la oración"], "steps": [{"icon": "🇪🇸", "title": "Repaso en Español", "html": "<div class=\"section-label\">Paso 1</div>\n<div class=\"section-title\">Paso 1: 🇪🇸 Repaso en Español</div>\n<div class=\"section-desc\">En español podemos mover los adverbios con mucha libertad. En inglés cada tipo tiene su lugar específico.</div>\n<div class=\"compare-grid\">\n<div class=\"compare-card esp\"><h4>🇪🇸 Español (libre)</h4><ul><li><b>Siempre</b> compro aquí</li><li>Compro <b>siempre</b> aquí</li><li>Compro aquí <b>siempre</b></li><li>Aquí compro <b>siempre</b></li></ul></div>\n<div class=\"compare-card eng\"><h4>🇬🇧 English (fijo)</h4><ul><li>I <b>always</b> shop here ✅</li><li>I shop <b>always</b> here ❌</li><li>I shop here <b>always</b> ❌</li><li>Only: I always shop here</li></ul></div>\n</div>\n<div class=\"ex-row\"><div class=\"icon\">🛒</div><div><div class=\"en\">Yo trabajo <b>en el banco</b> <b>todos los días</b>.</div><div class=\"es\">Lugar (banco) + Tiempo (días) — mismo orden en inglés</div></div></div>\n<div class=\"ex-row\"><div class=\"icon\">⏰</div><div><div class=\"en\"><b>Los lunes</b> compro pan.</div><div class=\"es\">Tiempo al inicio — también posible: \"Compro pan los lunes\"</div></div></div>\n<div class=\"tip-card\"><strong>💡 Idea clave:</strong> Los adverbios de <b>frecuencia</b> (always, never) van en el MEDIO. Los adverbios de <b>tiempo</b> (on Monday, every day) van al FINAL o al INICIO.</div>", "exercises": [{"q": "\"Siempre compro pan\" — ¿dónde va \"siempre\" en inglés?", "a": "a", "o": ["En el medio: I always buy bread", "Al final: I buy bread always"], "fc": "Adverbios de frecuencia van ANTES del verbo principal.", "fi": "\"Always\" al final no es natural en inglés.", "ex": "I always buy bread → Siempre compro pan"}, {"q": "\"Trabajo en casa los sábados\" — ¿qué va primero?", "a": "b", "o": ["Tiempo primero, luego lugar", "Lugar (at home), luego tiempo (on Saturdays)"], "fc": "Regla: LUGAR antes que TIEMPO.", "fi": "\"On Saturdays at home\" es orden invertido para el A1 estándar.", "ex": "I work at home on Saturdays → Trabajo en casa los sábados", "tip": "Place before Time"}, {"q": "\"Los lunes compro pan\" en inglés:", "a": "a", "o": ["On Mondays, I buy bread", "I buy on Mondays bread"], "fc": "Tiempo al inicio + coma + oración: \"On Mondays, I buy bread\".", "fi": "\"I buy on Mondays bread\" separa el verbo del objeto.", "ex": "On Mondays, I buy bread → Los lunes compro pan"}, {"q": "\"Yo usualmente estoy en casa\" en inglés:", "a": "b", "o": ["I usually am at home", "I am usually at home"], "fc": "Con \"be\": adverbio DESPUÉS: \"am usually\".", "fi": "\"Usually am\" invierte la regla del verbo be.", "ex": "I am usually at home → Usualmente estoy en casa"}, {"q": "¿Cuál es el orden básico en inglés?", "a": "b", "o": ["Sujeto + tiempo + verbo + lugar", "Sujeto + verbo + lugar + tiempo"], "fc": "Orden estándar: S + V + (objeto) + lugar + tiempo.", "fi": "Poner tiempo antes del verbo rompe el orden básico.", "ex": "I work at the bank every day → Trabajo en el banco todos los días"}]}, {"icon": "🤝", "title": "Similitudes", "html": "<div class=\"section-label\">Paso 2</div>\n<div class=\"section-title\">Paso 2: 🤝 Similitudes ESP ↔ ENG</div>\n<table class=\"g-table\">\n<tr><th>Similitud</th><th>🇪🇸 Español</th><th>🇬🇧 English</th></tr>\n<tr><td>Orden básico</td><td>Sujeto + verbo + objeto</td><td><span class=\"g-subj\">S</span> + <span class=\"g-verb\">V</span> + <span class=\"g-comp\">O</span></td></tr>\n<tr><td>Tiempo al inicio</td><td>Los lunes, compro pan</td><td>On Mondays, I buy bread</td></tr>\n<tr><td>Tiempo al final</td><td>Compro pan los lunes</td><td>I buy bread on Mondays</td></tr>\n<tr><td>Frecuencia en el medio</td><td>Siempre compro</td><td>I <b>always</b> buy</td></tr>\n<tr><td>Lugar antes de tiempo</td><td>en casa los sábados</td><td>at home on Saturdays</td></tr>\n</table>\n<div class=\"tip-card\"><strong>💡 Similitud clave:</strong> La regla \"LUGAR antes de TIEMPO\" también funciona en español. \"Trabajo en la oficina los lunes\" — lo mismo en inglés.</div>\n<div class=\"section-label\">Tipos de adverbiales</div>\n<div class=\"conj-grid\">\n<div class=\"conj-item\"><div class=\"pron\">Frequency</div><div class=\"vrb\">middle</div><div class=\"meaning\">always, often</div></div>\n<div class=\"conj-item\"><div class=\"pron\">Time</div><div class=\"vrb\">end/start</div><div class=\"meaning\">today, on Monday</div></div>\n<div class=\"conj-item\"><div class=\"pron\">Place</div><div class=\"vrb\">before time</div><div class=\"meaning\">at home, here</div></div>\n</div>", "exercises": [{"q": "\"I work here every day.\" ¿Qué hay antes del tiempo?", "a": "a", "o": ["El lugar (here)", "El sujeto (I)"], "fc": "El lugar va ANTES que el tiempo: \"here every day\".", "fi": "El sujeto va al inicio, no justo antes del tiempo.", "ex": "I work here every day → Trabajo aquí todos los días"}, {"q": "\"Yo a veces compro aquí\" en inglés:", "a": "a", "o": ["I sometimes shop here", "I shop here sometimes"], "fc": "\"Sometimes\" puede ir en el medio (más común) o al final.", "fi": "Al final es posible pero menos frecuente en el A1 estándar.", "ex": "I sometimes shop here → A veces compro aquí", "tip": "\"sometimes\" es flexible — medio o final"}, {"q": "\"Trabajan en la tienda los sábados\" en inglés:", "a": "b", "o": ["They on Saturdays work at the shop", "They work at the shop on Saturdays"], "fc": "S + V + Lugar + Tiempo.", "fi": "El tiempo NO va entre sujeto y verbo en la forma básica.", "ex": "They work at the shop on Saturdays → Trabajan en la tienda los sábados"}, {"q": "\"She is always busy\" — ¿por qué \"always\" está DESPUÉS de \"is\"?", "a": "a", "o": ["Con \"be\", el adverbio va después", "Es un error"], "fc": "Con el verbo \"be\": adverbio DESPUÉS.", "fi": "No es error — es la regla del verbo be.", "ex": "She is always busy → Ella siempre está ocupada"}, {"q": "En \"Every morning, I buy bread\", ¿qué va al inicio?", "a": "b", "o": ["Frecuencia", "Tiempo (every morning)"], "fc": "\"Every morning\" = expresión de tiempo.", "fi": "Frecuencia (always, never) NO va al inicio.", "ex": "Every morning, I buy bread → Cada mañana compro pan"}]}, {"icon": "⚡", "title": "Diferencias", "html": "<div class=\"section-label\">Paso 3</div>\n<div class=\"section-title\">Paso 3: ⚡ Diferencias Importantes</div>\n<table class=\"g-table\">\n<tr><th>🇪🇸 Español</th><th>🇬🇧 Inglés</th><th>💡 Explicación</th></tr>\n<tr><td>Orden libre</td><td>Orden ESTRICTO</td><td>Cada adverbio en su lugar</td></tr>\n<tr><td>Compro siempre aquí ✅</td><td>I always shop here ✅<br>I shop always here ❌</td><td>Frecuencia SOLO en el medio</td></tr>\n<tr><td>Los lunes, en casa...</td><td>Place BEFORE time</td><td>Lugar antes que tiempo</td></tr>\n<tr><td>Puedes decir \"hoy compro\"</td><td>\"Today, I shop\" o \"I shop today\"</td><td>Tiempo: inicio o final, no medio</td></tr>\n<tr><td>Adverbios flexibles</td><td>Cada uno tiene su lugar</td><td>Frequency ≠ Time</td></tr>\n</table>\n<div class=\"alert-card\"><div class=\"atitle\">⚠️ ¡Error clásico!</div><p>Los adverbios de FRECUENCIA (always, often, never) NUNCA van al final:<br>❌ \"I go shopping always\"<br>✅ \"I <b>always</b> go shopping\"</p></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">✅</div><div><div class=\"en\"><span class=\"g-subj\">She</span> <span class=\"g-verb\">works</span> <span class=\"g-comp\">at the bank</span> every day.</div><div class=\"es\">Trabaja en el banco todos los días — LUGAR + TIEMPO</div></div></div>\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">❌</div><div><div class=\"en\"><span class=\"g-subj\">She</span> <span class=\"g-verb\">works</span> every day <span class=\"g-comp\">at the bank</span>.</div><div class=\"es\">Orden invertido — tiempo antes de lugar</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">✅</div><div><div class=\"en\"><span class=\"g-subj\">I</span> <b>never</b> <span class=\"g-verb\">shop</span> on Sundays.</div><div class=\"es\">Nunca compro los domingos</div></div></div>\n<div class=\"ex-row ex-wrong\"><div class=\"icon\">❌</div><div><div class=\"en\"><span class=\"g-subj\">I</span> <span class=\"g-verb\">shop</span> on Sundays <b>never</b>.</div><div class=\"es\">\"Never\" al final es incorrecto</div></div></div>", "exercises": [{"q": "\"Trabajo en casa los lunes\" en inglés:", "a": "b", "o": ["I work on Mondays at home", "I work at home on Mondays"], "fc": "Lugar (at home) ANTES de tiempo (on Mondays).", "fi": "\"On Mondays at home\" invierte la regla.", "ex": "I work at home on Mondays → Trabajo en casa los lunes", "tip": "Place before Time"}, {"q": "\"Nunca voy los domingos\" en inglés:", "a": "a", "o": ["I never go on Sundays", "I go on Sundays never"], "fc": "\"Never\" va ANTES del verbo.", "fi": "\"Never\" nunca va al final en inglés.", "ex": "I never go on Sundays → Nunca voy los domingos"}, {"q": "\"Cada mañana compro pan\" en inglés:", "a": "b", "o": ["I every morning buy bread", "Every morning, I buy bread"], "fc": "Tiempo al INICIO o FINAL, no en el medio.", "fi": "\"Every morning\" entre sujeto y verbo no es natural.", "ex": "Every morning, I buy bread → Cada mañana compro pan"}, {"q": "\"Ella usualmente está aquí\" en inglés:", "a": "a", "o": ["She is usually here", "She usually is here"], "fc": "Con \"be\": adverbio DESPUÉS.", "fi": "\"Usually is\" invierte la regla del verbo be.", "ex": "She is usually here → Ella usualmente está aquí"}, {"q": "¿Cuál orden es correcto?", "a": "b", "o": ["They buy every day bread at the shop", "They buy bread at the shop every day"], "fc": "S + V + O + Lugar + Tiempo.", "fi": "El tiempo NO va entre el verbo y el objeto.", "ex": "They buy bread at the shop every day → Compran pan en la tienda todos los días"}]}, {"icon": "💡", "title": "Consejos", "html": "<div class=\"section-label\">Paso 4</div>\n<div class=\"section-title\">Paso 4: 💡 Consejos Prácticos</div>\n<div class=\"tip-card\"><strong>Tip 1:</strong> Memoriza la fórmula: <b>Sujeto + verbo + objeto + lugar + tiempo</b>. Es tu guía de oro.</div>\n<div class=\"tip-card\"><strong>Tip 2:</strong> Adverbios de <b>frecuencia</b> (always, never, often) van SIEMPRE en el medio. NUNCA al final.</div>\n<div class=\"tip-card\"><strong>Tip 3:</strong> Expresiones de <b>tiempo</b> (today, on Monday, every day) van al final o al inicio — nunca en el medio.</div>\n<div class=\"tip-card\"><strong>Tip 4:</strong> Con el verbo \"be\", los adverbios de frecuencia van DESPUÉS: \"She is <b>always</b> busy\".</div>\n<div class=\"formula-box\"><span class=\"g-subj\">S</span> + <span class=\"g-verb\">V</span> + <span class=\"g-comp\">O</span> + <b>place</b> + <b>time</b><br><br>❗ <b>Frequency</b> (always, never) → MIDDLE<br>❗ <b>Time</b> (today, on Monday) → START or END<br>❗ Place BEFORE Time</div>\n<div class=\"section-label\">Ejemplos del orden estándar</div>\n<table class=\"g-table\">\n<tr><th>Subject</th><th>Verb</th><th>Object</th><th>Place</th><th>Time</th></tr>\n<tr><td>I</td><td>buy</td><td>bread</td><td>at the shop</td><td>every Monday</td></tr>\n<tr><td>She</td><td>works</td><td>—</td><td>at home</td><td>on Saturdays</td></tr>\n<tr><td>They</td><td>shop</td><td>—</td><td>here</td><td>every day</td></tr>\n</table>", "exercises": [{"q": "\"Compro pan en la tienda todos los días\" en inglés:", "a": "b", "o": ["I every day at the shop buy bread", "I buy bread at the shop every day"], "fc": "S + V + O + Lugar + Tiempo — orden correcto.", "fi": "Ese orden rompe todas las reglas básicas.", "ex": "I buy bread at the shop every day → Compro pan en la tienda todos los días"}, {"q": "\"Ella siempre está feliz\" en inglés:", "a": "a", "o": ["She is always happy", "She always is happy"], "fc": "Con \"be\": adverbio DESPUÉS.", "fi": "\"Always is\" invierte la regla del verbo be.", "ex": "She is always happy → Ella siempre está feliz"}, {"q": "\"Hoy trabajo\" en inglés:", "a": "b", "o": ["I today work", "Today, I work / I work today"], "fc": "Tiempo al INICIO o FINAL, no en el medio.", "fi": "\"I today work\" pone el tiempo en el medio — incorrecto.", "ex": "Today, I work → Hoy trabajo", "tip": "Time = start or end"}, {"q": "\"A menudo vamos al supermercado\" en inglés:", "a": "b", "o": ["We go to the supermarket often", "We often go to the supermarket"], "fc": "Frecuencia en el medio — antes del verbo.", "fi": "Aunque suena natural en español, en inglés \"often\" va mejor en el medio.", "ex": "We often go to the supermarket → A menudo vamos al supermercado"}, {"q": "\"Está siempre ocupado\" en inglés:", "a": "a", "o": ["He is always busy", "He always is busy"], "fc": "Verbo \"be\" + adverbio DESPUÉS.", "fi": "\"Always is\" invierte el orden correcto.", "ex": "He is always busy → Él siempre está ocupado"}]}, {"icon": "✨", "title": "Práctica Final", "html": "<div class=\"section-label\">Paso 5</div>\n<div class=\"section-title\">Paso 5: ✨ Práctica Final</div>\n<div class=\"formula-box\">✅ <span class=\"g-subj\">Subject</span> + <span class=\"g-verb\">Verb</span> + <span class=\"g-comp\">Object</span> + <b>Place</b> + <b>Time</b><br>✅ <span class=\"g-subj\">Subject</span> + <b>frequency</b> + <span class=\"g-verb\">verb</span><br>✅ <span class=\"g-subj\">Subject</span> + <span class=\"g-verb\">be</span> + <b>frequency</b> + ...</div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">🏦</div><div><div class=\"en\"><span class=\"g-subj\">I</span> <b>always</b> <span class=\"g-verb\">work</span> <span class=\"g-comp\">at the bank</span> on weekdays.</div><div class=\"es\">Siempre trabajo en el banco entre semana.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">🛍️</div><div><div class=\"en\"><span class=\"g-subj\">She</span> <span class=\"g-verb\">buys</span> <span class=\"g-comp\">clothes</span> at the mall every Saturday.</div><div class=\"es\">Ella compra ropa en el centro comercial cada sábado.</div></div></div>\n<div class=\"ex-row ex-right\"><div class=\"icon\">⏰</div><div><div class=\"en\"><span class=\"g-subj\">He</span> <span class=\"g-verb\">is</span> <b>never</b> <span class=\"g-comp\">late</span>.</div><div class=\"es\">Él nunca llega tarde.</div></div></div>\n<div class=\"alert-card\"><div class=\"atitle\">⚠️ Errores Comunes</div><p>❌ \"I go always shopping\" → ✅ \"I <b>always</b> go shopping\" (frecuencia en el medio)<br>❌ \"I work every day at the bank\" → ✅ \"I work <b>at the bank every day</b>\" (lugar antes de tiempo)<br>❌ \"She always is kind\" → ✅ \"She <b>is always</b> kind\" (con be: después)</p></div>", "exercises": [{"q": "¿Cuál oración es correcta?", "a": "b", "o": ["I buy coffee at the shop often", "I often buy coffee at the shop"], "fc": "\"Often\" va en el medio, antes del verbo.", "fi": "\"Often\" al final no es estándar en A1.", "ex": "I often buy coffee at the shop → A menudo compro café en la tienda"}, {"q": "\"Trabajamos en casa los fines de semana\":", "a": "a", "o": ["We work at home on weekends", "We work on weekends at home"], "fc": "Lugar (at home) ANTES de tiempo (on weekends).", "fi": "\"On weekends at home\" invierte la regla.", "ex": "We work at home on weekends → Trabajamos en casa los fines de semana"}, {"q": "\"Ella nunca está triste\":", "a": "a", "o": ["She is never sad", "She never is sad"], "fc": "Con \"be\": adverbio DESPUÉS.", "fi": "\"Never is\" invierte la regla del verbo be.", "ex": "She is never sad → Ella nunca está triste"}, {"q": "\"Cada mañana compro el periódico\":", "a": "b", "o": ["I every morning buy the newspaper", "Every morning, I buy the newspaper"], "fc": "Tiempo al INICIO + coma, no en el medio.", "fi": "\"Every morning\" entre sujeto y verbo es incorrecto.", "ex": "Every morning, I buy the newspaper → Cada mañana compro el periódico", "tip": "Time at start needs a comma"}, {"q": "\"Compro pan en la panadería todos los días\":", "a": "a", "o": ["I buy bread at the bakery every day", "I buy every day at the bakery bread"], "fc": "Orden: S + V + O + Lugar + Tiempo.", "fi": "Ese orden rompe la secuencia básica de inglés.", "ex": "I buy bread at the bakery every day → Compro pan en la panadería todos los días"}]}]};

let curStep=0;const scores={};const answered={};

function renderStepTabs(){
var c=document.getElementById("stepTabs");c.innerHTML="";
DATA.steps.forEach(function(s,i){
var b=document.createElement("button");
b.className="step-tab"+(i===curStep?" active":"");
if(allAnswered(i)&&i!==curStep)b.classList.add("done");
b.textContent=(i+1)+". "+s.icon+" "+s.title;
b.addEventListener("click",function(){curStep=i;renderStepTabs();renderCard();document.getElementById("summaryFinal").classList.remove("show")});
c.appendChild(b);
});
}

function allAnswered(stepIdx){
for(var i=0;i<5;i++){if(!answered["s"+stepIdx+"e"+i])return false}
return true;
}

function renderCard(){
var s=DATA.steps[curStep];
var k="s"+curStep;
if(scores[k]===undefined)scores[k]=0;
var area=document.getElementById("cardArea");
area.innerHTML="";

var card=document.createElement("div");
card.className="card active";
card.innerHTML=s.html;

var exSec=document.createElement("div");
exSec.className="ex-section";
var h3=document.createElement("h3");
h3.textContent=EX_HEADER+" "+s.title;
exSec.appendChild(h3);

s.exercises.forEach(function(e,i){
var eid=k+"e"+i;
var div=document.createElement("div");
div.className="exercise";
div.id=eid;

var qDiv=document.createElement("div");
qDiv.className="exercise-q";
qDiv.innerHTML=(i+1)+". "+e.q;
div.appendChild(qDiv);

var opts=document.createElement("div");
opts.className="opts";
var btnA=document.createElement("button");
btnA.className="opt-btn";
btnA.textContent="a) "+e.o[0];
btnA.addEventListener("click",function(){chk(eid,"a",e.a)});
opts.appendChild(btnA);
var btnB=document.createElement("button");
btnB.className="opt-btn";
btnB.textContent="b) "+e.o[1];
btnB.addEventListener("click",function(){chk(eid,"b",e.a)});

div.appendChild(opts);

var fbOk=document.createElement("div");
fbOk.className="fb fb-ok";
fbOk.id="fbok-"+eid;
var correctText=e.o[e.a==="a"?0:1];

fbOkParts.push("<div class=\"fb-body\">");
fbOkParts.push("<div class=\"fb-row\"><span class=\"fb-dot\">"+ICON_CHECK+"</span><div class=\"fb-text\"><span class=\"fb-correct-answer\">"+correctText+"</span> "+DASH+" "+e.fc+"</div></div>");
fbOkParts.push("<div class=\"fb-row\"><span class=\"fb-dot\">"+ICON_BULB+"</span><div class=\"fb-text\">"+TEXT_OTHER_OPT+": "+e.fi+"</div></div>");

fbOk.innerHTML=fbOkParts.join("");
div.appendChild(fbOk);

fbBadParts.push("<div class=\"fb-body\">");
fbBadParts.push("<div class=\"fb-row\"><span class=\"fb-dot\">"+ICON_X+"</span><div class=\"fb-text\"><span class=\"fb-wrong-reason\">"+e.fi+"</span></div></div>");
fbBadParts.push("<div class=\"fb-row\"><span class=\"fb-dot\">"+ICON_CHECK+"</span><div class=\"fb-text\">"+TEXT_CORRECT_IS+" <span class=\"fb-correct-answer\">"+correctText+"</span> "+DASH+" "+e.fc+"</div></div>");
if(e.ex)fbBadParts.push("<div class=\"fb-example\">"+ICON_NOTE+" "+e.ex+"</div>");
if(e.tip)fbBadParts.push("<div class=\"fb-tip\"><strong>"+ICON_BULB+" "+TEXT_REMEMBER+":</strong> "+e.tip+"</div>");
fbBadParts.push("</div>");

div.appendChild(fbBad);

exSec.appendChild(div);

if(answered[eid]){
var btns=div.querySelectorAll(".opt-btn");
btns.forEach(function(b){b.disabled=true});
var sel=answered[eid].sel;
var correct=e.a;
if(sel===correct){
div.classList.add("correct");
btns.forEach(function(b){if(b.textContent.indexOf(sel+")")===0)b.classList.add("sel-ok")});
fbOk.classList.add("show");
}else{
div.classList.add("incorrect");
btns.forEach(function(b){
if(b.textContent.indexOf(sel+")")===0)b.classList.add("sel-bad");
if(b.textContent.indexOf(correct+")")===0)b.classList.add("show-ok");
});
fbBad.classList.add("show");
}
}
});

var sb=document.createElement("div");
sb.className="score-bar";
sb.innerHTML="<div class=\"num\" id=\"sc-"+k+"\">"+scores[k]+"/5</div><div class=\"lbl\">"+TEXT_SCORE+"</div>";
exSec.appendChild(sb);

area.appendChild(card);
}

function chk(eid,sel,correct){
if(answered[eid])return;
answered[eid]={sel:sel};
var ex=document.getElementById(eid);
var btns=ex.querySelectorAll(".opt-btn");
btns.forEach(function(b){b.disabled=true});
var k=eid.match(/s\d+/)[0];
if(sel===correct){
ex.classList.add("correct");
btns.forEach(function(b){if(b.textContent.indexOf(sel+")")===0)b.classList.add("sel-ok")});
document.getElementById("fbok-"+eid).classList.add("show");
scores[k]=(scores[k]||0)+1;
}else{
ex.classList.add("incorrect");
btns.forEach(function(b){
if(b.textContent.indexOf(sel+")")===0)b.classList.add("sel-bad");
if(b.textContent.indexOf(correct+")")===0)b.classList.add("show-ok");
});
document.getElementById("fbbad-"+eid).classList.add("show");
}
document.getElementById("sc-"+k).textContent=scores[k]+"/5";

if(allAnswered(curStep)){
renderStepTabs();
}

if(curStep===4&&allAnswered(4)){
setTimeout(function(){
var sf=document.getElementById("summaryFinal");
var sl=document.getElementById("summaryList");
sl.innerHTML=DATA.summary.map(function(s){return "<li>"+s+"</li>"}).join("");
var total=0;
for(var i=0;i<5;i++)total+=(scores["s"+i]||0);
var ts=document.getElementById("totalScore");
if(ts)ts.innerHTML="<div class=\"big\">"+total+"/25</div><div class=\"small\">"+TEXT_TOTAL+"</div>";
sf.classList.add("show");
sf.scrollIntoView({behavior:"smooth"});
},500);
}
}

renderStepTabs();renderCard();
