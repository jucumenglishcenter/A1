<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'Present Continuous',en:'Present Continuous'}, reportId:'sum-present-continuous' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">Para decir lo que pasa <b>ahora mismo</b>, en español usas «<b>estar</b> + <b>-ando/-iendo</b>»: «estoy comiendo», «está lloviendo».</div>
        <div class="art-hero"><div class="art-box"><div class="word">estoy comiendo</div><div class="role">Ahora 🕐</div><div class="desc">«Ahora estoy comiendo.»</div></div><div class="art-box"><div class="word">está lloviendo</div><div class="role">En este momento</div><div class="desc">«Mira, está lloviendo.»</div></div></div>
        ${ii('🔁','Se forma con <b>estar + gerundio</b> (-ando, -iendo): «jugando», «leyendo».')}
        ${ii('⏳','Habla de algo en proceso, no de una rutina: ahora mismo o estos días.')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «Estoy estudiando inglés este mes» o «Espera, estoy cocinando». En inglés es «to be + verbo-ing».</div>`,
      en:`<div class="gdesc">To say what is happening <b>right now</b>, Spanish uses «<b>estar</b> + <b>-ando/-iendo</b>»: «estoy comiendo», «está lloviendo».</div>
        <div class="art-hero"><div class="art-box"><div class="word">estoy comiendo</div><div class="role">Now 🕐</div><div class="desc">«Ahora estoy comiendo.»</div></div><div class="art-box"><div class="word">está lloviendo</div><div class="role">At this moment</div><div class="desc">«Mira, está lloviendo.»</div></div></div>
        ${ii('🔁','It is formed with <b>estar + gerund</b> (-ando, -iendo): «jugando», «leyendo».')}
        ${ii('⏳','It talks about something in progress, not a routine: right now or these days.')}
        <div class="gnote life">🌎 <b>From your life:</b> «Estoy estudiando inglés este mes» or «Espera, estoy cocinando». In English it\'s «to be + verb-ing».</div>`
    },
    checks:[
      { q:{es:'«Estoy comiendo» habla de algo:',en:'«Estoy comiendo» talks about something:'}, opts:{es:['Que pasa ahora','Que pasa todos los días'],en:['Happening now','Happening every day']}, correct:0, fb:{ why:{es:'Es una acción en proceso.',en:'An action in progress.'}, tip:{es:'ahora',en:'now'}} },
      { q:{es:'Se forma con:',en:'It is formed with:'}, opts:{es:['estar + gerundio','solo el verbo'],en:['estar + gerund','just the verb']}, correct:0, fb:{ why:{es:'estar + -ando/-iendo.',en:'estar + -ando/-iendo.'}, tip:{es:'estar + gerundio',en:'estar + gerund'}} },
      { q:{es:'«Está lloviendo» indica:',en:'«Está lloviendo» indicates:'}, opts:{es:['Ahora mismo','Mañana'],en:['Right now','Tomorrow']}, correct:0, fb:{ why:{es:'Acción en este momento.',en:'Action at this moment.'}, tip:{es:'en este momento',en:'at this moment'}} },
      { q:{es:'El gerundio de «jugar» es:',en:'The gerund of «jugar» is:'}, opts:{es:['jugando','jugado'],en:['jugando','jugado']}, correct:0, fb:{ why:{es:'-ando → jugando.',en:'-ando → jugando.'}, tip:{es:'-ando/-iendo',en:'-ando/-iendo'}} },
      { q:{es:'¿Rutina o acción en proceso?',en:'Routine or action in progress?'}, opts:{es:['Acción en proceso','Rutina'],en:['Action in progress','Routine']}, correct:0, fb:{ why:{es:'Algo que ocurre ahora.',en:'Something happening now.'}, tip:{es:'en proceso',en:'in progress'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">¡Casi igual! El inglés usa <b>am/is/are + verbo-ing</b>. «estar» = am/is/are y «-ando/-iendo» = «-ing».</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">Español</span>Estoy comiendo</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">English</span>I <b>am eating</b></div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">Español</span>Ella está leyendo</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">English</span>She <b>is reading</b></div></div>
        </div>
        ${eg('They <span class="tag s">are playing</span> football.','Están jugando fútbol.','ok')}
        ${eg('It <span class="tag s">is raining</span>.','Está lloviendo.','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los dos usan «estar/be + gerundio».</li><li>Los dos hablan de algo en proceso (ahora o estos días).</li><li>El gerundio inglés «-ing» es como «-ando/-iendo».</li></ul>
        <div class="gnote">👍 am/is/are + verbo-ing = estoy/estás/está + -ando. Solo cuida la ortografía del «-ing» (siguiente paso).</div>`,
      en:`<div class="gdesc">Almost the same! English uses <b>am/is/are + verb-ing</b>. «estar» = am/is/are and «-ando/-iendo» = «-ing».</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">Español</span>Estoy comiendo</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">English</span>I <b>am eating</b></div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">Español</span>Ella está leyendo</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">English</span>She <b>is reading</b></div></div>
        </div>
        ${eg('They <span class="tag s">are playing</span> football.','They are playing football.','ok')}
        ${eg('It <span class="tag s">is raining</span>.','It is raining.','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Both use «estar/be + gerund».</li><li>Both talk about something in progress (now or these days).</li><li>The English gerund «-ing» is like «-ando/-iendo».</li></ul>
        <div class="gnote">👍 am/is/are + verb-ing = estoy/estás/está + -ando. Just mind the «-ing» spelling (next step).</div>`
    },
    checks:[
      { q:{es:'«Estoy comiendo» en inglés:',en:'«Estoy comiendo» in English:'}, opts:{es:['I am eating','I eat'],en:['I am eating','I eat']}, correct:0, fb:{ why:{es:'am + verbo-ing.',en:'am + verb-ing.'}, ex:{es:'I am eating → Estoy comiendo',en:'I am eating'}, tip:{es:'be + -ing',en:'be + -ing'}} },
      { q:{es:'«Ella está leyendo» en inglés:',en:'«Ella está leyendo» in English:'}, opts:{es:['She is reading','She reads'],en:['She is reading','She reads']}, correct:0, fb:{ why:{es:'is + reading.',en:'is + reading.'}, ex:{es:'She is reading → Está leyendo',en:'She is reading'}, tip:{es:'is + -ing',en:'is + -ing'}} },
      { q:{es:'El «-ing» es como:',en:'The «-ing» is like:'}, opts:{es:['-ando/-iendo','-ado/-ido'],en:['-ando/-iendo','-ado/-ido']}, correct:0, fb:{ why:{es:'Es el gerundio.',en:'It is the gerund.'}, tip:{es:'-ing = -ando',en:'-ing = -ando'}} },
      { q:{es:'«They ___ playing.»',en:'«They ___ playing.»'}, opts:{es:['are','is'],en:['are','is']}, correct:0, fb:{ why:{es:'they → are.',en:'they → are.'}, ex:{es:'They are playing → Están jugando',en:'They are playing'}, tip:{es:'they → are',en:'they → are'}} },
      { q:{es:'Habla de algo:',en:'It talks about something:'}, opts:{es:['En proceso ahora','De todos los días'],en:['In progress now','Every day']}, correct:0, fb:{ why:{es:'Acción actual.',en:'Current action.'}, tip:{es:'ahora',en:'now'}} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">Dos cosas que cuidar: la <b>ortografía del «-ing»</b> y no confundirlo con el <b>presente simple</b> (rutina).</div>
        <table class="dtab"><tr><th>Regla del «-ing»</th><th>Ejemplo</th></tr>
          <tr><td>normal: + ing</td><td class="en">play → playing</td></tr>
          <tr><td>termina en «e»: quita la e + ing</td><td class="en">make → making</td></tr>
          <tr><td>1 vocal + 1 consonante: dobla + ing</td><td class="en">run → running</td></tr>
        </table>
        <div class="sec-label">⚠️ Continuous vs Simple</div>
        ${ii('🆚','<b>Now → continuous:</b> «I am eating now». <b>Rutina → simple:</b> «I eat every day».')}
        ${eg('Look! It <span class="tag s">is snowing</span>.','¡Mira! Está nevando. (ahora → continuous)','ok')}
        ${eg('I am eating breakfast every day.','Rutina → simple: «I eat breakfast every day».','bad')}
        <div class="gnote">📍 Señales del continuous: now, right now, at the moment, Look!, Listen!. Señales del simple: every day, usually, always.</div>`,
      en:`<div class="gdesc">Two things to watch: the <b>«-ing» spelling</b> and not confusing it with the <b>present simple</b> (routine).</div>
        <table class="dtab"><tr><th>«-ing» rule</th><th>Example</th></tr>
          <tr><td>normal: + ing</td><td class="en">play → playing</td></tr>
          <tr><td>ends in «e»: drop the e + ing</td><td class="en">make → making</td></tr>
          <tr><td>1 vowel + 1 consonant: double + ing</td><td class="en">run → running</td></tr>
        </table>
        <div class="sec-label">⚠️ Continuous vs Simple</div>
        ${ii('🆚','<b>Now → continuous:</b> «I am eating now». <b>Routine → simple:</b> «I eat every day».')}
        ${eg('Look! It <span class="tag s">is snowing</span>.','Look! It is snowing. (now → continuous)','ok')}
        ${eg('I am eating breakfast every day.','Routine → simple: «I eat breakfast every day».','bad')}
        <div class="gnote">📍 Continuous signals: now, right now, at the moment, Look!, Listen!. Simple signals: every day, usually, always.</div>`
    },
    checks:[
      { q:{es:'«-ing» de «make»:',en:'«-ing» of «make»:'}, opts:{es:['making','makeing'],en:['making','makeing']}, correct:0, fb:{ why:{es:'Termina en «e» → quita la e.',en:'Ends in «e» → drop the e.'}, ex:{es:'make → making',en:'make → making'}, tip:{es:'-e → quita la e',en:'-e → drop e'}} },
      { q:{es:'«-ing» de «run»:',en:'«-ing» of «run»:'}, opts:{es:['running','runing'],en:['running','runing']}, correct:0, fb:{ why:{es:'1 vocal + 1 consonante → dobla.',en:'1 vowel + 1 consonant → double.'}, ex:{es:'run → running',en:'run → running'}, tip:{es:'dobla la consonante',en:'double the consonant'}} },
      { q:{es:'«Look! She ___ (dance) now.» →',en:'«Look! She ___ (dance) now.» →'}, opts:{es:['is dancing','dances'],en:['is dancing','dances']}, correct:0, fb:{ why:{es:'«now / Look!» → continuous.',en:'«now / Look!» → continuous.'}, ex:{es:'She is dancing → Está bailando',en:'She is dancing'}, tip:{es:'now → continuous',en:'now → continuous'}}, tr:{es:'¡Mira! Ella está bailando ahora.',en:'Look! She is dancing now.'} },
      { q:{es:'«I ___ to school every day.» (rutina):',en:'«I ___ to school every day.» (routine):'}, opts:{es:['go','am going'],en:['go','am going']}, correct:0, fb:{ why:{es:'«every day» → simple.',en:'«every day» → simple.'}, ex:{es:'I go every day → Voy todos los días',en:'I go every day'}, tip:{es:'every day → simple',en:'every day → simple'}}, tr:{es:'Voy a la escuela todos los días.',en:'I go to school every day.'} },
      { q:{es:'Señal de present continuous:',en:'Present continuous signal:'}, opts:{es:['right now','every day'],en:['right now','every day']}, correct:0, fb:{ why:{es:'«right now» → continuous.',en:'«right now» → continuous.'}, tip:{es:'now → continuous',en:'now → continuous'}} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">La estructura completa:</div>
        <div class="fbox"><div class="frm"><span class="pill s">Sujeto</span><span class="plus">+</span><span class="pill v">am/is/are</span><span class="plus">+</span><span class="pill o">verbo-ing</span></div><div class="fex"><span class="s">She</span> <span class="v">is</span> <span class="o">reading</span>. — Ella está leyendo.</div></div>
        ${ii('🧠','<b>Tip 1 — No olvides el «be»:</b> «I am eating», no «I eating».')}
        ${ii('🔤','<b>Tip 2 — Ortografía:</b> +ing · quita la «e» (make→making) · dobla (run→running).')}
        ${ii('🚫','<b>Tip 3 — Verbos de estado</b> (like, want, know, have=tener) casi no van en -ing: «I want» (no «I am wanting»).')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «She reading» → ✅ «She <b>is</b> reading».<br>❌ «I am liking it» → ✅ «I <b>like</b> it».</p></div>`,
      en:`<div class="gdesc">The full structure:</div>
        <div class="fbox"><div class="frm"><span class="pill s">Subject</span><span class="plus">+</span><span class="pill v">am/is/are</span><span class="plus">+</span><span class="pill o">verb-ing</span></div><div class="fex"><span class="s">She</span> <span class="v">is</span> <span class="o">reading</span>. — Ella está leyendo.</div></div>
        ${ii('🧠','<b>Tip 1 — Don\'t forget the «be»:</b> «I am eating», not «I eating».')}
        ${ii('🔤','<b>Tip 2 — Spelling:</b> +ing · drop the «e» (make→making) · double (run→running).')}
        ${ii('🚫','<b>Tip 3 — State verbs</b> (like, want, know, have=own) rarely go in -ing: «I want» (not «I am wanting»).')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «She reading» → ✅ «She <b>is</b> reading».<br>❌ «I am liking it» → ✅ «I <b>like</b> it».</p></div>`
    },
    checks:[
      { q:{es:'¿Cuál está bien?',en:'Which one is right?'}, opts:{es:['She is working','She working'],en:['She is working','She working']}, correct:0, fb:{ why:{es:'Necesita «is».',en:'It needs «is».'}, ex:{es:'She is working → Está trabajando',en:'She is working'}, tip:{es:'be + -ing',en:'be + -ing'}} },
      { q:{es:'«-ing» de «write»:',en:'«-ing» of «write»:'}, opts:{es:['writing','writeing'],en:['writing','writeing']}, correct:0, fb:{ why:{es:'Quita la «e».',en:'Drop the «e».'}, ex:{es:'write → writing',en:'write → writing'}, tip:{es:'-e → quita',en:'-e → drop'}} },
      { q:{es:'«I ___ this song.» (gustar, estado):',en:'«I ___ this song.» (like, state):'}, opts:{es:['like','am liking'],en:['like','am liking']}, correct:0, fb:{ why:{es:'«like» es de estado → no va en -ing.',en:'«like» is a state verb → no -ing.'}, ex:{es:'I like this song → Me gusta esta canción',en:'I like this song'}, tip:{es:'estado → sin -ing',en:'state → no -ing'}} },
      { q:{es:'«We ___ TV right now.»',en:'«We ___ TV right now.»'}, opts:{es:['are watching','watch'],en:['are watching','watch']}, correct:0, fb:{ why:{es:'«right now» → continuous.',en:'«right now» → continuous.'}, ex:{es:'We are watching TV → Estamos viendo tele',en:'We are watching TV'}, tip:{es:'now → continuous',en:'now → continuous'}}, tr:{es:'Estamos viendo tele ahora mismo.',en:'We are watching TV right now.'} },
      { q:{es:'«-ing» de «sit»:',en:'«-ing» of «sit»:'}, opts:{es:['sitting','siting'],en:['sitting','siting']}, correct:0, fb:{ why:{es:'1 vocal + 1 consonante → dobla.',en:'1 vowel + 1 consonant → double.'}, ex:{es:'sit → sitting',en:'sit → sitting'}, tip:{es:'dobla',en:'double'}} }
    ] },
  { icon:'✨', title:{es:'Práctica Final',en:'Final Practice'}, builder:true,
    html:{
      es:`<div class="gdesc">Junta todo: am/is/are + verbo-ing, para acciones de ahora. Arma la oración.</div>
        <div class="cboxes"><div class="cbox s"><span class="cl">am</span><span class="cv">I</span></div><div class="cbox o"><span class="cl">is</span><span class="cv">He · She · It</span></div><div class="cbox p"><span class="cl">are</span><span class="cv">You · We · They</span></div></div>
        <div class="sec-label">Las reglas en una oración</div>
        ${eg('I <span class="tag s">am studying</span> now.','Estoy estudiando ahora.','ok')}
        ${eg('She <span class="tag s">is cooking</span> dinner.','Ella está cocinando la cena.','ok')}
        ${eg('They <b style="color:#7B1FA2">are running</b> in the park.','Están corriendo en el parque.','ok')}
        <div class="alert-card"><div class="atitle">⚠️ Los 3 errores más comunes</div><p>❌ «She reading» → ✅ «She <b>is</b> reading»<br>❌ «I am study» → ✅ «I am <b>studying</b>»<br>❌ «I am wanting» → ✅ «I <b>want</b>»</p></div>`,
      en:`<div class="gdesc">Put it together: am/is/are + verb-ing, for actions happening now. Build the sentence.</div>
        <div class="cboxes"><div class="cbox s"><span class="cl">am</span><span class="cv">I</span></div><div class="cbox o"><span class="cl">is</span><span class="cv">He · She · It</span></div><div class="cbox p"><span class="cl">are</span><span class="cv">You · We · They</span></div></div>
        <div class="sec-label">The rules in one sentence</div>
        ${eg('I <span class="tag s">am studying</span> now.','I am studying now.','ok')}

function say(text,acc){ try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=.82; const vs=speechSynthesis.getVoices()||[]; const want=acc==='US'?'en-US':'en-GB'; const v=vs.find(x=>x.lang===want)||vs.find(x=>x.lang&&x.lang.indexOf('en')===0); if(v){u.voice=v;u.lang=v.lang;}else u.lang=want; speechSynthesis.speak(u); }catch(e){} }
function render(){ cur=0; coreDone=false; doneSteps=new Array(STEPS.length).fill(false); answers=STEPS.map(s=>new Array(s.checks.length).fill(null)); bState={order:[],locked:false};

function applyLang(){ const t=L();

  document.getElementById('mhtitle').textContent=MAT.title[info]; document.getElementById('mhsub').textContent=document.getElementById('screen').getAttribute('data-level').toUpperCase().replace('-',' · ')+' · '+MAT.subtitle[info];

function renderStep(){ const t=L(), s=STEPS[cur]; curLab= info==='es'?'EJEMPLO':'EXAMPLE';

  const ansd=answers[cur].filter(x=>x!==null).length;

function finish(){ const t=L(); document.getElementById('mbody').style.display='none'; document.getElementById('results').classList.add('show');
