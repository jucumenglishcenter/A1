        · REGLA «el español se queda en español»: cuando el texto MENCIONA una palabra española o da un
          EJEMPLO en español (p. ej. el paso 1 «Repaso en Español»: «Él», «Ella», «Nosotros», «Juan… Él…»),
          en el lado en:'' repite esas palabras/ejemplos TAL CUAL en español; solo traduce la prosa que los rodea.
        · 'tr' (botón 🌐 traducción por pregunta): ponlo SOLO en auto-chequeos donde una oración en inglés
          tenga vocabulario que pueda frenar al alumno Y la traducción NO delate la respuesta. En drills de

<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'Adverbios de Frecuencia',en:'Adverbs of Frequency'}, reportId:'sum-adverbs-frequency' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">Para decir <b>cada cuánto</b> haces algo, usas palabras como «<b>siempre</b>», «<b>normalmente</b>», «<b>a veces</b>», «<b>nunca</b>».</div>
        <div class="art-hero three"><div class="art-box"><div class="word">siempre</div><div class="role">100%</div><div class="desc">«Siempre desayuno.»</div></div><div class="art-box"><div class="word">a veces</div><div class="role">~50%</div><div class="desc">«A veces salgo.»</div></div><div class="art-box"><div class="word">nunca</div><div class="role">0%</div><div class="desc">«Nunca fumo.»</div></div></div>
        ${ii('📊','Forman una escala: siempre → normalmente → a menudo → a veces → casi nunca → nunca.')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «Siempre me levanto temprano y a veces salgo a correr». En inglés estas palabras tienen un lugar fijo en la oración.</div>`,
      en:`<div class="gdesc">To say <b>how often</b> you do something, you use words like «<b>siempre</b>», «<b>normalmente</b>», «<b>a veces</b>», «<b>nunca</b>».</div>
        <div class="art-hero three"><div class="art-box"><div class="word">siempre</div><div class="role">100%</div><div class="desc">«Siempre desayuno.»</div></div><div class="art-box"><div class="word">a veces</div><div class="role">~50%</div><div class="desc">«A veces salgo.»</div></div><div class="art-box"><div class="word">nunca</div><div class="role">0%</div><div class="desc">«Nunca fumo.»</div></div></div>
        ${ii('📊','They form a scale: siempre → normalmente → a menudo → a veces → casi nunca → nunca.')}
        <div class="gnote life">🌎 <b>From your life:</b> «Siempre me levanto temprano y a veces salgo a correr». In English these words have a fixed place in the sentence.</div>`
    },
    checks:[
      { q:{es:'«Siempre» indica:',en:'«Siempre» indicates:'}, opts:{es:['100% de las veces','Casi nunca'],en:['100% of the time','Almost never']}, correct:0, fb:{ why:{es:'«Siempre» = todas las veces.',en:'«Siempre» = all the time.'}, tip:{es:'siempre = 100%',en:'siempre = 100%'}} },
      { q:{es:'«Nunca» indica:',en:'«Nunca» indicates:'}, opts:{es:['0% de las veces','La mitad'],en:['0% of the time','Half']}, correct:0, fb:{ why:{es:'«Nunca» = ninguna vez.',en:'«Nunca» = never.'}, tip:{es:'nunca = 0%',en:'nunca = 0%'}} },
      { q:{es:'«A veces» está:',en:'«A veces» is:'}, opts:{es:['En medio de la escala','En el 100%'],en:['In the middle of the scale','At 100%']}, correct:0, fb:{ why:{es:'Es una frecuencia media.',en:'A medium frequency.'}, tip:{es:'~50%',en:'~50%'}} },
      { q:{es:'Estas palabras dicen:',en:'These words tell:'}, opts:{es:['Cada cuánto pasa algo','Dónde pasa'],en:['How often something happens','Where it happens']}, correct:0, fb:{ why:{es:'Indican frecuencia.',en:'They show frequency.'}, tip:{es:'frecuencia',en:'frequency'}} },
      { q:{es:'Ordena de más a menos:',en:'Order from most to least:'}, opts:{es:['siempre → a veces → nunca','nunca → siempre → a veces'],en:['siempre → a veces → nunca','nunca → siempre → a veces']}, correct:0, fb:{ why:{es:'100% → 50% → 0%.',en:'100% → 50% → 0%.'}, tip:{es:'100→0',en:'100→0'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés tiene la misma escala de frecuencia, palabra por palabra.</div>
        <div class="viz-grid"><div class="viz-item"><span class="ico">💯</span><span class="lbl">always</span><span class="es">siempre</span></div><div class="viz-item"><span class="ico">🔆</span><span class="lbl">usually</span><span class="es">normalmente</span></div><div class="viz-item"><span class="ico">📈</span><span class="lbl">often</span><span class="es">a menudo</span></div><div class="viz-item"><span class="ico">🔁</span><span class="lbl">sometimes</span><span class="es">a veces</span></div><div class="viz-item"><span class="ico">🌙</span><span class="lbl">rarely</span><span class="es">rara vez</span></div><div class="viz-item"><span class="ico">🚫</span><span class="lbl">never</span><span class="es">nunca</span></div></div>
        ${eg('I <span class="tag s">always</span> have breakfast.','Siempre desayuno.','ok')}
        ${eg('She <span class="tag s">sometimes</span> walks to work.','Ella a veces camina al trabajo.','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los dos tienen una escala de 100% a 0%.</li><li>Las palabras significan casi exactamente lo mismo.</li><li>Los dos las usan para hablar de rutinas (presente simple).</li></ul>
        <div class="gnote">👍 always, usually, often, sometimes, rarely, never. Lo nuevo es DÓNDE colocarlas (siguiente paso).</div>`,
      en:`<div class="gdesc">English has the same frequency scale, word by word.</div>
        <div class="viz-grid"><div class="viz-item"><span class="ico">💯</span><span class="lbl">always</span><span class="es">siempre</span></div><div class="viz-item"><span class="ico">🔆</span><span class="lbl">usually</span><span class="es">normalmente</span></div><div class="viz-item"><span class="ico">📈</span><span class="lbl">often</span><span class="es">a menudo</span></div><div class="viz-item"><span class="ico">🔁</span><span class="lbl">sometimes</span><span class="es">a veces</span></div><div class="viz-item"><span class="ico">🌙</span><span class="lbl">rarely</span><span class="es">rara vez</span></div><div class="viz-item"><span class="ico">🚫</span><span class="lbl">never</span><span class="es">nunca</span></div></div>
        ${eg('I <span class="tag s">always</span> have breakfast.','I always have breakfast.','ok')}
        ${eg('She <span class="tag s">sometimes</span> walks to work.','She sometimes walks to work.','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Both have a scale from 100% to 0%.</li><li>The words mean almost exactly the same.</li><li>Both use them to talk about routines (present simple).</li></ul>
        <div class="gnote">👍 always, usually, often, sometimes, rarely, never. The new part is WHERE to place them (next step).</div>`
    },
    checks:[
      { q:{es:'«always» = ',en:'«always» = '}, opts:{es:['siempre','nunca'],en:['siempre','nunca']}, correct:0, fb:{ why:{es:'always = siempre.',en:'always = siempre.'}, tip:{es:'always = siempre',en:'always = siempre'}} },
      { q:{es:'«never» = ',en:'«never» = '}, opts:{es:['nunca','a veces'],en:['nunca','a veces']}, correct:0, fb:{ why:{es:'never = nunca.',en:'never = nunca.'}, tip:{es:'never = nunca',en:'never = nunca'}} },
      { q:{es:'«usually» = ',en:'«usually» = '}, opts:{es:['normalmente','rara vez'],en:['normalmente','rara vez']}, correct:0, fb:{ why:{es:'usually = normalmente.',en:'usually = normalmente.'}, tip:{es:'usually = normalmente',en:'usually = normalmente'}} },
      { q:{es:'«sometimes» = ',en:'«sometimes» = '}, opts:{es:['a veces','siempre'],en:['a veces','siempre']}, correct:0, fb:{ why:{es:'sometimes = a veces.',en:'sometimes = a veces.'}, tip:{es:'sometimes = a veces',en:'sometimes = a veces'}} },
      { q:{es:'Se usan sobre todo con:',en:'They are used mostly with:'}, opts:{es:['Rutinas (presente simple)','El pasado'],en:['Routines (present simple)','The past']}, correct:0, fb:{ why:{es:'Hábitos del presente.',en:'Present habits.'}, tip:{es:'rutinas',en:'routines'}} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">La regla de oro de la posición: el adverbio va <b>ANTES del verbo principal</b>, pero <b>DESPUÉS del verbo «be»</b>.</div>
        <table class="dtab"><tr><th>Caso</th><th>Posición</th><th>Ejemplo</th></tr>
          <tr><td>verbo normal</td><td class="en">antes del verbo</td><td>I <b>always</b> eat</td></tr>
          <tr><td>verbo «be»</td><td class="en">después de be</td><td>I am <b>always</b> late</td></tr>
        </table>
        <div class="sec-label">⚠️ «be» rompe la regla</div>
        ${ii('🔄','Con todos los verbos: «She <b>often</b> works». Pero con «be» va después: «She is <b>often</b> tired».')}
        ${eg('She <span class="tag s">never</span> drinks coffee.','Ella nunca toma café. (antes del verbo)','ok')}
        ${eg('He is <span class="tag s">always</span> happy.','Él siempre está feliz. (después de «is»)','ok')}
        ${eg('She drinks never coffee.','Va antes del verbo: «She never drinks coffee».','bad')}
        <div class="gnote">📍 Regla: <b>sujeto + adverbio + verbo</b> · pero <b>sujeto + be + adverbio</b>.</div>`,
      en:`<div class="gdesc">The golden rule of position: the adverb goes <b>BEFORE the main verb</b>, but <b>AFTER the verb «be»</b>.</div>
        <table class="dtab"><tr><th>Case</th><th>Position</th><th>Example</th></tr>
          <tr><td>normal verb</td><td class="en">before the verb</td><td>I <b>always</b> eat</td></tr>
          <tr><td>verb «be»</td><td class="en">after be</td><td>I am <b>always</b> late</td></tr>
        </table>
        <div class="sec-label">⚠️ «be» breaks the rule</div>
        ${ii('🔄','With all verbs: «She <b>often</b> works». But with «be» it goes after: «She is <b>often</b> tired».')}
        ${eg('She <span class="tag s">never</span> drinks coffee.','She never drinks coffee. (before the verb)','ok')}
        ${eg('He is <span class="tag s">always</span> happy.','He is always happy. (after «is»)','ok')}
        ${eg('She drinks never coffee.','It goes before the verb: «She never drinks coffee».','bad')}
        <div class="gnote">📍 Rule: <b>subject + adverb + verb</b> · but <b>subject + be + adverb</b>.</div>`
    },
    checks:[
      { q:{es:'«I ___ go to bed late.» (a veces):',en:'«I ___ go to bed late.» (sometimes):'}, opts:{es:['sometimes','—'],en:['sometimes','—']}, correct:0, fb:{ why:{es:'El adverbio va antes del verbo «go».',en:'The adverb goes before the verb «go».'}, ex:{es:'I sometimes go to bed late → A veces me acuesto tarde',en:'I sometimes go to bed late'}, tip:{es:'antes del verbo',en:'before the verb'}} },
      { q:{es:'¿Cuál está bien (verbo normal)?',en:'Which is right (normal verb)?'}, opts:{es:['She always helps','She helps always'],en:['She always helps','She helps always']}, correct:0, fb:{ why:{es:'Antes del verbo: always helps.',en:'Before the verb: always helps.'}, ex:{es:'She always helps → Siempre ayuda',en:'She always helps'}, tip:{es:'adverbio + verbo',en:'adverb + verb'}} },
      { q:{es:'«He ___ late.» con «is» (siempre):',en:'«He ___ late.» with «is» (always):'}, opts:{es:['is always','always is'],en:['is always','always is']}, correct:0, fb:{ why:{es:'Con «be» el adverbio va después.',en:'With «be» the adverb goes after.'}, ex:{es:'He is always late → Siempre llega tarde',en:'He is always late'}, tip:{es:'be + adverbio',en:'be + adverb'}} },
      { q:{es:'¿Cuál está bien?',en:'Which one is right?'}, opts:{es:['They are usually busy','They usually are busy'],en:['They are usually busy','They usually are busy']}, correct:0, fb:{ why:{es:'Con «are» el adverbio va después.',en:'With «are» the adverb goes after.'}, ex:{es:'They are usually busy → Normalmente están ocupados',en:'They are usually busy'}, tip:{es:'be + adverbio',en:'be + adverb'}} },
      { q:{es:'«She ___ eats meat.» (nunca):',en:'«She ___ eats meat.» (never):'}, opts:{es:['never','—'],en:['never','—']}, correct:0, fb:{ why:{es:'Antes del verbo «eats».',en:'Before the verb «eats».'}, ex:{es:'She never eats meat → Nunca come carne',en:'She never eats meat'}, tip:{es:'antes del verbo',en:'before the verb'}} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">Las dos posiciones, claras:</div>
        <div class="fbox"><div class="frm"><span class="pill s">Sujeto</span><span class="plus">+</span><span class="pill v">adverbio</span><span class="plus">+</span><span class="pill o">verbo</span></div><div class="fex"><span class="s">I</span> <span class="v">always</span> <span class="o">walk</span>. — Siempre camino.</div></div>
        <div class="fbox"><div class="frm"><span class="pill s">Sujeto</span><span class="plus">+</span><span class="pill o">be</span><span class="plus">+</span><span class="pill v">adverbio</span></div><div class="fex"><span class="s">I</span> <span class="o">am</span> <span class="v">always</span> tired. — Siempre estoy cansado.</div></div>
        ${ii('🧠','<b>Tip 1 — La regla:</b> antes del verbo normal, después de «be».')}
        ${ii('🗣️','<b>Tip 2 — sometimes y usually</b> también pueden ir al inicio: «Sometimes I cook».')}
        ${ii('🚫','<b>Tip 3 — «never» ya es negativo:</b> no lo mezcles con «don\'t»: «I never eat» (no «I don\'t never eat»).')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «I eat always rice» → ✅ «I <b>always eat</b> rice».</p></div>`,
      en:`<div class="gdesc">The two positions, clear:</div>
        <div class="fbox"><div class="frm"><span class="pill s">Subject</span><span class="plus">+</span><span class="pill v">adverb</span><span class="plus">+</span><span class="pill o">verb</span></div><div class="fex"><span class="s">I</span> <span class="v">always</span> <span class="o">walk</span>. — Siempre camino.</div></div>
        <div class="fbox"><div class="frm"><span class="pill s">Subject</span><span class="plus">+</span><span class="pill o">be</span><span class="plus">+</span><span class="pill v">adverb</span></div><div class="fex"><span class="s">I</span> <span class="o">am</span> <span class="v">always</span> tired. — Siempre estoy cansado.</div></div>
        ${ii('🧠','<b>Tip 1 — The rule:</b> before a normal verb, after «be».')}
        ${ii('🗣️','<b>Tip 2 — sometimes and usually</b> can also go at the start: «Sometimes I cook».')}
        ${ii('🚫','<b>Tip 3 — «never» is already negative:</b> don\'t mix it with «don\'t»: «I never eat» (not «I don\'t never eat»).')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «I eat always rice» → ✅ «I <b>always eat</b> rice».</p></div>`
    },
    checks:[
      { q:{es:'¿Cuál está bien?',en:'Which one is right?'}, opts:{es:['I always eat rice','I eat always rice'],en:['I always eat rice','I eat always rice']}, correct:0, fb:{ why:{es:'Antes del verbo.',en:'Before the verb.'}, ex:{es:'I always eat rice → Siempre como arroz',en:'I always eat rice'}, tip:{es:'adverbio + verbo',en:'adverb + verb'}} },
      { q:{es:'«We ___ at home in the evening.» con «are» (normalmente):',en:'«We ___ at home in the evening.» with «are» (usually):'}, opts:{es:['are usually','usually are'],en:['are usually','usually are']}, correct:0, fb:{ why:{es:'Con «are» va después.',en:'With «are» it goes after.'}, ex:{es:'We are usually at home → Normalmente estamos en casa',en:'We are usually at home'}, tip:{es:'be + adverbio',en:'be + adverb'}} },
      { q:{es:'«___ I take the bus.» (a veces, al inicio):',en:'«___ I take the bus.» (sometimes, at the start):'}, opts:{es:['Sometimes','Never'],en:['Sometimes','Never']}, correct:0, fb:{ why:{es:'«Sometimes» puede ir al inicio.',en:'«Sometimes» can go at the start.'}, ex:{es:'Sometimes I take the bus → A veces tomo el bus',en:'Sometimes I take the bus'}, tip:{es:'sometimes → puede ir al inicio',en:'sometimes → can start'}} },
      { q:{es:'¿Cuál está bien?',en:'Which one is right?'}, opts:{es:['I never smoke','I don\'t never smoke'],en:['I never smoke','I don\'t never smoke']}, correct:0, fb:{ why:{es:'«never» ya es negativo.',en:'«never» is already negative.'}, ex:{es:'I never smoke → Nunca fumo',en:'I never smoke'}, tip:{es:'never solo',en:'never alone'}} },
      { q:{es:'«He ___ reads books.» (a menudo):',en:'«He ___ reads books.» (often):'}, opts:{es:['often','—'],en:['often','—']}, correct:0, fb:{ why:{es:'Antes del verbo «reads».',en:'Before the verb «reads».'}, ex:{es:'He often reads → A menudo lee',en:'He often reads'}, tip:{es:'antes del verbo',en:'before the verb'}} }
    ] },
  { icon:'✨', title:{es:'Práctica Final',en:'Final Practice'}, builder:true,
    html:{
      es:`<div class="gdesc">Junta todo: adverbio antes del verbo normal, después de «be». Arma la oración.</div>
        <div class="cboxes"><div class="cbox s"><span class="cl">Escala</span><span class="cv">always · usually · often · sometimes · rarely · never</span></div><div class="cbox o"><span class="cl">Verbo normal</span><span class="cv">antes: I always eat</span></div><div class="cbox p"><span class="cl">Verbo be</span><span class="cv">después: I am always late</span></div></div>
        <div class="sec-label">Las reglas en una oración</div>
