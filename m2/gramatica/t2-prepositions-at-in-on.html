<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'Preposiciones de Tiempo (at / in / on)',en:'Prepositions of Time (at / in / on)'}, reportId:'sum-prepositions' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">En español usas pequeñas palabras para ubicar el tiempo: «<b>a</b> las 5», «<b>en</b> mayo», «<b>el</b> lunes». Son las preposiciones de tiempo.</div>
        <div class="art-hero three"><div class="art-box"><div class="word">a</div><div class="role">Hora</div><div class="desc">«a las 5», «a la una».</div></div><div class="art-box"><div class="word">en</div><div class="role">Mes/año</div><div class="desc">«en mayo», «en 2020».</div></div><div class="art-box"><div class="word">el</div><div class="role">Día</div><div class="desc">«el lunes», «el 5 de mayo».</div></div></div>
        ${ii('🕐','Cada tipo de tiempo (hora, día, mes) pide su propia palabra.')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «Trabajo a las 8, los lunes, en enero». En inglés esas tres palabras son at / on / in, y cada una tiene su uso fijo.</div>`,
      en:`<div class="gdesc">In Spanish you use small words to place time: «<b>a</b> las 5», «<b>en</b> mayo», «<b>el</b> lunes». They are the prepositions of time.</div>
        <div class="art-hero three"><div class="art-box"><div class="word">a</div><div class="role">Time</div><div class="desc">«a las 5», «a la una».</div></div><div class="art-box"><div class="word">en</div><div class="role">Month/year</div><div class="desc">«en mayo», «en 2020».</div></div><div class="art-box"><div class="word">el</div><div class="role">Day</div><div class="desc">«el lunes», «el 5 de mayo».</div></div></div>
        ${ii('🕐','Each kind of time (hour, day, month) asks for its own word.')}
        <div class="gnote life">🌎 <b>From your life:</b> «Trabajo a las 8, los lunes, en enero». In English those three words are at / on / in, and each has its fixed use.</div>`
    },
    checks:[
      { q:{es:'«a las 5» — «a» marca:',en:'«a las 5» — «a» marks:'}, opts:{es:['Una hora','Un mes'],en:['A time','A month']}, correct:0, fb:{ why:{es:'«a» va con horas.',en:'«a» goes with times.'}, tip:{es:'a + hora',en:'a + time'}} },
      { q:{es:'«en mayo» — «en» marca:',en:'«en mayo» — «en» marks:'}, opts:{es:['Un mes','Un día'],en:['A month','A day']}, correct:0, fb:{ why:{es:'«en» va con meses/años.',en:'«en» goes with months/years.'}, tip:{es:'en + mes',en:'en + month'}} },
      { q:{es:'«el lunes» se refiere a:',en:'«el lunes» refers to:'}, opts:{es:['Un día','Una hora'],en:['A day','A time']}, correct:0, fb:{ why:{es:'Es un día de la semana.',en:'A day of the week.'}, tip:{es:'día',en:'day'}} },
      { q:{es:'Cada tipo de tiempo:',en:'Each kind of time:'}, opts:{es:['Pide su propia palabra','Usa la misma siempre'],en:['Asks for its own word','Uses the same always']}, correct:0, fb:{ why:{es:'Hora, día y mes tienen palabras distintas.',en:'Hour, day and month have different words.'}, tip:{es:'cada uno su palabra',en:'each its word'}} },
      { q:{es:'«en 2020» — «en» marca:',en:'«en 2020» — «en» marks:'}, opts:{es:['Un año','Un día'],en:['A year','A day']}, correct:0, fb:{ why:{es:'«en» va con años.',en:'«en» goes with years.'}, tip:{es:'en + año',en:'en + year'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés también tiene tres palabras de tiempo: <b>at</b>, <b>on</b>, <b>in</b>. Cada una para un tamaño de tiempo.</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">a las 5</span>a las 5</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">at</span><b>at</b> 5 o'clock</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">el lunes</span>el lunes</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">on</span><b>on</b> Monday</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">en mayo</span>en mayo</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">in</span><b>in</b> May</div></div>
        </div>
        ${eg('I wake up <span class="tag s">at</span> 7.','Me levanto a las 7.','ok')}
        ${eg('We meet <span class="tag s">on</span> Friday.','Nos vemos el viernes.','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los dos tienen palabras distintas según el tipo de tiempo.</li><li>Los dos las ponen antes del dato de tiempo.</li><li>La lógica es parecida: hora pequeña → palabra pequeña.</li></ul>
        <div class="gnote">👍 at = hora · on = día · in = mes/año. Solo memoriza el reparto (siguiente paso).</div>`,
      en:`<div class="gdesc">English also has three time words: <b>at</b>, <b>on</b>, <b>in</b>. Each for a size of time.</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">a las 5</span>a las 5</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">at</span><b>at</b> 5 o'clock</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">el lunes</span>el lunes</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">on</span><b>on</b> Monday</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">en mayo</span>en mayo</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">in</span><b>in</b> May</div></div>
        </div>
        ${eg('I wake up <span class="tag s">at</span> 7.','I wake up at 7.','ok')}
        ${eg('We meet <span class="tag s">on</span> Friday.','We meet on Friday.','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Both have different words by the kind of time.</li><li>Both put them before the time detail.</li><li>The logic is similar: small time → small word.</li></ul>
        <div class="gnote">👍 at = hour · on = day · in = month/year. Just memorize the split (next step).</div>`
    },
    checks:[
      { q:{es:'«a las 5» en inglés:',en:'«a las 5» in English:'}, opts:{es:['at 5','in 5'],en:['at 5','in 5']}, correct:0, fb:{ why:{es:'Hora → at.',en:'Hour → at.'}, ex:{es:'at 5 → a las 5',en:'at 5'}, tip:{es:'hora → at',en:'hour → at'}} },
      { q:{es:'«el lunes» en inglés:',en:'«el lunes» in English:'}, opts:{es:['on Monday','in Monday'],en:['on Monday','in Monday']}, correct:0, fb:{ why:{es:'Día → on.',en:'Day → on.'}, ex:{es:'on Monday → el lunes',en:'on Monday'}, tip:{es:'día → on',en:'day → on'}} },
      { q:{es:'«en mayo» en inglés:',en:'«en mayo» in English:'}, opts:{es:['in May','on May'],en:['in May','on May']}, correct:0, fb:{ why:{es:'Mes → in.',en:'Month → in.'}, ex:{es:'in May → en mayo',en:'in May'}, tip:{es:'mes → in',en:'month → in'}} },
      { q:{es:'«at» se usa para:',en:'«at» is used for:'}, opts:{es:['Horas','Meses'],en:['Hours','Months']}, correct:0, fb:{ why:{es:'at + hora.',en:'at + hour.'}, tip:{es:'at = hora',en:'at = hour'}} },
      { q:{es:'«in» se usa para:',en:'«in» is used for:'}, opts:{es:['Meses y años','Horas'],en:['Months and years','Hours']}, correct:0, fb:{ why:{es:'in + mes/año.',en:'in + month/year.'}, tip:{es:'in = mes/año',en:'in = month/year'}} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">El reparto exacto, con sus casos especiales que el español no marca igual.</div>
        <table class="dtab"><tr><th>Palabra</th><th>Para…</th><th>Ejemplos</th></tr>
          <tr><td class="en">at</td><td>horas y momentos puntuales</td><td>at 5, at noon, at night, at the weekend</td></tr>
          <tr><td class="en">on</td><td>días y fechas</td><td>on Monday, on May 5th, on my birthday</td></tr>
          <tr><td class="en">in</td><td>meses, años, estaciones y partes del día</td><td>in May, in 2020, in summer, in the morning</td></tr>
        </table>
        <div class="sec-label">⚠️ Ojo con estos</div>
        ${ii('🌙','«at night» (de noche) pero «<b>in</b> the morning / afternoon / evening».')}
        ${ii('🎂','Las fechas y los cumpleaños van con <b>on</b>: «on my birthday», «on December 25th».')}
        ${eg('The party is <span class="tag s">on</span> Saturday.','La fiesta es el sábado.','ok')}
        ${eg('The party is in Saturday.','Día → on: «on Saturday».','bad')}
        <div class="gnote">📍 Truco del tamaño: at (lo más pequeño: hora) → on (día) → in (lo más grande: mes/año).</div>`,
      en:`<div class="gdesc">The exact split, with its special cases that Spanish doesn\'t mark the same.</div>
        <table class="dtab"><tr><th>Word</th><th>For…</th><th>Examples</th></tr>
          <tr><td class="en">at</td><td>hours and exact moments</td><td>at 5, at noon, at night, at the weekend</td></tr>
          <tr><td class="en">on</td><td>days and dates</td><td>on Monday, on May 5th, on my birthday</td></tr>
          <tr><td class="en">in</td><td>months, years, seasons and parts of the day</td><td>in May, in 2020, in summer, in the morning</td></tr>
        </table>
        <div class="sec-label">⚠️ Watch these</div>
        ${ii('🌙','«at night» (at night) but «<b>in</b> the morning / afternoon / evening».')}
        ${ii('🎂','Dates and birthdays take <b>on</b>: «on my birthday», «on December 25th».')}
        ${eg('The party is <span class="tag s">on</span> Saturday.','The party is on Saturday.','ok')}
        ${eg('The party is in Saturday.','Day → on: «on Saturday».','bad')}
        <div class="gnote">📍 Size trick: at (smallest: hour) → on (day) → in (biggest: month/year).</div>`
    },
    checks:[
      { q:{es:'«___ Monday» (el lunes):',en:'«___ Monday»:'}, opts:{es:['on','at'],en:['on','at']}, correct:0, fb:{ why:{es:'Día → on.',en:'Day → on.'}, ex:{es:'on Monday → el lunes',en:'on Monday'}, tip:{es:'día → on',en:'day → on'}} },
      { q:{es:'«___ night» (de noche):',en:'«___ night» (at night):'}, opts:{es:['at','in'],en:['at','in']}, correct:0, fb:{ why:{es:'«night» es excepción → at.',en:'«night» is an exception → at.'}, ex:{es:'at night → de noche',en:'at night'}, tip:{es:'at night',en:'at night'}}, tr:{es:'de noche',en:'at night'} },
      { q:{es:'«___ the morning» (en la mañana):',en:'«___ the morning» (in the morning):'}, opts:{es:['in','at'],en:['in','at']}, correct:0, fb:{ why:{es:'Partes del día → in (excepto night).',en:'Parts of the day → in (except night).'}, ex:{es:'in the morning → en la mañana',en:'in the morning'}, tip:{es:'morning → in',en:'morning → in'}}, tr:{es:'en la mañana',en:'in the morning'} },
      { q:{es:'«___ 2021» (en 2021):',en:'«___ 2021» (in 2021):'}, opts:{es:['in','on'],en:['in','on']}, correct:0, fb:{ why:{es:'Año → in.',en:'Year → in.'}, ex:{es:'in 2021 → en 2021',en:'in 2021'}, tip:{es:'año → in',en:'year → in'}} },
      { q:{es:'«___ my birthday» (en mi cumpleaños):',en:'«___ my birthday»:'}, opts:{es:['on','in'],en:['on','in']}, correct:0, fb:{ why:{es:'Fecha/cumpleaños → on.',en:'Date/birthday → on.'}, ex:{es:'on my birthday → en mi cumpleaños',en:'on my birthday'}, tip:{es:'fecha → on',en:'date → on'}} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">El truco del «tamaño» del tiempo:</div>
        <div class="fbox"><div class="frm"><span class="pill s">at</span><span class="plus">hora →</span><span class="pill v">on</span><span class="plus">día →</span><span class="pill o">in</span><span class="plus">mes/año</span></div><div class="fex"><span class="s">at</span> 7 · <span class="v">on</span> Monday · <span class="o">in</span> July</div></div>
        ${ii('🔎','<b>Tip 1 — De pequeño a grande:</b> at (hora) → on (día) → in (mes, año, estación).')}
        ${ii('📌','<b>Tip 2 — Memoriza las trampas:</b> at night · at noon · at the weekend (BrE) · in the morning.')}
        ${ii('🎯','<b>Tip 3 — Fechas completas → on:</b> on June 5th, on Monday morning.')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «in Monday» → ✅ «<b>on</b> Monday».<br>❌ «on May» → ✅ «<b>in</b> May».</p></div>`,
      en:`<div class="gdesc">The «size of time» trick:</div>
        <div class="fbox"><div class="frm"><span class="pill s">at</span><span class="plus">hour →</span><span class="pill v">on</span><span class="plus">day →</span><span class="pill o">in</span><span class="plus">month/year</span></div><div class="fex"><span class="s">at</span> 7 · <span class="v">on</span> Monday · <span class="o">in</span> July</div></div>
        ${ii('🔎','<b>Tip 1 — From small to big:</b> at (hour) → on (day) → in (month, year, season).')}
        ${ii('📌','<b>Tip 2 — Memorize the traps:</b> at night · at noon · at the weekend (BrE) · in the morning.')}
        ${ii('🎯','<b>Tip 3 — Full dates → on:</b> on June 5th, on Monday morning.')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «in Monday» → ✅ «<b>on</b> Monday».<br>❌ «on May» → ✅ «<b>in</b> May».</p></div>`
    },
    checks:[
      { q:{es:'«___ noon» (al mediodía):',en:'«___ noon» (at noon):'}, opts:{es:['at','in'],en:['at','in']}, correct:0, fb:{ why:{es:'Momento puntual → at.',en:'Exact moment → at.'}, ex:{es:'at noon → al mediodía',en:'at noon'}, tip:{es:'at noon',en:'at noon'}} },
      { q:{es:'«___ summer» (en verano):',en:'«___ summer» (in summer):'}, opts:{es:['in','on'],en:['in','on']}, correct:0, fb:{ why:{es:'Estación → in.',en:'Season → in.'}, ex:{es:'in summer → en verano',en:'in summer'}, tip:{es:'estación → in',en:'season → in'}} },
      { q:{es:'«___ December 25th» (el 25 de diciembre):',en:'«___ December 25th»:'}, opts:{es:['on','in'],en:['on','in']}, correct:0, fb:{ why:{es:'Fecha → on.',en:'Date → on.'}, ex:{es:'on December 25th → el 25 de diciembre',en:'on December 25th'}, tip:{es:'fecha → on',en:'date → on'}} },
      { q:{es:'«___ the evening» (en la tarde/noche):',en:'«___ the evening» (in the evening):'}, opts:{es:['in','at'],en:['in','at']}, correct:0, fb:{ why:{es:'Parte del día → in.',en:'Part of the day → in.'}, ex:{es:'in the evening → en la tarde',en:'in the evening'}, tip:{es:'evening → in',en:'evening → in'}}, tr:{es:'en la tarde/noche',en:'in the evening'} },
      { q:{es:'«___ 9 o\'clock» (a las 9):',en:'«___ 9 o\'clock» (at 9):'}, opts:{es:['at','on'],en:['at','on']}, correct:0, fb:{ why:{es:'Hora → at.',en:'Hour → at.'}, ex:{es:'at 9 o\'clock → a las 9',en:'at 9 o\'clock'}, tip:{es:'hora → at',en:'hour → at'}} }
    ] },
  { icon:'✨', title:{es:'Práctica Final',en:'Final Practice'}, builder:true,
    html:{
      es:`<div class="gdesc">Junta todo: at (hora), on (día/fecha), in (mes/año/estación). Arma la oración.</div>
        <div class="cboxes"><div class="cbox s"><span class="cl">at</span><span class="cv">5 · noon · night · the weekend</span></div><div class="cbox o"><span class="cl">on</span><span class="cv">Monday · May 5th · my birthday</span></div><div class="cbox p"><span class="cl">in</span><span class="cv">May · 2020 · summer · the morning</span></div></div>
        <div class="sec-label">Las reglas en una oración</div>
        ${eg('Class starts <span class="tag s">at</span> eight.','La clase empieza a las ocho.','ok')}
        ${eg('My birthday is <span class="tag s">on</span> July 3rd.','Mi cumpleaños es el 3 de julio.','ok')}
        ${eg('It often rains <b style="color:#7B1FA2">in</b> winter.','A menudo llueve en invierno.','ok')}

function say(text,acc){ try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=.82; const vs=speechSynthesis.getVoices()||[]; const want=acc==='US'?'en-US':'en-GB'; const v=vs.find(x=>x.lang===want)||vs.find(x=>x.lang&&x.lang.indexOf('en')===0); if(v){u.voice=v;u.lang=v.lang;}else u.lang=want; speechSynthesis.speak(u); }catch(e){} }
function render(){ cur=0; coreDone=false; doneSteps=new Array(STEPS.length).fill(false); answers=STEPS.map(s=>new Array(s.checks.length).fill(null)); bState={order:[],locked:false};

function applyLang(){ const t=L();

  document.getElementById('mhtitle').textContent=MAT.title[info]; document.getElementById('mhsub').textContent=document.getElementById('screen').getAttribute('data-level').toUpperCase().replace('-',' · ')+' · '+MAT.subtitle[info];

function renderStep(){ const t=L(), s=STEPS[cur]; curLab= info==='es'?'EJEMPLO':'EXAMPLE';
