<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'Present Perfect (ever / never)',en:'Present Perfect (ever / never)'}, reportId:'sum-present-perfect-ever' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">Para hablar de <b>experiencias de tu vida</b> (sin decir cuándo), en español usas «<b>he/has/ha + participio</b>» con «<b>alguna vez</b>» o «<b>nunca</b>».</div>
        <div class="art-hero"><div class="art-box"><div class="word">¿Has…?</div><div class="role">Experiencia</div><div class="desc">«¿Has comido sushi alguna vez?»</div></div><div class="art-box"><div class="word">Nunca he…</div><div class="role">Nunca</div><div class="desc">«Nunca he estado en Europa.»</div></div></div>
        ${ii('🌍','Hablas de si algo te pasó <b>alguna vez en la vida</b>, no de cuándo exactamente.')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «¿Has viajado en avión?», «Nunca he probado el café amargo». En inglés es «have/has + participio» con ever/never.</div>`,
      en:`<div class="gdesc">To talk about <b>life experiences</b> (without saying when), Spanish uses «<b>he/has/ha + participle</b>» with «<b>alguna vez</b>» or «<b>nunca</b>».</div>
        <div class="art-hero"><div class="art-box"><div class="word">¿Has…?</div><div class="role">Experience</div><div class="desc">«¿Has comido sushi alguna vez?»</div></div><div class="art-box"><div class="word">Nunca he…</div><div class="role">Never</div><div class="desc">«Nunca he estado en Europa.»</div></div></div>
        ${ii('🌍','You talk about whether something happened to you <b>at any time in your life</b>, not exactly when.')}
        <div class="gnote life">🌎 <b>From your life:</b> «¿Has viajado en avión?», «Nunca he probado el café amargo». In English it\'s «have/has + participle» with ever/never.</div>`
    },
    checks:[
      { q:{es:'«¿Has comido sushi?» pregunta por:',en:'«¿Has comido sushi?» asks about:'}, opts:{es:['Una experiencia (alguna vez)','La hora exacta'],en:['An experience (ever)','The exact time']}, correct:0, fb:{ why:{es:'Si lo hiciste alguna vez.',en:'Whether you ever did it.'}, tip:{es:'experiencia',en:'experience'}} },
      { q:{es:'«Nunca he estado en Europa» significa:',en:'«Nunca he estado en Europa» means:'}, opts:{es:['Ninguna vez en mi vida','Una vez ayer'],en:['Never in my life','Once yesterday']}, correct:0, fb:{ why:{es:'«Nunca» = ninguna vez.',en:'«Nunca» = never.'}, tip:{es:'nunca = 0',en:'nunca = 0'}} },
      { q:{es:'Se forma con:',en:'It is formed with:'}, opts:{es:['haber + participio','solo el pasado'],en:['haber + participle','just the past']}, correct:0, fb:{ why:{es:'he/has/ha + participio.',en:'he/has/ha + participle.'}, tip:{es:'haber + participio',en:'haber + participle'}} },
      { q:{es:'«Alguna vez» se refiere a:',en:'«Alguna vez» refers to:'}, opts:{es:['Cualquier momento de tu vida','Mañana'],en:['Any time in your life','Tomorrow']}, correct:0, fb:{ why:{es:'Experiencia, sin fecha.',en:'Experience, no date.'}, tip:{es:'en algún momento',en:'at some point'}} },
      { q:{es:'¿Importa el momento exacto?',en:'Does the exact moment matter?'}, opts:{es:['No','Sí'],en:['No','Yes']}, correct:0, fb:{ why:{es:'Solo importa si pasó alguna vez.',en:'Only whether it ever happened.'}, tip:{es:'sin fecha',en:'no date'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés lo arma igual: <b>have/has + participio</b>, con <b>ever</b> (alguna vez) y <b>never</b> (nunca).</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">¿Has…?</span>¿Has comido sushi?</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">Have you ever…?</span>Have you <b>ever eaten</b> sushi?</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">Nunca he…</span>Nunca he estado allí</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">I have never…</span>I have <b>never been</b> there</div></div>
        </div>
        ${eg('I <span class="tag s">have visited</span> Cusco.','He visitado Cusco. (experiencia)','ok')}
        ${eg('She <span class="tag s">has never tried</span> coffee.','Ella nunca ha probado el café.','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los dos usan «haber/have + participio».</li><li>Los dos hablan de experiencias de vida (sin fecha).</li><li>I/you/we/they → have · he/she/it → has (como «ha»).</li></ul>
        <div class="gnote">👍 Have you ever…? = ¿Has… alguna vez? · I have never… = Nunca he… Solo memoriza los participios (siguiente paso).</div>`,
      en:`<div class="gdesc">English builds it the same: <b>have/has + participle</b>, with <b>ever</b> (alguna vez) and <b>never</b> (nunca).</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">¿Has…?</span>¿Has comido sushi?</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">Have you ever…?</span>Have you <b>ever eaten</b> sushi?</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">Nunca he…</span>Nunca he estado allí</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">I have never…</span>I have <b>never been</b> there</div></div>
        </div>
        ${eg('I <span class="tag s">have visited</span> Cusco.','I have visited Cusco. (experience)','ok')}
        ${eg('She <span class="tag s">has never tried</span> coffee.','She has never tried coffee.','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Both use «haber/have + participle».</li><li>Both talk about life experiences (no date).</li><li>I/you/we/they → have · he/she/it → has (like «ha»).</li></ul>
        <div class="gnote">👍 Have you ever…? = ¿Has… alguna vez? · I have never… = Nunca he… Just memorize the participles (next step).</div>`
    },
    checks:[
      { q:{es:'«¿Has estado en Lima?» en inglés:',en:'«¿Has estado en Lima?» in English:'}, opts:{es:['Have you ever been to Lima?','Did you go to Lima?'],en:['Have you ever been to Lima?','Did you go to Lima?']}, correct:0, fb:{ why:{es:'Experiencia → present perfect con ever.',en:'Experience → present perfect with ever.'}, ex:{es:'Have you ever been to Lima?',en:'Have you ever been to Lima?'}, tip:{es:'experiencia → have + ever',en:'experience → have + ever'}}, tr:{es:'¿Has estado en Lima alguna vez?',en:'Have you ever been to Lima?'} },
      { q:{es:'«Nunca he estado allí» en inglés:',en:'«Nunca he estado allí» in English:'}, opts:{es:['I have never been there','I never go there'],en:['I have never been there','I never go there']}, correct:0, fb:{ why:{es:'never + participio.',en:'never + participle.'}, ex:{es:'I have never been there',en:'I have never been there'}, tip:{es:'never + been',en:'never + been'}}, tr:{es:'Nunca he estado allí.',en:'I have never been there.'} },
      { q:{es:'«ever» significa:',en:'«ever» means:'}, opts:{es:['alguna vez','nunca'],en:['alguna vez','nunca']}, correct:0, fb:{ why:{es:'ever = alguna vez (en preguntas).',en:'ever = ever (in questions).'}, tip:{es:'ever = alguna vez',en:'ever = ever'}} },
      { q:{es:'«never» significa:',en:'«never» means:'}, opts:{es:['nunca','siempre'],en:['nunca','siempre']}, correct:0, fb:{ why:{es:'never = nunca.',en:'never = nunca.'}, tip:{es:'never = nunca',en:'never = nunca'}} },
      { q:{es:'Con «she» se usa:',en:'With «she» you use:'}, opts:{es:['has','have'],en:['has','have']}, correct:0, fb:{ why:{es:'he/she/it → has.',en:'he/she/it → has.'}, ex:{es:'She has been → Ella ha estado',en:'She has been'}, tip:{es:'she → has',en:'she → has'}} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">Lo nuevo: hay que aprender el <b>participio</b> (a veces irregular), y «ever/never» tienen su <b>lugar fijo</b>.</div>
        <table class="dtab"><tr><th>Base</th><th>Participio</th><th></th></tr>
          <tr><td>be</td><td class="en">been</td><td>I have been</td></tr>
          <tr><td>eat</td><td class="en">eaten</td><td>I have eaten</td></tr>
          <tr><td>see</td><td class="en">seen</td><td>I have seen</td></tr>
          <tr><td>try</td><td class="en">tried</td><td>I have tried</td></tr>
        </table>
        <div class="sec-label">⚠️ Lugar de ever / never</div>
        ${ii('📍','Van <b>entre have/has y el participio</b>: «Have you <b>ever</b> been?», «I have <b>never</b> seen it».')}
        ${ii('🚫','«never» ya es negativo: NO uses «haven\'t» con él. «I have never been» (no «I haven\'t never been»).')}
        ${eg('Have you <span class="tag s">ever</span> seen snow?','¿Has visto nieve alguna vez?','ok')}
        ${eg('I haven\'t never been there.','«never» va solo: «I have never been there».','bad')}
        <div class="gnote">📍 Fórmula: have/has + (ever/never) + participio. ever en preguntas, never para negar.</div>`,
      en:`<div class="gdesc">The new part: you must learn the <b>participle</b> (sometimes irregular), and «ever/never» have a <b>fixed place</b>.</div>
        <table class="dtab"><tr><th>Base</th><th>Participle</th><th></th></tr>
          <tr><td>be</td><td class="en">been</td><td>I have been</td></tr>
          <tr><td>eat</td><td class="en">eaten</td><td>I have eaten</td></tr>
          <tr><td>see</td><td class="en">seen</td><td>I have seen</td></tr>
          <tr><td>try</td><td class="en">tried</td><td>I have tried</td></tr>
        </table>
        <div class="sec-label">⚠️ Position of ever / never</div>
        ${ii('📍','They go <b>between have/has and the participle</b>: «Have you <b>ever</b> been?», «I have <b>never</b> seen it».')}
        ${ii('🚫','«never» is already negative: do NOT use «haven\'t» with it. «I have never been» (not «I haven\'t never been»).')}
        ${eg('Have you <span class="tag s">ever</span> seen snow?','Have you ever seen snow?','ok')}
        ${eg('I haven\'t never been there.','«never» stands alone: «I have never been there».','bad')}
        <div class="gnote">📍 Formula: have/has + (ever/never) + participle. ever in questions, never to negate.</div>`
    },
    checks:[
      { q:{es:'Participio de «be»:',en:'Participle of «be»:'}, opts:{es:['been','was'],en:['been','was']}, correct:0, fb:{ why:{es:'be – was – been.',en:'be – was – been.'}, ex:{es:'I have been → He estado',en:'I have been'}, tip:{es:'been',en:'been'}} },
      { q:{es:'«Have you ___ eaten octopus?»',en:'«Have you ___ eaten octopus?»'}, opts:{es:['ever','never'],en:['ever','never']}, correct:0, fb:{ why:{es:'En preguntas → ever.',en:'In questions → ever.'}, ex:{es:'Have you ever eaten…? → ¿Has comido… alguna vez?',en:'Have you ever eaten…?'}, tip:{es:'pregunta → ever',en:'question → ever'}}, tr:{es:'¿Has comido pulpo alguna vez?',en:'Have you ever eaten octopus?'} },
      { q:{es:'¿Dónde va «never»?',en:'Where does «never» go?'}, opts:{es:['Entre have y el participio','Al final'],en:['Between have and the participle','At the end']}, correct:0, fb:{ why:{es:'have never been.',en:'have never been.'}, ex:{es:'I have never been → Nunca he estado',en:'I have never been'}, tip:{es:'have + never + participio',en:'have + never + participle'}} },
      { q:{es:'¿Cuál está bien?',en:'Which one is right?'}, opts:{es:['I have never seen it','I haven\'t never seen it'],en:['I have never seen it','I haven\'t never seen it']}, correct:0, fb:{ why:{es:'«never» solo, sin «haven\'t».',en:'«never» alone, no «haven\'t».'}, ex:{es:'I have never seen it → Nunca lo he visto',en:'I have never seen it'}, tip:{es:'never solo',en:'never alone'}} },
      { q:{es:'Participio de «see»:',en:'Participle of «see»:'}, opts:{es:['seen','saw'],en:['seen','saw']}, correct:0, fb:{ why:{es:'see – saw – seen.',en:'see – saw – seen.'}, ex:{es:'I have seen → He visto',en:'I have seen'}, tip:{es:'seen',en:'seen'}} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">Las dos fórmulas con ever / never:</div>
        <div class="fbox"><div class="frm"><span class="pill v">Have/Has</span><span class="plus">+</span><span class="pill s">sujeto</span><span class="plus">+</span><span class="pill o">ever + participio?</span></div><div class="fex"><span class="v">Have</span> <span class="s">you</span> <span class="o">ever been</span> abroad?</div></div>
        <div class="fbox"><div class="frm"><span class="pill s">Sujeto</span><span class="plus">+</span><span class="pill v">have/has never</span><span class="plus">+</span><span class="pill o">participio</span></div><div class="fex"><span class="s">I</span> <span class="v">have never</span> <span class="o">tried</span> it.</div></div>
        ${ii('❓','<b>Tip 1 — Preguntar:</b> «Have you ever + participio?» → Have you ever flown?')}
        ${ii('🚫','<b>Tip 2 — Negar:</b> «I have never + participio» (never reemplaza al «not»).')}
        ${ii('✅','<b>Tip 3 — Responder:</b> «Yes, I have» / «No, I haven\'t» / «No, never».')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «Have you ever go?» → ✅ «Have you ever <b>gone</b>?» (participio).<br>❌ «I have never ate sushi» → ✅ «I have never <b>eaten</b> sushi».</p></div>`,
      en:`<div class="gdesc">The two formulas with ever / never:</div>
        <div class="fbox"><div class="frm"><span class="pill v">Have/Has</span><span class="plus">+</span><span class="pill s">subject</span><span class="plus">+</span><span class="pill o">ever + participle?</span></div><div class="fex"><span class="v">Have</span> <span class="s">you</span> <span class="o">ever been</span> abroad?</div></div>
        <div class="fbox"><div class="frm"><span class="pill s">Subject</span><span class="plus">+</span><span class="pill v">have/has never</span><span class="plus">+</span><span class="pill o">participle</span></div><div class="fex"><span class="s">I</span> <span class="v">have never</span> <span class="o">tried</span> it.</div></div>
        ${ii('❓','<b>Tip 1 — Ask:</b> «Have you ever + participle?» → Have you ever flown?')}
        ${ii('🚫','<b>Tip 2 — Negate:</b> «I have never + participle» (never replaces the «not»).')}
        ${ii('✅','<b>Tip 3 — Answer:</b> «Yes, I have» / «No, I haven\'t» / «No, never».')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «Have you ever go?» → ✅ «Have you ever <b>gone</b>?» (participle).<br>❌ «I have never ate sushi» → ✅ «I have never <b>eaten</b> sushi».</p></div>`
    },
    checks:[
      { q:{es:'¿Cuál está bien?',en:'Which one is right?'}, opts:{es:['Have you ever gone there?','Have you ever go there?'],en:['Have you ever gone there?','Have you ever go there?']}, correct:0, fb:{ why:{es:'Participio de go = gone.',en:'Participle of go = gone.'}, ex:{es:'Have you ever gone there?',en:'Have you ever gone there?'}, tip:{es:'go → gone',en:'go → gone'}} },
      { q:{es:'«She has ___ ridden a horse.» (nunca):',en:'«She has ___ ridden a horse.» (never):'}, opts:{es:['never','ever'],en:['never','ever']}, correct:0, fb:{ why:{es:'Frase negativa → never.',en:'Negative → never.'}, ex:{es:'She has never ridden → Nunca ha montado',en:'She has never ridden'}, tip:{es:'negar → never',en:'negate → never'}}, tr:{es:'Ella nunca ha montado a caballo.',en:'She has never ridden a horse.'} },
      { q:{es:'Respuesta a «Have you ever been to Paris?» (sí):',en:'Answer to «Have you ever been to Paris?» (yes):'}, opts:{es:['Yes, I have.','Yes, I do.'],en:['Yes, I have.','Yes, I do.']}, correct:0, fb:{ why:{es:'Repites «have».',en:'You repeat «have».'}, ex:{es:'Yes, I have → Sí',en:'Yes, I have'}, tip:{es:'have → have',en:'have → have'}} },
      { q:{es:'«We have never ___ snow.» (see):',en:'«We have never ___ snow.» (see):'}, opts:{es:['seen','saw'],en:['seen','saw']}, correct:0, fb:{ why:{es:'Participio → seen.',en:'Participle → seen.'}, ex:{es:'We have never seen snow → Nunca hemos visto nieve',en:'We have never seen snow'}, tip:{es:'seen',en:'seen'}}, tr:{es:'Nunca hemos visto nieve.',en:'We have never seen snow.'} },
      { q:{es:'«Have you ___ met a famous person?» (alguna vez):',en:'«Have you ___ met a famous person?» (ever):'}, opts:{es:['ever','never'],en:['ever','never']}, correct:0, fb:{ why:{es:'En preguntas → ever.',en:'In questions → ever.'}, ex:{es:'Have you ever met…? → ¿Has conocido…?',en:'Have you ever met…?'}, tip:{es:'pregunta → ever',en:'question → ever'}}, tr:{es:'¿Has conocido a una persona famosa alguna vez?',en:'Have you ever met a famous person?'} }
    ] },

let info='es', cur=0, doneSteps=[], answers=[], coreDone=false, bState={order:[],locked:false}, curLab='';
function L(){ return T[info]; }
function say(text,acc){ try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=.82; const vs=speechSynthesis.getVoices()||[]; const want=acc==='US'?'en-US':'en-GB'; const v=vs.find(x=>x.lang===want)||vs.find(x=>x.lang&&x.lang.indexOf('en')===0); if(v){u.voice=v;u.lang=v.lang;}else u.lang=want; speechSynthesis.speak(u); }catch(e){} }
function render(){ cur=0; coreDone=false; doneSteps=new Array(STEPS.length).fill(false); answers=STEPS.map(s=>new Array(s.checks.length).fill(null)); bState={order:[],locked:false};
  document.getElementById('results').classList.remove('show'); document.getElementById('mbody').style.display='block'; document.getElementById('msbanner').style.display='none';

function renderTabs(){ document.getElementById('steptabs').innerHTML=STEPS.map((s,i)=>`<button class="stab${i===0?' on':''}${doneSteps[i]?' done':''}" id="stab${i}" onclick="goStep(${i})">${s.icon} ${i+1}</button>`).join(''); }
function applyLang(){ const t=L();
  document.getElementById('lsEs').classList.toggle('on',info==='es'); document.getElementById('lsEn').classList.toggle('on',info==='en');
  document.getElementById('mhtitle').textContent=MAT.title[info]; document.getElementById('mhsub').textContent=document.getElementById('screen').getAttribute('data-level').toUpperCase().replace('-',' · ')+' · '+MAT.subtitle[info];
  document.getElementById('unT').textContent=t.unT; document.getElementById('unP').textContent=t.unP;
  document.getElementById('helpT').textContent=t.helpT; document.getElementById('helpTips').innerHTML='<div style="font-size:11.5px;color:var(--text-soft);font-weight:700;margin-bottom:6px">'+t.tipsT+'</div>'+t.tips.map(x=>'<div class="helptip">• <span>'+x+'</span></div>').join('');
  document.getElementById('kpT').textContent=t.kpT; document.getElementById('lBack').textContent=t.back; document.getElementById('lRetry').textContent=t.retry;
  updateMilestone(); renderStep(); }
function renderStep(){ const t=L(), s=STEPS[cur]; curLab= info==='es'?'EJEMPLO':'EXAMPLE';

  if(s.builder) html+=builderHtml(); html+=`</div>`;
  const ansd=answers[cur].filter(x=>x!==null).length;
  html+=`<div class="check"><div class="check-h">🧠 ${t.checkH}<span class="cprog">${ansd}/${s.checks.length}</span></div><div class="check-sub">${t.checkSub}</div>`;
  s.checks.forEach((c,ci)=>{ const sel=answers[cur][ci]; const done=sel!==null; const ok=sel===c.correct;

      (f.tip?`<div class="fblk tip"><b>💡 ${t.fTip}</b>${f.tip[info]}</div>`:'')+`</div></div>`; }

function initBuilder(){ bState={order:[],locked:false}; const sh=[...BUILD.answer.keys()].sort(()=>Math.random()-.5);

function placeTile(idx){ if(bState.locked)return; bState.order.push(idx); document.getElementById('tile'+idx).classList.add('placed'); const tr=document.getElementById('tray'); const b=document.createElement('button'); b.className='tile '+BUILD.answer[idx].c; b.textContent=BUILD.answer[idx].w; b.onclick=()=>removeTile(idx,b); tr.appendChild(b); document.getElementById('bchk').disabled=bState.order.length!==BUILD.answer.length; }
function removeTile(idx,el){ if(bState.locked)return; bState.order=bState.order.filter(x=>x!==idx); el.remove(); document.getElementById('tile'+idx).classList.remove('placed'); document.getElementById('bchk').disabled=bState.order.length!==BUILD.answer.length; }
function checkBuild(){ const t=L(); bState.locked=true; const ok=bState.order.join(',')===BUILD.answer.map((_,i)=>i).join(','); document.querySelectorAll('#tray .tile').forEach(x=>x.style.pointerEvents='none');

function finish(){ const t=L(); document.getElementById('mbody').style.display='none'; document.getElementById('results').classList.add('show');
  let tot=0,corr=0; answers.forEach((arr,si)=>arr.forEach((k,ci)=>{ if(k!==null){tot++; if(k===STEPS[si].checks[ci].correct)corr++;} })); const pct=tot?Math.round(corr/tot*100):0; const pass=pct>=PASS;
  const db=document.getElementById('doneBar'); db.classList.toggle('fail',!pass); db.textContent= pass? t.done : t.failBar; document.getElementById('fscore').textContent=pct; document.getElementById('fphrase').textContent= pass? t.phrase : t.phraseFail;
