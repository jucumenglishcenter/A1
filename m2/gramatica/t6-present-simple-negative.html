<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'Present Simple — Negativo (3ª persona)',en:'Present Simple — Negative (3rd person)'}, reportId:'sum-present-simple-neg' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">En español, negar lo que hace «él» o «ella» es muy fácil: solo pones un «<b>no</b>» antes del verbo. «<b>No come</b>», «<b>no trabaja</b>».</div>
        <div class="art-hero"><div class="art-box"><div class="word">come</div><div class="role">Afirma ✅</div><div class="desc">«Ella come carne.»</div></div><div class="art-box"><div class="word">no come</div><div class="role">Niega ❌</div><div class="desc">«Ella no come carne.»</div></div></div>
        ${ii('🚫','El verbo no cambia: solo le agregas «no» delante.')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «Mi hermano no estudia los domingos», «Ella no toma café». En inglés, esta persona (he/she/it) usa «doesn\'t».</div>`,
      en:`<div class="gdesc">In Spanish, negating what «he» or «she» does is very easy: just put a «<b>no</b>» before the verb. «<b>No come</b>», «<b>no trabaja</b>».</div>
        <div class="art-hero"><div class="art-box"><div class="word">come</div><div class="role">Affirm ✅</div><div class="desc">«Ella come carne.»</div></div><div class="art-box"><div class="word">no come</div><div class="role">Deny ❌</div><div class="desc">«Ella no come carne.»</div></div></div>
        ${ii('🚫','The verb doesn\'t change: you just add «no» in front.')}
        <div class="gnote life">🌎 <b>From your life:</b> «Mi hermano no estudia los domingos», «Ella no toma café». In English, this person (he/she/it) uses «doesn\'t».</div>`
    },
    checks:[
      { q:{es:'Para negar en español pones:',en:'To negate in Spanish you put:'}, opts:{es:['«no» antes del verbo','«no» al final'],en:['«no» before the verb','«no» at the end']}, correct:0, fb:{ why:{es:'«No come».',en:'«No come».'}, tip:{es:'no + verbo',en:'no + verb'}} },
      { q:{es:'«Ella no come carne» es:',en:'«Ella no come carne» is:'}, opts:{es:['Negativa','Pregunta'],en:['Negative','Question']}, correct:0, fb:{ why:{es:'Niegas algo.',en:'You deny something.'}, tip:{es:'negar',en:'deny'}} },
      { q:{es:'«he / she / it» se refiere a:',en:'«he / she / it» refers to:'}, opts:{es:['Una sola persona o cosa (3ª)','Varias personas'],en:['One person or thing (3rd)','Many people']}, correct:0, fb:{ why:{es:'Tercera persona singular.',en:'Third person singular.'}, tip:{es:'él/ella/eso',en:'he/she/it'}} },
      { q:{es:'Al negar en español, el verbo:',en:'When negating in Spanish, the verb:'}, opts:{es:['No cambia','Cambia mucho'],en:['Doesn\'t change','Changes a lot']}, correct:0, fb:{ why:{es:'Solo agregas «no».',en:'You only add «no».'}, tip:{es:'igual',en:'same'}} },
      { q:{es:'Lo contrario de «Él trabaja» es:',en:'The opposite of «Él trabaja» is:'}, opts:{es:['Él no trabaja','Él trabaja mucho'],en:['Él no trabaja','Él trabaja mucho']}, correct:0, fb:{ why:{es:'Le pones «no».',en:'You add «no».'}, tip:{es:'+ no',en:'+ no'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés también niega lo que hace «él/ella/eso», con la palabra ayudante <b>doesn\'t</b> (= does not).</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">no come</span>Ella no come carne</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">doesn't</span>She <b>doesn't eat</b> meat</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">no trabaja</span>Él no trabaja aquí</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">doesn't</span>He <b>doesn't work</b> here</div></div>
        </div>
        ${eg('He <span class="tag s">doesn\'t like</span> fish.','A él no le gusta el pescado.','ok')}
        ${eg('It <span class="tag s">doesn\'t work</span>.','No funciona.','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los dos niegan el hábito de una sola persona/cosa.</li><li>La negación va antes del verbo principal.</li><li>El verbo principal queda igual (eat, work, like).</li></ul>
        <div class="gnote">👍 he/she/it + doesn\'t + verbo. Lo nuevo: ese «doesn\'t» se lleva la «-s» (siguiente paso).</div>`,
      en:`<div class="gdesc">English also negates what «he/she/it» does, with the helper word <b>doesn\'t</b> (= does not).</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">no come</span>Ella no come carne</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">doesn't</span>She <b>doesn't eat</b> meat</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">no trabaja</span>Él no trabaja aquí</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">doesn't</span>He <b>doesn't work</b> here</div></div>
        </div>
        ${eg('He <span class="tag s">doesn\'t like</span> fish.','He doesn\'t like fish.','ok')}
        ${eg('It <span class="tag s">doesn\'t work</span>.','It doesn\'t work.','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Both negate the habit of one person/thing.</li><li>The negation goes before the main verb.</li><li>The main verb stays the same (eat, work, like).</li></ul>
        <div class="gnote">👍 he/she/it + doesn\'t + verb. The new part: that «doesn\'t» takes the «-s» (next step).</div>`
    },
    checks:[
      { q:{es:'«Ella no come carne» en inglés:',en:'«Ella no come carne» in English:'}, opts:{es:['She doesn\'t eat meat','She don\'t eat meat'],en:['She doesn\'t eat meat','She don\'t eat meat']}, correct:0, fb:{ why:{es:'she → doesn\'t.',en:'she → doesn\'t.'}, ex:{es:'She doesn\'t eat meat',en:'She doesn\'t eat meat'}, tip:{es:'she → doesn\'t',en:'she → doesn\'t'}}, tr:{es:'Ella no come carne.',en:'She doesn\'t eat meat.'} },
      { q:{es:'«doesn\'t» es la contracción de:',en:'«doesn\'t» is the contraction of:'}, opts:{es:['does not','do not'],en:['does not','do not']}, correct:0, fb:{ why:{es:'does not → doesn\'t.',en:'does not → doesn\'t.'}, tip:{es:'does not = doesn\'t',en:'does not = doesn\'t'}} },
      { q:{es:'¿Con qué personas va «doesn\'t»?',en:'Which persons use «doesn\'t»?'}, opts:{es:['He / She / It','I / You / We / They'],en:['He / She / It','I / You / We / They']}, correct:0, fb:{ why:{es:'3ª persona singular.',en:'3rd person singular.'}, tip:{es:'he/she/it',en:'he/she/it'}} },
      { q:{es:'La negación va:',en:'The negation goes:'}, opts:{es:['Antes del verbo principal','Al final'],en:['Before the main verb','At the end']}, correct:0, fb:{ why:{es:'He doesn\'t eat...',en:'He doesn\'t eat...'}, tip:{es:'antes del verbo',en:'before the verb'}} },
      { q:{es:'«It ___ work.» (no funciona):',en:'«It ___ work.» (doesn\'t work):'}, opts:{es:['doesn\'t','don\'t'],en:['doesn\'t','don\'t']}, correct:0, fb:{ why:{es:'it → doesn\'t.',en:'it → doesn\'t.'}, ex:{es:'It doesn\'t work → No funciona',en:'It doesn\'t work'}, tip:{es:'it → doesn\'t',en:'it → doesn\'t'}} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">El detalle clave: con «doesn\'t», el verbo principal va <b>SIN la «-s»</b>. La «-s» de he/she/it ya está en «does».</div>
        <table class="dtab"><tr><th>Afirmativo</th><th>Negativo</th></tr>
          <tr><td class="en">He eats</td><td>He <b>doesn't eat</b></td></tr>
          <tr><td class="en">She plays</td><td>She <b>doesn't play</b></td></tr>
          <tr><td class="en">It goes</td><td>It <b>doesn't go</b></td></tr>
        </table>
        <div class="sec-label">⚠️ La «-s» salta a «does»</div>
        ${ii('✂️','En «He eats» la «-s» está en el verbo. Al negar, esa «-s» pasa a «does» (doe<b>s</b>n\'t) y el verbo vuelve a la base.')}
        ${eg('She <span class="tag s">doesn\'t play</span> tennis.','Ella no juega tenis. (doesn\'t + base)','ok')}
        ${eg('She doesn\'t plays tennis.','Sin «-s»: «She doesn\'t <b>play</b>».','bad')}
        <div class="gnote">📍 Regla de oro: He/She/It → <b>doesn\'t + verbo base</b> (nunca «doesn\'t plays»).</div>`,
      en:`<div class="gdesc">The key detail: with «doesn\'t», the main verb goes <b>WITHOUT the «-s»</b>. The «-s» of he/she/it is already on «does».</div>
        <table class="dtab"><tr><th>Affirmative</th><th>Negative</th></tr>
          <tr><td class="en">He eats</td><td>He <b>doesn't eat</b></td></tr>
          <tr><td class="en">She plays</td><td>She <b>doesn't play</b></td></tr>
          <tr><td class="en">It goes</td><td>It <b>doesn't go</b></td></tr>
        </table>
        <div class="sec-label">⚠️ The «-s» jumps to «does»</div>
        ${ii('✂️','In «He eats» the «-s» is on the verb. When you negate, that «-s» moves to «does» (doe<b>s</b>n\'t) and the verb goes back to base.')}
        ${eg('She <span class="tag s">doesn\'t play</span> tennis.','She doesn\'t play tennis. (doesn\'t + base)','ok')}
        ${eg('She doesn\'t plays tennis.','No «-s»: «She doesn\'t <b>play</b>».','bad')}
        <div class="gnote">📍 Golden rule: He/She/It → <b>doesn\'t + base verb</b> (never «doesn\'t plays»).</div>`
    },
    checks:[
      { q:{es:'¿Cuál está bien?',en:'Which one is right?'}, opts:{es:['He doesn\'t play','He doesn\'t plays'],en:['He doesn\'t play','He doesn\'t plays']}, correct:0, fb:{ why:{es:'Tras «doesn\'t» → verbo base.',en:'After «doesn\'t» → base verb.'}, ex:{es:'He doesn\'t play → Él no juega',en:'He doesn\'t play'}, tip:{es:'doesn\'t + base',en:'doesn\'t + base'}} },
      { q:{es:'Negativo de «She works»:',en:'Negative of «She works»:'}, opts:{es:['She doesn\'t work','She doesn\'t works'],en:['She doesn\'t work','She doesn\'t works']}, correct:0, fb:{ why:{es:'La «-s» pasa a «does».',en:'The «-s» moves to «does».'}, ex:{es:'She doesn\'t work → Ella no trabaja',en:'She doesn\'t work'}, tip:{es:'doesn\'t + base',en:'doesn\'t + base'}} },
      { q:{es:'«My dad ___ drink coffee.»',en:'«My dad ___ drink coffee.»'}, opts:{es:['doesn\'t','don\'t'],en:['doesn\'t','don\'t']}, correct:0, fb:{ why:{es:'he (my dad) → doesn\'t.',en:'he (my dad) → doesn\'t.'}, ex:{es:'My dad doesn\'t drink coffee → Mi papá no toma café',en:'My dad doesn\'t drink coffee'}, tip:{es:'he → doesn\'t',en:'he → doesn\'t'}} },
      { q:{es:'¿Cuál está bien?',en:'Which one is right?'}, opts:{es:['It doesn\'t rain here','It doesn\'t rains here'],en:['It doesn\'t rain here','It doesn\'t rains here']}, correct:0, fb:{ why:{es:'Tras «doesn\'t» → base.',en:'After «doesn\'t» → base.'}, ex:{es:'It doesn\'t rain → No llueve',en:'It doesn\'t rain'}, tip:{es:'doesn\'t + base',en:'doesn\'t + base'}} },
      { q:{es:'Negativo de «He goes»:',en:'Negative of «He goes»:'}, opts:{es:['He doesn\'t go','He doesn\'t goes'],en:['He doesn\'t go','He doesn\'t goes']}, correct:0, fb:{ why:{es:'La «-s» va en «does».',en:'The «-s» is on «does».'}, ex:{es:'He doesn\'t go → Él no va',en:'He doesn\'t go'}, tip:{es:'doesn\'t + base',en:'doesn\'t + base'}} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">La estructura para 3ª persona:</div>
        <div class="fbox"><div class="frm"><span class="pill s">He/She/It</span><span class="plus">+</span><span class="pill v">doesn't</span><span class="plus">+</span><span class="pill o">verbo base</span></div><div class="fex"><span class="s">She</span> <span class="v">doesn't</span> <span class="o">eat</span> meat. — Ella no come carne.</div></div>
        ${ii('👉','<b>Tip 1 — Solo he/she/it usan «doesn\'t»:</b> las demás personas usan «don\'t».')}
        ${ii('✂️','<b>Tip 2 — Verbo base:</b> después de «doesn\'t», nunca pongas «-s».')}
        ${ii('🔄','<b>Tip 3 — Afirmativo ↔ negativo:</b> «He eats» → «He doesn\'t eat» (la «-s» salta a «does»).')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «He don\'t like» → ✅ «He <b>doesn\'t</b> like».<br>❌ «She doesn\'t works» → ✅ «She doesn\'t <b>work</b>».</p></div>`,
      en:`<div class="gdesc">The structure for 3rd person:</div>
        <div class="fbox"><div class="frm"><span class="pill s">He/She/It</span><span class="plus">+</span><span class="pill v">doesn't</span><span class="plus">+</span><span class="pill o">base verb</span></div><div class="fex"><span class="s">She</span> <span class="v">doesn't</span> <span class="o">eat</span> meat. — Ella no come carne.</div></div>
        ${ii('👉','<b>Tip 1 — Only he/she/it use «doesn\'t»:</b> the other persons use «don\'t».')}
        ${ii('✂️','<b>Tip 2 — Base verb:</b> after «doesn\'t», never add «-s».')}
        ${ii('🔄','<b>Tip 3 — Affirmative ↔ negative:</b> «He eats» → «He doesn\'t eat» (the «-s» jumps to «does»).')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «He don\'t like» → ✅ «He <b>doesn\'t</b> like».<br>❌ «She doesn\'t works» → ✅ «She doesn\'t <b>work</b>».</p></div>`
    },
    checks:[
      { q:{es:'«He ___ like vegetables.»',en:'«He ___ like vegetables.»'}, opts:{es:['doesn\'t','don\'t'],en:['doesn\'t','don\'t']}, correct:0, fb:{ why:{es:'he → doesn\'t.',en:'he → doesn\'t.'}, ex:{es:'He doesn\'t like vegetables → No le gustan las verduras',en:'He doesn\'t like vegetables'}, tip:{es:'he → doesn\'t',en:'he → doesn\'t'}} },
      { q:{es:'¿Cuál está bien?',en:'Which one is right?'}, opts:{es:['She doesn\'t speak French','She doesn\'t speaks French'],en:['She doesn\'t speak French','She doesn\'t speaks French']}, correct:0, fb:{ why:{es:'Tras «doesn\'t» → base.',en:'After «doesn\'t» → base.'}, ex:{es:'She doesn\'t speak French → No habla francés',en:'She doesn\'t speak French'}, tip:{es:'doesn\'t + base',en:'doesn\'t + base'}} },
      { q:{es:'Negativo de «It costs a lot»:',en:'Negative of «It costs a lot»:'}, opts:{es:['It doesn\'t cost a lot','It doesn\'t costs a lot'],en:['It doesn\'t cost a lot','It doesn\'t costs a lot']}, correct:0, fb:{ why:{es:'La «-s» salta a «does».',en:'The «-s» jumps to «does».'}, ex:{es:'It doesn\'t cost a lot → No cuesta mucho',en:'It doesn\'t cost a lot'}, tip:{es:'doesn\'t + base',en:'doesn\'t + base'}} },
      { q:{es:'«My sister ___ have a car.»',en:'«My sister ___ have a car.»'}, opts:{es:['doesn\'t','don\'t'],en:['doesn\'t','don\'t']}, correct:0, fb:{ why:{es:'she → doesn\'t + have.',en:'she → doesn\'t + have.'}, ex:{es:'She doesn\'t have a car → No tiene carro',en:'She doesn\'t have a car'}, tip:{es:'doesn\'t have',en:'doesn\'t have'}} },
      { q:{es:'¿Cuál es 3ª persona con «doesn\'t»?',en:'Which is 3rd person with «doesn\'t»?'}, opts:{es:['The dog doesn\'t bark','The dogs don\'t bark'],en:['The dog doesn\'t bark','The dogs don\'t bark']}, correct:0, fb:{ why:{es:'«The dog» (it) → doesn\'t.',en:'«The dog» (it) → doesn\'t.'}, ex:{es:'The dog doesn\'t bark → El perro no ladra',en:'The dog doesn\'t bark'}, tip:{es:'singular → doesn\'t',en:'singular → doesn\'t'}} }
    ] },
  { icon:'✨', title:{es:'Práctica Final',en:'Final Practice'}, builder:true,
    html:{
      es:`<div class="gdesc">Junta todo: he/she/it + doesn\'t + verbo base. Arma la oración.</div>
        <div class="cboxes"><div class="cbox s"><span class="cl">He/She/It</span><span class="cv">3ª persona singular</span></div><div class="cbox o"><span class="cl">doesn't</span><span class="cv">= does not</span></div><div class="cbox p"><span class="cl">+ verbo</span><span class="cv">siempre BASE (sin -s)</span></div></div>
        <div class="sec-label">Las reglas en una oración</div>
        ${eg('He <span class="tag s">doesn\'t like</span> coffee.','A él no le gusta el café.','ok')}

function say(text,acc){ try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=.82; const vs=speechSynthesis.getVoices()||[]; const want=acc==='US'?'en-US':'en-GB'; const v=vs.find(x=>x.lang===want)||vs.find(x=>x.lang&&x.lang.indexOf('en')===0); if(v){u.voice=v;u.lang=v.lang;}else u.lang=want; speechSynthesis.speak(u); }catch(e){} }
function render(){ cur=0; coreDone=false; doneSteps=new Array(STEPS.length).fill(false); answers=STEPS.map(s=>new Array(s.checks.length).fill(null)); bState={order:[],locked:false};

function renderStep(){ const t=L(), s=STEPS[cur]; curLab= info==='es'?'EJEMPLO':'EXAMPLE';
