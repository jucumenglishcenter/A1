<script>
/* ═══ METADATOS ═══ */
const MAT = { title:{es:'Resumen de Gramática',en:'Grammar Summary'}, subtitle:{es:'Present Simple — Preguntas',en:'Present Simple — Questions'}, reportId:'sum-present-simple-q' };
const PASS = 75;
const STEPS = [
  { icon:'🇪🇸', title:{es:'Repaso en Español',en:'Spanish Recap'},
    html:{
      es:`<div class="gdesc">En español preguntas en presente de dos maneras: con <b>tono</b> («¿Trabajas?») o con una <b>palabra de pregunta</b> («¿Dónde trabajas?»).</div>
        <div class="art-hero"><div class="art-box"><div class="word">¿Trabajas?</div><div class="role">Sí / No</div><div class="desc">Solo subes el tono.</div></div><div class="art-box"><div class="word">¿Dónde…?</div><div class="role">Información</div><div class="desc">«¿Dónde trabajas?»</div></div></div>
        ${ii('🗣️','Las preguntas de sí/no solo cambian el tono; las de información empiezan con qué, dónde, cuándo…')}
        <div class="gnote life">🌎 <b>De tu vida:</b> «¿Te gusta el cine?» (sí/no) y «¿Qué música escuchas?» (información). En inglés ambas usan «do/does».</div>`,
      en:`<div class="gdesc">In Spanish you ask in the present in two ways: with <b>tone</b> («¿Trabajas?») or with a <b>question word</b> («¿Dónde trabajas?»).</div>
        <div class="art-hero"><div class="art-box"><div class="word">¿Trabajas?</div><div class="role">Yes / No</div><div class="desc">You just raise your tone.</div></div><div class="art-box"><div class="word">¿Dónde…?</div><div class="role">Information</div><div class="desc">«¿Dónde trabajas?»</div></div></div>
        ${ii('🗣️','Yes/no questions just change the tone; information ones start with what, where, when…')}
        <div class="gnote life">🌎 <b>From your life:</b> «¿Te gusta el cine?» (yes/no) and «¿Qué música escuchas?» (information). In English both use «do/does».</div>`
    },
    checks:[
      { q:{es:'«¿Trabajas?» es pregunta de:',en:'«¿Trabajas?» is a question of:'}, opts:{es:['Sí / No','Información'],en:['Yes / No','Information']}, correct:0, fb:{ why:{es:'Se responde sí o no.',en:'Answered yes or no.'}, tip:{es:'sí/no',en:'yes/no'}} },
      { q:{es:'«¿Dónde trabajas?» pide:',en:'«¿Dónde trabajas?» asks for:'}, opts:{es:['Información (un lugar)','Sí o no'],en:['Information (a place)','Yes or no']}, correct:0, fb:{ why:{es:'Pide un dato.',en:'Asks for a fact.'}, tip:{es:'información',en:'information'}} },
      { q:{es:'Las de sí/no cambian:',en:'Yes/no ones change:'}, opts:{es:['El tono','Todo el orden'],en:['The tone','The whole order']}, correct:0, fb:{ why:{es:'Solo el tono en español.',en:'Only the tone in Spanish.'}, tip:{es:'tono',en:'tone'}} },
      { q:{es:'Las de información empiezan con:',en:'Information ones start with:'}, opts:{es:['Qué, dónde, cuándo…','Un verbo'],en:['What, where, when…','A verb']}, correct:0, fb:{ why:{es:'Palabra de pregunta.',en:'Question word.'}, tip:{es:'WH',en:'WH'}} },
      { q:{es:'«¿Qué música escuchas?» pide:',en:'«¿Qué música escuchas?» asks for:'}, opts:{es:['Una cosa','Sí o no'],en:['A thing','Yes or no']}, correct:0, fb:{ why:{es:'«Qué» pide la cosa.',en:'«Qué» asks for the thing.'}, tip:{es:'qué = cosa',en:'qué = thing'}} }
    ] },
  { icon:'🤝', title:{es:'Similitudes',en:'Similarities'},
    html:{
      es:`<div class="gdesc">El inglés también tiene preguntas de sí/no y de información, y ambas usan la palabra ayudante <b>do / does</b>.</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">¿Trabajas?</span>¿Trabajas aquí?</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">Do</span><b>Do</b> you work here?</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">¿Dónde?</span>¿Dónde trabajas?</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">Where do</span><b>Where do</b> you work?</div></div>
        </div>
        ${eg('<span class="tag s">Do</span> you like music?','¿Te gusta la música?','ok')}
        ${eg('<span class="tag s">Where does</span> she live?','¿Dónde vive ella?','ok')}
        <div class="sec-label">Lo igual en los dos idiomas</div>
        <ul class="simlist"><li>Los dos tienen preguntas de sí/no y de información.</li><li>La palabra de pregunta (WH) va al inicio en ambos.</li><li>Las de sí/no esperan «sí» o «no».</li></ul>
        <div class="gnote">👍 Do/Does abre la pregunta; con WH, la palabra va primero y luego do/does (siguiente paso).</div>`,
      en:`<div class="gdesc">English also has yes/no and information questions, and both use the helper word <b>do / does</b>.</div>
        <div class="vs-grid">
          <div class="vs-row"><div class="vs-side es"><span class="flag">¿Trabajas?</span>¿Trabajas aquí?</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">Do</span><b>Do</b> you work here?</div></div>
          <div class="vs-row"><div class="vs-side es"><span class="flag">¿Dónde?</span>¿Dónde trabajas?</div><div class="vs-mid">=</div><div class="vs-side en"><span class="flag">Where do</span><b>Where do</b> you work?</div></div>
        </div>
        ${eg('<span class="tag s">Do</span> you like music?','Do you like music?','ok')}
        ${eg('<span class="tag s">Where does</span> she live?','Where does she live?','ok')}
        <div class="sec-label">What is the same in both languages</div>
        <ul class="simlist"><li>Both have yes/no and information questions.</li><li>The question word (WH) goes at the start in both.</li><li>Yes/no ones expect «yes» or «no».</li></ul>
        <div class="gnote">👍 Do/Does opens the question; with WH, the word goes first then do/does (next step).</div>`
    },
    checks:[
      { q:{es:'«¿Te gusta la música?» en inglés:',en:'«¿Te gusta la música?» in English:'}, opts:{es:['Do you like music?','You like music?'],en:['Do you like music?','You like music?']}, correct:0, fb:{ why:{es:'Abre con «Do».',en:'Opens with «Do».'}, ex:{es:'Do you like music?',en:'Do you like music?'}, tip:{es:'sí/no → Do',en:'yes/no → Do'}} },
      { q:{es:'«¿Dónde vive ella?» en inglés:',en:'«¿Dónde vive ella?» in English:'}, opts:{es:['Where does she live?','Where she lives?'],en:['Where does she live?','Where she lives?']}, correct:0, fb:{ why:{es:'WH + does + sujeto + base.',en:'WH + does + subject + base.'}, ex:{es:'Where does she live?',en:'Where does she live?'}, tip:{es:'WH + does',en:'WH + does'}}, tr:{es:'¿Dónde vive ella?',en:'Where does she live?'} },
      { q:{es:'La palabra ayudante es:',en:'The helper word is:'}, opts:{es:['do / does','be'],en:['do / does','be']}, correct:0, fb:{ why:{es:'Presente simple → do/does.',en:'Present simple → do/does.'}, tip:{es:'do/does',en:'do/does'}} },
      { q:{es:'La palabra WH va:',en:'The WH word goes:'}, opts:{es:['Al inicio','Al final'],en:['At the start','At the end']}, correct:0, fb:{ why:{es:'Primero la palabra de pregunta.',en:'Question word first.'}, tip:{es:'al inicio',en:'at the start'}} },
      { q:{es:'«Do you ___ tea?» (drink):',en:'«Do you ___ tea?» (drink):'}, opts:{es:['drink','drinks'],en:['drink','drinks']}, correct:0, fb:{ why:{es:'Tras «Do» → verbo base.',en:'After «Do» → base verb.'}, ex:{es:'Do you drink tea? → ¿Tomas té?',en:'Do you drink tea?'}, tip:{es:'Do + base',en:'Do + base'}} }
    ] },
  { icon:'⚡', title:{es:'Diferencias',en:'Differences'},
    html:{
      es:`<div class="gdesc">El cambio clave: eliges <b>Do</b> o <b>Does</b> según la persona, y el verbo va <b>SIN «-s»</b>. Con info, la palabra WH va antes.</div>
        <table class="dtab"><tr><th>Tipo</th><th>Fórmula</th></tr>
          <tr><td>sí/no</td><td class="en">Do/Does + sujeto + base?</td></tr>
          <tr><td>información</td><td class="en">WH + do/does + sujeto + base?</td></tr>
        </table>
        <div class="sec-label">Elegir do o does</div>
        ${ii('👉','He/She/It → <b>Does</b> · I/You/We/They → <b>Do</b>. El verbo siempre en base.')}
        ${ii('✅','<b>Respuestas cortas:</b> «Yes, I do» / «No, she doesn\'t».')}
        ${eg('<span class="tag s">What does</span> he <span class="tag s">do</span>?','¿A qué se dedica él? (does + base do)','ok')}
        ${eg('Where she lives?','Falta «does»: «Where <b>does</b> she live?».','bad')}
        <div class="gnote">📍 Sí/No: Do/Does + sujeto + base. Info: WH + do/does + sujeto + base.</div>`,
      en:`<div class="gdesc">The key change: you pick <b>Do</b> or <b>Does</b> by person, and the verb has <b>NO «-s»</b>. With info, the WH word goes first.</div>
        <table class="dtab"><tr><th>Type</th><th>Formula</th></tr>
          <tr><td>yes/no</td><td class="en">Do/Does + subject + base?</td></tr>
          <tr><td>information</td><td class="en">WH + do/does + subject + base?</td></tr>
        </table>
        <div class="sec-label">Choosing do or does</div>
        ${ii('👉','He/She/It → <b>Does</b> · I/You/We/They → <b>Do</b>. The verb always in base.')}
        ${ii('✅','<b>Short answers:</b> «Yes, I do» / «No, she doesn\'t».')}
        ${eg('<span class="tag s">What does</span> he <span class="tag s">do</span>?','What does he do? (does + base do)','ok')}
        ${eg('Where she lives?','«does» is missing: «Where <b>does</b> she live?».','bad')}
        <div class="gnote">📍 Yes/No: Do/Does + subject + base. Info: WH + do/does + subject + base.</div>`
    },
    checks:[
      { q:{es:'«___ you speak English?»',en:'«___ you speak English?»'}, opts:{es:['Do','Does'],en:['Do','Does']}, correct:0, fb:{ why:{es:'you → Do.',en:'you → Do.'}, ex:{es:'Do you speak English? → ¿Hablas inglés?',en:'Do you speak English?'}, tip:{es:'you → Do',en:'you → Do'}} },
      { q:{es:'«___ he like soccer?»',en:'«___ he like soccer?»'}, opts:{es:['Does','Do'],en:['Does','Do']}, correct:0, fb:{ why:{es:'he → Does.',en:'he → Does.'}, ex:{es:'Does he like soccer? → ¿Le gusta el fútbol?',en:'Does he like soccer?'}, tip:{es:'he → Does',en:'he → Does'}} },
      { q:{es:'«Where ___ they live?»',en:'«Where ___ they live?»'}, opts:{es:['do','does'],en:['do','does']}, correct:0, fb:{ why:{es:'they → do.',en:'they → do.'}, ex:{es:'Where do they live? → ¿Dónde viven?',en:'Where do they live?'}, tip:{es:'they → do',en:'they → do'}}, tr:{es:'¿Dónde viven?',en:'Where do they live?'} },
      { q:{es:'¿Cuál está bien?',en:'Which one is right?'}, opts:{es:['Does she work?','Does she works?'],en:['Does she work?','Does she works?']}, correct:0, fb:{ why:{es:'Tras «Does» → base.',en:'After «Does» → base.'}, ex:{es:'Does she work? → ¿Ella trabaja?',en:'Does she work?'}, tip:{es:'Does + base',en:'Does + base'}} },
      { q:{es:'Respuesta a «Do you like it?» (sí):',en:'Answer to «Do you like it?» (yes):'}, opts:{es:['Yes, I do.','Yes, I am.'],en:['Yes, I do.','Yes, I am.']}, correct:0, fb:{ why:{es:'Repites «do».',en:'You repeat «do».'}, ex:{es:'Yes, I do → Sí',en:'Yes, I do'}, tip:{es:'do → do',en:'do → do'}} }
    ] },
  { icon:'💡', title:{es:'Tips Prácticos',en:'Practical Tips'},
    html:{
      es:`<div class="gdesc">Las dos fórmulas, lado a lado:</div>
        <div class="fbox"><div class="frm"><span class="pill v">Do/Does</span><span class="plus">+</span><span class="pill s">sujeto</span><span class="plus">+</span><span class="pill o">base?</span></div><div class="fex"><span class="v">Does</span> <span class="s">he</span> <span class="o">work</span>? — ¿Él trabaja?</div></div>
        <div class="fbox"><div class="frm"><span class="pill p">WH</span><span class="plus">+</span><span class="pill v">do/does</span><span class="plus">+</span><span class="pill s">sujeto + base?</span></div><div class="fex"><span class="p">What</span> <span class="v">do</span> <span class="s">you do</span>? — ¿A qué te dedicas?</div></div>
        ${ii('👉','<b>Tip 1 — Elige:</b> He/She/It → does · I/You/We/They → do.')}
        ${ii('✂️','<b>Tip 2 — Verbo base:</b> nunca «Does he plays?».')}
        ${ii('✅','<b>Tip 3 — Respuesta corta:</b> «Yes, I do» / «No, he doesn\'t».')}
        <div class="alert-card"><div class="atitle">⚠️ Error típico</div><p>❌ «Do she like…?» → ✅ «<b>Does</b> she like…?»<br>❌ «What she does?» → ✅ «What <b>does</b> she do?»</p></div>`,
      en:`<div class="gdesc">The two formulas, side by side:</div>
        <div class="fbox"><div class="frm"><span class="pill v">Do/Does</span><span class="plus">+</span><span class="pill s">subject</span><span class="plus">+</span><span class="pill o">base?</span></div><div class="fex"><span class="v">Does</span> <span class="s">he</span> <span class="o">work</span>? — ¿Él trabaja?</div></div>
        <div class="fbox"><div class="frm"><span class="pill p">WH</span><span class="plus">+</span><span class="pill v">do/does</span><span class="plus">+</span><span class="pill s">subject + base?</span></div><div class="fex"><span class="p">What</span> <span class="v">do</span> <span class="s">you do</span>? — ¿A qué te dedicas?</div></div>
        ${ii('👉','<b>Tip 1 — Choose:</b> He/She/It → does · I/You/We/They → do.')}
        ${ii('✂️','<b>Tip 2 — Base verb:</b> never «Does he plays?».')}
        ${ii('✅','<b>Tip 3 — Short answer:</b> «Yes, I do» / «No, he doesn\'t».')}
        <div class="alert-card"><div class="atitle">⚠️ Common mistake</div><p>❌ «Do she like…?» → ✅ «<b>Does</b> she like…?»<br>❌ «What she does?» → ✅ «What <b>does</b> she do?»</p></div>`
    },
    checks:[
      { q:{es:'«___ they need help?»',en:'«___ they need help?»'}, opts:{es:['Do','Does'],en:['Do','Does']}, correct:0, fb:{ why:{es:'they → Do.',en:'they → Do.'}, ex:{es:'Do they need help? → ¿Necesitan ayuda?',en:'Do they need help?'}, tip:{es:'they → Do',en:'they → Do'}} },
      { q:{es:'«When ___ the class start?»',en:'«When ___ the class start?»'}, opts:{es:['does','do'],en:['does','do']}, correct:0, fb:{ why:{es:'«the class» (it) → does.',en:'«the class» (it) → does.'}, ex:{es:'When does the class start? → ¿Cuándo empieza la clase?',en:'When does the class start?'}, tip:{es:'it → does',en:'it → does'}}, tr:{es:'¿Cuándo empieza la clase?',en:'When does the class start?'} },
      { q:{es:'¿Cuál está bien?',en:'Which one is right?'}, opts:{es:['Do you have a car?','Do you has a car?'],en:['Do you have a car?','Do you has a car?']}, correct:0, fb:{ why:{es:'Tras «Do» → have (base).',en:'After «Do» → have (base).'}, ex:{es:'Do you have a car? → ¿Tienes carro?',en:'Do you have a car?'}, tip:{es:'Do + base',en:'Do + base'}} },
      { q:{es:'«How ___ she go to work?»',en:'«How ___ she go to work?»'}, opts:{es:['does','do'],en:['does','do']}, correct:0, fb:{ why:{es:'she → does.',en:'she → does.'}, ex:{es:'How does she go? → ¿Cómo va?',en:'How does she go?'}, tip:{es:'she → does',en:'she → does'}}, tr:{es:'¿Cómo va al trabajo?',en:'How does she go to work?'} },
      { q:{es:'Respuesta a «Does he study?» (no):',en:'Answer to «Does he study?» (no):'}, opts:{es:['No, he doesn\'t.','No, he don\'t.'],en:['No, he doesn\'t.','No, he don\'t.']}, correct:0, fb:{ why:{es:'he → doesn\'t.',en:'he → doesn\'t.'}, ex:{es:'No, he doesn\'t → No',en:'No, he doesn\'t'}, tip:{es:'he → doesn\'t',en:'he → doesn\'t'}} }
    ] },
  { icon:'✨', title:{es:'Práctica Final',en:'Final Practice'}, builder:true,
    html:{
      es:`<div class="gdesc">Junta todo: Do/Does + sujeto + base; con WH la palabra va primero. Arma la pregunta.</div>
        <div class="cboxes"><div class="cbox s"><span class="cl">Do</span><span class="cv">I · You · We · They</span></div><div class="cbox o"><span class="cl">Does</span><span class="cv">He · She · It</span></div><div class="cbox p"><span class="cl">WH</span><span class="cv">What · Where · When · How · Why</span></div></div>
        <div class="sec-label">Las reglas en una oración</div>
        ${eg('<span class="tag s">Do</span> you play sports?','¿Practicas deportes?','ok')}

let info='es', cur=0, doneSteps=[], answers=[], coreDone=false, bState={order:[],locked:false}, curLab='';
function L(){ return T[info]; }
function say(text,acc){ try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=.82; const vs=speechSynthesis.getVoices()||[]; const want=acc==='US'?'en-US':'en-GB'; const v=vs.find(x=>x.lang===want)||vs.find(x=>x.lang&&x.lang.indexOf('en')===0); if(v){u.voice=v;u.lang=v.lang;}else u.lang=want; speechSynthesis.speak(u); }catch(e){} }
function render(){ cur=0; coreDone=false; doneSteps=new Array(STEPS.length).fill(false); answers=STEPS.map(s=>new Array(s.checks.length).fill(null)); bState={order:[],locked:false};
  document.getElementById('results').classList.remove('show'); document.getElementById('mbody').style.display='block'; document.getElementById('msbanner').style.display='none';
  renderTabs(); applyLang(); showStep(0); }
function renderTabs(){ document.getElementById('steptabs').innerHTML=STEPS.map((s,i)=>`<button class="stab${i===0?' on':''}${doneSteps[i]?' done':''}" id="stab${i}" onclick="goStep(${i})">${s.icon} ${i+1}</button>`).join(''); }
function applyLang(){ const t=L();
  document.getElementById('lsEs').classList.toggle('on',info==='es'); document.getElementById('lsEn').classList.toggle('on',info==='en');
  document.getElementById('mhtitle').textContent=MAT.title[info]; document.getElementById('mhsub').textContent=document.getElementById('screen').getAttribute('data-level').toUpperCase().replace('-',' · ')+' · '+MAT.subtitle[info];
  document.getElementById('unT').textContent=t.unT; document.getElementById('unP').textContent=t.unP;
  document.getElementById('helpT').textContent=t.helpT; document.getElementById('helpTips').innerHTML='<div style="font-size:11.5px;color:var(--text-soft);font-weight:700;margin-bottom:6px">'+t.tipsT+'</div>'+t.tips.map(x=>'<div class="helptip">• <span>'+x+'</span></div>').join('');
  document.getElementById('kpT').textContent=t.kpT; document.getElementById('lBack').textContent=t.back; document.getElementById('lRetry').textContent=t.retry;
  updateMilestone(); renderStep(); }
function renderStep(){ const t=L(), s=STEPS[cur]; curLab= info==='es'?'EJEMPLO':'EXAMPLE';
  let html=`<div class="gcard"><div class="sec-label">${cur+1}. ${s.icon} ${s.title[info]}</div>${s.html[info]}`;
  if(s.builder) html+=builderHtml(); html+=`</div>`;
  const ansd=answers[cur].filter(x=>x!==null).length;
  html+=`<div class="check"><div class="check-h">🧠 ${t.checkH}<span class="cprog">${ansd}/${s.checks.length}</span></div><div class="check-sub">${t.checkSub}</div>`;
  s.checks.forEach((c,ci)=>{ const sel=answers[cur][ci]; const done=sel!==null; const ok=sel===c.correct;
    let fb='';
    if(done){ const f=c.fb; fb=`<div class="cfb show ${ok?'ok':'no'}"><div class="cfbh">${ok?'✅ '+t.cOk:'❌ '+t.cBad}</div><div class="cfbb">`+
      `<div class="fblk why"><b>🔍 ${t.fWhy}</b>${f.why[info]}</div>`+
      (f.contrast?`<div class="fblk contrast"><b>⚠ ${t.fNo}</b>${f.contrast[info]}</div>`:'')+
      (f.ex?`<div class="fblk ex"><b>📝 ${t.fEx}</b>${f.ex[info]}</div>`:'')+
      (f.tip?`<div class="fblk tip"><b>💡 ${t.fTip}</b>${f.tip[info]}</div>`:'')+`</div></div>`; }
    const trBtn = (c.tr && info==='es') ? `<button class="ctransbtn" onclick="this.nextElementSibling.classList.toggle('show')">🌐 ${t.seeTr}</button><div class="ctrans">${c.tr.es}</div>` : '';
    html+=`<div class="citem"><p class="cq"><span class="n">${ci+1}.</span> ${c.q[info]}</p>${trBtn}<div class="copts">`+

      `</div>${fb}</div>`;

function initBuilder(){ bState={order:[],locked:false}; const sh=[...BUILD.answer.keys()].sort(()=>Math.random()-.5);
  document.getElementById('bank').innerHTML=sh.map(idx=>`<button class="tile ${BUILD.answer[idx].c}" id="tile${idx}" onclick="placeTile(${idx})">${BUILD.answer[idx].w}</button>`).join(''); document.getElementById('tray').innerHTML=''; }
function placeTile(idx){ if(bState.locked)return; bState.order.push(idx); document.getElementById('tile'+idx).classList.add('placed'); const tr=document.getElementById('tray'); const b=document.createElement('button'); b.className='tile '+BUILD.answer[idx].c; b.textContent=BUILD.answer[idx].w; b.onclick=()=>removeTile(idx,b); tr.appendChild(b); document.getElementById('bchk').disabled=bState.order.length!==BUILD.answer.length; }
function removeTile(idx,el){ if(bState.locked)return; bState.order=bState.order.filter(x=>x!==idx); el.remove(); document.getElementById('tile'+idx).classList.remove('placed'); document.getElementById('bchk').disabled=bState.order.length!==BUILD.answer.length; }
function checkBuild(){ const t=L(); bState.locked=true; const ok=bState.order.join(',')===BUILD.answer.map((_,i)=>i).join(','); document.querySelectorAll('#tray .tile').forEach(x=>x.style.pointerEvents='none');

function navStep(d){ if(d<0){ if(cur>0) showStep(cur-1); return; } if(cur<STEPS.length-1){ showStep(cur+1); return; } const inc=answers.findIndex(a=>a.some(x=>x===null)); if(inc>=0){ toast(L().finishNeed); showStep(inc); } else finish(); }
function finish(){ const t=L(); document.getElementById('mbody').style.display='none'; document.getElementById('results').classList.add('show');
  let tot=0,corr=0; answers.forEach((arr,si)=>arr.forEach((k,ci)=>{ if(k!==null){tot++; if(k===STEPS[si].checks[ci].correct)corr++;} })); const pct=tot?Math.round(corr/tot*100):0; const pass=pct>=PASS;
  const db=document.getElementById('doneBar'); db.classList.toggle('fail',!pass); db.textContent= pass? t.done : t.failBar; document.getElementById('fscore').textContent=pct; document.getElementById('fphrase').textContent= pass? t.phrase : t.phraseFail;
  document.getElementById('kpList').innerHTML=SUMMARY[info].map(s=>`<li>${s}</li>`).join('');
