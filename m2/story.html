<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stories y Diálogos · Shopping, Services & Money · JUCUM</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#ECEAE3; --card:#fff; --text:#2A2A2A; --text-soft:#777; --border:#E8E5DC;
    --fd:'Fredoka','Nunito',system-ui,sans-serif; --fb:'Nunito',system-ui,sans-serif; --fs:'Atkinson Hyperlegible',Georgia,serif;
    --rv-bg:#F3E5F5; --rv-text:#7B1FA2; --rv-bd:#CE93D8; --reading:18px;
    --shadow:0 2px 4px rgba(0,0,0,.07),0 10px 30px rgba(0,0,0,.14); --shadow-sm:0 1px 2px rgba(0,0,0,.06),0 3px 10px rgba(0,0,0,.09); }
  [data-level="pre-a1"]{ --lp:#F9A825; --ld:#E65100; --ll:#FFF9C4; --lm:#FFECB3; --lg:linear-gradient(135deg,#F9A825,#FF8F00); --tint:#FAF7EE; }
  [data-level="a1"]{ --lp:#2196F3; --ld:#0D47A1; --ll:#E3F2FD; --lm:#BBDEFB; --lg:linear-gradient(135deg,#1565C0,#2196F3 60%,#64B5F6); --tint:#F1F7FE; }
  [data-level="a2"]{ --lp:#2EA84B; --ld:#1B5E20; --ll:#DFF5E3; --lm:#9FD3A2; --lg:linear-gradient(135deg,#43C062,#1F7A33); --tint:#F0F8F2; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;}
  .bar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:11px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .bar-brand{display:flex;align-items:center;gap:9px;} .bar-brand img{width:36px;height:36px;object-fit:contain;}
  .bar-brand b{font-family:var(--fd);font-weight:600;font-size:15px;display:block;line-height:1.05;} .bar-brand span{font-size:10.5px;color:var(--text-soft);font-weight:700;}
  .bar-title{flex:1;min-width:160px;} .bar-title h1{font-family:var(--fd);font-weight:600;font-size:16px;margin:0;} .bar-title p{margin:1px 0 0;font-size:11.5px;color:var(--text-soft);font-weight:700;}
  .ctrl{display:flex;align-items:center;gap:7px;} .ctrl>span{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--text-soft);}

  #segPre.on{background:linear-gradient(135deg,#F9A825,#FF8F00);color:#fff;} #segA1.on{background:linear-gradient(135deg,#1565C0,#2196F3);color:#fff;} #segA2.on{background:linear-gradient(135deg,#43C062,#1F7A33);color:#fff;}
  .stage{max-width:1200px;margin:0 auto;padding:24px 20px 60px;display:grid;grid-template-columns:minmax(0,420px) minmax(0,1fr);gap:30px;align-items:start;}
  @media(max-width:900px){.stage{grid-template-columns:1fr;}}
  .phone-wrap{position:sticky;top:78px;display:flex;flex-direction:column;align-items:center;gap:12px;}
  .phone-cap{font-size:11.5px;color:var(--text-soft);font-weight:800;text-transform:uppercase;letter-spacing:.08em;display:flex;gap:7px;align-items:center;} .phone-cap b{padding:3px 10px;border-radius:20px;color:#fff;font-size:10.5px;background:var(--lp);}
  .phone{width:408px;max-width:93vw;background:#1c1c22;border-radius:42px;padding:11px;box-shadow:var(--shadow);}
  .screen{background:var(--tint);border-radius:32px;overflow:hidden;position:relative;height:772px;display:flex;flex-direction:column;}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:130px;height:24px;background:#1c1c22;border-radius:0 0 16px 16px;z-index:30;}
  .scroll{position:relative;z-index:2;flex:1;overflow-y:auto;overflow-x:hidden;} .scroll::-webkit-scrollbar{width:0;}
  .mhead{background:var(--lg);padding:30px 15px 13px;display:flex;align-items:center;gap:10px;color:#fff;}
  .mback{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.22);border:none;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;}
  .mbadge{width:32px;height:32px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.2);} .mbadge img{width:24px;height:24px;object-fit:contain;}
  .mh-info{flex:1;min-width:0;} .mh-info b{font-family:var(--fd);font-weight:600;font-size:15px;display:block;} .mh-info span{font-size:10.5px;opacity:.9;font-weight:700;}
  .pill{background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.35);color:#fff;font-size:10px;font-weight:800;padding:3px 9px;border-radius:12px;}
  .rtools{position:sticky;top:0;z-index:15;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:8px 10px;display:flex;flex-direction:column;gap:7px;}
  .rrow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .playall{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:12.5px;border:none;border-radius:10px;padding:8px 14px;cursor:pointer;background:var(--lg);color:#fff;box-shadow:var(--shadow-sm);}
  .miniseg{display:flex;background:#F0EDE4;border:1px solid var(--border);border-radius:9px;padding:2px;gap:2px;} .miniseg button{border:none;background:transparent;font-weight:800;font-size:10.5px;padding:4px 8px;border-radius:7px;cursor:pointer;color:var(--text-soft);} .miniseg button.on{background:var(--lg);color:#fff;} .miniseg .lab{font-size:9px;font-weight:800;color:var(--text-soft);align-self:center;padding:0 4px;text-transform:uppercase;}
  .tbtn{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:800;border:1.5px solid var(--lm);background:#fff;color:var(--ld);border-radius:9px;padding:5px 8px;cursor:pointer;} .tbtn.on{background:var(--lg);color:#fff;border-color:transparent;}
  .speed{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:800;color:var(--text-soft);} .speed input{width:70px;accent-color:var(--lp);}
  .ring{margin-left:auto;display:flex;align-items:center;gap:6px;} .ring .t{font-size:10px;font-weight:800;color:var(--ld);line-height:1.1;} .ring .t small{display:block;color:var(--text-soft);font-size:8px;font-weight:700;}
  .mbody{padding:14px 16px 30px;}
  .howto{background:#fff;border:1px solid var(--lm);border-radius:14px;box-shadow:var(--shadow-sm);margin-bottom:14px;overflow:hidden;}
  .howto-h{display:flex;align-items:center;gap:8px;padding:11px 13px;background:var(--ll);cursor:pointer;} .howto-h b{font-family:var(--fd);font-weight:600;font-size:13.5px;color:var(--ld);flex:1;} .howto-h .ar{transition:.2s;font-weight:800;color:var(--ld);} .howto.open .ar{transform:rotate(90deg);}
  .howto-b{display:none;padding:12px 14px;} .howto.open .howto-b{display:block;}
  .stepline{display:flex;gap:9px;padding:5px 0;font-size:12.5px;line-height:1.45;} .stepn{width:21px;height:21px;border-radius:50%;background:var(--lg);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex-shrink:0;} .stepnote{margin-top:8px;background:var(--tint);border-radius:9px;padding:8px 10px;font-size:11.5px;color:var(--text-soft);line-height:1.45;}
  .stitle{font-family:var(--fd);font-weight:600;font-size:21px;color:var(--ld);margin:2px 0 2px;} .ssub{font-size:12px;color:var(--text-soft);font-weight:700;margin-bottom:14px;}
  .para{margin-bottom:14px;border-radius:10px;transition:box-shadow .2s;padding:6px;margin-left:-6px;margin-right:-6px;} .para.reading{box-shadow:0 0 0 2px var(--lm);background:rgba(255,255,255,.5);}
  .ptext{font-family:var(--fs);font-size:var(--reading);line-height:1.95;color:#2b2b2b;}
  .sent,.sente{transition:background .15s;border-radius:4px;padding:0 1px;} .sent.read{background:var(--ll);box-shadow:0 0 0 2px var(--ll);} .sente.read{background:#F3E5F5;box-shadow:0 0 0 2px #F3E5F5;}
  .pes{display:none;font-family:var(--fs);font-style:italic;color:#5A2A66;font-size:calc(var(--reading) - 2px);line-height:1.85;margin-top:6px;padding-left:10px;border-left:2px solid var(--rv-bd);}
  .screen[data-text="es"] .ptext{display:none;} .screen[data-text="es"] .pes{display:block;border-left:none;padding-left:0;font-style:normal;color:#2b2b2b;} .screen[data-text="both"] .pes{display:block;}
  .prow{display:flex;gap:7px;margin-top:8px;} .pbtn{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;border-radius:9px;padding:5px 11px;cursor:pointer;border:1.5px solid var(--lm);background:var(--tint);color:var(--ld);} .pbtn.on{background:var(--lg);color:#fff;border-color:transparent;}
  .dato{display:none;margin-top:9px;background:#FFF8E1;border:1px solid #FFE082;border-radius:11px;padding:9px 12px;font-size:12.5px;color:#6B4E00;line-height:1.5;} .screen[data-datos="on"] .dato{display:block;} .dato .hd{display:flex;align-items:center;gap:5px;font-weight:800;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:#92510F;margin-bottom:3px;} .dato b{color:#92510F;}
  .endcard{background:#fff;border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow-sm);padding:18px;text-align:center;margin-top:6px;}
  .endcard .em{font-size:40px;} .endcard h3{font-family:var(--fd);font-weight:600;font-size:18px;color:var(--ld);margin:6px 0 2px;} .endcard p{font-size:12.5px;color:var(--text-soft);margin:0 0 12px;line-height:1.5;}
  .estats{display:flex;gap:9px;margin-bottom:12px;} .estat{flex:1;background:var(--tint);border:1px solid var(--lm);border-radius:12px;padding:10px 6px;} .estat b{font-family:var(--fd);font-weight:600;font-size:18px;color:var(--ld);display:block;} .estat span{font-size:10px;color:var(--text-soft);font-weight:800;text-transform:uppercase;letter-spacing:.03em;}
  .ebtn{width:100%;padding:13px;border:none;border-radius:13px;background:var(--lg);color:#fff;font-weight:800;font-size:13.5px;cursor:pointer;}
  .markdone{width:100%;padding:13px;border:2px solid var(--lm);border-radius:13px;background:#fff;color:var(--ld);font-weight:800;font-size:13.5px;cursor:pointer;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:7px;} .markdone.done{background:var(--lg);color:#fff;border-color:transparent;}
  .mfoot{display:flex;align-items:center;justify-content:center;gap:7px;font-size:10px;color:#B0A99A;padding:12px;font-weight:700;} .mfoot img{height:18px;opacity:.5;}
  .vpanel{position:absolute;left:0;right:0;bottom:0;z-index:60;background:#fff;border-top:1px solid var(--lm);border-radius:20px 20px 0 0;box-shadow:0 -8px 30px rgba(0,0,0,.18);padding:14px 16px 18px;transform:translateY(110%);transition:transform .28s;max-height:62%;display:flex;flex-direction:column;} .vpanel.show{transform:translateY(0);}
  .vpanel h4{font-family:var(--fd);font-weight:600;font-size:15px;color:var(--ld);margin:0 0 2px;display:flex;align-items:center;gap:7px;} .vpanel .sub{font-size:11px;color:var(--text-soft);font-weight:700;margin-bottom:10px;} .vpanel .gx{position:absolute;top:10px;right:12px;border:none;background:none;font-size:19px;color:#bbb;cursor:pointer;}
  .vlist{overflow-y:auto;display:flex;flex-direction:column;gap:7px;} .vrow{display:flex;align-items:center;gap:10px;background:var(--tint);border:1px solid var(--lm);border-radius:11px;padding:9px 11px;} .vrow .vw{font-weight:800;color:var(--ld);font-size:14px;min-width:78px;} .vrow .vm{flex:1;font-size:12.5px;color:#444;} .vrow .vex{display:block;font-family:var(--fs);font-style:italic;color:var(--text-soft);font-size:11px;margin-top:1px;} .vrow .spk{background:#fff;border:1.5px solid var(--lm);border-radius:9px;width:34px;height:34px;font-size:15px;cursor:pointer;color:var(--ld);flex-shrink:0;}
  .helpfab{position:absolute;right:14px;bottom:14px;z-index:55;display:inline-flex;align-items:center;gap:6px;height:40px;padding:0 16px;border-radius:22px;background:var(--lg);color:#fff;border:none;font-family:var(--fd);font-size:13.5px;font-weight:600;cursor:pointer;box-shadow:var(--shadow);}
  .helpov{position:absolute;inset:0;z-index:70;background:rgba(20,20,25,.5);display:none;align-items:center;justify-content:center;padding:18px;} .helpov.show{display:flex;}
  .helpcard{background:#fff;border-radius:18px;max-width:340px;width:100%;max-height:86%;overflow-y:auto;box-shadow:var(--shadow);padding:16px 18px;position:relative;} .helpcard h3{font-family:var(--fd);font-weight:600;font-size:16px;color:var(--ld);margin:0 0 8px;display:flex;align-items:center;gap:7px;} .helpcard .hx{position:absolute;top:10px;right:12px;border:none;background:none;font-size:19px;color:#bbb;cursor:pointer;}
  .helptip{display:flex;gap:6px;font-size:12px;color:#555;padding:4px 0;line-height:1.45;} .helptip b{color:var(--ld);}
  .helpfab.hidden{display:none;}
  .viewseg{display:flex;gap:4px;background:#F0EDE4;border:1px solid var(--border);border-radius:11px;padding:3px;margin-bottom:10px;}
  .viewseg button{flex:1;border:none;background:transparent;font-family:var(--fd);font-weight:600;font-size:12.5px;padding:7px 6px;border-radius:8px;cursor:pointer;color:var(--text-soft);display:flex;align-items:center;justify-content:center;gap:5px;} .viewseg button.on{background:var(--lg);color:#fff;}
  .dsp{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--ld);margin-bottom:2px;}
  .stpick{position:absolute;inset:0;z-index:65;background:var(--tint);overflow-y:auto;padding:20px 16px;}
  .stpick h3{font-family:var(--fd);font-weight:600;font-size:17px;color:var(--ld);margin:0 0 3px;} .stpick .sub{font-size:12px;color:var(--text-soft);font-weight:700;margin-bottom:14px;line-height:1.4;}
  .stcard{display:flex;gap:11px;align-items:center;background:#fff;border:1.5px solid var(--border);border-radius:15px;padding:12px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow-sm);}
  .stcard.lock{opacity:.55;cursor:default;} .stcard .nx{width:40px;height:40px;border-radius:12px;background:var(--lg);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .stcard .si{flex:1;} .stcard .si b{font-family:var(--fd);font-weight:600;font-size:14px;color:var(--text);display:block;} .stcard .si span{font-size:11px;color:var(--text-soft);font-weight:700;} .stcard .go{color:var(--lp);font-weight:800;font-size:18px;}
  .notes h2{font-family:var(--fd);font-weight:600;font-size:18px;margin:0 0 4px;} .notes .lead{font-size:13px;color:var(--text-soft);margin:0 0 18px;line-height:1.5;}
  .note{background:#fff;border:1px solid var(--border);border-radius:15px;padding:14px 16px;margin-bottom:11px;box-shadow:var(--shadow-sm);} .note-h{display:flex;align-items:center;gap:10px;margin-bottom:6px;} .note-n{width:25px;height:25px;border-radius:8px;background:var(--lg);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:600;font-size:12px;flex-shrink:0;} .note-h b{font-family:var(--fd);font-weight:600;font-size:14px;} .note p{margin:0;font-size:12.5px;color:#555;line-height:1.5;}
  .ask{background:#FFFDF5;border:1.5px solid #F0D98B;border-radius:13px;padding:14px 16px;margin-top:6px;} .ask b{font-family:var(--fd);font-weight:600;font-size:14px;color:#8A5A00;} .ask p{font-size:12.5px;color:#6B5A33;margin:6px 0 0;line-height:1.55;}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:#222;color:#fff;padding:11px 20px;border-radius:24px;font-weight:800;font-size:13px;box-shadow:var(--shadow);z-index:200;opacity:0;transition:.3s;pointer-events:none;} .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ===== PRODUCCIÓN: pantalla completa (no tocar) ===== */
  .bar{display:none!important}.notes{display:none!important}.phone-cap{display:none!important}.notch{display:none!important}
  .stage{display:block!important;max-width:560px;margin:0 auto;padding:0!important}
  .phone-wrap{position:static!important;display:block!important}
  .phone{width:100%!important;max-width:none!important;background:none!important;border-radius:0!important;padding:0!important;box-shadow:none!important}
  .screen{height:auto!important;min-height:100vh;border-radius:0!important;display:block!important;overflow:visible!important}
  .phone{width:100%!important;max-width:none!important;background:none!important;border-radius:0!important;padding:0!important;box-shadow:none!important;overflow:visible!important}
  .scroll{overflow:visible!important;height:auto!important;flex:none!important}
  .mhead{position:static!important}
  .rtools{position:sticky!important;top:0!important;z-index:30}
  .helpfab{position:fixed!important;right:16px;bottom:16px}
  .vpanel{position:fixed!important;left:50%!important;transform:translateX(-50%) translateY(110%);max-width:680px;}
  .vpanel.show{transform:translateX(-50%) translateY(0)!important;}
  .stpick{position:fixed!important;inset:0;max-width:none;}
  /* Escritorio: experiencia cómoda, no solo móvil */
  @media(min-width:760px){
    .stage{max-width:760px}
    .mbody{padding:20px 32px 48px}
    .ptext{font-size:20px;line-height:2}
    .pes{font-size:18px}
    .rtools{padding:12px 32px}
    .mhead{padding:18px 32px 14px}

  }
  #screen{overflow:visible!important} #screen .scroll{overflow:visible!important}
</style>
</head>
<body>
  
<div class="stage">
    <div class="phone-wrap">
      <div class="phone-cap">Vista del alumno · <b id="capLvl">Pre-A1</b></div>
      <div class="phone"><div class="screen" id="screen" data-level="a1" data-text="both" data-datos="off">
        <div class="notch"></div>
        <div class="scroll" id="scroll">
          <div class="mhead"><button class="mback" onclick="backToPicker()">‹</button>
            <div class="mbadge"><img src="https://jucum-english-center.netlify.app/assets/jucum-figure.png" alt="JUCUM" onerror="this.style.display='none'"></div>
            <div class="mh-info"><b>Stories &amp; Diálogos</b><span id="mhsub">A1 · M2 · Shopping, Services & Money</span></div>
            <div class="pill">📗 Lectura</div></div>
          <div class="rtools">
            <div class="rrow">
              <button class="playall" id="playAll" onclick="playAll()"><span class="ic">▶</span> <span class="pl"></span></button>
              <div class="miniseg"><span class="lab" id="txtLab">Texto</span><button id="txEn" onclick="setText('en')">EN</button><button id="txEs" onclick="setText('es')">ES</button><button id="txBoth" class="on" onclick="setText('both')">EN+ES</button></div>
              <div class="ring"><svg width="32" height="32" viewBox="0 0 34 34"><circle cx="17" cy="17" r="14" fill="none" stroke="#E5E1D6" stroke-width="4"></circle><circle id="ringFill" cx="17" cy="17" r="14" fill="none" stroke="var(--lp)" stroke-width="4" stroke-linecap="round" stroke-dasharray="88" stroke-dashoffset="88" transform="rotate(-90 17 17)"></circle></svg><div class="t"><span id="ringT">0:00</span><small id="ringNext"></small></div></div>
            </div>
            <div class="rrow">
              <button class="tbtn" id="datosBtn" onclick="toggleDatos()">💡 <span id="datosLab"></span></button>
              <button class="tbtn" onclick="openVocab()">📖 <span id="vocLab"></span></button>
              <button class="tbtn" id="voiceBtn" onclick="toggleVoice()">🔊 US</button>
              <div class="speed">🐢<input type="range" min="0.6" max="1.3" step="0.1" value="1" oninput="setRate(this.value)"/>🐇</div>
              <button class="tbtn" onclick="textSize(-1)">A−</button><button class="tbtn" onclick="textSize(1)">A+</button>
              <div class="miniseg" style="margin-left:auto"><span class="lab">🌐</span><button id="inEs" onclick="setInfo('es')">ES</button><button id="inEn" class="on" onclick="setInfo('en')">EN</button></div>
            </div>
          </div>
          <div class="mbody">
            <div class="howto" id="howto"><div class="howto-h" onclick="document.getElementById('howto').classList.toggle('open')"><span>🧭</span><b id="howtoT"></b><span class="ar">▸</span></div><div class="howto-b" id="howtoB"></div></div>
            <div class="viewseg"><button id="vwStory" class="on" onclick="setView('story')">📖 <span id="vwStoryL">Story</span></button><button id="vwDlg" onclick="setView('dlg')">💬 <span id="vwDlgL">Diálogo</span></button></div>
            <div class="stitle" id="stitle">A Week Without Water</div>

<script>
const GLOSS = [{"w":"shop / store","es":"tienda","ex":"a small shop"},{"w":"buy / sell","es":"comprar / vender","ex":"I want to buy it."},{"w":"price","es":"precio","ex":"a good price"},{"w":"pay","es":"pagar","ex":"pay with my card"},{"w":"receipt","es":"recibo","ex":"keep the receipt"},{"w":"refund","es":"reembolso","ex":"I want a refund."},{"w":"return","es":"devolver","ex":"return the item"},{"w":"cash / card","es":"efectivo / tarjeta","ex":"cash or card"},{"w":"save","es":"ahorrar","ex":"save money"},{"w":"cost","es":"costar","ex":"How much does it cost?"}];
/* Cada oración alineada EN↔ES (para resaltado por oración en ambos idiomas) */
const STORYDATA = {"1":{"sTitle":"The Hat in the Window","sTitleEs":"El sombrero del escaparate","dTitle":"The Green Jacket","dTitleEs":"La casaca verde","paras":[[["Clara loved shopping on Saturday mornings.","A Clara le encantaba ir de compras los sábados por la mañana."],["She would walk slowly down the street, her feet moving from one window to the next.","Caminaba despacio por la calle, mirando los escaparates de cada tienda."],["That morning, she saw a hat — wide-brimmed and deep green — sitting on a stand in the display.","Esa mañana, vio un sombrero — de ala ancha y verde oscuro — posado en un soporte del escaparate."],["She stopped walking immediately.","Dejó de caminar de inmediato."],["It stirred a quiet emotion she could not quite name.","Le despertó una emoción callada que no supo nombrar."]],[["She went inside and found a clerk near the entrance.","Entró y encontró a un dependiente cerca de la entrada."],["The shop was small but full of things.","La tienda era pequeña pero llena de cosas."],["There were boxes stacked underneath the shelves and bags hanging on every wall.","Había cajas apiladas debajo de las estanterías y bolsas colgadas en cada pared."],["Clara pointed at the hat in the window and asked if it was still for sale.","Clara señaló el sombrero del escaparate y preguntó si todavía estaba en venta."]],[["The clerk explained that it was the last one.","El dependiente explicó que era el último."],["She also described the material — it was a soft felt, made to keep its shape even on windy days.","También describió el material — era un fieltro suave, hecho para mantener su forma incluso en días de viento."],["Clara tried it on.","Clara se lo probó."],["It felt just right.","Le quedaba justo bien."],["But the price was more than she had planned to spend.","Pero el precio era más de lo que había planeado gastar."]],[["She stood there for a moment, thinking.","Se quedó parada un momento, pensando."],["She had been saving a little money each week since January.","Había estado ahorrando un poco de dinero cada semana desde enero."],["Despite the cost being slightly over her estimate, she decided it was worth it.","A pesar de que el costo era ligeramente mayor que su estimado, decidió que valía la pena."],["She told herself, once and for all, that she was done hesitating.","Se dijo, de una vez por todas, que ya no iba a dudar más."],["Good things on this earth require a bit more effort sometimes.","Las cosas buenas a veces requieren un poco más de esfuerzo."]],[["Clara paid and walked out into the sunshine wearing the hat.","Clara pagó y salió al sol con el sombrero puesto."],["She felt happy.","Se sentía feliz."],["A few people on the street smiled at her.","Algunas personas en la calle le sonrieron."],["One woman said it was a great color — just right for the season.","Una mujer dijo que era un gran color — perfecto para la temporada."],["Clara smiled back and kept walking, her energy suddenly better than before.","Clara le devolvió la sonrisa y siguió caminando, con más energía que antes."]],[["Walking on, Clara passed two other shops with hats in the window.","Mientras seguía caminando, Clara pasó por otras dos tiendas con sombreros en el escaparate."],["One was cheaper, but the color looked dull next to hers.","Uno era más barato, pero el color se veía apagado junto al suyo."],["The other was far too expensive for what it was.","El otro era demasiado caro para lo que era."],["She realized the green hat had been the best choice after all.","Se dio cuenta de que el sombrero verde había sido la mejor elección."],["A good purchase, she thought, is not only about the price — it is about how it makes you feel.","Una buena compra, pensó, no se trata solo del precio, sino de cómo te hace sentir."]],[["On the way home, she stopped at a small market and got a box of eggs and some fresh bread.","De camino a casa, se detuvo en un pequeño mercado y compró una caja de huevos y algo de pan fresco."],["It had been a good morning — one of those days when everything just seemed to go well.","Había sido una buena mañana — uno de esos días en que todo parece ir bien."],["She was already thinking about what she might look for next Saturday.","Ya estaba pensando en qué podría buscar el próximo sábado."]]],"dlg":[["Sara","Excuse me. Can you help me? I want to find a jacket, but I'm not sure which one to choose.","Disculpe. ¿Me puede ayudar? Quiero encontrar una chaqueta, pero no sé cuál seleccionar."],["Clerk","Of course! Let me show you two options. This first one is green. The second one is darker.","¡Claro! Déjeme mostrarle dos opciones. Esta primera es verde. La segunda es más oscura."],["Sara","I really like the green one. Can you describe the material?","Me gusta mucho la verde. ¿Puede describir el material?"],["Clerk","It's a very soft material. It's warm and light at the same time. Most customers love it.","Es un material muy suave. Es cálido y ligero al mismo tiempo. A la mayoría de los clientes les encanta."],["Sara","What sizes do you have? I usually wear a medium, but I'm not sure.","¿Qué talla tienen? Normalmente uso mediana, pero no estoy segura."],["Clerk","We have several sizes. The green jacket is slightly bigger than normal, so I recommend a small.","Tenemos varios tallas. La chaqueta verde es ligeramente más grande de lo normal, así que recomiendo la pequeña."],["Sara","How much does it cost?","¿Cuánto cuesta?"],["Clerk","The green one is forty-five dollars. It's a great price for this quality. The other one costs fifty.","La verde cuesta cuarenta y cinco dólares. Es un gran precio por esta calidad. La otra cuesta cincuenta."],["Sara","That's a bit expensive. Is there anything else below forty dollars?","Es un poco caro. ¿Hay algo más por debajo de cuarenta dólares?"],["Clerk","Let me check. We have a sale section. Maybe you can find something there.","Déjeme revisar. Tenemos una sección de rebajas. Quizás pueda encontrar algo allí."],["Sara","Great. I'll try the green one first, just to see how it fits.","Bien. Voy a probar primero la verde, solo para ver cómo me queda."],["Clerk","The fitting rooms are on the left, underneath the sign that says \"Try Here.\"","Los vestidores están a la izquierda, debajo del letrero que dice \"Pruebe Aquí\"."],["Sara","Thank you. I'll decide after I try it on.","Gracias. Decidiré después de probármela."],["Clerk","Take your time. I'll be right here if you need more help.","Tómese su tiempo. Estaré aquí si necesita más ayuda."],["Sara","It fits well, but I think it's still a bit too expensive for me. I need to save more money this month.","Me queda bien, pero creo que sigue siendo un poco cara para mí. Necesito ahorrar más dinero este mes."],["Clerk","I understand. We also accept payments in two installments. Would that help?","Entiendo. También aceptamos pagos en dos cuotas. ¿Le ayudaría eso?"],["Sara","Oh, that's a good solution. Let me consider it. I'll probably come back tomorrow.","Oh, esa es una buena solución. Déjeme considerarlo. Probablemente regrese mañana."],["Clerk","We'll keep the jacket for you until closing time today, if you want.","Le guardaremos la chaqueta hasta la hora de cierre hoy, si quiere."],["Sara","Yes, please! I'll send my sister a message and ask what she thinks.","¡Sí, por favor! Le enviaré un mensaje a mi hermana y le preguntaré qué opina."],["Clerk","No problem! The jacket will be here. See you later.","¡No hay problema! La chaqueta estará aquí. Hasta luego."]],"datos":{"0":"<i>would walk</i> aquí = costumbre del pasado: «solía caminar / caminaba». <i>would + verbo</i> repetido describe hábitos de antes, no el condicional."}},"2":{"sTitle":"The Receipt","sTitleEs":"El recibo","dTitle":"The Wrong Box","dTitleEs":"La caja equivocada","paras":[[["Pedro bought a lamp from a shop near his apartment.","Pedro compró una lámpara en una tienda cerca de su apartamento."],["It was a tall floor lamp with a gold base — elegant and solid.","Era una lámpara de pie alta con base dorada — elegante y sólida."],["He paid sixty dollars for it, which was more than he usually spent on things for the house.","Pagó sesenta dólares por ella, que era más de lo que normalmente gastaba en cosas para la casa."],["But he really liked the way it looked.","Pero realmente le gustaba el aspecto que tenía."]],[["Three days later, the lamp fell while he was moving furniture.","Tres días después, la lámpara cayó mientras movía muebles."],["The base broke in two separate pieces.","La base se rompió en dos piezas separadas."],["He tried to fix it himself, but the material was too hard to work with.","Intentó arreglarla él mismo, pero el material era demasiado duro para trabajar."],["He felt frustrated — what terrible timing — but he stayed calm.","Se sintió frustrado — qué mal momento — pero se mantuvo tranquilo."],["There was clearly a deep crack in the base.","Claramente había una grieta profunda en la base."],["He thought the best solution was to go back to the shop and explain what happened.","Pensó que la mejor solución era volver a la tienda y explicar lo que había pasado."]],[["At the shop, the clerk was polite but firm.","En la tienda, el dependiente fue amable pero firme."],["She said the store did not cover damage from accidents.","Dijo que la tienda no cubría daños por accidentes."],["Pedro asked if there was any other solution.","Pedro preguntó si había alguna otra solución."],["The clerk said she could demonstrate the repair service they offered — but it would cost extra.","El dependiente dijo que podía demostrar el servicio de reparación que ofrecían — pero costaría más."],["Pedro was disappointed.","Pedro se decepcionó."],["He had not thought about that.","No había pensado en eso."]],[["Then she asked for the receipt.","Entonces ella pidió el recibo."],["He looked in his jacket, his bag, and even his old notes.","Buscó en su chaqueta, su bolso e incluso sus notas antiguas."],["The receipt was gone.","El recibo había desaparecido."],["He had not kept it.","No lo había guardado."],["Since he had no proof of purchase, there was nothing they could do for a refund.","Como no tenía prueba de compra, no podían hacer nada para el reembolso."],["He left feeling sorry he had not been more careful.","Se fue sintiéndose arrepentido de no haber sido más cuidadoso."]],[["Despite the bad experience, Pedro decided to handle it with a positive attitude.","A pesar de la mala experiencia, Pedro decidió manejarlo con una actitud positiva."],["He found a local repair shop a few streets away.","Encontró una tienda de reparación local a unas pocas calles de distancia."],["An older man there said he could fix the base for fifteen dollars.","Un hombre mayor allí dijo que podía arreglar la base por quince dólares."],["That was a much better option.","Esa era una opción mucho mejor."],["Pedro got the lamp back the next day, good as new.","Pedro recuperó la lámpara al día siguiente, como nueva."]],[["A few days later, Pedro told a friend about the whole situation.","Unos días después, Pedro le contó a un amigo toda la situación."],["His friend nodded and said the same thing happened to him once.","Su amigo asintió y dijo que a él le pasó lo mismo una vez."],["They agreed that many shops are friendly until something goes wrong.","Coincidieron en que muchas tiendas son amables hasta que algo sale mal."],["From then on, Pedro decided to always ask about the return policy before buying anything expensive.","Desde entonces, Pedro decidió preguntar siempre por la política de devoluciones antes de comprar algo caro."]],[["Since that day, Pedro has kept every receipt in a small box on his desk.","Desde ese día, Pedro guarda todos los recibos en una pequeña caja sobre su escritorio."],["He learned that a simple piece of paper can save you a lot of trouble.","Aprendió que un simple trozo de papel puede ahorrarte muchos problemas."],["He also learned that a good solution is not always where you first look for it — sometimes it's just around the corner.","También aprendió que una buena solución no siempre está donde la buscas primero — a veces está justo a la vuelta de la esquina."]]],"dlg":[["Marco","Hi. I bought this blender here last week.","Hola. Compré esta licuadora aquí la semana pasada."],["Agent","Hello! Is there something wrong with it?","¡Hola! ¿Hay algo malo con ella?"],["Marco","No, it works fine, but I want to return it.","No, funciona bien, pero quiero devolverla."],["Agent","No problem. Can I ask why you want to return it?","Sin problema. ¿Puedo preguntar por qué quiere devolverla?"],["Marco","My family gave me the same blender as a gift.","Mi familia me regaló la misma licuadora."],["Agent","I understand. That happens a lot. Do you have the receipt?","Entiendo. Eso pasa mucho. ¿Tiene el recibo?"],["Marco","Yes, here it is. I bought it just five days ago.","Sí, aquí está. La compré hace solo cinco días."],["Agent","Great. And is the box still sealed and unused?","Qué bien. ¿Y la caja sigue sellada y sin usar?"],["Marco","Yes, completely. I never even opened it.","Sí, completamente. Ni siquiera la abrí."],["Agent","Perfect. Then we can return it today, no problem.","Perfecto. Entonces podemos devolverla hoy, sin problema."],["Marco","That is good news. Can I get my money back?","Qué buena noticia. ¿Me pueden devolver el dinero?"],["Agent","Of course. Do you want a refund or store credit?","Por supuesto. ¿Quiere un reembolso o crédito en tienda?"],["Marco","A refund on my card, please.","Un reembolso a mi tarjeta, por favor."],["Agent","Done. The money will arrive in two or three days.","Listo. El dinero llegará en dos o tres días."],["Marco","Thank you. By the way, do you sell kitchen sets?","Gracias. Por cierto, ¿venden juegos de cocina?"],["Agent","Yes, we do. You can find them in aisle four.","Sí, claro. Los puede encontrar en el pasillo cuatro."],["Marco","Perfect. I will go take a look right now.","Perfecto. Voy a echar un vistazo ahorita."],["Agent","Sure! And remember to keep your new receipt too.","¡Claro! Y recuerde guardar también su nuevo recibo."]],"datos":{"0":"<i>floor lamp</i> = «lámpara de pie». En inglés el primer sustantivo describe al segundo: <i>floor lamp</i> (de piso), <i>table lamp</i> (de mesa)."}},"3":{"sTitle":"Fifty a Week","sTitleEs":"Cincuenta por semana","dTitle":"Gold or Credit?","dTitleEs":"¿Oro o crédito?","paras":[[["Ana earns a small salary at the market near her home.","Ana gana un pequeño salario en el mercado cerca de su casa."],["She works six days a week and finishes each shift feeling tired but satisfied.","Trabaja seis días a la semana y termina cada turno sintiéndose cansada pero satisfecha."],["Despite the long hours, she enjoys her job.","A pesar de las largas horas, disfruta su trabajo."],["The people there are kind, and she has learned to manage her time and energy well.","La gente allí es amable, y ha aprendido a gestionar bien su tiempo y energía."]],[["Each month, she sits down with a pen and paper to estimate her expenses.","Cada mes, se sienta con lápiz y papel para estimar sus gastos."],["She mainly spends money on food, transportation, and rent.","Principalmente gasta dinero en comida, transporte y alquiler."],["She grew up on a farm, far from the city and its factories, so she learned early to be careful with money.","Intenta ahorrar al menos cincuenta dólares cada mes."],["She tries to save at least fifty dollars every month.","No es mucho, pero es constante."],["It's not a lot, but she is consistent.","Lo ha hecho desde que consiguió su primer trabajo hace dos años."]],[["Sometimes it's hard.","A veces es difícil."],["When something breaks, or when a bill arrives that she didn't expect, the math doesn't work out perfectly.","Cuando algo se rompe, o cuando llega una factura que no esperaba, las cuentas no cuadran perfectamente."],["Last month, her phone required a repair that cost more than she had planned.","El mes pasado, su teléfono necesitó una reparación que costó más de lo que había planeado."],["She had to use part of her savings to cover it.","Tuvo que usar parte de sus ahorros para cubrirlo."],["The fear of losing all her savings felt very real that Tuesday — her dream of traveling suddenly felt very far away.","El miedo de perder todos sus ahorros se sintió muy real ese martes — su sueño de viajar de pronto pareció muy lejano."],["But she kept going.","Pero siguió adelante."]],[["She told herself that most people face these moments and that the important thing is to not let them define your whole plan.","Se dijo que la mayoría de las personas enfrentan estos momentos y que lo importante es no dejar que definan todo tu plan."],["She decided to work one extra shift that month to earn a little more.","Decidió trabajar un turno extra ese mes para ganar un poco más."],["Her manager said yes right away.","Su gerente dijo que sí de inmediato."],["Everyone at the shop knew she was reliable.","Todos en la tienda sabían que era confiable."]],[["By the end of the month, she had saved thirty dollars — not fifty, but still something.","Al final del mes, había ahorrado treinta dólares — no cincuenta, pero aún algo."],["She marked it in her notebook.","Lo marcó en su cuaderno."],["Small wins matter, she thought.","Las pequeñas victorias importan, pensó."],["She was not going to let one difficult month make her feel like the whole effort was gone.","No iba a dejar que un mes difícil la hiciera sentir que todo el esfuerzo se había ido."],["She would try again next month.","Lo intentaría de nuevo el próximo mes."]],[["To save money each week, Ana made small changes in her daily life.","Para ahorrar dinero cada semana, Ana hizo pequeños cambios en su vida diaria."],["She stopped buying coffee on the way to work and made it at home instead.","Dejó de comprar café camino al trabajo y lo preparaba en casa."],["She cooked simple meals and walked when the weather was good.","Cocinaba comidas sencillas y caminaba cuando el clima estaba bueno."],["None of it was easy, but every coin she put away brought her a little closer to her dream.","Nada de eso fue fácil, pero cada moneda que guardaba la acercaba un poco más a su sueño."]],[["Ana's goal is to save enough money to visit the sea one day — a distant place she has only seen in photos.","La meta de Ana es ahorrar suficiente dinero para visitar el mar algún día — un lugar distante que solo ha visto en fotos."],["It doesn't matter if it takes two more years.","No importa si tarda dos años más."],["She is patient.","Ella es paciente."],["She knows that most things worth having take time, and she is willing to wait for them.","Sabe que la mayoría de las cosas que valen la pena requieren tiempo, y está dispuesta a esperar por ellas."]]],"dlg":[["Lena","Hi. I am looking for a gift for my sister.","Hola. Estoy buscando un regalo para mi hermana."],["Clerk","Of course! What kind of things does she like?","¡Claro! ¿Qué tipo de cosas le gustan?"],["Lena","She loves jewelry, especially gold earrings.","Le encanta la joyería, sobre todo los aretes de oro."],["Clerk","We have a lovely gold set right here. Take a look.","Tenemos un lindo juego de oro aquí. Eche un vistazo."],["Lena","Oh, those are beautiful! How much do they cost?","¡Ay, son preciosos! ¿Cuánto cuestan?"],["Clerk","They are eighty soles, and they are real gold.","Cuestan ochenta soles, y son de oro de verdad."],["Lena","That is a bit more than I wanted to spend.","Es un poco más de lo que quería gastar."],["Clerk","I understand. We also have silver ones for fifty.","Entiendo. También tenemos unos de plata por cincuenta."],["Lena","Hmm. I think the gold ones look much nicer.","Mmm. Creo que los de oro se ven mucho más bonitos."],["Clerk","They do. And your sister will surely love them.","Así es. Y a su hermana seguro le van a encantar."],["Lena","You are right. I will take the gold earrings.","Tiene razón. Me llevo los aretes de oro."],["Clerk","Great choice! How would you like to pay today?","¡Excelente elección! ¿Cómo desea pagar hoy?"],["Lena","Can I pay with my credit card?","¿Puedo pagar con mi tarjeta de crédito?"],["Clerk","Yes, of course. We take both cash and card.","Sí, por supuesto. Aceptamos efectivo y tarjeta."],["Lena","I will use my card, then.","Entonces usaré mi tarjeta."],["Clerk","Perfect. Would you like a gift box as well?","Perfecto. ¿Desea también una caja de regalo?"],["Lena","Yes, please. That would be really lovely.","Sí, por favor. Eso sería muy lindo."],["Clerk","All done. Here you go — I hope she likes them!","Listo. Aquí tiene — ¡espero que le gusten!"]],"datos":{"6":"El <i>'s</i> indica posesión: <i>Ana's goal</i> = «la meta de Ana». En español invertimos el orden usando «de»."}},"4":{"sTitle":"Carlos's Long Shift","sTitleEs":"El turno largo de Carlos","dTitle":"The Shift Swap","dTitleEs":"El cambio de turno","paras":[[["Carlos has worked at the same shop for three years.","Carlos ha trabajado en la misma tienda por tres años."],["He is the shift supervisor now, which means he is mainly responsible for making sure everything runs well.","Ahora es el supervisor de turno, lo que significa que es principalmente responsable de asegurarse de que todo funcione bien."],["He led his first team at just twenty-three — young for the role, but he got the job because he was calm and organized.","Dirigió su primer equipo a los veintitrés — joven para el puesto, pero consiguió el trabajo porque era tranquilo y organizado."]],[["His morning started, as always, with a walkthrough of the shop floor.","Su mañana comenzó, como siempre, con un recorrido por la planta de la tienda."],["He checked that all items were in their right place and that the price marks were correct.","Comprobó que todos los artículos estuvieran en su lugar correcto y que las marcas de precio fueran correctas."],["He noticed a few boxes left underneath a table near the entrance — no one had put them away.","Notó algunas cajas dejadas debajo de una mesa cerca de la entrada — nadie las había guardado."],["He made a note to talk about it at the team meeting.","Hizo una nota para hablar sobre ello en la reunión del equipo."]],[["By mid-morning, the shop was busy.","A media mañana, la tienda estaba llena."],["Everyone seemed to be shopping at once.","Todo el mundo parecía estar comprando a la vez."],["Carlos helped two customers find items they were looking for, and he also tried to persuade a third customer not to leave after a misunderstanding about a price.","Carlos ayudó a dos clientes a encontrar artículos que buscaban, y también intentó convencer a un tercer cliente para que no se fuera después de un malentendido sobre un precio."],["He stayed patient.","Se mantuvo paciente."],["He knew that how you handle those moments matters.","Sabía que cómo manejas esos momentos importa."]],[["At lunch, he sat in the break room with two colleagues.","En el almuerzo, se sentó en la sala de descanso con dos compañeros."],["The conversation was light — they talked about a football match from the night before, and someone mentioned a music concert happening in the city on the weekend.","La conversación fue ligera — hablaron de un partido de fútbol de la noche anterior, y alguien mencionó un concierto de música que habría en la ciudad el fin de semana."],["Carlos laughed and said he hadn't been to a concert since he was a student.","Carlos se rió y dijo que no había ido a un concierto desde que era estudiante."],["He missed those days.","Echaba de menos esos días."]],[["In the afternoon, he had a short meeting with the store manager.","Por la tarde, tuvo una corta reunión con la gerente de la tienda."],["She said the sales numbers for the month were good — everyone had done well.","Ella dijo que las cifras de ventas del mes eran buenas — todos habían hecho un buen trabajo."],["She asked Carlos to define a new system for tracking inventory.","Le pidió a Carlos que definiera un nuevo sistema para controlar el inventario."],["He said he would use a simple set of forms.","Él dijo que usaría un conjunto sencillo de formularios."],["A key element, he explained, was making it easy enough that anyone could figure out how to use it without training.","Un elemento clave, explicó, era hacerlo lo bastante fácil para que cualquiera pudiera usarlo sin capacitación."],["He also offered to proofread the new form before it went out — a small but thoughtful gesture.","También se ofreció a revisar el nuevo formulario antes de publicarlo — un gesto pequeño pero atento."],["The manager smiled and said he was great with details.","La gerente sonrió y dijo que era excelente con los detalles."]],[["By the end of his shift, Carlos felt tired but good.","Al final de su turno, Carlos se sentía cansado pero bien."],["He had managed the day well.","Había manejado bien el día."],["He turned off the lights in the back room, made sure the doors were locked, and sent a short message to the team group chat to say everyone had done a great job.","Apagó las luces en la sala trasera, se aseguró de que las puertas estuvieran cerradas con llave, y envió un corto mensaje al chat grupal del equipo para decir que todos habían hecho un gran trabajo."],["Then he walked home through the field path, enjoying the quiet.","Luego caminó a casa por el camino del campo, disfrutando del silencio."]]],"dlg":[["Daniel","Hi Rita. Can I ask you a small favor?","Hola, Rita. ¿Te puedo pedir un pequeño favor?"],["Rita","Sure, Daniel. What do you need?","Claro, Daniel. ¿Qué necesitas?"],["Daniel","Could we swap our shifts this Thursday?","¿Podríamos cambiar nuestros turnos este jueves?"],["Rita","Thursday? Let me check my schedule first.","¿Jueves? Déjame revisar mi horario primero."],["Daniel","I have a doctor appointment in the morning.","Tengo una cita con el doctor en la mañana."],["Rita","I see. What time is your shift that day?","Ya veo. ¿A qué hora es tu turno ese día?"],["Daniel","It starts at nine and ends at three.","Empieza a las nueve y termina a las tres."],["Rita","That works for me. I can take your shift.","Eso me funciona. Puedo tomar tu turno."],["Daniel","Thank you so much! And I will cover yours.","¡Muchas gracias! Y yo cubro el tuyo."],["Rita","I work Saturday morning, from eight to two.","Trabajo el sábado en la mañana, de ocho a dos."],["Daniel","No problem at all. I will be there early.","No hay problema. Llegaré temprano."],["Rita","Great. Should we tell the manager about this?","Bien. ¿Deberíamos avisarle a la gerente?"],["Daniel","Yes, she needs to approve the swap first.","Sí, ella tiene que aprobar el cambio primero."],["Rita","I will send her a message right now.","Le voy a mandar un mensaje ahorita."],["Daniel","Perfect. Thanks again for helping me out.","Perfecto. Gracias de nuevo por ayudarme."],["Rita","Of course. We always help each other, right?","Claro. Siempre nos ayudamos, ¿no?"],["Daniel","Always. Let me know what she says.","Siempre. Avísame qué dice."],["Rita","I will. I am sure she will say yes.","Lo haré. Estoy segura de que dirá que sí."]],"datos":{"0":"<i>shift</i> aquí = «turno» (de trabajo), no «cambio». Es un falso amigo: el significado depende del contexto."}}};

let ALL=[], gi=0, gEnd=0, gScope='all', gPlaying=false;
function L(){ return UI[info]; }
let DLG = [];

function setView(v){ if(v===curView) return; pausePlay(); curView=v; VIEW= v==='dlg'?DLG:PARAS;
  document.getElementById('vwStory').classList.toggle('on',v==='story'); document.getElementById('vwDlg').classList.toggle('on',v==='dlg');

function render(){
  document.getElementById('paras').innerHTML = VIEW.map((p,pi)=>{
    const sp = p.sp?`<div class="dsp">${p.sp}</div>`:'';
    const en=p.pairs.map((q,si)=>`<span class="sent" id="s${pi}_${si}">${q.en}</span>`).join(' ');
    const es=p.pairs.map((q,si)=>`<span class="sente" id="e${pi}_${si}">${q.es}</span>`).join(' ');
    const dato=p.dato?`<div class="dato"><div class="hd">💡 Dato de traducción</div>${p.dato}</div>`:'';
    return `<div class="para" id="p${pi}">${sp}<div class="ptext">${en}</div><div class="pes" id="pes${pi}">${es}</div>
      <div class="prow"><button class="pbtn play" id="play${pi}" onclick="playPara(${pi})">▶ <span class="pl"></span></button></div>${dato}</div>`;
  }).join('');
  ALL=[]; VIEW.forEach((p,pi)=>p.pairs.forEach((q,si)=>ALL.push({pi,si}))); gi=0; gScope='all'; gEnd=ALL.length;
  applyInfo();
}
function applyInfo(){ const u=L(), st=STEPS[document.getElementById('screen').getAttribute('data-level')][info];
  document.getElementById('vocLab').textContent=u.voc; document.getElementById('datosLab').textContent=u.datos; document.getElementById('txtLab').textContent=u.txt; document.getElementById('ringNext').textContent=u.ringNext;

function pickVoice(){ try{ const vs=speechSynthesis.getVoices()||[]; const want=voice==='US'?'en-US':'en-GB'; return vs.find(v=>v.lang===want)||vs.find(v=>v.lang&&v.lang.indexOf('en')===0)||null; }catch(e){ return null; } }
function say(text,onend){ try{ if(!('speechSynthesis' in window))throw 0; speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=rate; const v=pickVoice(); if(v){u.voice=v;u.lang=v.lang;}else u.lang=voice==='US'?'en-US':'en-GB'; if(onend)u.onend=onend; speechSynthesis.speak(u); }catch(e){ if(onend) setTimeout(onend,Math.max(700,String(text).split(' ').length*330/rate)); } }
/* Reproducción: rango [gi,gEnd) · pausa conserva gi */
function setBtns(){ const all=gPlaying&&gScope==='all'; const pa=document.getElementById('playAll');
  pa.querySelector('.ic').textContent= all?'⏸':'▶'; pa.querySelector('.pl').textContent= all?L().pause:L().play;
  VIEW.forEach((p,pi)=>{ const b=document.getElementById('play'+pi); if(!b)return; const on=gPlaying&&gScope==='p'+pi; b.classList.toggle('on',on); b.querySelector('.pl').textContent= on?L().pPause:L().pPlay; b.firstChild.textContent= on?'⏸ ':'▶ '; }); }
function clearHl(){ document.querySelectorAll('.sent.read,.sente.read').forEach(s=>s.classList.remove('read')); document.querySelectorAll('.para.reading').forEach(p=>p.classList.remove('reading')); }
function startRange(st,end,scope){ if(gScope!==scope || gi<st || gi>=end) gi=st; gEnd=end; gScope=scope; gPlaying=true; setBtns(); step(); }
function playAll(){ if(gPlaying&&gScope==='all'){ pausePlay(); return; } startRange(0,ALL.length,'all'); }
function playPara(pi){ const idxs=ALL.map((a,k)=>a.pi===pi?k:-1).filter(k=>k>=0); if(gPlaying&&gScope==='p'+pi){ pausePlay(); return; } startRange(idxs[0],idxs[idxs.length-1]+1,'p'+pi); }
function pausePlay(){ gPlaying=false; try{speechSynthesis.cancel();}catch(e){} setBtns(); }
function step(){ if(!gPlaying) return;
  if(gi>=gEnd){ gPlaying=false; if(gScope==='all') gi=0; setBtns(); clearHl(); toast(info==='es'?'✓ Fin del audio':'✓ End of audio'); return; }
  const {pi,si}=ALL[gi]; clearHl(); const para=document.getElementById('p'+pi); para.classList.add('reading');
  const se=document.getElementById('s'+pi+'_'+si); if(se)se.classList.add('read');
  const ee=document.getElementById('e'+pi+'_'+si); if(ee)ee.classList.add('read');
  para.scrollIntoView({behavior:'smooth',block:'center'});
  say(VIEW[pi].pairs[si].en, ()=>{ if(!gPlaying)return; gi++; step(); });
}
