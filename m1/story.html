<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stories y Diálogos · Daily Life & Personal Routines · JUCUM</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:ital,wght@0,400;0,600;0,700;0,800&family=Atkinson+Hyperlegible:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#ECEAE3; --card:#fff; --text:#2A2A2A; --text-soft:#777; --border:#E8E5DC;
    --fd:'Fredoka','Nunito',system-ui,sans-serif; --fb:'Nunito',system-ui,sans-serif; --fs:'Atkinson Hyperlegible',Georgia,serif;
    --rv-bg:#F3E5F5; --rv-text:#7B1FA2; --rv-bd:#CE93D8; --reading:18px;
    --shadow:0 2px 4px rgba(0,0,0,.07),0 10px 30px rgba(0,0,0,.14); --shadow-sm:0 1px 2px rgba(0,0,0,.06),0 3px 10px rgba(0,0,0,.09); }
  [data-level="pre-a1"]{ --lp:#F9A825; --ld:#E65100; --ll:#FFF9C4; --lm:#FFECB3; --lg:linear-gradient(135deg,#F9A825,#FF8F00); --tint:#FAF7EE; }
  [data-level="a1"]{ --lp:#2196F3; --ld:#0D47A1; --ll:#E3F2FD; --lm:#BBDEFB; --lg:linear-gradient(135deg,#1565C0,#2196F3 60%,#64B5F6); --tint:#F1F7FE; }
  [data-level="a2"]{ --lp:#2EA84B; --ld:#1B5E20; --ll:#DFF5E3; --lm:#9FD3A2; --lg:linear-gradient(135deg,#43C062,#1F7A33); --tint:#F0F8F2; }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--fb);min-height:100vh;}
  .bar{position:sticky;top:0;z-index:50;background:rgba(255,255,255,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:11px 20px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .bar-brand{display:flex;align-items:center;gap:9px;} .bar-brand img{width:36px;height:36px;object-fit:contain;}
  .bar-brand b{font-family:var(--fd);font-weight:600;font-size:15px;display:block;line-height:1.05;} .bar-brand span{font-size:10.5px;color:var(--text-soft);font-weight:700;}
  .bar-title{flex:1;min-width:160px;} .bar-title h1{font-family:var(--fd);font-weight:600;font-size:16px;margin:0;} .bar-title p{margin:1px 0 0;font-size:11.5px;color:var(--text-soft);font-weight:700;}
  .ctrl{display:flex;align-items:center;gap:7px;} .ctrl>span{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--text-soft);}

  #segPre.on{background:linear-gradient(135deg,#F9A825,#FF8F00);color:#fff;} #segA1.on{background:linear-gradient(135deg,#1565C0,#2196F3);color:#fff;} #segA2.on{background:linear-gradient(135deg,#43C062,#1F7A33);color:#fff;}
  .stage{max-width:1200px;margin:0 auto;padding:24px 20px 60px;display:grid;grid-template-columns:minmax(0,420px) minmax(0,1fr);gap:30px;align-items:start;}
  @media(max-width:900px){.stage{grid-template-columns:1fr;}}
  .phone-wrap{position:sticky;top:78px;display:flex;flex-direction:column;align-items:center;gap:12px;}
  .phone-cap{font-size:11.5px;color:var(--text-soft);font-weight:800;text-transform:uppercase;letter-spacing:.08em;display:flex;gap:7px;align-items:center;} .phone-cap b{padding:3px 10px;border-radius:20px;color:#fff;font-size:10.5px;background:var(--lp);}
  .phone{width:408px;max-width:93vw;background:#1c1c22;border-radius:42px;padding:11px;box-shadow:var(--shadow);}
  .screen{background:var(--tint);border-radius:32px;overflow:hidden;position:relative;height:772px;display:flex;flex-direction:column;}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:130px;height:24px;background:#1c1c22;border-radius:0 0 16px 16px;z-index:30;}
  .scroll{position:relative;z-index:2;flex:1;overflow-y:auto;overflow-x:hidden;} .scroll::-webkit-scrollbar{width:0;}
  .mhead{background:var(--lg);padding:30px 15px 13px;display:flex;align-items:center;gap:10px;color:#fff;}
  .mback{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.22);border:none;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;}
  .mbadge{width:32px;height:32px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,.2);} .mbadge img{width:24px;height:24px;object-fit:contain;}
  .mh-info{flex:1;min-width:0;} .mh-info b{font-family:var(--fd);font-weight:600;font-size:15px;display:block;} .mh-info span{font-size:10.5px;opacity:.9;font-weight:700;}
  .pill{background:rgba(255,255,255,.22);border:1px solid rgba(255,255,255,.35);color:#fff;font-size:10px;font-weight:800;padding:3px 9px;border-radius:12px;}
  .rtools{position:sticky;top:0;z-index:15;background:rgba(255,255,255,.94);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:8px 10px;display:flex;flex-direction:column;gap:7px;}
  .rrow{display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
  .playall{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:12.5px;border:none;border-radius:10px;padding:8px 14px;cursor:pointer;background:var(--lg);color:#fff;box-shadow:var(--shadow-sm);}
  .miniseg{display:flex;background:#F0EDE4;border:1px solid var(--border);border-radius:9px;padding:2px;gap:2px;} .miniseg button{border:none;background:transparent;font-weight:800;font-size:10.5px;padding:4px 8px;border-radius:7px;cursor:pointer;color:var(--text-soft);} .miniseg button.on{background:var(--lg);color:#fff;} .miniseg .lab{font-size:9px;font-weight:800;color:var(--text-soft);align-self:center;padding:0 4px;text-transform:uppercase;}
  .tbtn{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;font-weight:800;border:1.5px solid var(--lm);background:#fff;color:var(--ld);border-radius:9px;padding:5px 8px;cursor:pointer;} .tbtn.on{background:var(--lg);color:#fff;border-color:transparent;}
  .speed{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:800;color:var(--text-soft);} .speed input{width:70px;accent-color:var(--lp);}
  .ring{margin-left:auto;display:flex;align-items:center;gap:6px;} .ring .t{font-size:10px;font-weight:800;color:var(--ld);line-height:1.1;} .ring .t small{display:block;color:var(--text-soft);font-size:8px;font-weight:700;}
  .mbody{padding:14px 16px 30px;}
  .howto{background:#fff;border:1px solid var(--lm);border-radius:14px;box-shadow:var(--shadow-sm);margin-bottom:14px;overflow:hidden;}
  .howto-h{display:flex;align-items:center;gap:8px;padding:11px 13px;background:var(--ll);cursor:pointer;} .howto-h b{font-family:var(--fd);font-weight:600;font-size:13.5px;color:var(--ld);flex:1;} .howto-h .ar{transition:.2s;font-weight:800;color:var(--ld);} .howto.open .ar{transform:rotate(90deg);}
  .howto-b{display:none;padding:12px 14px;} .howto.open .howto-b{display:block;}
  .stepline{display:flex;gap:9px;padding:5px 0;font-size:12.5px;line-height:1.45;} .stepn{width:21px;height:21px;border-radius:50%;background:var(--lg);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;flex-shrink:0;} .stepnote{margin-top:8px;background:var(--tint);border-radius:9px;padding:8px 10px;font-size:11.5px;color:var(--text-soft);line-height:1.45;}
  .stitle{font-family:var(--fd);font-weight:600;font-size:21px;color:var(--ld);margin:2px 0 2px;} .ssub{font-size:12px;color:var(--text-soft);font-weight:700;margin-bottom:14px;}
  .para{margin-bottom:14px;border-radius:10px;transition:box-shadow .2s;padding:6px;margin-left:-6px;margin-right:-6px;} .para.reading{box-shadow:0 0 0 2px var(--lm);background:rgba(255,255,255,.5);}
  .ptext{font-family:var(--fs);font-size:var(--reading);line-height:1.95;color:#2b2b2b;}
  .sent,.sente{transition:background .15s;border-radius:4px;padding:0 1px;} .sent.read{background:var(--ll);box-shadow:0 0 0 2px var(--ll);} .sente.read{background:#F3E5F5;box-shadow:0 0 0 2px #F3E5F5;}
  .pes{display:none;font-family:var(--fs);font-style:italic;color:#5A2A66;font-size:calc(var(--reading) - 2px);line-height:1.85;margin-top:6px;padding-left:10px;border-left:2px solid var(--rv-bd);}
  .screen[data-text="es"] .ptext{display:none;} .screen[data-text="es"] .pes{display:block;border-left:none;padding-left:0;font-style:normal;color:#2b2b2b;} .screen[data-text="both"] .pes{display:block;}
  .prow{display:flex;gap:7px;margin-top:8px;} .pbtn{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:800;border-radius:9px;padding:5px 11px;cursor:pointer;border:1.5px solid var(--lm);background:var(--tint);color:var(--ld);} .pbtn.on{background:var(--lg);color:#fff;border-color:transparent;}
  .dato{display:none;margin-top:9px;background:#FFF8E1;border:1px solid #FFE082;border-radius:11px;padding:9px 12px;font-size:12.5px;color:#6B4E00;line-height:1.5;} .screen[data-datos="on"] .dato{display:block;} .dato .hd{display:flex;align-items:center;gap:5px;font-weight:800;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;color:#92510F;margin-bottom:3px;} .dato b{color:#92510F;}
  .endcard{background:#fff;border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow-sm);padding:18px;text-align:center;margin-top:6px;}
  .endcard .em{font-size:40px;} .endcard h3{font-family:var(--fd);font-weight:600;font-size:18px;color:var(--ld);margin:6px 0 2px;} .endcard p{font-size:12.5px;color:var(--text-soft);margin:0 0 12px;line-height:1.5;}
  .estats{display:flex;gap:9px;margin-bottom:12px;} .estat{flex:1;background:var(--tint);border:1px solid var(--lm);border-radius:12px;padding:10px 6px;} .estat b{font-family:var(--fd);font-weight:600;font-size:18px;color:var(--ld);display:block;} .estat span{font-size:10px;color:var(--text-soft);font-weight:800;text-transform:uppercase;letter-spacing:.03em;}
  .ebtn{width:100%;padding:13px;border:none;border-radius:13px;background:var(--lg);color:#fff;font-weight:800;font-size:13.5px;cursor:pointer;}
  .markdone{width:100%;padding:13px;border:2px solid var(--lm);border-radius:13px;background:#fff;color:var(--ld);font-weight:800;font-size:13.5px;cursor:pointer;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:7px;} .markdone.done{background:var(--lg);color:#fff;border-color:transparent;}
  .mfoot{display:flex;align-items:center;justify-content:center;gap:7px;font-size:10px;color:#B0A99A;padding:12px;font-weight:700;} .mfoot img{height:18px;opacity:.5;}
  .vpanel{position:absolute;left:0;right:0;bottom:0;z-index:60;background:#fff;border-top:1px solid var(--lm);border-radius:20px 20px 0 0;box-shadow:0 -8px 30px rgba(0,0,0,.18);padding:14px 16px 18px;transform:translateY(110%);transition:transform .28s;max-height:62%;display:flex;flex-direction:column;} .vpanel.show{transform:translateY(0);}
  .vpanel h4{font-family:var(--fd);font-weight:600;font-size:15px;color:var(--ld);margin:0 0 2px;display:flex;align-items:center;gap:7px;} .vpanel .sub{font-size:11px;color:var(--text-soft);font-weight:700;margin-bottom:10px;} .vpanel .gx{position:absolute;top:10px;right:12px;border:none;background:none;font-size:19px;color:#bbb;cursor:pointer;}
  .vlist{overflow-y:auto;display:flex;flex-direction:column;gap:7px;} .vrow{display:flex;align-items:center;gap:10px;background:var(--tint);border:1px solid var(--lm);border-radius:11px;padding:9px 11px;} .vrow .vw{font-weight:800;color:var(--ld);font-size:14px;min-width:78px;} .vrow .vm{flex:1;font-size:12.5px;color:#444;} .vrow .vex{display:block;font-family:var(--fs);font-style:italic;color:var(--text-soft);font-size:11px;margin-top:1px;} .vrow .spk{background:#fff;border:1.5px solid var(--lm);border-radius:9px;width:34px;height:34px;font-size:15px;cursor:pointer;color:var(--ld);flex-shrink:0;}
  .helpfab{position:absolute;right:14px;bottom:14px;z-index:55;display:inline-flex;align-items:center;gap:6px;height:40px;padding:0 16px;border-radius:22px;background:var(--lg);color:#fff;border:none;font-family:var(--fd);font-size:13.5px;font-weight:600;cursor:pointer;box-shadow:var(--shadow);}
  .helpov{position:absolute;inset:0;z-index:70;background:rgba(20,20,25,.5);display:none;align-items:center;justify-content:center;padding:18px;} .helpov.show{display:flex;}
  .helpcard{background:#fff;border-radius:18px;max-width:340px;width:100%;max-height:86%;overflow-y:auto;box-shadow:var(--shadow);padding:16px 18px;position:relative;} .helpcard h3{font-family:var(--fd);font-weight:600;font-size:16px;color:var(--ld);margin:0 0 8px;display:flex;align-items:center;gap:7px;} .helpcard .hx{position:absolute;top:10px;right:12px;border:none;background:none;font-size:19px;color:#bbb;cursor:pointer;}
  .helptip{display:flex;gap:6px;font-size:12px;color:#555;padding:4px 0;line-height:1.45;} .helptip b{color:var(--ld);}
  .helpfab.hidden{display:none;}
  .viewseg{display:flex;gap:4px;background:#F0EDE4;border:1px solid var(--border);border-radius:11px;padding:3px;margin-bottom:10px;}
  .viewseg button{flex:1;border:none;background:transparent;font-family:var(--fd);font-weight:600;font-size:12.5px;padding:7px 6px;border-radius:8px;cursor:pointer;color:var(--text-soft);display:flex;align-items:center;justify-content:center;gap:5px;} .viewseg button.on{background:var(--lg);color:#fff;}
  .dsp{font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--ld);margin-bottom:2px;}
  .stpick{position:absolute;inset:0;z-index:65;background:var(--tint);overflow-y:auto;padding:20px 16px;}
  .stpick h3{font-family:var(--fd);font-weight:600;font-size:17px;color:var(--ld);margin:0 0 3px;} .stpick .sub{font-size:12px;color:var(--text-soft);font-weight:700;margin-bottom:14px;line-height:1.4;}
  .stcard{display:flex;gap:11px;align-items:center;background:#fff;border:1.5px solid var(--border);border-radius:15px;padding:12px;margin-bottom:10px;cursor:pointer;box-shadow:var(--shadow-sm);}
  .stcard.lock{opacity:.55;cursor:default;} .stcard .nx{width:40px;height:40px;border-radius:12px;background:var(--lg);color:#fff;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
  .stcard .si{flex:1;} .stcard .si b{font-family:var(--fd);font-weight:600;font-size:14px;color:var(--text);display:block;} .stcard .si span{font-size:11px;color:var(--text-soft);font-weight:700;} .stcard .go{color:var(--lp);font-weight:800;font-size:18px;}
  .notes h2{font-family:var(--fd);font-weight:600;font-size:18px;margin:0 0 4px;} .notes .lead{font-size:13px;color:var(--text-soft);margin:0 0 18px;line-height:1.5;}
  .note{background:#fff;border:1px solid var(--border);border-radius:15px;padding:14px 16px;margin-bottom:11px;box-shadow:var(--shadow-sm);} .note-h{display:flex;align-items:center;gap:10px;margin-bottom:6px;} .note-n{width:25px;height:25px;border-radius:8px;background:var(--lg);color:#fff;display:flex;align-items:center;justify-content:center;font-family:var(--fd);font-weight:600;font-size:12px;flex-shrink:0;} .note-h b{font-family:var(--fd);font-weight:600;font-size:14px;} .note p{margin:0;font-size:12.5px;color:#555;line-height:1.5;}
  .ask{background:#FFFDF5;border:1.5px solid #F0D98B;border-radius:13px;padding:14px 16px;margin-top:6px;} .ask b{font-family:var(--fd);font-weight:600;font-size:14px;color:#8A5A00;} .ask p{font-size:12.5px;color:#6B5A33;margin:6px 0 0;line-height:1.55;}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:#222;color:#fff;padding:11px 20px;border-radius:24px;font-weight:800;font-size:13px;box-shadow:var(--shadow);z-index:200;opacity:0;transition:.3s;pointer-events:none;} .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  /* ===== PRODUCCIÓN: pantalla completa (no tocar) ===== */
  .bar{display:none!important}.notes{display:none!important}.phone-cap{display:none!important}.notch{display:none!important}
  .stage{display:block!important;max-width:560px;margin:0 auto;padding:0!important}
  .phone-wrap{position:static!important;display:block!important}
  .phone{width:100%!important;max-width:none!important;background:none!important;border-radius:0!important;padding:0!important;box-shadow:none!important}
  .screen{height:auto!important;min-height:100vh;border-radius:0!important;display:block!important;overflow:visible!important}
  .phone{width:100%!important;max-width:none!important;background:none!important;border-radius:0!important;padding:0!important;box-shadow:none!important;overflow:visible!important}
  .scroll{overflow:visible!important;height:auto!important;flex:none!important}
  .mhead{position:static!important}
  .rtools{position:sticky!important;top:0!important;z-index:30}
  .helpfab{position:fixed!important;right:16px;bottom:16px}
  .vpanel{position:fixed!important;left:50%!important;transform:translateX(-50%) translateY(110%);max-width:680px;}
  .vpanel.show{transform:translateX(-50%) translateY(0)!important;}
  .stpick{position:fixed!important;inset:0;max-width:none;}
  /* Escritorio: experiencia cómoda, no solo móvil */
  @media(min-width:760px){
    .stage{max-width:760px}
    .mbody{padding:20px 32px 48px}
    .ptext{font-size:20px;line-height:2}
    .pes{font-size:18px}
    .rtools{padding:12px 32px}
    .mhead{padding:18px 32px 14px}

  }
  #screen{overflow:visible!important} #screen .scroll{overflow:visible!important}
</style>

<body>
  
<div class="stage">
    <div class="phone-wrap">
      <div class="phone-cap">Vista del alumno · <b id="capLvl">Pre-A1</b></div>
      <div class="phone"><div class="screen" id="screen" data-level="a1" data-text="both" data-datos="off">
        <div class="notch"></div>
        <div class="scroll" id="scroll">
          <div class="mhead"><button class="mback" onclick="backToPicker()">‹</button>
            <div class="mbadge"><img src="https://jucum-english-center.netlify.app/assets/jucum-figure.png" alt="JUCUM" onerror="this.style.display='none'"></div>
            <div class="mh-info"><b>Stories &amp; Diálogos</b><span id="mhsub">A1 · M1 · Daily Life & Personal Routines</span></div>
            <div class="pill">📗 Lectura</div></div>
          <div class="rtools">
            <div class="rrow">
              <button class="playall" id="playAll" onclick="playAll()"><span class="ic">▶</span> <span class="pl"></span></button>
              <div class="miniseg"><span class="lab" id="txtLab">Texto</span><button id="txEn" onclick="setText('en')">EN</button><button id="txEs" onclick="setText('es')">ES</button><button id="txBoth" class="on" onclick="setText('both')">EN+ES</button></div>
              <div class="ring"><svg width="32" height="32" viewBox="0 0 34 34"><circle cx="17" cy="17" r="14" fill="none" stroke="#E5E1D6" stroke-width="4"></circle><circle id="ringFill" cx="17" cy="17" r="14" fill="none" stroke="var(--lp)" stroke-width="4" stroke-linecap="round" stroke-dasharray="88" stroke-dashoffset="88" transform="rotate(-90 17 17)"></circle></svg><div class="t"><span id="ringT">0:00</span><small id="ringNext"></small></div></div>
            </div>
            <div class="rrow">
              <button class="tbtn" id="datosBtn" onclick="toggleDatos()">💡 <span id="datosLab"></span></button>
              <button class="tbtn" onclick="openVocab()">📖 <span id="vocLab"></span></button>
              <button class="tbtn" id="voiceBtn" onclick="toggleVoice()">🔊 US</button>
              <div class="speed">🐢<input type="range" min="0.6" max="1.3" step="0.1" value="1" oninput="setRate(this.value)"/>🐇</div>
              <button class="tbtn" onclick="textSize(-1)">A−</button><button class="tbtn" onclick="textSize(1)">A+</button>
              <div class="miniseg" style="margin-left:auto"><span class="lab">🌐</span><button id="inEs" onclick="setInfo('es')">ES</button><button id="inEn" class="on" onclick="setInfo('en')">EN</button></div>
            </div>
          </div>
          <div class="mbody">
            <div class="howto" id="howto"><div class="howto-h" onclick="document.getElementById('howto').classList.toggle('open')"><span>🧭</span><b id="howtoT"></b><span class="ar">▸</span></div><div class="howto-b" id="howtoB"></div></div>
            <div class="viewseg"><button id="vwStory" class="on" onclick="setView('story')">📖 <span id="vwStoryL">Story</span></button><button id="vwDlg" onclick="setView('dlg')">💬 <span id="vwDlgL">Diálogo</span></button></div>
            <div class="stitle" id="stitle">A Week Without Water</div>

const STORYDATA = {"1":{"sTitle":"The Hour Before School","sTitleEs":"La hora antes de la escuela","dTitle":"Good Mornings and Bad Habits","dTitleEs":"Buenas mañanas y malos hábitos","paras":[[["Ana wakes up at half past six every morning.","Ana se despierta a las seis y media cada mañana."],["She doesn't use an alarm — her body just knows when it's time.","No usa despertador — su cuerpo simplemente sabe cuándo es el momento."],["She lies in bed for a few minutes and then she gets up.","Se queda en cama unos minutos y luego se levanta."]],[["The first thing she does is open the window in her room.","Lo primero que hace es abrir la ventana de su cuarto."],["She likes to feel the morning air, even if it's a little cold.","Le gusta sentir el aire de la mañana, aunque haga un poco de frío."],["After that, she gets dressed and goes to the kitchen to help her father with breakfast.","Después de eso, se viste y va a la cocina a ayudar a su padre con el desayuno."]],[["Her father always wakes up before her.","Su padre siempre se despierta antes que ella."],["He puts water on for tea and cuts some fruit.","Él pone agua para el té y corta fruta."],["Some days he also makes toast or eggs if they have time.","Algunos días también hace tostadas o huevos si tienen tiempo."],["Ana pours the tea and sets the cups on the table.","Ana sirve el té y pone las tazas en la mesa."]],[["They eat together and talk about the day.","Comen juntos y hablan del día."],["Sometimes her father asks what she is studying at school.","A veces su padre pregunta qué está estudiando en la escuela."],["It is a short time, but Ana really likes it.","Es un momento corto, pero a Ana le gusta mucho."],["It helps her feel good before she goes to class.","La ayuda a sentirse bien antes de ir a clases."]],[["After breakfast, she washes the dishes quickly and goes back to her room to get her bag.","Después del desayuno, lava los platos rápido y vuelve a su cuarto a buscar su bolsa."],["She makes sure she has her books, her notebook, and her bus card before she leaves the house.","Se asegura de tener sus libros, su cuaderno y su tarjeta del autobús antes de salir de casa."]],[["The walk to the bus stop takes about five minutes.","La caminata hasta la parada del autobús tarda unos cinco minutos."],["She usually listens to music or just looks at the street.","Generalmente escucha música o simplemente mira la calle."],["This small, quiet time helps her feel calm and ready for the day.","Este momento tranquilo la ayuda a sentirse serena y lista para el día."]],[["Sometimes her brother is still asleep when she leaves.","A veces su hermano todavía está dormido cuando ella sale."],["She tries not to make noise in the hallway.","Intenta no hacer ruido en el pasillo."],["She closes the front door slowly and steps outside.","Cierra la puerta principal despacio y sale."]],[["At school, she goes to her classroom and puts her bag on her chair.","En la escuela, va a su salón y pone su bolsa en su silla."],["She takes out her notebook and her pen.","Saca su cuaderno y su bolígrafo."],["She likes to be ready before the teacher arrives.","Le gusta estar lista antes de que llegue la maestra."]],[["After school, Ana comes home and has a snack.","Después de clases, Ana llega a casa y come algo."],["She eats some bread or a piece of fruit.","Come pan o una fruta."],["Then she does her homework at the kitchen table.","Luego hace su tarea en la mesa de la cocina."],["Her father is usually nearby.","Su padre generalmente está cerca."]],[["In the evening, the family eats dinner together.","Por la noche, la familia cena junta."],["Ana tells them about her classes and her friends.","Ana les cuenta sobre sus clases y sus amigos."],["After dinner, she reads a little or talks with her brother.","Después de cenar, lee un poco o conversa con su hermano."],["She goes to bed early so she can wake up calm again.","Se acuesta temprano para poder despertar tranquila otra vez."]]],"dlg":[["Ana","Good morning, Sofia! You are up early today.","¡Buenos días, Sofía! Madrugas hoy."],["Sofia","I always get up early. It is my habit.","Siempre me levanto temprano. Es mi costumbre."],["Ana","Mornings are hard for me. I want to sleep more.","Las mañanas me cuestan. Quiero dormir más."],["Sofia","I know the feeling. But coffee helps me a lot.","Te entiendo. Pero el café me ayuda mucho."],["Ana","Do you eat breakfast before you leave home?","¿Desayunas antes de salir de casa?"],["Sofia","Yes, always. I never leave without eating something.","Sí, siempre. Nunca salgo sin comer algo."],["Ana","My father makes eggs and toast every morning.","Mi papá hace huevos y tostadas cada mañana."],["Sofia","That sounds nice. I just have fruit and yogurt.","Qué rico. Yo solo como fruta y yogur."],["Ana","My mornings are a little crazy. I lose my things.","Mis mañanas son un poco locas. Pierdo mis cosas."],["Sofia","Put your bag by the door the night before.","Pon tu mochila junto a la puerta la noche anterior."],["Ana","That is a good idea. I always forget my things.","Es una buena idea. Siempre olvido mis cosas."],["Sofia","What time do you get to school?","¿A qué hora llegas a la escuela?"],["Ana","I try to arrive by eight, but sometimes I am late.","Intento llegar a las ocho, pero a veces llego tarde."],["Sofia","I go to the bus stop ten minutes early.","Yo voy al paradero diez minutos antes."],["Ana","You are so organized! Do you study in the morning?","¡Eres muy organizada! ¿Estudias en la mañana?"],["Sofia","I read for twenty minutes. It helps me feel ready.","Leo veinte minutos. Me ayuda a sentirme lista."],["Ana","I cannot study early. My brain is still asleep.","No puedo estudiar temprano. Mi cerebro sigue dormido."],["Sofia","That is okay. Just start with one small habit.","Está bien. Empieza con un pequeño hábito."],["Ana","Okay. Tomorrow I will put my bag by the door.","Bien. Mañana pondré mi mochila junto a la puerta."],["Sofia","Good luck! Tell me how it goes.","¡Buena suerte! Cuéntame cómo te va."]],"datos":{"0":"<i>half past six</i> = «las seis y media» (literal «media pasada de las seis»). El inglés cuenta los minutos ya «pasados» de la hora."}},"2":{"sTitle":"The Cookbook","sTitleEs":"El libro de cocina","dTitle":"A Better Way to Study","dTitleEs":"Una mejor forma de estudiar","paras":[[["David did not cook much before his second year at university.","David no cocinaba mucho antes de su segundo año en la universidad."],["He usually ate bread or whatever his roommates made.","Generalmente comía pan o lo que sus compañeros de cuarto hacían."],["One day, his mother came to visit and gave him a small cookbook.","Un día, su mamá vino a visitarlo y le dio un pequeño libro de cocina."],["That was the beginning of something new.","Eso fue el comienzo de algo nuevo."]],[["The book was old and the pages were soft.","El libro era viejo y las páginas eran suaves."],["His mother had marked her favorite recipes with small pieces of paper.","Su mamá había marcado sus recetas favoritas con pequeños papeles."],["She sat with him and showed him how to make a simple rice dish.","Ella se sentó con él y le mostró cómo hacer un plato de arroz sencillo."],["It was not hard, but David had to pay attention.","No era difícil, pero David tenía que prestar atención."]],[["He burned the first attempt.","Quemó el primer intento."],["He put the heat too high and did not add enough water.","Puso el fuego muy alto y no agregó suficiente agua."],["His mother did not say anything bad — she just smiled and said, 'Again.' So he tried a second time and it came out much better.","Su mamá no dijo nada malo — solo sonrió y dijo: 'Otra vez.' Entonces lo intentó por segunda vez y le salió mucho mejor."]],[["He started to cook every day after that.","Después de eso, empezó a cocinar todos los días."],["He would come home from class and open the book.","Llegaba a casa de clases y abría el libro."],["Some of the food was not very good.","Algo de la comida no era muy buena."],["But some of it was really nice.","Pero algo era realmente rico."],["He learned from every meal, good or bad.","Aprendía de cada comida, buena o mala."]],[["His roommates began to notice.","Sus compañeros de cuarto empezaron a notar."],["They would ask if he had enough for two, or three.","Preguntaban si tenía suficiente para dos, o tres."],["Before long, David was cooking dinner for all of them several nights a week.","En poco tiempo, David cocinaba la cena para todos ellos varias noches a la semana."],["He liked the company.","Le gustaba la compañía."],["Eating together felt good.","Comer juntos se sentía bien."]],[["Now, several years later, cooking is one of the things David enjoys most.","Ahora, varios años después, cocinar es una de las cosas que David más disfruta."],["After a long day, making a good meal feels like a reward.","Después de un día largo, preparar una buena comida se siente como una recompensa."],["He still uses his mother's old cookbook.","Todavía usa el viejo libro de cocina de su mamá."],["The pages are even softer now.","Las páginas están aún más suaves ahora."]],[["David did not know many recipes at first.","David no sabía muchas recetas al principio."],["He started with the easy ones.","Empezó con las fáciles."],["He made rice, soup, and eggs.","Hacía arroz, sopa y huevos."],["These were simple but good.","Eran sencillos pero buenos."]],[["He went to the market every Saturday morning.","Iba al mercado cada sábado por la mañana."],["He bought vegetables, eggs, and sometimes chicken.","Compraba verduras, huevos y a veces pollo."],["He tried to spend only a little money.","Intentaba gastar solo un poco de dinero."],["His mother had taught him to plan before buying.","Su madre le había enseñado a planificar antes de comprar."]],[["David also called his mother on weekends.","David también llamaba a su mamá los fines de semana."],["He told her what he made during the week.","Le contaba lo que había hecho durante la semana."],["She gave him tips and sometimes a new recipe.","Ella le daba consejos y a veces una receta nueva."],["He wrote them down in a small notebook next to the cookbook.","Él las anotaba en un pequeño cuaderno junto al libro de cocina."]],[["Today, David feels proud of his cooking.","Hoy, David se siente orgulloso de su cocina."],["A simple cookbook changed his daily life.","Un sencillo libro de cocina cambió su vida diaria."],["Now cooking is a real part of his day, and he is grateful for it.","Ahora cocinar es una parte real de su día, y está agradecido por ello."]]],"dlg":[["Luis","Hey David, are you busy right now?","Oye David, ¿estás ocupado ahora?"],["David","Not really. I just finished eating. What is up?","No mucho. Acabo de comer. ¿Qué pasa?"],["Luis","I have a big test next week. I need help.","Tengo un examen grande la próxima semana. Necesito ayuda."],["David","Of course. What subject is it?","Claro. ¿De qué materia es?"],["Luis","History. There is so much to learn.","Historia. Hay muchísimo que aprender."],["David","Do you have your book here?","¿Tienes tu libro aquí?"],["Luis","Yes, but it is very long. I feel lost.","Sí, pero es muy largo. Me siento perdido."],["David","You do not need all of it. What is on the test?","No necesitas todo. ¿Qué entra en el examen?"],["Luis","Early cities. About ten pages in chapter two.","Las primeras ciudades. Unas diez páginas del capítulo dos."],["David","Good. We study only those ten pages. That is easy.","Bien. Estudiamos solo esas diez páginas. Eso es fácil."],["Luis","That feels much smaller. Okay, I will read it.","Eso se siente mucho más pequeño. Bien, voy a leerlo."],["David","Read it once, then tell me what you learned.","Léelo una vez y dime qué aprendiste."],["Luis","It says early people lived near rivers for food.","Dice que la gente antigua vivía cerca de los ríos por la comida."],["David","Right. And why was the river important?","Correcto. ¿Y por qué era importante el río?"],["Luis","Because they needed water and food every day.","Porque necesitaban agua y comida cada día."],["David","Exactly. You understand it well. Keep going.","Exacto. Lo entiendes bien. Sigue."],["Luis","This is easier when you help me.","Esto es más fácil cuando me ayudas."],["David","Studying with someone is good. You can ask questions.","Estudiar con alguien es bueno. Puedes hacer preguntas."],["Luis","Can we do this every evening before the test?","¿Podemos hacer esto cada tarde antes del examen?"],["David","Sure. That is what big brothers are for.","Claro. Para eso están los hermanos mayores."]],"datos":{"3":"<i>would + verbo</i> aquí no es condicional: marca una costumbre del pasado. <i>He would come home and open the book</i> = «llegaba y abría el libro»."}},"3":{"sTitle":"The House on Calle Verde","sTitleEs":"La casa de la Calle Verde","dTitle":"Planning the Week","dTitleEs":"Planeando la semana","paras":[[["Elena grew up in a small house with a large garden.","Elena creció en una casa pequeña con un jardín grande."],["The house had three bedrooms and one bathroom.","La casa tenía tres dormitorios y un baño."],["Elena shared a room with her sister.","Elena compartía un cuarto con su hermana."],["They had two beds, one near the window and one close to the door.","Tenían dos camas, una cerca de la ventana y una cerca de la puerta."]],[["The kitchen was the most important room in the house.","La cocina era el cuarto más importante de la casa."],["Her mother cooked there every day.","Su mamá cocinaba ahí todos los días."],["The family ate all their meals at the big old table.","La familia comía todas sus comidas en la gran mesa vieja."],["The table was a little uneven, but nobody wanted to get a new one.","La mesa estaba un poco dispareja, pero nadie quería conseguir una nueva."]],[["In the mornings, Elena's father woke up early.","En las mañanas, el padre de Elena se despertaba temprano."],["He opened the door to the garden and drank his coffee outside.","Abría la puerta al jardín y tomaba su café afuera."],["He said the morning air helped him feel awake.","Decía que el aire de la mañana lo ayudaba a sentirse despierto."],["Elena liked to watch him from the kitchen window.","A Elena le gustaba mirarlo desde la ventana de la cocina."]],[["Her grandmother lived in the house too.","Su abuela también vivía en la casa."],["She had the room next to Elena's.","Tenía el cuarto al lado del de Elena."],["She was a quiet woman who woke up very early and sat in the garden before breakfast.","Era una mujer tranquila que se despertaba muy temprano y se sentaba en el jardín antes del desayuno."],["Every morning, Elena gave her a cup of tea.","Cada mañana, Elena le daba una taza de té."]],[["The evenings were always lively.","Las tardes siempre eran animadas."],["Elena's father came home from work at around six.","El padre de Elena llegaba del trabajo alrededor de las seis."],["Then everyone ate together.","Luego todos comían juntos."],["They talked about their days — what was good, what was hard.","Hablaban de sus días — qué fue bueno, qué fue difícil."],["Her mother said that talking over dinner was important for the family.","Su mamá decía que hablar durante la cena era importante para la familia."]],[["Elena learned many things in that house.","Elena aprendió muchas cosas en esa casa."],["She learned to cook by watching her mother.","Aprendió a cocinar observando a su mamá."],["She learned to read by sitting on her bed with a book and a lamp.","Aprendió a leer sentada en su cama con un libro y una lámpara."],["She learned that a home does not need to be large.","Aprendió que un hogar no necesita ser grande."],["It just needs to feel good.","Solo necesita sentirse bien."]],[["When Elena moved to the city for university, she missed that house a lot.","Cuando Elena se mudó a la ciudad para la universidad, extrañó mucho esa casa."],["She found a small apartment and tried to make it feel like home.","Encontró un pequeño apartamento e intentó que se sintiera como un hogar."],["She put a chair near the window.","Puso una silla cerca de la ventana."],["She cooked the food her mother had taught her.","Cocinó la comida que su mamá le había enseñado."],["It was not the same, but it helped.","No era lo mismo, pero ayudaba."]],[["On weekends, the whole family worked in the garden together.","Los fines de semana, toda la familia trabajaba en el jardín juntos."],["Her father cut the grass.","Su padre cortaba el pasto."],["Her sister watered the plants.","Su hermana regaba las plantas."],["Elena picked up leaves from the floor.","Elena recogía hojas del suelo."],["Everyone had a job to do.","Todos tenían un trabajo que hacer."]],[["In the afternoons, Elena and her sister did homework on their beds.","Por las tardes, Elena y su hermana hacían la tarea en sus camas."],["The room was small but they each had their own space.","El cuarto era pequeño pero cada una tenía su propio espacio."],["Sometimes they helped each other with difficult problems.","A veces se ayudaban la una a la otra con los problemas difíciles."]],[["Before bed, her mother came to say good night.","Antes de dormir, su mamá venía a dar las buenas noches."],["She turned off the big light and left the small lamp on.","Apagaba la luz grande y dejaba encendida la lámpara pequeña."],["Elena read for a little while and then closed her book.","Elena leía un rato y luego cerraba su libro."],["She put it on the floor next to her bed.","Lo ponía en el suelo junto a su cama."]]],"dlg":[["Elena","Mom, can we sit and plan the week together?","Mamá, ¿podemos sentarnos a planificar la semana?"],["Mother","Of course. Let me get my notebook.","Claro. Déjame traer mi cuaderno."],["Elena","On Monday I have school and a study group.","El lunes tengo clases y un grupo de estudio."],["Mother","What time does the study group finish?","¿A qué hora termina el grupo de estudio?"],["Elena","Around nine, so I will miss dinner that day.","Como a las nueve, así que me pierdo la cena ese día."],["Mother","Do not worry. I will leave you a plate.","No te preocupes. Te dejaré un plato."],["Elena","Thank you. Tuesday I finish school early.","Gracias. El martes termino temprano las clases."],["Mother","Good. You can help me cook that day.","Bien. Ese día me puedes ayudar a cocinar."],["Elena","I want to learn to make your soup.","Quiero aprender a hacer tu sopa."],["Mother","I will teach you. It is easy but slow.","Te enseñaré. Es fácil pero lenta."],["Elena","Is grandmother coming to visit this week?","¿Viene la abuela de visita esta semana?"],["Mother","Yes, on Wednesday. She stays all afternoon.","Sí, el miércoles. Se queda toda la tarde."],["Elena","I love seeing her. I will be home early.","Me encanta verla. Llegaré temprano a casa."],["Mother","She will be happy. What about Thursday?","Estará feliz. ¿Y el jueves?"],["Elena","Thursday is long. School and then English class.","El jueves es largo. Clases y luego inglés."],["Mother","Is your English class going well now?","¿Va bien tu clase de inglés ahora?"],["Elena","Much better. The teacher is very patient.","Mucho mejor. La maestra es muy paciente."],["Mother","Good. On Friday we can go to the market.","Bien. El viernes podemos ir al mercado."],["Elena","Perfect. And on Sunday we rest at home.","Perfecto. Y el domingo descansamos en casa."],["Mother","Yes. A calm day is good for everyone.","Sí. Un día tranquilo le hace bien a todos."]],"datos":{"2":"Verbos irregulares en pasado: <i>wake → woke</i>, <i>drink → drank</i>. No se les agrega <i>-ed</i>; hay que aprenderlos de memoria."}},"4":{"sTitle":"A Day Well Used","sTitleEs":"Un día bien aprovechado","dTitle":"Neighbors in the Afternoon","dTitleEs":"Vecinos por la tarde","paras":[[["Carlos's days start early.","Los días de Carlos empiezan temprano."],["He wakes up at six and goes for a short run before the city wakes up.","Se despierta a las seis y sale a correr un poco antes de que la ciudad despierte."],["He likes the streets when they are quiet — just a few people and the smell of bread from the bakery on the corner.","Le gustan las calles cuando están tranquilas — solo unas pocas personas y el olor a pan de la panadería en la esquina."]],[["Back home, he showers and drinks his coffee standing at the kitchen window.","De regreso en casa, se ducha y toma su café parado en la ventana de la cocina."],["He eats something quick — usually toast with an egg or yogurt with fruit.","Come algo rápido — generalmente tostadas con un huevo o yogur con fruta."],["He is at school by eight.","Está en la escuela a las ocho."],["He says that being on time is important.","Dice que llegar a tiempo es importante."]],[["He teaches four classes in the morning.","Enseña cuatro clases en la mañana."],["Between classes, he goes over his notes and gets ready for the next lesson.","Entre clases, repasa sus notas y se prepara para la siguiente lección."],["He also helps students who have questions.","También ayuda a los estudiantes que tienen preguntas."],["He never says a question is bad or unimportant.","Nunca dice que una pregunta es mala o sin importancia."]],[["At midday, he eats lunch in the teachers' room.","Al mediodía, almuerza en la sala de profesores."],["He likes to eat with other teachers and talk about the morning.","Le gusta comer con otros maestros y hablar sobre la mañana."],["He feels it is good to share how things are going — both the hard days and the good ones.","Siente que es bueno compartir cómo van las cosas — tanto los días difíciles como los buenos."]],[["The afternoons are for a special group of students.","Las tardes son para un grupo especial de estudiantes."],["These students missed a lot of school the year before.","Estos estudiantes faltaron mucho a la escuela el año anterior."],["Carlos goes slowly with them.","Carlos va despacio con ellos."],["He puts the most important ideas on the board and goes over them many times.","Pone las ideas más importantes en la pizarra y las repasa muchas veces."]],[["He gets home around five and changes his clothes.","Llega a casa alrededor de las cinco y se cambia de ropa."],["Then he cooks.","Luego cocina."],["This is the part of the day he likes most.","Esta es la parte del día que más le gusta."],["He opens the window, puts on music, and takes his time.","Abre la ventana, pone música y se toma su tiempo."],["He drinks a glass of water while he cooks and tries not to rush.","Toma un vaso de agua mientras cocina e intenta no apresurarse."]],[["After dinner, he reads for about an hour.","Después de cenar, lee durante aproximadamente una hora."],["He usually reads history books — not for work, but because he enjoys it.","Generalmente lee libros de historia — no por trabajo, sino porque lo disfruta."],["He goes to bed at ten.","Se va a dormir a las diez."],["He falls asleep quickly.","Se queda dormido rápidamente."],["He feels that if a day was long and full, it was also a good day.","Siente que si un día fue largo y lleno, también fue un buen día."]],[["Carlos does not think his life is exciting or special.","Carlos no cree que su vida sea emocionante o especial."],["But it feels right to him.","Pero para él se siente correcta."],["Every day has a beginning and an end.","Cada día tiene un principio y un final."],["Every day he learns something — from his students, from his books, from the small things around him.","Cada día aprende algo — de sus estudiantes, de sus libros, de las pequeñas cosas a su alrededor."]],[["On Fridays, Carlos stays a little later at school.","Los viernes, Carlos se queda un poco más tarde en la escuela."],["He talks with students who need extra help.","Habla con los estudiantes que necesitan ayuda extra."],["He never says he is too busy.","Nunca dice que está demasiado ocupado."],["He knows that one good conversation can make a big difference.","Sabe que una buena conversación puede hacer una gran diferencia."]],[["On Saturdays, he goes to the market early.","Los sábados, va al mercado temprano."],["He buys fresh vegetables and sometimes fish.","Compra verduras frescas y a veces pescado."],["He takes his time and talks to the sellers.","Se toma su tiempo y habla con los vendedores."],["He feels good when he cooks with fresh food.","Se siente bien cuando cocina con comida fresca."]]],"dlg":[["Rosa","Good afternoon, Carlos! I never see you now.","¡Buenas tardes, Carlos! Ya nunca te veo."],["Carlos","I know! Work is very long this month.","¡Lo sé! El trabajo es muy largo este mes."],["Rosa","That sounds hard. Do you still cook at home?","Suena difícil. ¿Todavía cocinas en casa?"],["Carlos","Yes, I like to cook. I do not like fast food.","Sí, me gusta cocinar. No me gusta la comida rápida."],["Rosa","My husband never cooks. He only makes coffee.","Mi esposo nunca cocina. Solo hace café."],["Carlos","Ha! My father was the same. My mother taught me.","¡Ja! Mi papá era igual. Mi mamá me enseñó."],["Rosa","My daughter wants to learn. She is twelve.","Mi hija quiere aprender. Tiene doce años."],["Carlos","Good age to start. Give her something easy first.","Buena edad para empezar. Dale algo fácil primero."],["Rosa","Like what? Maybe eggs or a simple soup?","¿Como qué? ¿Quizás huevos o una sopa sencilla?"],["Carlos","Exactly. Soup is easy and everyone likes it.","Exacto. La sopa es fácil y a todos les gusta."],["Rosa","Do you eat at the same time every day?","¿Comes a la misma hora cada día?"],["Carlos","I try to eat at seven, like your family.","Intento comer a las siete, como tu familia."],["Rosa","We always eat at seven. The kids like the routine.","Siempre comemos a las siete. A los niños les gusta la rutina."],["Carlos","A routine helps. I feel better with one.","Una rutina ayuda. Me siento mejor con una."],["Rosa","Do you go to bed early these days?","¿Te acuestas temprano estos días?"],["Carlos","Yes. Late nights make the morning very hard.","Sí. Las noches largas hacen muy difícil la mañana."],["Rosa","Me too. Now I sleep before eleven.","Yo igual. Ahora duermo antes de las once."],["Carlos","That is smart. Now I am in bed by ten.","Eso es inteligente. Ahora estoy en cama a las diez."],["Rosa","Well, I must go make dinner. Take care!","Bueno, debo ir a hacer la cena. ¡Cuídate!"],["Carlos","You too, Rosa. Say hello to your family.","Tú también, Rosa. Saluda a tu familia."]],"datos":{"0":"<i>go for a run</i> = «salir a correr» (literal «ir por una corrida»). El inglés usa <i>go for a + sustantivo</i>: <i>go for a walk / a coffee</i>."}}};

let info='en', voice='US', rate=1, secs=0, marked=false, milestones={10:false,20:false,30:false};
let storyId=1; const ST_TITLES={1:{es:STORYDATA[1].sTitleEs,en:STORYDATA[1].sTitle},2:{es:STORYDATA[2].sTitleEs,en:STORYDATA[2].sTitle},3:{es:STORYDATA[3].sTitleEs,en:STORYDATA[3].sTitle},4:{es:STORYDATA[4].sTitleEs,en:STORYDATA[4].sTitle}};
function renderStPick(){ const es=info!=='en'; document.getElementById('spkH').textContent= es?'Elige tu lectura':'Choose your reading'; document.getElementById('spkS').textContent= es?'¿Qué Story + Diálogo vas a leer? Tu elección se registra para tu seguimiento.':'Which Story + Dialogue will you read? Your choice is logged for your tracking.';
  document.getElementById('spkList').innerHTML=[1,2,3,4].map(n=>{ const has=true; const t=ST_TITLES[n][es?'es':'en']; return `<div class="stcard ${has?'':'lock'}" onclick="${has?`pickStory(${n})`:`toast('${es?'Demo: usa la Story 1':'Demo: use Story 1'}')`}"><div class="nx">${has?'📖':'🔒'}</div><div class="si"><b>Story ${n} · Diálogo ${n}</b><span>${t}</span></div><div class="go">${has?'›':'🔒'}</div></div>`; }).join(''); }
function backToPicker(){ try{pausePlay();}catch(e){} document.getElementById('stpick').style.display='block'; window.scrollTo(0,0); }
function updateTitles(){ const d=STORYDATA[storyId], es=info!=='en'; document.getElementById('stitle').textContent= curView==='dlg'?(es?d.dTitleEs:d.dTitle):(es?d.sTitleEs:d.sTitle); document.getElementById('ssub').textContent=(curView==='dlg'?(es?'Diálogo ':'Dialogue '):'Story ')+storyId; }
function pickStory(n){ storyId=n; const d=STORYDATA[n];
  PARAS = d.paras.map((p,i)=>({pairs:p.map(x=>({en:x[0],es:x[1]})), dato:(d.datos&&d.datos[i])||null}));
  DLG = d.dlg.map(t=>({sp:t[0], pairs:[{en:t[1],es:t[2]}]}));
  curView='story'; VIEW=PARAS;
  document.getElementById('stpick').style.display='none'; document.getElementById('helpfab').classList.remove('hidden');
  const lv=document.getElementById('screen').getAttribute('data-level'); const nm={'pre-a1':'Pre-A1','a1':'A1','a2':'A2'}[lv]||'Pre-A1';
  document.getElementById('mhsub').textContent= nm+' · M1 · Daily Life & Personal Routines';
  document.getElementById('vwStory').classList.add('on'); document.getElementById('vwDlg').classList.remove('on');
  updateTitles(); render(); window.scrollTo(0,0); }
let ALL=[], gi=0, gEnd=0, gScope='all', gPlaying=false;
function L(){ return UI[info]; }
let DLG = [];
let VIEW = PARAS, curView='story';
function setView(v){ if(v===curView) return; pausePlay(); curView=v; VIEW= v==='dlg'?DLG:PARAS;
  document.getElementById('vwStory').classList.toggle('on',v==='story'); document.getElementById('vwDlg').classList.toggle('on',v==='dlg');
  updateTitles(); render(); }
function render(){
  document.getElementById('paras').innerHTML = VIEW.map((p,pi)=>{
    const sp = p.sp?`<div class="dsp">${p.sp}</div>`:'';
    const en=p.pairs.map((q,si)=>`<span class="sent" id="s${pi}_${si}">${q.en}</span>`).join(' ');
    const es=p.pairs.map((q,si)=>`<span class="sente" id="e${pi}_${si}">${q.es}</span>`).join(' ');
    const dato=p.dato?`<div class="dato"><div class="hd">💡 Dato de traducción</div>${p.dato}</div>`:'';
    return `<div class="para" id="p${pi}">${sp}<div class="ptext">${en}</div><div class="pes" id="pes${pi}">${es}</div>
      <div class="prow"><button class="pbtn play" id="play${pi}" onclick="playPara(${pi})">▶ <span class="pl"></span></button></div>${dato}</div>`;
  }).join('');
  ALL=[]; VIEW.forEach((p,pi)=>p.pairs.forEach((q,si)=>ALL.push({pi,si}))); gi=0; gScope='all'; gEnd=ALL.length;
  applyInfo();
}
function applyInfo(){ const u=L(), st=STEPS[document.getElementById('screen').getAttribute('data-level')][info];
  document.getElementById('vocLab').textContent=u.voc; document.getElementById('datosLab').textContent=u.datos; document.getElementById('txtLab').textContent=u.txt; document.getElementById('ringNext').textContent=u.ringNext;
  document.getElementById('markLab').textContent= marked? u.marked : u.mark;
  document.getElementById('howtoT').textContent=st.t;
  document.getElementById('howtoB').innerHTML = st.s.map((x,k)=>`<div class="stepline"><span class="stepn">${k+1}</span><span>${x}</span></div>`).join('')+`<div class="stepnote">📝 ${st.n}</div>`;
  document.getElementById('helpT').textContent=u.helpT;
  document.getElementById('helpTips').innerHTML = `<div style="font-size:11.5px;color:var(--text-soft);font-weight:700;margin-bottom:6px">${u.tipsT}</div>`+ u.tips.map(t=>`<div class="helptip">• <span>${t}</span></div>`).join('');
  document.getElementById('endT').textContent=u.endT; document.getElementById('endP').textContent=u.endP; document.getElementById('eTimeL').textContent=u.eTimeL; document.getElementById('eXpL').textContent=u.eXpL; document.getElementById('endBack').textContent=u.endBack;
  document.getElementById('vpTitle').textContent=u.vpTitle; document.getElementById('vpSub').textContent=u.vpSub;
  document.getElementById('inEs').classList.toggle('on',info==='es'); document.getElementById('inEn').classList.toggle('on',info==='en');
  setBtns();
}
function toggleDatos(){ const s=document.getElementById('screen'); const on=s.getAttribute('data-datos')==='on'; s.setAttribute('data-datos',on?'off':'on'); document.getElementById('datosBtn').classList.toggle('on',!on); }
function openHelp(){ document.getElementById('helpov').classList.add('show'); } function closeHelp(){ document.getElementById('helpov').classList.remove('show'); }
function openVocab(){ document.getElementById('vlist').innerHTML = GLOSS.map(g=>`<div class="vrow"><span class="vw">${g.w}</span><span class="vm">${g.es}<span class="vex">“${g.ex}”</span></span><button class="spk" onclick="say('${g.w.replace(/'/g,'')}')">🔊</button></div>`).join(''); document.getElementById('vpanel').classList.add('show'); }
function closeVocab(){ document.getElementById('vpanel').classList.remove('show'); }
function pickVoice(){ try{ const vs=speechSynthesis.getVoices()||[]; const want=voice==='US'?'en-US':'en-GB'; return vs.find(v=>v.lang===want)||vs.find(v=>v.lang&&v.lang.indexOf('en')===0)||null; }catch(e){ return null; } }
function say(text,onend){ try{ if(!('speechSynthesis' in window))throw 0; speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text); u.rate=rate; const v=pickVoice(); if(v){u.voice=v;u.lang=v.lang;}else u.lang=voice==='US'?'en-US':'en-GB'; if(onend)u.onend=onend; speechSynthesis.speak(u); }catch(e){ if(onend) setTimeout(onend,Math.max(700,String(text).split(' ').length*330/rate)); } }
/* Reproducción: rango [gi,gEnd) · pausa conserva gi */
function setBtns(){ const all=gPlaying&&gScope==='all'; const pa=document.getElementById('playAll');
  pa.querySelector('.ic').textContent= all?'⏸':'▶'; pa.querySelector('.pl').textContent= all?L().pause:L().play;
  VIEW.forEach((p,pi)=>{ const b=document.getElementById('play'+pi); if(!b)return; const on=gPlaying&&gScope==='p'+pi; b.classList.toggle('on',on); b.querySelector('.pl').textContent= on?L().pPause:L().pPlay; b.firstChild.textContent= on?'⏸ ':'▶ '; }); }
function clearHl(){ document.querySelectorAll('.sent.read,.sente.read').forEach(s=>s.classList.remove('read')); document.querySelectorAll('.para.reading').forEach(p=>p.classList.remove('reading')); }
function startRange(st,end,scope){ if(gScope!==scope || gi<st || gi>=end) gi=st; gEnd=end; gScope=scope; gPlaying=true; setBtns(); step(); }
function playAll(){ if(gPlaying&&gScope==='all'){ pausePlay(); return; } startRange(0,ALL.length,'all'); }
function playPara(pi){ const idxs=ALL.map((a,k)=>a.pi===pi?k:-1).filter(k=>k>=0); if(gPlaying&&gScope==='p'+pi){ pausePlay(); return; } startRange(idxs[0],idxs[idxs.length-1]+1,'p'+pi); }
function pausePlay(){ gPlaying=false; try{speechSynthesis.cancel();}catch(e){} setBtns(); }
function step(){ if(!gPlaying) return;
  if(gi>=gEnd){ gPlaying=false; if(gScope==='all') gi=0; setBtns(); clearHl(); toast(info==='es'?'✓ Fin del audio':'✓ End of audio'); return; }
  const {pi,si}=ALL[gi]; clearHl(); const para=document.getElementById('p'+pi); para.classList.add('reading');
  const se=document.getElementById('s'+pi+'_'+si); if(se)se.classList.add('read');
  const ee=document.getElementById('e'+pi+'_'+si); if(ee)ee.classList.add('read');
  para.scrollIntoView({behavior:'smooth',block:'center'});
  say(VIEW[pi].pairs[si].en, ()=>{ if(!gPlaying)return; gi++; step(); });
}
function setText(m){ document.getElementById('screen').setAttribute('data-text',m); ['txEn','txEs','txBoth'].forEach(id=>document.getElementById(id).classList.remove('on')); document.getElementById(m==='en'?'txEn':m==='es'?'txEs':'txBoth').classList.add('on'); }
function setInfo(l){ info=l; applyInfo(); renderStPick(); if(document.getElementById('stpick').style.display==='none') updateTitles(); }
function toggleVoice(){ voice=voice==='US'?'UK':'US'; document.getElementById('voiceBtn').textContent='🔊 '+voice; }
function setRate(v){ rate=parseFloat(v); }
function textSize(d){ let s=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--reading'))||18; s=Math.max(15,Math.min(24,s+d)); document.documentElement.style.setProperty('--reading',s+'px'); }
function markDone(){ marked=true; const b=document.getElementById('markBtn'); b.classList.add('done'); b.querySelector('.mi').textContent='✅'; document.getElementById('markLab').textContent=L().marked;
  const m=Math.floor(secs/60); document.getElementById('eTime').textContent=m+':'+String(secs%60).padStart(2,'0'); document.getElementById('eXp').textContent='+'+(m>=30?15:m>=20?10:m>=10?5:0);
  try{ window.dispatchEvent(new CustomEvent('jucum:done',{detail:{type:'story', story:storyId, minutes:m, xp:(m>=30?15:m>=20?10:m>=10?5:0), finished:true}})); }catch(e){}
  const ec=document.getElementById('endcard'); ec.style.display='block'; ec.scrollIntoView({behavior:'smooth'}); }
setInterval(()=>{ secs++; const m=Math.floor(secs/60),s=secs%60; document.getElementById('ringT').textContent=m+':'+String(s).padStart(2,'0'); const frac=Math.min(1,secs/600); document.getElementById('ringFill').setAttribute('stroke-dashoffset',(88*(1-frac)).toFixed(1)); [10,20,30].forEach(mm=>{ if(m>=mm&&!milestones[mm]){ milestones[mm]=true; toast(L().xpMsg(mm)); } }); },1000);
function setLevel(lv){ pausePlay(); const s=document.getElementById('screen'); s.setAttribute('data-level',lv); const n={'pre-a1':'Pre-A1','a1':'A1','a2':'A2'}; var _c=document.getElementById('capLvl'); if(_c)_c.textContent=n[lv]; document.getElementById('mhsub').textContent=n[lv]+' · M1 · Personal Identity';
  ['segPre','segA1','segA2'].forEach(id=>{var b=document.getElementById(id);if(b)b.classList.remove('on');}); var _a=document.getElementById(lv==='pre-a1'?'segPre':lv==='a1'?'segA1':'segA2'); if(_a)_a.classList.add('on');
  info= lv==='pre-a1'?'es':'en'; setText(lv==='pre-a1'?'both':'en'); render(); }
function toast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('show'),2600); }
0&&document.addEventListener('contextmenu',e=>{ if(e.target.closest('.screen')){ e.preventDefault(); toast('Material protegido © JUCUM EC'); }});
try{ speechSynthesis.onvoiceschanged=()=>pickVoice(); }catch(e){}
render(); setLevel('a1'); renderStPick();
