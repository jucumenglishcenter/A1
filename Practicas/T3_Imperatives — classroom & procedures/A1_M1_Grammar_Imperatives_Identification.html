<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Identify - A1 M1 Imperatives | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2196F3; --primary-light: #BBDEFB; --primary-dark: #0D47A1;
            --accent: #64B5F6;
            --bg-gradient-start: #E3F2FD; --bg-gradient-end: #BBDEFB;
            --text-dark: #0A3470; --text-medium: #0D47A1; --text-light: #1565C0;
            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444;   --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6;    --info-light: #DBEAFE;  --info-dark: #1D4ED8;
            --purple: #8B5CF6;  --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --shadow-soft: 0 4px 20px rgba(33,150,243,0.15);
            --shadow-strong: 0 8px 30px rgba(33,150,243,0.25);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start),var(--bg-gradient-end)); min-height:100vh; color:var(--text-dark); }

        .header { background:linear-gradient(135deg,#1565C0 0%,#2196F3 60%,#64B5F6 100%); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.4rem; text-decoration:none; color:white; transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); transform:scale(1.1); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; white-space:nowrap; }
        .progress-container { height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; transition:width .5s ease; width:0%; }

        main { padding:1.5rem; max-width:650px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }

        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1.1rem; flex-wrap:wrap; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .q-label { font-size:0.88rem; color:var(--text-medium); font-weight:600; flex:1; }
        .imp-badge { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.7rem; border-radius:20px; font-size:0.72rem; font-weight:700; }
        .imp-badge.aff  { background:#D1FAE5; color:#059669; }
        .imp-badge.neg  { background:#FEE2E2; color:#DC2626; }
        .imp-badge.both { background:#FFF3E0; color:#C2410C; }
        .imp-badge.let  { background:#EDE9FE; color:#6D28D9; }

        .sentence-options { display:flex; flex-direction:column; gap:0.6rem; margin-bottom:0.5rem; }
        .sent-option { display:flex; align-items:center; gap:0.8rem; padding:0.85rem 1rem; border:2.5px solid #E5E7EB; border-radius:12px; background:white; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:600; cursor:pointer; transition:all .2s; color:var(--text-dark); text-align:left; }
        .sent-option:hover:not(.disabled) { border-color:var(--primary); background:var(--primary-light); }
        .sent-option.correct  { border-color:var(--success); background:var(--success-light); color:var(--success-dark); }
        .sent-option.incorrect{ border-color:var(--error);   background:var(--error-light);   color:var(--error-dark); }
        .sent-option.disabled { cursor:default; }
        .option-letter { width:26px; height:26px; border-radius:50%; background:var(--primary-light); color:var(--primary-dark); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:0.78rem; flex-shrink:0; }
        .sent-option.correct  .option-letter { background:var(--success); color:white; }
        .sent-option.incorrect .option-letter{ background:var(--error);   color:white; }
        .option-text { flex:1; line-height:1.45; }
        .error-highlight   { color:var(--error-dark);   font-weight:800; text-decoration:underline wavy var(--error); }
        .correct-highlight { color:var(--success-dark); font-weight:800; }

        .feedback { margin-top:1rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct   .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon  { font-size:1.6rem; }
        .fb-title    { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }

        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct   .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }

        .fb-block { border-radius:12px; padding:0.9rem 1rem; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.15rem 0.55rem; border-radius:6px; font-size:0.72rem; font-weight:700; margin-left:4px; }

        .fb-signal       { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-signal.wrong { background:#FFF1F2; border-color:#FECDD3; }
        .fb-signal       .fb-block-title { color:var(--success-dark); }
        .fb-signal.wrong .fb-block-title { color:var(--error-dark); }
        .signal-tag     { display:inline-block; background:var(--success); color:white; border-radius:6px; padding:0.1rem 0.5rem; font-size:0.82rem; font-weight:700; margin:0 2px; }
        .signal-tag.red { background:var(--error); }

        .fb-error { background:var(--error-light); border:1px solid #FECACA; }
        .fb-error .fb-block-title { color:var(--error-dark); }
        .word-swap  { display:flex; align-items:center; justify-content:center; gap:0.75rem; margin:0.5rem 0; flex-wrap:wrap; }
        .ws-box  { padding:0.35rem 0.9rem; border-radius:8px; font-weight:700; font-size:0.95rem; }
        .ws-wrong{ background:white; color:var(--error); border:2px solid var(--error); text-decoration:line-through; }
        .ws-arrow{ font-size:1.2rem; color:#94A3B8; }
        .ws-right{ background:var(--success); color:white; }
        .error-text { font-size:0.9rem; color:var(--text-dark); line-height:1.55; }

        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula  { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.95rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }
        .rule-examples { display:flex; flex-wrap:wrap; gap:0.4rem; }
        .rule-ex        { display:flex; align-items:center; gap:0.3rem; font-size:0.82rem; background:white; border:1px solid #BFDBFE; border-radius:6px; padding:0.2rem 0.5rem; }
        .rule-ex .base  { color:var(--info-dark); font-weight:600; }
        .rule-ex .arrow { color:#94A3B8; }
        .rule-ex .past  { color:var(--success-dark); font-weight:700; }

        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }
        .why-hl { background:var(--success-light); color:var(--success-dark); padding:0.1rem 0.4rem; border-radius:5px; font-weight:700; }

        .nav-buttons { display:flex; gap:0.75rem; margin-top:1rem; }
        .nav-btn      { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled             { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }

        .results-screen      { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji  { font-size:4rem; margin-bottom:1rem; }
        .results-title  { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; color:var(--text-dark); }
        .results-score  { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message{ font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container{ display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star           { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned    { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary   { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>
    <header class="header">
        <a href="a1-daily-index.html" class="back-btn">←</a>
        <div class="header-info">
            <div class="header-title">🔍 Identify</div>
            <div class="header-subtitle">🩵 A1 · Daily Life · Imperatives</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/15</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">🔍</div>
            <div>
                <div class="instructions-title">Identifica la oración correcta</div>
                <div class="instructions-text">Una de las tres opciones es gramaticalmente correcta. Identifícala. Las otras dos tienen errores en el uso del imperativo.</div>
            </div>
        </div>

        <div id="questionsContainer"></div>

        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">¡Completado!</div>
            <div class="results-score" id="finalScore">0/15</div>
            <div class="stars-container">
                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Intentar de Nuevo</button>
                <a href="a1-daily-index.html" class="result-btn secondary">← Volver al Módulo</a>
            </div>
        </div>
    </main>

    <script>
    // ============================================================
    // IDENTIFY — Imperatives
    // Verbos: look, come, be quiet, start, go, clean, repeat,
    //         keep, share, try, stand, put away, wait, copy, raise
    // ============================================================
    const quizData = [
        {
            id: 1,
            impType: "aff",
            impLabel: "Imperativo Afirmativo",
            options: [
                { text: "Looks at the board carefully — the teacher is writing something important.", correct: false,
                  errorWord: "Looks", correctWord: "Look",
                  errorType: "Presente simple 3ª persona — no es imperativo",
                  explanation: "'Looks' es la forma de he/she/it en presente simple. El imperativo afirmativo usa la forma base sin -s: 'Look at the board', no 'Looks at the board'." },
                { text: "Look at the board carefully — the teacher is writing something important.", correct: true },
                { text: "Looking at the board carefully — the teacher is writing something important.", correct: false,
                  errorWord: "Looking", correctWord: "Look",
                  errorType: "Gerundio — no es imperativo",
                  explanation: "'Looking' es un gerundio. El imperativo afirmativo no usa -ing. Para instrucciones directas: 'Look', la forma base pura del verbo." }
            ],
            clue: "instrucción directa en clase",
            clueExplain: "Las instrucciones directas usan el imperativo afirmativo: forma base del verbo sin sujeto ni -s ni -ing.",
            rule: "Imperativo afirmativo = forma base: Look (no Looks, no Looking)",
            examples: ["Look → imperativo", "Listen → imperativo", "Read → imperativo"],
            correctReason: "<span class='why-hl'>Look</span> at the board — forma base del verbo, sin sujeto y sin -s. Así son todas las instrucciones directas en inglés."
        },
        {
            id: 2,
            impType: "neg",
            impLabel: "Imperativo Negativo",
            options: [
                { text: "Don't come late to the study session — Luis is always on time.", correct: true },
                { text: "Doesn't come late to the study session — Luis is always on time.", correct: false,
                  errorWord: "Doesn't come", correctWord: "Don't come",
                  errorType: "Presente simple negativo — no es imperativo",
                  explanation: "'Doesn't come' es el presente simple negativo de he/she/it. Para prohibiciones directas, siempre se usa 'Don't + forma base', nunca 'Doesn't'." },
                { text: "Not come late to the study session — Luis is always on time.", correct: false,
                  errorWord: "Not come", correctWord: "Don't come",
                  errorType: "Forma incompleta — falta 'Don't'",
                  explanation: "'Not come' sin 'Don't' no existe como imperativo en inglés. La estructura completa es: 'Don't + forma base'. 'Not' solo no puede iniciar un imperativo negativo." }
            ],
            clue: "prohibición directa con 'Don't'",
            clueExplain: "El imperativo negativo en inglés es siempre 'Don't + forma base del verbo'. No puede ser 'Doesn't' ni 'Not' solo.",
            rule: "Don't + forma base = imperativo negativo (nunca Doesn't, nunca Not solo)",
            examples: ["Don't come → neg. imperativo", "Don't run → neg. imperativo", "Don't talk → neg. imperativo"],
            correctReason: "<span class='why-hl'>Don't come</span> late — 'Don't + forma base' es la única forma del imperativo negativo. 'Doesn't' es presente simple; 'Not come' está incompleto."
        },
        {
            id: 3,
            impType: "aff",
            impLabel: "Imperativo Afirmativo",
            options: [
                { text: "Is quiet in the hallway — Ana's brother is sleeping.", correct: false,
                  errorWord: "Is", correctWord: "Be",
                  errorType: "Forma de 'to be' — no es imperativo",
                  explanation: "'Is' es la tercera persona del presente de 'to be'. El imperativo de 'be' siempre usa la forma base 'be', no 'is', 'are' o 'am'." },
                { text: "Be quiet in the hallway — Ana's brother is sleeping.", correct: true },
                { text: "Are quiet in the hallway — Ana's brother is sleeping.", correct: false,
                  errorWord: "Are", correctWord: "Be",
                  errorType: "Forma de 'to be' — no es imperativo",
                  explanation: "'Are' es la forma plural/segunda persona del presente de 'to be'. El imperativo de 'be' es siempre 'be': 'Be quiet', no 'Are quiet'." }
            ],
            clue: "imperativo de 'be' — forma base",
            clueExplain: "El imperativo del verbo 'be' usa su forma base: 'be'. Nunca 'is', 'are' o 'am'. 'Be quiet' = la instrucción de guardar silencio.",
            rule: "Imperativo de 'be' = Be (forma base, nunca Is/Are/Am)",
            examples: ["Be quiet → imperativo de be", "Be careful → imperativo de be", "Be ready → imperativo de be"],
            correctReason: "<span class='why-hl'>Be quiet</span> — el imperativo de 'be' usa su forma base. 'Is quiet' y 'Are quiet' son formas del presente, no imperativos."
        },
        {
            id: 4,
            impType: "let",
            impLabel: "Let's...",
            options: [
                { text: "We start cooking together — David's mother always says this.", correct: false,
                  errorWord: "We start", correctWord: "Let's start",
                  errorType: "Presente simple — no es propuesta conjunta",
                  explanation: "'We start' describe lo que hacen normalmente — es un hecho. Para proponer hacer algo juntos en este momento, se usa 'Let's start': 'Let's start cooking together'." },
                { text: "Let start cooking together — David's mother always says this.", correct: false,
                  errorWord: "Let start", correctWord: "Let's start",
                  errorType: "Falta apóstrofe — 'Let us' incompleto",
                  explanation: "'Let start' está incompleto. La forma correcta es 'Let's' (= Let us) con apóstrofe. Sin el apóstrofe, 'Let' funciona como verbo de permiso ('Let him start'), no como propuesta conjunta." },
                { text: "Let's start cooking together — David's mother always says this.", correct: true }
            ],
            clue: "propuesta conjunta — 'Let's'",
            clueExplain: "'Let's + verbo base' propone una acción conjunta. El apóstrofe es obligatorio: 'Let's' = Let us. Sin apóstrofe, el significado cambia.",
            rule: "Let's + verbo base = propuesta conjunta (apóstrofe obligatorio)",
            examples: ["Let's start → propuesta", "Let's go → propuesta", "Let's cook → propuesta"],
            correctReason: "<span class='why-hl'>Let's start</span> cooking — 'Let's' (= Let us) con apóstrofe + forma base. 'We start' es descripción; 'Let start' está incompleto sin apóstrofe."
        },
        {
            id: 5,
            impType: "neg",
            impLabel: "Imperativo Negativo",
            options: [
                { text: "Don't go to bed late if you want to wake up early, like Carlos learned.", correct: true },
                { text: "Don't goes to bed late if you want to wake up early, like Carlos learned.", correct: false,
                  errorWord: "Don't goes", correctWord: "Don't go",
                  errorType: "Don't + tercera persona — forma incorrecta",
                  explanation: "Después de 'Don't', el verbo siempre va en forma base — nunca con -s. 'Don't goes' es incorrecto. La forma correcta es 'Don't go'." },
                { text: "Don't went to bed late if you want to wake up early, like Carlos learned.", correct: false,
                  errorWord: "Don't went", correctWord: "Don't go",
                  errorType: "Don't + pasado — forma incorrecta",
                  explanation: "'Went' es el pasado de 'go'. Después de 'Don't' siempre va la forma BASE del verbo, nunca el pasado. 'Don't went' no existe — la forma correcta es 'Don't go'." }
            ],
            clue: "Don't + forma base (sin -s, sin pasado)",
            clueExplain: "Después de 'Don't', el verbo va siempre en forma base: 'Don't go'. Nunca 'goes' ni 'went'.",
            rule: "Don't + forma base del verbo (sin -s, sin pasado, sin -ing)",
            examples: ["Don't go → correcto", "Don't goes → incorrecto", "Don't went → incorrecto"],
            correctReason: "<span class='why-hl'>Don't go</span> to bed late — 'Don't' + forma base 'go'. Después de 'Don't' el verbo nunca cambia: ni -s ni pasado."
        },
        {
            id: 6,
            impType: "aff",
            impLabel: "Imperativo Afirmativo",
            options: [
                { text: "Cleans your room before your grandmother arrives, Elena.", correct: false,
                  errorWord: "Cleans", correctWord: "Clean",
                  errorType: "Tercera persona presente — no es imperativo",
                  explanation: "'Cleans' es la forma de he/she/it en presente simple. El imperativo no lleva -s, aunque se dirija a una persona: 'Clean your room'." },
                { text: "Cleaned your room before your grandmother arrives, Elena.", correct: false,
                  errorWord: "Cleaned", correctWord: "Clean",
                  errorType: "Pasado simple — no es imperativo",
                  explanation: "'Cleaned' es el pasado de 'clean'. El imperativo siempre usa la forma base del verbo en presente: 'Clean your room', no 'Cleaned your room'." },
                { text: "Clean your room before your grandmother arrives, Elena.", correct: true }
            ],
            clue: "instrucción directa — forma base sin -s ni pasado",
            clueExplain: "El imperativo afirmativo es la forma base del verbo. Nunca lleva -s (eso es presente simple) ni -ed (eso es pasado).",
            rule: "Imperativo = forma base: Clean (no Cleans, no Cleaned)",
            examples: ["Clean → imperativo", "Cook → imperativo", "Help → imperativo"],
            correctReason: "<span class='why-hl'>Clean</span> your room — forma base pura. 'Cleans' es presente simple y 'Cleaned' es pasado: ninguno es imperativo."
        },
        {
            id: 7,
            impType: "both",
            impLabel: "Aff. + Neg.",
            options: [
                { text: "Repeated the recipe steps out loud, but don't rush — take your time.", correct: false,
                  errorWord: "Repeated", correctWord: "Repeat",
                  errorType: "Pasado simple en imperativo afirmativo",
                  explanation: "'Repeated' es el pasado de 'repeat'. El imperativo afirmativo usa la forma base: 'Repeat the recipe steps'. La segunda parte 'don't rush' está bien — el error es solo en la primera." },

    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }
    // ── STATE ──
    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, i) => {
            q.shuffled = shuffle(q.options);
            container.appendChild(createCard(q, i));
        });
        showQuestion(0);
        updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = `question-card ${index !== 0 ? 'hidden' : ''}`;
        card.id = `question-${index}`;
        const letters = ['A','B','C'];
        const badge = `<span class="imp-badge ${q.impType}">${q.impLabel}</span>`;

        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span class="q-label">Elige la oración gramaticalmente correcta:</span>
                ${badge}
            </div>
            <div class="sentence-options" id="options-${index}">
                ${q.shuffled.map((opt, i) => `
                    <button class="sent-option" onclick="selectOption(${index}, ${i})">
                        <div class="option-letter">${letters[i]}</div>
                        <div class="option-text">${opt.text}</div>
                    </button>
                `).join('')}
            </div>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Anterior</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'Ver Resultados 🎉' : 'Siguiente →'}
                </button>
            </div>
        `;
        return card;
    }

    function selectOption(qi, optIdx) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const selected = q.shuffled[optIdx];
        const isCorrect = selected.correct;
        if (isCorrect) score++;

        document.querySelectorAll(`#options-${qi} .sent-option`).forEach((btn, i) => {
            btn.classList.add('disabled');
            if (q.shuffled[i].correct) btn.classList.add('correct');
            else if (i === optIdx) btn.classList.add('incorrect');
        });

        buildFeedback(qi, selected, isCorrect, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;

        const ruleExamples = q.examples.map(e => {
            const p = e.split(' → ');
            return `<span class="rule-ex"><span class="base">${p[0]}</span><span class="arrow">→</span><span class="past">${p[1]}</span></span>`;
        }).join('');

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">✅</span>
                    <div>
                        <div class="fb-title">¡Correcto! Identificaste bien la oración</div>
                        <div class="fb-subtitle">Veamos por qué las otras estaban mal</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-signal">
                        <div class="fb-block-title">🔍 Señal clave</div>
                        <div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">
                            <span class="signal-tag">${q.clue}</span> ${q.clueExplain}
                        </div>
                    </div>
                    ${q.shuffled.filter(o => !o.correct).map(err => `
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ Error en opción: <span class="error-badge">${err.errorType}</span></div>
                        <div class="word-swap">
                            <span class="ws-box ws-wrong">${err.errorWord}</span>
                            <span class="ws-arrow">→</span>
                            <span class="ws-box ws-right">${err.correctWord}</span>
                        </div>
                        <div class="error-text">${err.explanation}</div>
                    </div>`).join('')}
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 Regla aplicada</div>
                        <div class="rule-formula">${q.rule}</div>
                        <div class="rule-examples">${ruleExamples}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 ¿Por qué es correcta?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>`;
        } else {
            const correctOpt = q.shuffled.find(o => o.correct);
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">❌</span>
                    <div>
                        <div class="fb-title">Incorrecto</div>
                        <div class="fb-subtitle">Revisemos qué salió mal</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-signal wrong">
                        <div class="fb-block-title">🔍 Señal clave que debías identificar</div>
                        <div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">
                            <span class="signal-tag red">${q.clue}</span> ${q.clueExplain}
                        </div>
                    </div>
                    <div class="fb-block fb-compare" style="background:#F8FAFC;border:1px solid #E2E8F0;">
                        <div class="fb-block-title" style="color:#475569;">🔄 Tu opción vs. la correcta</div>
                        <div style="margin-bottom:0.4rem;font-size:0.88rem;">
                            <span style="background:#FEE2E2;color:#DC2626;padding:0.15rem 0.5rem;border-radius:6px;font-weight:800;font-size:0.72rem;text-transform:uppercase;">Elegiste</span>
                            <span style="font-size:0.9rem;font-weight:600;margin-left:0.4rem;">${selected.text}</span>
                        </div>
                        <div style="font-size:0.88rem;">
                            <span style="background:#D1FAE5;color:#059669;padding:0.15rem 0.5rem;border-radius:6px;font-weight:800;font-size:0.72rem;text-transform:uppercase;">Correcto</span>
                            <span style="font-size:0.9rem;font-weight:600;margin-left:0.4rem;">${correctOpt.text}</span>
                        </div>
                    </div>
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ Tu error: <span class="error-badge">${selected.errorType}</span></div>
                        <div class="word-swap">
                            <span class="ws-box ws-wrong">${selected.errorWord}</span>
                            <span class="ws-arrow">→</span>
                            <span class="ws-box ws-right">${selected.correctWord}</span>
                        </div>
                        <div class="error-text">${selected.explanation}</div>
                    </div>
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 La regla correcta</div>
                        <div class="rule-formula">${q.rule}</div>
                        <div class="rule-examples">${ruleExamples}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 ¿Por qué ES correcta la otra opción?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>`;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c, idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
    }
    function nextQuestion(i) { i < quizData.length - 1 ? showQuestion(i + 1) : showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
    function updateProgress() {
        document.getElementById('progressFill').style.width = (answered.filter(Boolean).length / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? '¡Excelente! Identificas los imperativos perfectamente. 🏆'
            : pct >= 70 ? '¡Muy bien! Sigue practicando. 💪'
            : 'Buen esfuerzo. Repasa las reglas e inténtalo de nuevo. 📚';
        document.querySelectorAll('.star').forEach((s, i) => {
            if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300);
        });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
