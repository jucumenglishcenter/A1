<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fill in the Blanks - A1 M1 | Modals of Deduction | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2196F3;
            --primary-light: #BBDEFB;
            --primary-dark: #0D47A1;
            --accent: #64B5F6;
            --bg-gradient-start: #E3F2FD;
            --bg-gradient-end: #BBDEFB;
            --text-dark: #0A3470;
            --text-medium: #0D47A1;
            --text-light: #1565C0;
            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444;   --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6;    --info-light: #DBEAFE;  --info-dark: #1D4ED8;
            --purple: #8B5CF6;  --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --shadow-soft: 0 4px 20px rgba(33,150,243,0.15);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start),var(--bg-gradient-end)); min-height:100vh; color:var(--text-dark); }

        .header { background:linear-gradient(135deg,#1565C0 0%,#2196F3 60%,#64B5F6 100%); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.4rem; text-decoration:none; color:white; transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); transform:scale(1.1); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; white-space:nowrap; }
        .progress-container { height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; transition:width .5s ease; width:0%; }

        main { padding:1.5rem; max-width:680px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }

        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; flex-wrap:wrap; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .topic-badge { display:inline-flex; align-items:center; padding:0.2rem 0.7rem; border-radius:20px; font-size:0.72rem; font-weight:700; margin-left:auto; }
        .topic-badge.deduction  { background:#EDE9FE; color:#6D28D9; }
        .topic-badge.certainty  { background:#FFF3E0; color:#C2410C; }
        .topic-badge.contrast   { background:#D1FAE5; color:#065F46; }

        /* context box */
        .context-box { background:#F0F9FF; border:1px solid #BAE6FD; border-radius:10px; padding:0.7rem 0.9rem; margin-bottom:0.85rem; font-size:0.88rem; color:#0C4A6E; line-height:1.55; }
        .context-label { font-size:0.68rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:#0369A1; display:block; margin-bottom:0.25rem; }

        .sentence-area { background:#F8FAFC; border:1px solid #E2E8F0; border-radius:12px; padding:1rem 1.1rem; margin-bottom:1rem; font-size:1.05rem; font-weight:600; color:var(--text-dark); line-height:2; }
        .blank-input { display:inline-block; border:none; border-bottom:2.5px solid var(--primary); background:transparent; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; color:var(--primary-dark); width:130px; text-align:center; padding:0 4px; outline:none; vertical-align:baseline; transition:border-color .2s; }
        .blank-input:focus { border-bottom-color:var(--accent); }
        .blank-input.correct   { border-bottom-color:var(--success); color:var(--success-dark); }
        .blank-input.incorrect { border-bottom-color:var(--error);   color:var(--error-dark); }
        .blank-input:disabled  { background:transparent; }

        .options-row { display:flex; flex-wrap:wrap; gap:0.5rem; margin-bottom:0.75rem; }
        .option-chip { padding:0.35rem 0.85rem; border:2px solid var(--primary-light); border-radius:20px; font-size:0.88rem; font-weight:700; color:var(--text-medium); background:white; cursor:pointer; transition:all .2s; user-select:none; }
        .option-chip:hover { background:var(--primary-light); border-color:var(--primary); }
        .option-chip.used { opacity:.35; cursor:default; text-decoration:line-through; }

        .check-btn { width:100%; padding:0.8rem; border:none; border-radius:12px; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; margin-bottom:0.5rem; }
        .check-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
        .check-btn:disabled { opacity:.45; cursor:default; }

        .feedback { border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); margin-top:0.75rem; }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct   .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon  { font-size:1.6rem; }
        .fb-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }

        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct   .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }

        .fb-block { border-radius:12px; padding:0.9rem 1rem; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; flex-wrap:wrap; }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.15rem 0.55rem; border-radius:6px; font-size:0.72rem; font-weight:700; margin-left:4px; }

        .fb-signal      { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-signal.wrong{ background:#FFF1F2; border-color:#FECDD3; }
        .fb-signal      .fb-block-title { color:var(--success-dark); }
        .fb-signal.wrong .fb-block-title { color:var(--error-dark); }
        .signal-tag     { display:inline-block; background:var(--success); color:white; border-radius:6px; padding:0.1rem 0.5rem; font-size:0.82rem; font-weight:700; margin:0 2px; }
        .signal-tag.red { background:var(--error); }

        .fb-compare { background:#F8FAFC; border:1px solid #E2E8F0; }
        .fb-compare .fb-block-title { color:#475569; }
        .compare-row { display:flex; align-items:flex-start; gap:0.6rem; padding:0.4rem 0; border-bottom:1px dashed #E2E8F0; }
        .compare-row:last-child { border-bottom:none; }
        .compare-label       { font-size:0.72rem; font-weight:800; text-transform:uppercase; white-space:nowrap; padding:0.15rem 0.5rem; border-radius:6px; flex-shrink:0; margin-top:2px; }
        .compare-label.wrong { background:var(--error-light);   color:var(--error-dark); }
        .compare-label.right { background:var(--success-light); color:var(--success-dark); }
        .compare-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; font-weight:600; }
        .hl-wrong   { color:var(--error-dark);   font-weight:800; text-decoration:underline wavy var(--error); }
        .hl-correct { color:var(--success-dark); font-weight:800; }

        .fb-error { background:var(--error-light); border:1px solid #FECACA; }
        .fb-error .fb-block-title { color:var(--error-dark); }
        .word-swap  { display:flex; align-items:center; justify-content:center; gap:0.75rem; margin:0.6rem 0; flex-wrap:wrap; }
        .ws-box   { padding:0.4rem 1rem; border-radius:8px; font-weight:700; font-size:1rem; }
        .ws-wrong { background:white; color:var(--error); border:2px solid var(--error); text-decoration:line-through; }
        .ws-arrow { font-size:1.3rem; color:#94A3B8; }
        .ws-right { background:var(--success); color:white; }
        .error-text { font-size:0.9rem; color:var(--text-dark); line-height:1.55; }

        /* certainty scale */
        .certainty-scale { display:flex; align-items:center; gap:0; margin:0.5rem 0; border-radius:8px; overflow:hidden; font-size:0.78rem; font-weight:700; }
        .cs-item { flex:1; text-align:center; padding:0.3rem 0.2rem; }
        .cs-item.active { outline:2px solid var(--text-dark); outline-offset:-2px; }
        .cs-cant    { background:#FEE2E2; color:#DC2626; }
        .cs-might   { background:#FFF3E0; color:#D97706; }
        .cs-may     { background:#FEF9C3; color:#854D0E; }
        .cs-must    { background:#D1FAE5; color:#059669; }
        .cs-will    { background:#DBEAFE; color:#1D4ED8; }
        .cs-prob    { background:#EDE9FE; color:#7C3AED; }

        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula  { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.95rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }
        .rule-examples { display:flex; flex-wrap:wrap; gap:0.4rem; }
        .rule-ex        { display:flex; align-items:center; gap:0.3rem; font-size:0.82rem; background:white; border:1px solid #BFDBFE; border-radius:6px; padding:0.2rem 0.5rem; }
        .rule-ex .base  { color:var(--info-dark);    font-weight:600; }
        .rule-ex .arrow { color:#94A3B8; }
        .rule-ex .result{ color:var(--success-dark); font-weight:700; }

        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text  { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }
        .why-hl { background:var(--success-light); color:var(--success-dark); padding:0.1rem 0.4rem; border-radius:5px; font-weight:700; }

        .nav-buttons { display:flex; gap:0.75rem; margin-top:1rem; }
        .nav-btn      { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled             { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }

        .results-screen      { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji   { font-size:4rem; margin-bottom:1rem; }
        .results-title   { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; color:var(--text-dark); }
        .results-score   { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star            { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned     { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons  { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn         { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary   { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>
    <header class="header">
        <a href="a1-m1-index.html" class="back-btn">←</a>
        <div class="header-info">
            <div class="header-title">✏️ Fill in the Blanks</div>
            <div class="header-subtitle">🔵 A1 · M1 · Modals of Deduction · Degrees of Certainty</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/15</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">✏️</div>
            <div>
                <div class="instructions-title">Completa con el modal correcto</div>
                <div class="instructions-text">Lee el contexto y elige entre <strong>must / might / may / can't / will probably / probably won't</strong> según el grado de certeza indicado.</div>
            </div>
        </div>

        <div id="questionsContainer"></div>

        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">¡Completado!</div>
            <div class="results-score" id="finalScore">0/15</div>
            <div class="stars-container">
                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Intentar de Nuevo</button>
                <a href="a1-m1-index.html" class="result-btn secondary">← Volver al Módulo</a>
            </div>
        </div>
    </main>

    <script>
    // ============================================================
    // FILL — 15 preguntas
    // A1 · M1 · Modals of deduction + Degrees of certainty
    // Personajes: Ana, David, Elena, Carlos
    //
    // Distribución:
    //  Q1–Q5   Modals of deduction: must / can't / might / may
    //  Q6–Q10  Degrees of certainty: will probably / might /
    //          definitely / probably won't
    //  Q11–Q15 Contraste: elegir el modal según nivel de certeza
    //
    // Cada pregunta tiene:
    //  - context: situación que justifica el modal
    //  - parts[]: la oración con el espacio en blanco
    //  - answer: el modal correcto
    //  - options[]: 4 opciones mezcladas con shuffle()
    //  - certaintyScale: qué nivel marcar en la escala visual
    // ============================================================
    const quizData = [

        // ── MODALS OF DEDUCTION ────────────────────────────────
        {
            id: 1, topicType: "deduction", topicLabel: "Modal de deducción",
            context: "Ana wakes up every morning without an alarm. Her body always knows when it's time.",
            parts: ["Her body ", "___", " know the right time — she never needs an alarm!"],
            answer: "must",
            options: ["must", "can't", "might", "may"],
            certaintyScale: "must",
            clue: "always knows — certeza casi total",
            clueExplain: "el hecho de que NUNCA necesite despertador es evidencia sólida. 'Must' expresa deducción lógica con certeza casi total basada en evidencia clara.",
            errorType: "Modal de certeza incorrecto",
            errorExplain: "'Can't' niega la posibilidad. 'Might/may' expresan solo posibilidad (quizás). La evidencia (nunca falla, siempre funciona) justifica 'must' — deducción casi segura.",
            rule: "must = deducción con certeza alta (la evidencia lo hace casi seguro)",
            examples: ["must know → certeza alta", "must be tired → evidencia clara", "must like it → deducción lógica"],
            correctReason: "<span class='why-hl'>must know</span> — la evidencia es clara y consistente: nunca necesita alarma. 'Must' es la deducción lógica cuando la evidencia hace algo casi inevitable."
        },
        {
            id: 2, topicType: "deduction", topicLabel: "Modal de deducción",
            context: "Ana's brother is always still asleep when she leaves at 6:30 am. She tiptoes past his room every day.",
            parts: ["He ", "___", " be a morning person — he's asleep every time she leaves!"],
            answer: "can't",
            options: ["can't", "must", "might", "may"],
            certaintyScale: "cant",
            clue: "asleep every single time — imposibilidad lógica",
            clueExplain: "'Can't' expresa deducción negativa — es (casi) imposible que sea una persona madrugadora dado que está dormido cada vez sin excepción.",
            errorType: "Modal de negación lógica incorrecto",
            errorExplain: "'Must' afirmaría algo positivo. 'Might/may' sugerirían solo duda. La evidencia repetida e inequívoca (siempre dormido) lleva a negar la posibilidad → 'can't'.",
            rule: "can't = deducción negativa (la evidencia hace algo casi imposible)",
            examples: ["can't be home → evidencia lo niega", "can't like it → nunca lo hace", "can't know → imposible dado el contexto"],
            correctReason: "<span class='why-hl'>can't be</span> — estar siempre dormido a las 6:30 hace (casi) imposible ser madrugador. 'Can't' niega la posibilidad con base en evidencia sólida."
        },
        {
            id: 3, topicType: "deduction", topicLabel: "Modal de deducción",
            context: "David's old cookbook has very soft pages and some pencil marks his mother added. He has used it for years.",
            parts: ["The cookbook ", "___", " have a lot of memories for David — it was his mother's."],
            answer: "must",
            options: ["must", "might", "can't", "may"],
            certaintyScale: "must",
            clue: "it was his mother's + used for years — deducción casi segura",
            clueExplain: "el hecho de ser el libro de su madre, con marcas personales y años de uso, es evidencia fuerte de que tiene un valor emocional especial. 'Must' refleja esa deducción casi segura.",
            errorType: "Modal de certeza incorrecto",
            errorExplain: "'Might/may' expresarían solo posibilidad débil. 'Can't' negaría el valor sentimental — contradice la evidencia. 'Must' es la deducción lógica ante evidencia tan clara.",
            rule: "must = conclusión lógica muy probable basada en evidencia concreta",
            examples: ["must have memories → evidencia clara", "must be special → contexto lo confirma", "must mean a lot → deducción lógica"],
            correctReason: "<span class='why-hl'>must have</span> — el libro era de su madre, tiene marcas personales y ha durado años. La evidencia hace la deducción casi inevitable."
        },
        {
            id: 4, topicType: "deduction", topicLabel: "Modal de deducción",
            context: "Elena doesn't know if her old neighbor still lives in the same street. She hasn't been back in years.",
            parts: ["He ", "___", " still live there — I haven't seen him in years and people move."],
            answer: "might",
            options: ["might", "must", "can't", "will"],
            certaintyScale: "might",
            clue: "haven't seen in years — posibilidad incierta",
            clueExplain: "'Might' expresa una posibilidad real pero incierta. No hay evidencia suficiente para afirmar (must) ni para negar (can't) — solo una suposición débil.",
            errorType: "Modal de posibilidad incorrecto",
            errorExplain: "'Must' requiere evidencia sólida a favor. 'Can't' requiere evidencia sólida en contra. Sin información reciente, solo se puede decir 'might' (quizás, no se sabe).",
            rule: "might = posibilidad incierta (no hay evidencia suficiente para decidir)",
            examples: ["might still live there → posibilidad", "might be home → no se sabe", "might know → tal vez"],
            correctReason: "<span class='why-hl'>might still live</span> — sin información reciente, no se puede afirmar ni negar. 'Might' expresa exactamente esa incertidumbre: quizás sí, quizás no."
        },
        {
            id: 5, topicType: "deduction", topicLabel: "Modal de deducción",
            context: "Carlos arrives at school at exactly 8 am every single day without exception. His students have never seen him late.",
            parts: ["He ", "___", " be a disorganized person — he's always perfectly on time."],
            answer: "can't",
            options: ["can't", "must", "may", "might"],
            certaintyScale: "cant",
            clue: "always perfectly on time — niega la posibilidad",
            clueExplain: "llegar siempre puntual, sin excepción, es evidencia que hace imposible ser una persona desorganizada. 'Can't' expresa esa deducción negativa.",
            errorType: "Modal de negación incorrecto",
            errorExplain: "'Must' afirmaría que es desorganizado — contradice la evidencia. 'May/might' sugerirían duda donde la evidencia es clara. Solo 'can't' captura la negación lógica.",
            rule: "can't = la evidencia niega casi completamente la posibilidad",
            examples: ["can't be disorganized → siempre puntual", "can't be tired → lleno de energía", "can't hate it → lo hace cada día"],

    // ── CERTAINTY SCALE HTML ──
    const scaleHTML = {
        cant:  { label: "can't",         cls: "cant" },
        might: { label: "might / may",   cls: "might" },
        may:   { label: "might / may",   cls: "may" },
        must:  { label: "must",          cls: "must" },
        prob:  { label: "will probably / probably won't", cls: "prob" }
    };

    function buildScale(activeKey) {
        const items = [
            { key: "cant",  label: "can't",  cls: "cs-cant" },
            { key: "might", label: "might",  cls: "cs-might" },
            { key: "may",   label: "may",    cls: "cs-may" },
            { key: "must",  label: "must",   cls: "cs-must" },
            { key: "prob",  label: "will probably", cls: "cs-prob" }
        ];
        return `<div class="certainty-scale">${items.map(it =>
            `<div class="cs-item ${it.cls}${it.key === activeKey ? ' active' : ''}">${it.label}</div>`
        ).join('')}</div>`;
    }

    // ── SHUFFLE ──
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    // ── STATE ──
    let currentQuestion = 0, score = 0;
    let answered = new Array(quizData.length).fill(false);

    function initQuiz() {
        quizData.forEach(q => { q.shuffledOptions = shuffle(q.options); });
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, i) => container.appendChild(createCard(q, i)));
        showQuestion(0);
        updateProgress();
    }

    function createCard(q, index) {
        const card = document.createElement('div');
        card.className = `question-card ${index !== 0 ? 'hidden' : ''}`;
        card.id = `question-${index}`;

        const badge = `<span class="topic-badge ${q.topicType}">${q.topicLabel}</span>`;
        const sentenceHTML = q.parts[0]
            + `<input class="blank-input" id="input-${index}" type="text" maxlength="25"
                autocomplete="off" autocorrect="off" spellcheck="false"
                placeholder="___" oninput="onInput(${index})">`
            + q.parts[2];
        const chipsHTML = q.shuffledOptions.map(opt =>
            `<span class="option-chip" onclick="fillBlank(${index}, \`${opt}\`)">${opt}</span>`
        ).join('');

        card.innerHTML = `
            <div class="q-header">
                <div class="question-number">${index + 1}</div>
                <span style="font-size:0.88rem;color:var(--text-medium);font-weight:600;flex:1;">Completa con el modal correcto:</span>
                ${badge}
            </div>
            <div class="context-box">
                <span class="context-label">📖 Contexto</span>
                ${q.context}
            </div>
            <div class="sentence-area">${sentenceHTML}</div>
            <div class="options-row" id="chips-${index}">${chipsHTML}</div>
            <button class="check-btn" id="check-${index}" onclick="checkAnswer(${index})" disabled>Comprobar ✓</button>
            <div class="feedback" id="feedback-${index}"></div>
            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevQuestion()" ${index === 0 ? 'disabled' : ''}>← Anterior</button>
                <button class="nav-btn next" id="next-${index}" onclick="nextQuestion(${index})" disabled>
                    ${index === quizData.length - 1 ? 'Ver Resultados 🎉' : 'Siguiente →'}
                </button>
            </div>
        `;
        return card;
    }

    function fillBlank(qi, value) {
        if (answered[qi]) return;
        const input = document.getElementById(`input-${qi}`);
        input.value = value;
        document.querySelectorAll(`#chips-${qi} .option-chip`).forEach(c =>
            c.classList.toggle('used', c.textContent === value));
        document.getElementById(`check-${qi}`).disabled = false;
    }

    function onInput(qi) {
        if (answered[qi]) return;
        const val = document.getElementById(`input-${qi}`).value.trim();
        document.getElementById(`check-${qi}`).disabled = val.length === 0;
        document.querySelectorAll(`#chips-${qi} .option-chip`).forEach(c =>
            c.classList.toggle('used', c.textContent === val));
    }

    function checkAnswer(qi) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const input = document.getElementById(`input-${qi}`);
        const userAnswer = input.value.trim().toLowerCase();
        const isCorrect = userAnswer === q.answer.toLowerCase();

        input.classList.add(isCorrect ? 'correct' : 'incorrect');
        input.disabled = true;
        document.getElementById(`check-${qi}`).disabled = true;
        document.querySelectorAll(`#chips-${qi} .option-chip`).forEach(c => c.style.pointerEvents = 'none');

        if (isCorrect) score++;
        buildFeedback(qi, userAnswer, isCorrect, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, userAnswer, isCorrect, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;

        const ruleExamples = q.examples.map(e => {
            const p = e.split(' → ');
            return `<span class="rule-ex"><span class="base">${p[0]}</span><span class="arrow">→</span><span class="result">${p[1]}</span></span>`;
        }).join('');

        const correctSentence = q.parts[0] + `<span class="hl-correct">${q.answer}</span>` + q.parts[2];
        const wrongSentence   = q.parts[0] + `<span class="hl-wrong">${userAnswer || '(vacío)'}</span>` + q.parts[2];
        const scale = buildScale(q.certaintyScale);

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">✅</span>
                    <div>
                        <div class="fb-title">¡Correcto!</div>
                        <div class="fb-subtitle">Elegiste el grado de certeza adecuado</div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-signal">
                        <div class="fb-block-title">🔍 Señal clave del contexto</div>
                        <div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">
                            <span class="signal-tag">${q.clue}</span> ${q.clueExplain}
                        </div>
                        ${scale}
                    </div>
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 Regla aplicada</div>
                        <div class="rule-formula">${q.rule}</div>
                        <div class="rule-examples">${ruleExamples}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 ¿Por qué es correcto?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>`;
        } else {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">❌</span>
                    <div>
                        <div class="fb-title">Incorrecto — revisemos juntos</div>
                        <div class="fb-subtitle">El modal correcto era: <strong>${q.answer}</strong></div>
                    </div>
                </div>
                <div class="fb-body">
                    <div class="fb-block fb-signal wrong">
                        <div class="fb-block-title">🔍 Señal clave que debías identificar</div>
                        <div style="font-size:0.92rem;color:var(--text-dark);line-height:1.55;">
                            <span class="signal-tag red">${q.clue}</span> ${q.clueExplain}
                        </div>
                        ${scale}
                    </div>
                    <div class="fb-block fb-compare">
                        <div class="fb-block-title">🔄 Tu respuesta vs. la correcta</div>
                        <div class="compare-row">
                            <span class="compare-label wrong">Escribiste</span>
                            <span class="compare-text">${wrongSentence}</span>
                        </div>
                        <div class="compare-row">
                            <span class="compare-label right">Correcto</span>
                            <span class="compare-text">${correctSentence}</span>
                        </div>
                    </div>
                    <div class="fb-block fb-error">
                        <div class="fb-block-title">⚠️ El error: <span class="error-badge">${q.errorType}</span></div>
                        <div class="word-swap">
                            <span class="ws-box ws-wrong">${userAnswer || '(vacío)'}</span>
                            <span class="ws-arrow">→</span>
                            <span class="ws-box ws-right">${q.answer}</span>
                        </div>
                        <div class="error-text">${q.errorExplain}</div>
                    </div>
                    <div class="fb-block fb-rule">
                        <div class="fb-block-title">📐 La regla correcta</div>
                        <div class="rule-formula">${q.rule}</div>
                        <div class="rule-examples">${ruleExamples}</div>
                    </div>
                    <div class="fb-block fb-why">
                        <div class="fb-block-title">💡 ¿Por qué es correcto "${q.answer}"?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>`;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c, idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
        const inp = document.getElementById(`input-${i}`);
        if (inp && !answered[i]) setTimeout(() => inp.focus(), 300);
    }
    function nextQuestion(i) { i < quizData.length - 1 ? showQuestion(i + 1) : showResults(); }
    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }
    function updateProgress() {
        const done = answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width = (done / quizData.length * 100) + '%';
    }
    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        document.getElementById('resultsScreen').classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? '¡Excelente! Dominas los modales de deducción. 🏆'
            : pct >= 70 ? '¡Muy bien! Sigue practicando. 💪'
            : 'Buen esfuerzo. Repasa los grados de certeza e inténtalo de nuevo. 📚';
        document.querySelectorAll('.star').forEach((s, i) => {
            if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300);
        });
    }
    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
