<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fill in the Blanks - A1 M1 Daily Life | JUCUM English</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* A1 BLUE THEME — tomado directamente del HTML del módulo */
            --primary: #2196F3;
            --primary-light: #BBDEFB;
            --primary-dark: #0D47A1;
            --accent: #64B5F6;
            --bg-gradient-start: #E3F2FD;
            --bg-gradient-end: #BBDEFB;
            --text-dark: #0A3470;
            --text-medium: #0D47A1;
            --text-light: #1565C0;
            --success: #10B981; --success-light: #D1FAE5; --success-dark: #059669;
            --error: #EF4444; --error-light: #FEE2E2; --error-dark: #DC2626;
            --info: #3B82F6; --info-light: #DBEAFE; --info-dark: #1D4ED8;
            --purple: #8B5CF6; --purple-light: #EDE9FE; --purple-dark: #6D28D9;
            --white: #FFFFFF;
            --shadow-soft: 0 4px 20px rgba(33,150,243,0.15);
            --shadow-strong: 0 8px 30px rgba(33,150,243,0.25);
            --border-radius: 20px;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        body { font-family:'Nunito',sans-serif; background:linear-gradient(135deg,var(--bg-gradient-start) 0%,var(--bg-gradient-end) 100%); min-height:100vh; color:var(--text-dark); }

        /* ── HEADER ── */
        .header { background:linear-gradient(135deg,#1565C0 0%,#2196F3 60%,#64B5F6 100%); padding:1rem 1.5rem; display:flex; align-items:center; gap:1rem; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-soft); }
        .back-btn { width:40px; height:40px; border-radius:50%; background:rgba(255,255,255,0.3); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:1.4rem; text-decoration:none; color:white; transition:all .2s; flex-shrink:0; }
        .back-btn:hover { background:rgba(255,255,255,0.5); transform:scale(1.1); }
        .header-info { flex:1; }
        .header-title { font-family:'Fredoka',sans-serif; font-size:1.1rem; font-weight:600; color:white; }
        .header-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:2px; }
        .progress-indicator { background:rgba(255,255,255,0.3); padding:0.4rem 0.9rem; border-radius:20px; font-weight:700; color:white; font-size:0.9rem; white-space:nowrap; }
        .progress-container { padding:0; height:6px; background:rgba(255,255,255,0.3); }
        .progress-fill { height:100%; background:white; border-radius:0 3px 3px 0; transition:width .5s ease; width:0%; }

        /* ── LAYOUT ── */
        main { padding:1.5rem; max-width:650px; margin:0 auto; }
        .instructions { background:white; border-radius:16px; padding:1rem 1.25rem; margin-bottom:1.25rem; box-shadow:var(--shadow-soft); border-left:5px solid var(--primary); display:flex; gap:0.75rem; align-items:flex-start; }
        .instructions-icon { font-size:1.6rem; flex-shrink:0; }
        .instructions-title { font-family:'Fredoka',sans-serif; font-size:1rem; font-weight:600; color:var(--text-dark); margin-bottom:0.2rem; }
        .instructions-text { font-size:0.85rem; color:var(--text-medium); line-height:1.5; }

        /* ── QUESTION CARD ── */
        .question-card { background:white; border-radius:var(--border-radius); box-shadow:var(--shadow-soft); padding:1.5rem; margin-bottom:1rem; animation:slideIn .4s ease; }
        .question-card.hidden { display:none; }
        @keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }

        .q-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1rem; }
        .question-number { width:32px; height:32px; border-radius:50%; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; display:flex; align-items:center; justify-content:center; font-family:'Fredoka',sans-serif; font-weight:700; font-size:0.95rem; flex-shrink:0; }
        .verb-type-badge { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.7rem; border-radius:20px; font-size:0.72rem; font-weight:700; }
        .verb-type-badge.there-is  { background:#E3F2FD; color:#0D47A1; }
        .verb-type-badge.there-are { background:#EDE9FE; color:#7C3AED; }
        .verb-type-badge.to-be-aff { background:#D1FAE5; color:#059669; }
        .verb-type-badge.to-be-neg { background:#FEE2E2; color:#DC2626; }
        .verb-type-badge.to-be-q   { background:#FFF3E0; color:#E65100; }

        .hint-box { background:#E3F2FD; border-left:4px solid var(--primary); padding:0.7rem 1rem; border-radius:0 10px 10px 0; margin-bottom:1rem; font-size:0.88rem; color:var(--text-dark); line-height:1.5; }
        .hint-label { font-weight:700; color:var(--primary-dark); display:flex; align-items:center; gap:0.4rem; margin-bottom:0.2rem; font-size:0.82rem; text-transform:uppercase; letter-spacing:.5px; }

        .question-text { font-size:1.1rem; line-height:1.7; margin-bottom:0.4rem; font-weight:600; }
        .blank { display:inline-block; min-width:90px; padding:0.2rem 0.6rem; background:var(--primary-light); border:2px dashed var(--primary-dark); border-radius:8px; text-align:center; font-weight:700; color:var(--primary-dark); transition:all .3s; }
        .blank.correct   { background:var(--success-light); border:2px solid var(--success); color:var(--success-dark); }
        .blank.incorrect { background:var(--error-light);   border:2px solid var(--error);   color:var(--error-dark); }
        .translation { color:var(--text-light); font-style:italic; font-size:0.85rem; margin-bottom:1rem; }

        /* ── OPTIONS ── */
        .options-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:0.7rem; margin-top:0.5rem; }
        .option-btn { padding:0.9rem 0.5rem; border:2.5px solid #E5E7EB; border-radius:12px; background:white; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; transition:all .2s; color:var(--text-dark); }
        .option-btn:hover:not(:disabled) { border-color:var(--primary); background:var(--primary-light); transform:translateY(-2px); }
        .option-btn:disabled { cursor:default; }
        .option-btn.correct   { border-color:var(--success); background:var(--success-light); color:var(--success-dark); }
        .option-btn.incorrect { border-color:var(--error);   background:var(--error-light);   color:var(--error-dark); }

        /* ── FEEDBACK SYSTEM ── */
        .feedback { margin-top:1.25rem; border-radius:16px; overflow:hidden; display:none; box-shadow:0 4px 16px rgba(0,0,0,0.1); }
        .feedback.show { display:block; animation:fadeUp .35s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

        .fb-header { padding:0.9rem 1.25rem; display:flex; align-items:center; gap:0.75rem; }
        .feedback.correct   .fb-header { background:linear-gradient(135deg,var(--success),var(--success-dark)); }
        .feedback.incorrect .fb-header { background:linear-gradient(135deg,var(--error),var(--error-dark)); }
        .fb-icon { font-size:1.6rem; }
        .fb-title    { font-family:'Fredoka',sans-serif; font-size:1.1rem; color:white; font-weight:600; }
        .fb-subtitle { font-size:0.8rem; color:rgba(255,255,255,0.85); margin-top:1px; }

        .fb-body { background:white; border:2px solid; border-top:none; border-radius:0 0 16px 16px; padding:1.25rem; display:flex; flex-direction:column; gap:0.9rem; }
        .feedback.correct   .fb-body { border-color:var(--success); }
        .feedback.incorrect .fb-body { border-color:var(--error); }

        .fb-signal { background:#F0FDF4; border:1px solid #BBF7D0; border-radius:12px; padding:0.9rem 1rem; }
        .fb-signal.wrong { background:#FFF1F2; border-color:#FECDD3; }
        .fb-block-title { font-weight:800; font-size:0.78rem; text-transform:uppercase; letter-spacing:.6px; margin-bottom:0.5rem; display:flex; align-items:center; gap:0.4rem; }
        .fb-signal       .fb-block-title { color:var(--success-dark); }
        .fb-signal.wrong .fb-block-title { color:var(--error-dark); }
        .fb-signal-text { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }
        .signal-tag     { display:inline-block; background:var(--success); color:white; border-radius:6px; padding:0.1rem 0.5rem; font-size:0.8rem; font-weight:700; margin:0 2px; }
        .signal-tag.red { background:var(--error); }

        .fb-compare { background:#F8FAFC; border:1px solid #E2E8F0; border-radius:12px; padding:0.9rem 1rem; }
        .fb-compare-row { display:flex; align-items:baseline; gap:0.6rem; padding:0.35rem 0; border-bottom:1px dashed #E2E8F0; }
        .fb-compare-row:last-child { border-bottom:none; }
        .compare-label       { font-size:0.72rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; padding:0.15rem 0.5rem; border-radius:6px; flex-shrink:0; }
        .compare-label.wrong { background:var(--error-light);   color:var(--error-dark); }
        .compare-label.right { background:var(--success-light); color:var(--success-dark); }
        .compare-text  { font-size:0.95rem; color:var(--text-dark); line-height:1.5; }
        .word-wrong    { color:var(--error);        font-weight:700; text-decoration:line-through; }
        .word-right    { color:var(--success-dark); font-weight:700; }

        .fb-error { background:var(--error-light); border-radius:12px; padding:0.9rem 1rem; }
        .error-badge { display:inline-block; background:var(--error); color:white; padding:0.2rem 0.6rem; border-radius:6px; font-size:0.75rem; font-weight:700; margin-left:auto; }
        .fb-error .fb-block-title { color:var(--error-dark); }
        .error-word-row { display:flex; align-items:center; justify-content:center; gap:0.75rem; margin:0.6rem 0; }
        .ew-box  { padding:0.4rem 1rem; border-radius:8px; font-weight:700; font-size:1rem; }
        .ew-wrong { background:white; color:var(--error); border:2px solid var(--error); text-decoration:line-through; }
        .ew-arrow { font-size:1.3rem; color:var(--text-medium); }
        .ew-right { background:var(--success); color:white; }
        .error-rule { font-size:0.88rem; color:var(--error-dark); line-height:1.5; }

        .fb-rule { background:var(--info-light); border:1px solid #BFDBFE; border-radius:12px; padding:0.9rem 1rem; }
        .fb-rule .fb-block-title { color:var(--info-dark); }
        .rule-formula  { background:white; border-radius:8px; padding:0.5rem 0.9rem; font-family:'Fredoka',sans-serif; font-size:0.95rem; color:var(--info-dark); font-weight:600; margin-bottom:0.6rem; text-align:center; border:1px solid #BFDBFE; }
        .rule-examples { display:flex; flex-wrap:wrap; gap:0.4rem; }
        .rule-ex       { display:flex; align-items:center; gap:0.3rem; font-size:0.82rem; background:white; border:1px solid #BFDBFE; border-radius:6px; padding:0.2rem 0.5rem; }
        .rule-ex .base  { color:var(--info-dark);    font-weight:600; }
        .rule-ex .arrow { color:#94A3B8; }
        .rule-ex .past  { color:var(--success-dark); font-weight:700; }

        .fb-why { background:#F0FDF4; border:1px solid #BBF7D0; border-radius:12px; padding:0.9rem 1rem; }
        .fb-why .fb-block-title { color:var(--success-dark); }
        .fb-why-text  { font-size:0.92rem; color:var(--text-dark); line-height:1.55; }
        .why-highlight { background:var(--success-light); color:var(--success-dark); padding:0.1rem 0.4rem; border-radius:5px; font-weight:700; }

        /* ── NAV BUTTONS ── */
        .nav-buttons { display:flex; gap:0.75rem; margin-top:1.25rem; }
        .nav-btn      { padding:0.8rem 1.2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all .2s; }
        .nav-btn.next { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; flex:1; }
        .nav-btn.prev { background:#F1F5F9; color:var(--text-dark); }
        .nav-btn:disabled           { opacity:.4; cursor:default; }
        .nav-btn:not(:disabled):hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }

        /* ── RESULTS ── */
        .results-screen      { display:none; text-align:center; padding:2rem 1.5rem; }
        .results-screen.show { display:block; animation:fadeUp .5s ease; }
        .results-emoji   { font-size:4rem; margin-bottom:1rem; }
        .results-title   { font-family:'Fredoka',sans-serif; font-size:2rem; margin-bottom:0.5rem; color:var(--text-dark); }
        .results-score   { font-size:3rem; font-weight:800; color:var(--purple); margin:1rem 0; }
        .results-message { font-size:1.05rem; color:var(--text-medium); margin-bottom:1.5rem; }
        .stars-container { display:flex; justify-content:center; gap:0.5rem; margin:1.5rem 0; }
        .star            { font-size:2.5rem; opacity:.3; transition:all .5s ease; }
        .star.earned     { opacity:1; animation:starPop .5s ease; }
        @keyframes starPop { 0%{transform:scale(0)} 50%{transform:scale(1.3)} 100%{transform:scale(1)} }
        .results-buttons { display:flex; flex-direction:column; gap:1rem; margin-top:2rem; }
        .result-btn         { padding:1rem 2rem; border:none; border-radius:12px; font-family:'Nunito',sans-serif; font-size:1rem; font-weight:700; cursor:pointer; text-decoration:none; display:flex; align-items:center; justify-content:center; gap:0.5rem; transition:all .2s; }
        .result-btn.primary   { background:linear-gradient(135deg,var(--purple),var(--purple-dark)); color:white; }
        .result-btn.secondary { background:#F1F5F9; color:var(--text-dark); }
        .result-btn:hover { transform:translateY(-2px); box-shadow:var(--shadow-soft); }
    </style>
</head>
<body>
    <header class="header">
        <a href="a1-daily-index.html" class="back-btn">←</a>
        <div class="header-info">
            <div class="header-title">📝 Fill in the Blanks</div>
            <div class="header-subtitle">🔵 A1 · Daily Life & Personal Routines · There is/are + To be</div>
        </div>
        <div class="progress-indicator"><span id="currentQ">1</span>/15</div>
    </header>
    <div class="progress-container"><div class="progress-fill" id="progressFill"></div></div>

    <main>
        <div class="instructions">
            <div class="instructions-icon">📖</div>
            <div>
                <div class="instructions-title">Completa el espacio en blanco</div>
                <div class="instructions-text">Elige la forma correcta de <strong>there is / there are</strong> o del verbo <strong>to be</strong>. Usa la pista para pensar antes de responder.</div>
            </div>
        </div>

        <div id="questionsContainer"></div>

        <div class="results-screen" id="resultsScreen">
            <div class="results-emoji">🎉</div>
            <div class="results-title">¡Completado!</div>
            <div class="results-score" id="finalScore">0/10</div>
            <div class="stars-container">
                <span class="star">⭐</span><span class="star">⭐</span><span class="star">⭐</span>
            </div>
            <div class="results-message" id="resultsMessage"></div>
            <div class="results-buttons">
                <button class="result-btn primary" onclick="location.reload()">🔄 Intentar de Nuevo</button>
                <a href="a1-daily-index.html" class="result-btn secondary">← Volver al Módulo</a>
            </div>
        </div>
    </main>

    <script>
    const quizData = [
        {
            id: 1,
            sentence: "_____ a big book about food on the table in Ana's house.",
            translation: "Hay un libro grande sobre comida en la mesa de la casa de Ana.",
            hint: "¿Cuántos libros hay? Solo uno. ¿Qué palabra usas cuando hay UNA cosa?",
            clue: "a big book",
            clueExplain: "El artículo 'a' antes de 'big book' indica que hay UN solo libro (singular). Con sustantivos singulares usamos 'There is'.",
            structureType: "there-is",
            structureLabel: "There is",
            options: ["There are", "There is", "There has"],
            correct: "There is",
            feedback: {
                "There are": {
                    errorType: "Singular vs. Plural",
                    explanation: "'There are' se usa con sustantivos PLURALES. 'A big book' lleva el artículo 'a' — indica UN solo libro (singular). Con singular, la forma correcta es 'There is'.",
                    rule: "There is + sustantivo singular / There are + sustantivo plural"
                },
                "There has": {
                    errorType: "Forma inexistente",
                    explanation: "'There has' no existe como estructura de existencia en inglés. Para decir que algo existe en un lugar: 'There is' (singular) o 'There are' (plural).",
                    rule: "Existencia en inglés: There is / There are (nunca 'there has')"
                }
            },
            correctReason: "Usamos <span class='why-highlight'>There is</span> porque 'a big book' es singular (un solo libro). Regla: There is + singular, There are + plural.",
            examples: ["There is a book → singular", "There are two books → plural", "There is a plan → singular"]
        },
        {
            id: 2,
            sentence: "_____ many nice things to learn in Carlos's home.",
            translation: "Hay muchas cosas bonitas para aprender en la casa de Carlos.",
            hint: "La palabra 'many' siempre va con sustantivos en plural. ¿Qué forma de 'there' usas con plural?",
            clue: "many nice things",
            clueExplain: "'Many' indica cantidad plural. 'Things' también es plural. Con sustantivos en plural siempre se usa 'There are'.",
            structureType: "there-are",
            structureLabel: "There are",
            options: ["There is", "There have", "There are"],
            correct: "There are",
            feedback: {
                "There is": {
                    errorType: "Singular vs. Plural",
                    explanation: "'There is' se usa con singulares. 'Many things' es claramente plural — 'many' significa 'muchas/os' y siempre acompaña plurales. Con plural la forma correcta es 'There are'.",
                    rule: "Many + sustantivo plural → There are"
                },
                "There have": {
                    errorType: "Forma inexistente",
                    explanation: "'There have' no existe como estructura de existencia. Solo usamos 'There is' (singular) o 'There are' (plural).",
                    rule: "Existencia: There is / There are — nunca 'there have'"
                }
            },
            correctReason: "Usamos <span class='why-highlight'>There are</span> porque 'many things' es plural. La palabra 'many' siempre exige 'There are'.",
            examples: ["There are many books → plural", "There are two friends → plural", "There are nice plans → plural"]
        },
        {
            id: 3,
            sentence: "Ana _____ very happy about her good friends.",
            translation: "Ana está muy feliz por sus buenos amigos.",
            hint: "El sujeto es 'Ana' (= she). ¿Qué forma del verbo 'to be' usas con he/she/it?",
            clue: "Ana (= she, singular)",
            clueExplain: "'Ana' es tercera persona singular femenina (= she). Con he/she/it, la forma de 'to be' en afirmativo es 'is'.",
            structureType: "to-be-aff",
            structureLabel: "To be — Afirmativo",
            options: ["is", "are", "am"],
            correct: "is",
            feedback: {
                "are": {
                    errorType: "Sujeto incorrecto para 'are'",
                    explanation: "'Are' se usa con YOU, WE, THEY. 'Ana' equivale a 'she' — tercera persona singular. La forma correcta para he/she/it es 'is'.",
                    rule: "I → am / You, We, They → are / He, She, It → is"
                },
                "am": {
                    errorType: "Sujeto incorrecto para 'am'",
                    explanation: "'Am' se usa ÚNICAMENTE con 'I'. 'Ana' equivale a 'she' — tercera persona. Con she/he/it siempre se usa 'is'.",
                    rule: "'Am' = solo con I. 'Is' = con he, she, it, o nombres propios singulares"
                }
            },
            correctReason: "'Ana' equivale a 'she' — tercera persona singular. Con she/he/it, el verbo 'to be' siempre es <span class='why-highlight'>is</span>.",
            examples: ["Ana is happy → she is", "Carlos is nice → he is", "The plan is good → it is"]
        },
        {
            id: 4,
            sentence: "_____ no bad thing about our big plan.",
            translation: "No hay ninguna cosa mala en nuestro gran plan.",
            hint: "Esta es una negación con 'there'. 'Thing' es singular. ¿Qué forma de 'there' usas con singular?",
            clue: "no bad thing (singular negativo)",
            clueExplain: "'No bad thing' tiene 'thing' en singular. Aunque es negativa, la regla de número se mantiene: singular → 'There is'.",
            structureType: "there-is",
            structureLabel: "There is — Negativo",
            options: ["There are", "There isn't", "There is"],
            correct: "There is",
            feedback: {
                "There are": {
                    errorType: "Singular vs. Plural",
                    explanation: "'There are' es para plural. 'No bad thing' usa 'thing' sin -s — singular. La regla de número aplica también en negaciones: singular → 'There is'.",
                    rule: "There is + singular (positivo o negativo) / There are + plural"
                },
                "There isn't": {
                    errorType: "Estructura incompleta en este contexto",
                    explanation: "'There isn't' también expresa negación singular, pero cuando la oración ya incluye 'no' dentro del sintagma nominal ('no bad thing'), la estructura correcta y completa es 'There is no + sustantivo'.",
                    rule: "There is no + sustantivo = forma negativa correcta con 'no' interno"
                }
            },
            correctReason: "La estructura <span class='why-highlight'>There is no + sustantivo singular</span> es una forma negativa correcta y completa. 'Thing' es singular → 'is'.",
            examples: ["There is no book → singular neg.", "There is no plan → singular neg.", "There is no bad thing → singular neg."]
        },
        {
            id: 5,
            sentence: "Maria and Carlos _____ good friends of Ana.",
            translation: "Maria y Carlos son buenos amigos de Ana.",
            hint: "El sujeto son DOS personas unidas por 'and'. Dos personas = plural. ¿Qué forma del verbo 'to be' usas?",
            clue: "Maria and Carlos (= they, plural)",
            clueExplain: "'Maria and Carlos' son dos personas — equivale a 'they' (plural). Con they/we/you, la forma de 'to be' es 'are'.",
            structureType: "to-be-aff",
            structureLabel: "To be — Afirmativo",
            options: ["is", "are", "am"],
            correct: "are",
            feedback: {
                "is": {
                    errorType: "Plural tratado como singular",
                    explanation: "'Is' es para he/she/it (singular). 'Maria and Carlos' son DOS personas — eso es plural (they). Con plural la forma correcta es 'are'.",
                    rule: "Nombre 1 + and + Nombre 2 = plural → they are"
                },
                "am": {
                    errorType: "Sujeto incorrecto para 'am'",
                    explanation: "'Am' se usa exclusivamente con 'I'. 'Maria and Carlos' equivale a 'they' — plural de tercera persona. La forma correcta es 'are'.",

    // ── STATE ──
    let currentQuestion = 0;
    let score = 0;
    let answered = new Array(quizData.length).fill(false);

    // ── INIT ──
    function initQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';
        quizData.forEach((q, qi) => {
            const card = document.createElement('div');
            card.className = `question-card ${qi !== 0 ? 'hidden' : ''}`;
            card.id = `card-${qi}`;
            card.innerHTML = `
                <div class="q-header">
                    <div class="question-number">${q.id}</div>
                    <span class="verb-type-badge ${q.structureType}">${q.structureLabel}</span>
                </div>
                <div class="hint-box">
                    <div class="hint-label">💡 Pista</div>
                    ${q.hint}
                </div>
                <div class="question-text">
                    ${q.sentence.replace('_____', `<span class="blank" id="blank-${qi}">?</span>`)}
                </div>
                <div class="translation">${q.translation}</div>
                <div class="options-grid" id="options-${qi}">
                    ${q.options.map(opt => `<button class="option-btn" onclick="selectOption(${qi}, this.textContent.trim())">${opt}</button>`).join('')}
                </div>
                <div class="feedback" id="feedback-${qi}"></div>
                <div class="nav-buttons">
                    <button class="nav-btn prev" onclick="prevQuestion()" ${qi === 0 ? 'disabled' : ''}>← Anterior</button>
                    <button class="nav-btn next" id="next-${qi}" onclick="nextQuestion(${qi})" disabled>Siguiente →</button>
                </div>
            `;
            container.appendChild(card);
        });
        updateProgress();
    }

    function selectOption(qi, selected) {
        if (answered[qi]) return;
        answered[qi] = true;
        const q = quizData[qi];
        const isCorrect = selected === q.correct;
        if (isCorrect) score++;

        const blank = document.getElementById(`blank-${qi}`);
        blank.textContent = selected;
        blank.classList.add(isCorrect ? 'correct' : 'incorrect');

        document.querySelectorAll(`#options-${qi} .option-btn`).forEach(b => {
            b.disabled = true;
            const t = b.textContent.trim();
            if (t === q.correct) b.classList.add('correct');
            else if (t === selected) b.classList.add('incorrect');
        });

        buildFeedback(qi, selected, isCorrect, q);
        document.getElementById(`next-${qi}`).disabled = false;
        updateProgress();
    }

    function buildFeedback(qi, selected, isCorrect, q) {
        const el = document.getElementById(`feedback-${qi}`);
        el.className = `feedback show ${isCorrect ? 'correct' : 'incorrect'}`;
        const examplesHTML = q.examples.map(e => {
            const p = e.split(' → ');
            return `<span class="rule-ex"><span class="base">${p[0]}</span><span class="arrow">→</span><span class="past">${p[1]}</span></span>`;
        }).join('');

        if (isCorrect) {
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">✅</span>
                    <div><div class="fb-title">¡Correcto!</div><div class="fb-subtitle">Elegiste la forma correcta</div></div>
                </div>
                <div class="fb-body">
                    <div class="fb-signal">
                        <div class="fb-block-title">🔍 La señal clave que debías identificar</div>
                        <div class="fb-signal-text">La señal <span class="signal-tag">${q.clue}</span> en la oración indica qué forma usar. ${q.clueExplain}</div>
                    </div>
                    <div class="fb-rule">
                        <div class="fb-block-title">📐 Regla aplicada</div>
                        <div class="rule-formula">${q.structureLabel} → ${q.correct}</div>
                        <div class="rule-examples">${examplesHTML}</div>
                    </div>
                    <div class="fb-why">
                        <div class="fb-block-title">💡 ¿Por qué es correcta?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>`;
        } else {
            const err = q.feedback[selected] || { errorType: 'Error', explanation: 'Respuesta incorrecta.', rule: '' };
            el.innerHTML = `
                <div class="fb-header">
                    <span class="fb-icon">❌</span>
                    <div><div class="fb-title">Incorrecto</div><div class="fb-subtitle">Revisemos juntos qué pasó</div></div>
                </div>
                <div class="fb-body">
                    <div class="fb-signal wrong">
                        <div class="fb-block-title">🔍 La señal clave que debías identificar</div>
                        <div class="fb-signal-text">La señal <span class="signal-tag red">${q.clue}</span> indica qué forma usar. ${q.clueExplain}</div>
                    </div>
                    <div class="fb-compare">
                        <div class="fb-block-title" style="color:#64748B;">🔄 Tu respuesta vs. la correcta</div>
                        <div class="fb-compare-row"><span class="compare-label wrong">Tú elegiste</span><span class="compare-text"><span class="word-wrong">${selected}</span></span></div>
                        <div class="fb-compare-row"><span class="compare-label right">Correcto</span><span class="compare-text"><span class="word-right">${q.correct}</span></span></div>
                    </div>
                    <div class="fb-error">
                        <div class="fb-block-title">⚠️ Tipo de error: <span class="error-badge">${err.errorType}</span></div>
                        <div class="error-word-row">
                            <span class="ew-box ew-wrong">${selected}</span>
                            <span class="ew-arrow">→</span>
                            <span class="ew-box ew-right">${q.correct}</span>
                        </div>
                        <div class="error-rule">${err.explanation}</div>
                        ${err.rule ? `<div style="margin-top:0.5rem;font-size:0.82rem;color:var(--error-dark);font-weight:700;">📌 ${err.rule}</div>` : ''}
                    </div>
                    <div class="fb-rule">
                        <div class="fb-block-title">📐 La regla correcta</div>
                        <div class="rule-formula">${q.structureLabel} → ${q.correct}</div>
                        <div class="rule-examples">${examplesHTML}</div>
                    </div>
                    <div class="fb-why">
                        <div class="fb-block-title">💡 ¿Por qué es correcta la respuesta?</div>
                        <div class="fb-why-text">${q.correctReason}</div>
                    </div>
                </div>`;
        }
    }

    function showQuestion(i) {
        document.querySelectorAll('.question-card').forEach((c, idx) => c.classList.toggle('hidden', idx !== i));
        document.getElementById('currentQ').textContent = i + 1;
        currentQuestion = i;
    }

    function nextQuestion(i) {
        if (i < quizData.length - 1) showQuestion(i + 1);
        else showResults();
    }

    function prevQuestion() { if (currentQuestion > 0) showQuestion(currentQuestion - 1); }

    function updateProgress() {
        const done = answered.filter(Boolean).length;
        document.getElementById('progressFill').style.width = (done / quizData.length * 100) + '%';
    }

    function showResults() {
        document.querySelectorAll('.question-card').forEach(c => c.classList.add('hidden'));
        const rs = document.getElementById('resultsScreen');
        rs.classList.add('show');
        const pct = score / quizData.length * 100;
        document.getElementById('finalScore').textContent = `${score}/${quizData.length}`;
        const stars = pct >= 90 ? 3 : pct >= 70 ? 2 : 1;
        document.getElementById('resultsMessage').textContent = pct >= 90
            ? '¡Excelente! Dominas There is/are y To be. 🏆'
            : pct >= 70 ? '¡Muy bien! Sigue practicando. 💪'
            : 'Buen esfuerzo. Repasa las reglas e inténtalo de nuevo. 📚';
        document.querySelectorAll('.star').forEach((s, i) => {
            if (i < stars) setTimeout(() => s.classList.add('earned'), i * 300);
        });
    }

    document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
